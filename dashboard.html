<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>Power Up Midiática</title>
  <link rel="preload" href="./fonts/BwModelica-Regular.otf" as="font" type="font/otf" crossorigin>
  <link rel="preload" href="./fonts/BwModelica-Bold.otf" as="font" type="font/otf" crossorigin>
  <style>
    @font-face {
      font-family: 'BW Modelica';
      src: url('./fonts/BwModelica-Regular.otf') format('opentype');
      font-weight: 400;
      font-display: swap;
    }
    @font-face {
      font-family: 'BW Modelica';
      src: url('./fonts/BwModelica-Bold.otf') format('opentype');
      font-weight: 700;
      font-display: swap;
    }
    /* ── Design tokens: fonte única de cor/raio/sombra (antes: rgba() repetidos 40+ vezes) ── */
    :root {
      --ink: #0A0A0A;          /* texto primário */
      --ink-2: #55555E;        /* texto secundário (>= 6:1 sobre branco) */
      --muted: #75757F;        /* rótulos e metadados (>= 4.5:1) */
      --faint: #A9A9B2;        /* decorativo/desabilitado apenas — nunca texto de leitura */
      --brand: #FFCF06;
      --surface: #F6F6F7;
      --card: #FFFFFF;
      --border: #E8E8EC;       /* hairline padrão */
      --border-2: #DBDBE1;     /* hairline reforçada (cabeçalhos, inputs) */
      --ok-text: #1E7A46;   --ok-bg: #EAF6EF;   --ok-line: #CDE9D9;
      --warn-text: #8A6400; --warn-bg: #FFF4D6; --warn-line: #F0E0AB;
      --danger-text: #B3272F; --danger-bg: #FDECEC; --danger-line: #F5CFD1;
      --radius-sm: 6px;
      --radius: 10px;
      --radius-lg: 14px;
      --shadow-1: 0 1px 2px rgba(10,10,15,0.05), 0 1px 3px rgba(10,10,15,0.04);
      --shadow-2: 0 2px 6px rgba(10,10,15,0.06), 0 8px 24px rgba(10,10,15,0.09);
      --shadow-pop: 0 12px 32px rgba(10,10,15,0.16), 0 4px 10px rgba(10,10,15,0.08);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'BW Modelica', 'Inter', 'Helvetica Neue', sans-serif;
      font-size: 14px;
      line-height: 1.45;
      color: var(--ink);
      background: var(--surface);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    button:focus-visible, a:focus-visible { outline: 2px solid var(--ink); outline-offset: 2px; }
    .header {
      background: #0A0A0A;
      color: #F9F9F9;
      padding: 18px 24px 0;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header h1 { font-size: 16px; font-weight: 400; letter-spacing: 0.01em; margin-bottom: 14px; }
    /* flex-wrap: sem ele, com 5 abas o rótulo longo "Análises Personalizadas" estourava a
       largura do iframe estreito do Power-Up e as abas à direita eram recortadas (sumiam).
       Quebra para uma 2ª linha só quando não cabe; em telas largas fica idêntico a antes. */
    .tabs { display: flex; flex-wrap: wrap; gap: 2px; }
    .tab {
      white-space: nowrap;
      padding: 9px 16px 11px;
      background: transparent;
      color: #A2A2AA;
      border: none;
      border-bottom: 2px solid transparent;
      border-radius: var(--radius-sm) var(--radius-sm) 0 0;
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
      font-weight: 500;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .tab:hover { color: #F9F9F9; background: rgba(255,255,255,0.06); }
    .tab.active { color: var(--brand); border-bottom-color: var(--brand); font-weight: 700; }
    .tab:focus-visible { outline-color: var(--brand); outline-offset: -2px; }
    .alert-banner {
      padding: 10px 24px;
      border-left: 3px solid;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
    }
    .alert-banner.danger { background: var(--danger-bg); border-color: var(--danger-text); color: var(--ink); }
    .alert-banner.success { background: var(--ok-bg); border-color: var(--ok-text); color: var(--ink); }
    .body { padding: 28px 24px 44px; max-width: 980px; margin: 0 auto; position: relative; }
    .spinner-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 0; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid rgba(10,10,15,0.08);
      border-top-color: var(--brand);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner-wrap p { margin-top: 12px; color: var(--muted); }
    .error-box { text-align: center; padding: 60px 20px; color: var(--ink); }
    .error-box button { margin-top: 12px; }
    .btn {
      background: var(--brand); color: var(--ink); border: none; border-radius: 8px;
      padding: 9px 18px; font-size: 13px; font-family: inherit; font-weight: 700; cursor: pointer;
      transition: background 0.15s;
    }
    .btn:hover { background: #EFC303; }
    .btn:disabled { background: #ECECEF; color: var(--faint); cursor: not-allowed; }
    .btn-secondary { background: var(--card); color: var(--ink); border: 1px solid var(--border-2); }
    .btn-secondary:hover { background: #FAFAFB; border-color: #B9B9C2; }
    /* ── Health Score: painel hero centralizado ── */
    .score-circle-wrap {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-1);
      padding: 28px 20px 24px;
      margin-bottom: 24px;
      text-align: center;
    }
    .score-ring-svg { display: block; margin: 0 auto 8px; }
    /* preenchimento do anel com easing suave; cor transiciona junto (só visual) */
    .score-ring-progress { transition: stroke-dashoffset 0.9s cubic-bezier(0.22,1,0.36,1), stroke 0.6s ease; }
    /* status = ponto colorido (marca) + texto em tinta — texto nunca veste a cor do dado */
    .score-status {
      display: inline-flex; align-items: center; justify-content: center; gap: 7px;
      font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.09em;
      color: var(--ink-2);
    }
    .score-status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    /* grid determinístico: 6 KPIs em 1 linha; 3+3 em telas médias; 2×3 em estreitas
       (auto-fit deixava a 6ª métrica órfã numa segunda linha) */
    .kpi-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px; margin-bottom: 24px; }
    @media (max-width: 1024px) { .kpi-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 540px) { .kpi-grid { grid-template-columns: repeat(2, 1fr); } }
    .kpi-card {
      background: var(--card); border-radius: 12px; padding: 16px 18px; border: 1px solid var(--border);
      box-shadow: var(--shadow-1);
      display: flex; flex-direction: column; min-height: 124px;
      transition: box-shadow 0.18s ease, transform 0.18s ease, border-color 0.18s ease;
    }
    /* realce sutil ao passar o mouse (transform/box-shadow → barato p/ o compositor) */
    .kpi-card:hover { box-shadow: var(--shadow-2); transform: translateY(-2px); border-color: var(--border-2); }
    /* KPI clicável: cursor + realce em marca + rótulo "N cards →" revelado no hover/foco */
    .kpi-card.kpi-clickable { cursor: pointer; }
    .kpi-card.kpi-clickable:hover { border-color: var(--brand); }
    .kpi-card.kpi-clickable:focus-visible { outline: 2px solid var(--ink); outline-offset: 2px; }
    .kpi-cardcount { font-size: 10px; font-weight: 700; color: var(--muted); margin-top: 8px; letter-spacing: 0.03em; text-transform: uppercase; opacity: 0; transform: translateY(-2px); transition: opacity 0.15s, transform 0.15s, color 0.15s; }
    .kpi-card.kpi-clickable:hover .kpi-cardcount, .kpi-card.kpi-clickable:focus-visible .kpi-cardcount { opacity: 1; transform: none; color: var(--ink); }
    /* nome: rótulo discreto; min-height alinha os valores entre cards de 1 ou 2 linhas */
    .kpi-card .kpi-name { font-size: 11px; color: var(--muted); font-weight: 600; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.06em; line-height: 1.3; min-height: 28px; }
    /* valor: protagonista do card; dígitos proporcionais (tabular só em colunas de tabela) */
    .kpi-card .kpi-value { font-size: 26px; font-weight: 700; color: var(--ink); line-height: 1.05; letter-spacing: -0.02em; }
    .kpi-card .kpi-meta { font-size: 11px; color: var(--muted); margin-top: 5px; }
    /* margin-top:auto empurra a barra para a base → todas alinhadas, qualquer que seja o texto */
    .kpi-bar-bg { height: 6px; background: rgba(10,10,15,0.06); border-radius: 999px; margin-top: auto; overflow: hidden; }
    /* transição suave de largura E cor, sem flicker (parent com overflow:hidden) */
    .kpi-bar-fill { height: 100%; border-radius: 999px; transition: width 0.6s cubic-bezier(0.22,1,0.36,1), background 0.5s ease; }
    .footer-bar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .footer-bar .info { font-size: 12px; color: var(--muted); margin-left: auto; }
    .collapsible { margin-bottom: 24px; }
    .collapse-toggle {
      width: 100%; text-align: left; padding: 12px 16px;
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      box-shadow: var(--shadow-1);
      cursor: pointer; font-family: inherit; font-size: 12px; font-weight: 700; color: var(--ink);
      text-transform: uppercase; letter-spacing: 0.05em;
      transition: background 0.15s;
    }
    .collapse-toggle:hover { background: #FAFAFB; }
    .collapse-toggle.open { border-radius: var(--radius) var(--radius) 0 0; }
    .collapse-body {
      display: none; background: var(--card); border: 1px solid var(--border);
      border-top: none; border-radius: 0 0 var(--radius) var(--radius); padding: 0;
      overflow-x: auto;
    }
    .collapse-body.open { display: block; }
    /* ── Tabelas: regras COMPARTILHADAS entre as 4 tabelas (antes: 4 blocos duplicados) ── */
    .funnel-table, .history-table, .rework-table, .collapse-body table {
      width: 100%; border-collapse: collapse; background: var(--card);
    }
    .funnel-table, .history-table, .rework-table {
      border-radius: var(--radius); overflow: hidden;
      border: 1px solid var(--border); box-shadow: var(--shadow-1);
    }
    .funnel-table th, .history-table th, .rework-table th, .collapse-body th {
      text-align: left; padding: 9px 14px; background: #FAFAFB;
      font-size: 11px; text-transform: uppercase; color: var(--muted); font-weight: 700;
      letter-spacing: 0.06em; border-bottom: 1px solid var(--border-2); white-space: nowrap;
    }
    .funnel-table td, .history-table td, .rework-table td, .collapse-body td {
      padding: 9px 14px; border-bottom: 1px solid var(--border); font-size: 13px;
    }
    .funnel-table tr:nth-child(even) td, .history-table tr:nth-child(even) td,
    .rework-table tr:nth-child(even) td, .collapse-body tr:nth-child(even) td { background: #FBFBFC; }
    .funnel-table tbody tr:hover td, .history-table tbody tr:hover td,
    .rework-table tbody tr:hover td, .collapse-body tbody tr:hover td { background: rgba(255,207,6,0.07); }
    /* wrapper de rolagem horizontal: em telas estreitas a tabela desliza, nada quebra.
       min-width só nas tabelas de largura cheia (a de retrabalho vive numa coluna de ~460px) */
    .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .table-scroll > .funnel-table, .table-scroll > .history-table { min-width: 560px; }
    /* ── Tempo até 1ª entrega por nível de esforço ── */
    .pe-section { margin-bottom: 24px; }
    .pe-title-row { display: flex; align-items: flex-end; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 14px; }
    .pe-title-left { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
    .pe-title-row h3 { margin: 0; font-size: 15px; font-weight: 700; letter-spacing: -0.01em; }
    .pe-hint { font-size: 12px; font-weight: 500; color: var(--muted); }
    .pe-epoch { font-size: 11px; color: var(--muted); }
    /* seletor segmentado Média / Mediana (padrão SaaS: trilho + pílula ativa em elevação) */
    .pe-metric { display: inline-flex; background: rgba(10,10,15,0.05); border: 1px solid var(--border); border-radius: 999px; padding: 3px; gap: 2px; flex-shrink: 0; }
    .pe-metric-opt { border: none; background: transparent; font-family: inherit; font-size: 12px; font-weight: 700; color: var(--muted); padding: 5px 14px; border-radius: 999px; cursor: pointer; transition: background 0.15s, color 0.15s, box-shadow 0.15s; }
    .pe-metric-opt:hover:not(.on) { color: var(--ink); }
    .pe-metric-opt.on { background: var(--card); color: var(--ink); box-shadow: var(--shadow-1); }
    .pe-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
    /* Card: mesma linguagem do .kpi-card (raio/borda/hover) + acento de cor por nível no topo. */
    .pe-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 12px;
      border-top: 3px solid var(--pe-cor, var(--faint)); overflow: hidden;
      box-shadow: var(--shadow-1);
      transition: box-shadow 0.18s ease, transform 0.18s ease, border-color 0.18s ease;
    }
    .pe-card:hover { box-shadow: var(--shadow-2); transform: translateY(-2px); }
    .pe-card.pe-nodata { border-top-color: var(--border-2); }
    .pe-toggle {
      width: 100%; text-align: left; background: transparent; border: none; cursor: pointer;
      padding: 16px 18px; font-family: inherit; color: var(--ink); display: block;
      transition: background 0.14s;
    }
    .pe-toggle:hover:not(:disabled) { background: rgba(255,207,6,0.06); }
    .pe-toggle:disabled { cursor: default; }
    .pe-toggle:focus-visible { outline-offset: -2px; }
    .pe-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    /* chip do nível: pílula neutra + ponto na cor do nível → diferenciação forte e limpa */
    .pe-chip { display: inline-flex; align-items: center; gap: 6px; padding: 3px 9px; border-radius: 999px;
      background: rgba(10,10,15,0.04); font-size: 10px; font-weight: 700; letter-spacing: 0.07em;
      text-transform: uppercase; color: var(--pe-cor, var(--ink)); }
    .pe-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; background: var(--pe-cor, var(--faint)); }
    .pe-arrow { color: var(--faint); font-size: 11px; }
    /* valor protagonista (dígitos proporcionais) + unidade subordinada; dias em linha discreta */
    .pe-main { display: flex; align-items: baseline; gap: 5px; }
    .pe-value { font-size: 26px; font-weight: 700; color: var(--ink); line-height: 1.0; letter-spacing: -0.02em; }
    .pe-unit { font-size: 13px; font-weight: 600; color: var(--ink-2); }
    .pe-days { font-size: 12px; color: var(--muted); margin-top: 3px; }
    .pe-main.pe-empty { font-size: 15px; color: var(--muted); font-weight: 500; }
    /* mini-barra de comparação: escala COMPARTILHADA entre os 3 níveis (largura = avg/máx);
       trilha em tom claro da MESMA cor do nível (fallback neutro p/ browsers sem color-mix) */
    .pe-compare { height: 6px; background: rgba(10,10,15,0.06); background: color-mix(in srgb, var(--pe-cor, #A9A9B2) 14%, #FFFFFF); border-radius: 999px; margin: 12px 0 8px; overflow: hidden; }
    .pe-compare-fill { height: 100%; border-radius: 999px; background: var(--pe-cor, var(--faint)); transition: width 0.6s cubic-bezier(0.22,1,0.36,1); }
    .pe-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }
    .pe-body { display: none; border-top: 1px solid var(--border); padding: 4px 0 0; }
    .pe-body.open { display: block; }
    .pe-table { width: 100%; border-collapse: collapse; }
    .pe-table th { text-align: left; font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); padding: 8px 18px 4px; font-weight: 700; }
    .pe-table td { padding: 6px 18px; font-size: 12px; border-bottom: 1px solid var(--border); }
    .pe-table td:last-child { text-align: right; font-variant-numeric: tabular-nums; }
    /* ── stat tiles (padrão SaaS premium): rótulo, valor protagonista, nota/badge ── */
    .pe-stats-grid { display: grid; grid-template-columns: 1fr; gap: 8px; padding: 12px 18px 4px; }
    .pe-stat { display: flex; flex-direction: column; gap: 4px; text-align: left; width: 100%;
      background: #FBFBFC; border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; font-family: inherit; }
    .pe-stat-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; color: var(--muted); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .pe-stat-value { font-size: 17px; font-weight: 700; color: var(--ink); letter-spacing: -0.01em; font-variant-numeric: tabular-nums; display: flex; align-items: baseline; gap: 6px; }
    .pe-stat-note { font-size: 11px; color: var(--muted); font-variant-numeric: tabular-nums; }
    .pe-stat-of { font-size: 12px; font-weight: 600; color: var(--muted); }
    .pe-stat-pct { margin-left: auto; align-self: center; font-size: 12px; font-weight: 700; color: var(--pe-cor, var(--ink));
      background: color-mix(in srgb, var(--pe-cor, #A9A9B2) 14%, #fff); padding: 2px 9px; border-radius: 999px; }
    .pe-stat-tag { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; color: var(--danger-text);
      background: var(--danger-bg); border: 1px solid var(--danger-line); padding: 1px 6px; border-radius: 999px; }
    .pe-stat-click { cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s, background 0.15s; }
    .pe-stat-click:hover { border-color: var(--pe-cor, var(--border-2)); box-shadow: var(--shadow-1); transform: translateY(-1px); background: var(--card); }
    .pe-stat-rw[disabled] { cursor: default; }
    /* amplitude mín–máx: trilho na cor do nível + marcador na posição da tendência central */
    .pe-range { display: flex; align-items: center; gap: 8px; margin-top: 2px; }
    .pe-range-cap { font-size: 11px; font-weight: 600; color: var(--ink-2); font-variant-numeric: tabular-nums; white-space: nowrap; }
    .pe-range-track { position: relative; flex: 1; height: 6px; border-radius: 999px; background: color-mix(in srgb, var(--pe-cor, #A9A9B2) 16%, #fff); }
    .pe-range-mark { position: absolute; top: 50%; width: 12px; height: 12px; border-radius: 50%; background: var(--pe-cor, var(--faint));
      border: 2px solid var(--card); box-shadow: var(--shadow-1); transform: translate(-50%, -50%); }
    /* link → abre o MESMO modal de cards da aba Análises Personalizadas */
    .pe-cards-link { display: block; margin: 8px 18px 14px; text-align: center; background: transparent;
      border: 1px dashed var(--border-2); border-radius: 10px; padding: 9px; font-family: inherit; font-size: 12px; font-weight: 600;
      color: var(--ink-2); cursor: pointer; transition: background 0.14s, border-color 0.14s, color 0.14s; }
    .pe-cards-link:hover { background: rgba(255,207,6,0.10); border-color: var(--brand); color: var(--ink); }
    .pe-foot { font-size: 11px; color: var(--muted); margin-top: 10px; }
    @media (max-width: 700px) { .pe-grid { grid-template-columns: 1fr; } }
    @media (max-width: 480px) { .pe-title-row { align-items: flex-start; } .pe-metric { width: 100%; } .pe-metric-opt { flex: 1; text-align: center; } }
    /* tag de campo faltante = aviso → tom âmbar (o emoji ⚠️ acompanha o texto) */
    .missing-tag {
      display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600;
      margin: 1px 3px; background: var(--warn-bg); color: var(--warn-text); border: 1px solid var(--warn-line);
    }
    .summary-cards { display: flex; gap: 14px; margin-bottom: 20px; flex-wrap: wrap; }
    .summary-card {
      flex: 1; min-width: 180px; background: var(--card); border-radius: 12px;
      padding: 16px; border: 1px solid var(--border); box-shadow: var(--shadow-1); text-align: center;
    }
    .summary-card .sc-value { font-size: 27px; font-weight: 700; color: var(--ink); letter-spacing: -0.02em; }
    .summary-card .sc-label { font-size: 12px; color: var(--muted); margin-top: 4px; }
    /* quadro-resumo clicável: mesma linguagem de interação dos KPI/painéis */
    .summary-card.sc-clickable { cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s; }
    .summary-card.sc-clickable:hover { border-color: var(--brand); box-shadow: var(--shadow-2); transform: translateY(-2px); }
    .summary-card.sc-clickable:focus-visible { outline: 2px solid var(--ink); outline-offset: 2px; }
    .summary-card .sc-cardcount { display: block; font-size: 10px; font-weight: 700; color: var(--muted); margin-top: 6px; letter-spacing: 0.03em; text-transform: uppercase; opacity: 0; transition: opacity 0.15s, color 0.15s; }
    .summary-card.sc-clickable:hover .sc-cardcount, .summary-card.sc-clickable:focus-visible .sc-cardcount { opacity: 1; color: var(--ink); }
    .funnel-table { margin-bottom: 24px; }
    /* barra fina (marca discreta); a contagem numérica ao lado carrega o valor exato */
    .funnel-bar { height: 8px; background: var(--brand); border-radius: 999px; min-width: 4px; }
    /* pílulas de status com cor semântica real (emoji + texto acompanham — nunca só cor) */
    .funnel-table .status-ok, .funnel-table .status-warn, .funnel-table .status-danger {
      display: inline-block; padding: 2px 9px; border-radius: 999px;
      font-size: 12px; font-weight: 600; white-space: nowrap;
    }
    .funnel-table .status-ok { color: var(--ok-text); background: var(--ok-bg); border: 1px solid var(--ok-line); }
    .funnel-table .status-warn { color: var(--warn-text); background: var(--warn-bg); border: 1px solid var(--warn-line); }
    .funnel-table .status-danger { color: var(--danger-text); background: var(--danger-bg); border: 1px solid var(--danger-line); }
    .funnel-table tr.concluded td { background: rgba(255,207,6,0.10); }
    .detail-flex { display: flex; gap: 24px; margin-top: 24px; }
    .detail-flex > div { flex: 1; min-width: 0; }
    @media (max-width: 900px) { .detail-flex { flex-direction: column; } }
    .pag-controls { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 12px; }
    .pag-btn {
      background: var(--card); color: var(--ink); border: 1px solid var(--border-2); border-radius: 8px;
      padding: 6px 14px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit;
      transition: background 0.15s, border-color 0.15s;
    }
    .pag-btn:disabled { opacity: 0.4; cursor: default; }
    .pag-btn:hover:not(:disabled) { background: #FAFAFB; border-color: #B9B9C2; }
    .pag-info { font-size: 12px; color: var(--muted); }
    .alerts-section { margin-top: 0; }
    .alerts-section h3 { font-size: 15px; margin-bottom: 12px; color: var(--ink); font-weight: 700; letter-spacing: -0.01em; }
    .alert-row { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow-1); padding: 11px 14px; margin-bottom: 8px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .alert-row .ar-name { font-weight: 600; flex: 1; min-width: 200px; color: var(--ink); }
    .alert-row .ar-stage { color: var(--muted); font-size: 13px; }
    .alert-row .ar-days { color: var(--ink); font-weight: 700; font-variant-numeric: tabular-nums; }
    /* excesso de SLA = alerta → pílula em tom de perigo */
    .alert-row .ar-excess { background: var(--danger-bg); color: var(--danger-text); padding: 2px 9px; border-radius: 999px; font-size: 12px; font-weight: 600; border: 1px solid var(--danger-line); }
    .history-table tr.current-month td { background: rgba(255,207,6,0.10); border-left: 3px solid var(--brand); font-weight: 600; }
    .history-empty { text-align: center; padding: 40px; color: var(--muted); }
    /* ── Histórico: cards de tendência (variação vs. o mês anterior registrado) ──
       Mesma linguagem do .kpi-card (raio/borda/sombra/hover). O delta usa DUPLA
       codificação: a seta dá a direção e a cor dá o juízo (bom/ruim), respeitando
       o tipo do KPI — em indicadores "quanto menor melhor" (tipo B) uma queda é boa. */
    .hist-trend { display: grid; grid-template-columns: repeat(auto-fit, minmax(158px, 1fr)); gap: 14px; margin-bottom: 24px; }
    .hist-tile {
      background: var(--card); border: 1px solid var(--border); border-radius: 12px;
      padding: 14px 16px; box-shadow: var(--shadow-1);
      display: flex; flex-direction: column; min-height: 130px;
      transition: box-shadow 0.18s ease, transform 0.18s ease, border-color 0.18s ease;
    }
    .hist-tile:hover { box-shadow: var(--shadow-2); transform: translateY(-2px); border-color: var(--border-2); }
    .hist-tile-name { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); line-height: 1.3; min-height: 26px; }
    .hist-tile-value { font-size: 24px; font-weight: 700; color: var(--ink); letter-spacing: -0.02em; line-height: 1.1; margin-top: 4px; }
    .hist-tile-foot { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-top: 7px; }
    .hist-delta { display: inline-flex; align-items: center; gap: 3px; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 999px; font-variant-numeric: tabular-nums; }
    .hist-delta.good { color: var(--ok-text); background: var(--ok-bg); border: 1px solid var(--ok-line); }
    .hist-delta.bad { color: var(--danger-text); background: var(--danger-bg); border: 1px solid var(--danger-line); }
    .hist-delta.neutral { color: var(--ink-2); background: rgba(10,10,15,0.05); border: 1px solid var(--border); }
    .hist-vs { font-size: 10px; color: var(--muted); }
    .hist-spark { display: block; width: 100%; height: 26px; margin-top: auto; padding-top: 10px; }
    /* cabeçalho da tendência + seletor de datas da comparação */
    .hist-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }
    .hist-head h3 { margin: 0; font-size: 15px; font-weight: 700; letter-spacing: -0.01em; }
    .hist-controls { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .hist-controls label, .hist-controls-sep { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); }
    .hist-select {
      padding: 6px 10px; border: 1px solid var(--border-2); border-radius: 8px; background: var(--card);
      font-size: 12px; font-weight: 600; font-family: inherit; color: var(--ink); cursor: pointer;
      transition: border-color 0.14s, box-shadow 0.14s;
    }
    .hist-select:hover { border-color: var(--brand); }
    .hist-select:focus { outline: none; border-color: var(--ink); box-shadow: 0 0 0 3px rgba(255,207,6,0.35); }
    /* tile clicável (mesma linguagem dos KPI cards) → abre a evolução do indicador */
    .hist-tile.hist-clickable { cursor: pointer; }
    .hist-tile.hist-clickable:hover { border-color: var(--brand); }
    .hist-tile.hist-clickable:focus-visible { outline: 2px solid var(--ink); outline-offset: 2px; }
    .hist-drill { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em; color: var(--muted); margin-top: 6px; opacity: 0; transition: opacity 0.15s, color 0.15s; }
    .hist-tile.hist-clickable:hover .hist-drill, .hist-tile.hist-clickable:focus-visible .hist-drill { opacity: 1; color: var(--ink); }
    /* nota de rodapé do gráfico + estado "coletando dados" */
    .hist-note { font-size: 11px; color: var(--muted); margin-top: 10px; line-height: 1.5; }

    /* ── seletor de período (dd/mm/aaaa + calendário) que substitui os selects
       "Comparar <mês> com <mês>" na faixa de Tendência ── */
    .histdate-picker { display: flex; align-items: flex-end; gap: 8px; flex-wrap: wrap; position: relative; }
    .histdate-field { display: flex; flex-direction: column; gap: 3px; }
    .histdate-field label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); }
    .histdate-field input {
      padding: 6px 9px; border: 1px solid var(--border-2); border-radius: 8px;
      font-size: 12px; font-family: inherit; font-weight: 600; background: var(--card); color: var(--ink); width: 96px;
    }
    .histdate-field input:focus { outline: none; border-color: var(--ink); box-shadow: 0 0 0 3px rgba(255,207,6,0.35); }
    .histdate-sep { color: var(--muted); padding-bottom: 7px; font-size: 12px; }
    .histdate-cal-btn {
      display: flex; align-items: center; justify-content: center; width: 30px; height: 30px;
      background: var(--card); border: 1px solid var(--border-2); border-radius: 8px; cursor: pointer; padding: 0;
    }
    .histdate-cal-btn:hover { border-color: var(--brand); background: rgba(255,207,6,0.08); }
    .histdate-cal-btn img { width: 15px; height: 15px; opacity: 0.75; }
    .histdate-error { color: var(--danger-text) !important; }
    .histdate-popover {
      position: absolute; top: calc(100% + 6px); right: 0; z-index: 50; width: 280px;
      background: var(--card); border: 1px solid var(--border-2); border-radius: var(--radius); box-shadow: var(--shadow-pop); padding: 12px;
    }
    .histdate-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; max-height: 74px; overflow-y: auto; }
    .histdate-chip {
      background: var(--surface); border: 1px solid var(--border-2); color: var(--ink);
      border-radius: 999px; padding: 3px 10px; font-size: 11px; font-family: inherit; font-weight: 600; cursor: pointer;
    }
    .histdate-chip:hover { border-color: var(--brand); background: rgba(255,207,6,0.10); }
    .histdate-cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; gap: 6px; }
    .histdate-cal-title { font-size: 12px; font-weight: 700; color: var(--ink); }
    .histdate-cal-nodata { font-size: 10px; font-weight: 600; color: var(--muted); text-transform: none; letter-spacing: 0; }
    .histdate-cal-nav {
      background: transparent; border: 1px solid var(--border-2); border-radius: 6px; width: 22px; height: 22px;
      cursor: pointer; color: var(--ink); font-size: 13px; line-height: 1; flex-shrink: 0;
    }
    .histdate-cal-nav:hover { border-color: var(--brand); background: rgba(255,207,6,0.10); }
    .histdate-cal-weekdays { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; margin-bottom: 4px; }
    .histdate-cal-weekdays span { font-size: 9px; color: var(--muted); font-weight: 700; }
    .histdate-cal-days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
    .histdate-cal-day { display: flex; align-items: center; justify-content: center; height: 25px; font-size: 11px; color: var(--faint); border-radius: 5px; cursor: default; }
    .histdate-cal-day.empty { cursor: default; }
    .histdate-cal-day.has-data { color: var(--ink); cursor: pointer; }
    .histdate-cal-day.has-data:hover { background: rgba(255,207,6,0.15); }
    .histdate-cal-day.today { font-weight: 700; text-decoration: underline; text-decoration-color: var(--brand); }
    .histdate-cal-day.in-range { background: rgba(255,207,6,0.15); }
    .histdate-cal-day.selected { background: var(--brand); color: var(--ink); font-weight: 700; }
    .histdate-cal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 10px; }
    .hist-collect {
      display: flex; flex-direction: column; gap: 6px; text-align: center;
      padding: 28px 22px; border: 1px dashed var(--border-2); border-radius: 12px;
      background: #FBFBFC; color: var(--muted); font-size: 12px; line-height: 1.5;
    }
    .hist-collect b { color: var(--ink); font-size: 13px; }
    .config-section { background: var(--card); border-radius: 12px; padding: 22px; border: 1px solid var(--border); box-shadow: var(--shadow-1); margin-bottom: 20px; }
    .config-section h3 { font-size: 15px; margin-bottom: 16px; color: var(--ink); font-weight: 700; letter-spacing: -0.01em; }
    .config-row { margin-bottom: 16px; }
    .config-row label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; color: var(--ink); }
    .config-row .slider-row { display: flex; align-items: center; gap: 12px; }
    .config-row input[type=range] { flex: 1; accent-color: var(--brand); }
    .config-row .slider-unit { min-width: 70px; font-size: 12px; color: var(--muted); }
    .sla-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .sla-row { display: flex; align-items: center; gap: 8px; }
    .sla-row label { flex: 1; font-size: 13px; margin-bottom: 0; }
    .sla-row input[type=number] { width: 60px; padding: 6px 8px; border: 1px solid var(--border-2); border-radius: 8px; font-size: 14px; font-family: inherit; text-align: center; }
    .sla-row .sla-unit { font-size: 12px; color: var(--muted); }
    .peso-sum { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
    /* soma válida/ inválida com cor semântica (o texto "(deve ser 100)" acompanha) */
    .peso-sum.invalid { color: var(--danger-text); }
    .peso-sum.valid { color: var(--ok-text); }
    .config-footer { display: flex; gap: 12px; align-items: center; }
    .config-msg { font-size: 13px; color: var(--ok-text); font-weight: 600; }
    /* anel de foco consistente em todos os campos de edição */
    .sla-row input[type=number]:focus, .num-input:focus,
    .rework-filters select:focus, .rework-filters input[type=number]:focus {
      outline: none; border-color: var(--ink);
      box-shadow: 0 0 0 3px rgba(255,207,6,0.35);
    }
    .tab-content { display: none; opacity: 0; transition: opacity 0.15s ease; }
    .tab-content.active { display: block; }
    .tab-content.visible { opacity: 1; }
    .rework-section { margin-top: 0; }
    .rework-section h3 { font-size: 15px; margin-bottom: 12px; color: var(--ink); font-weight: 700; letter-spacing: -0.01em; }
    .rework-filters { display: flex; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; align-items: flex-end; }
    .rework-filters select, .rework-filters input[type=number] {
      padding: 7px 10px; border: 1px solid var(--border-2); border-radius: 8px;
      font-size: 13px; font-family: inherit; background: var(--card); color: var(--ink);
    }
    .rework-filters label { font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
    .rework-filters .filter-group { display: flex; flex-direction: column; gap: 4px; }
    .rework-rank { font-weight: 700; color: var(--muted); width: 40px; font-variant-numeric: tabular-nums; }
    .rework-val { font-weight: 700; font-variant-numeric: tabular-nums; }
    /* intensidade do retrabalho: alto em tom de perigo, médio em tinta, baixo atenuado */
    .rework-val.high { color: var(--danger-text); }
    .rework-val.med { color: var(--ink); }
    .rework-val.low { color: var(--ink-2); }
    .label-tag {
      display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 500;
      margin: 1px 3px; background: rgba(255,207,6,0.16); color: var(--ink);
    }
    .rework-empty { text-align: center; padding: 24px; color: var(--muted); font-style: italic; }
    .no-data { text-align: center; padding: 60px 20px; color: var(--muted); }
    /* sem padding/fundo no hover: mudar o box no hover deslocava o layout da linha */
    .card-link {
      color: var(--ink);
      text-decoration: underline;
      text-decoration-color: rgba(255,207,6,0.65);
      text-decoration-thickness: 2px;
      text-underline-offset: 3px;
      cursor: pointer;
      font-weight: 500;
      transition: text-decoration-color 0.15s;
    }
    .card-link:hover { text-decoration-color: var(--brand); }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .skeleton {
      background: linear-gradient(90deg, rgba(10,10,15,0.05) 25%, rgba(10,10,15,0.10) 50%, rgba(10,10,15,0.05) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 12px;
    }
    .skeleton-circle { width: 120px; height: 120px; border-radius: 50%; margin: 0 auto 8px; }
    .skeleton-card { height: 124px; }
    .skeleton-wrap { max-width: 980px; margin: 0 auto; padding: 24px; }
    /* espelha o .kpi-grid real → o skeleton tem a mesma silhueta do conteúdo final */
    .skeleton-kpi-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px; margin-top: 24px; }
    @media (max-width: 1024px) { .skeleton-kpi-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 540px) { .skeleton-kpi-grid { grid-template-columns: repeat(2, 1fr); } }
    .skeleton-status { text-align: center; color: var(--muted); font-size: 13px; margin-top: 16px; }
    .cache-indicator {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 12px; color: var(--muted); background: rgba(10,10,15,0.04);
      padding: 4px 12px; border-radius: 999px;
    }
    .cache-indicator a { color: var(--ink); font-weight: 600; cursor: pointer; text-decoration: underline; }
    .fade-in { animation: fadeIn 0.2s ease-in; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    /* respeita usuários com preferência por menos movimento */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }
    .etapa-count-btn {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 28px; padding: 2px 9px;
      background: rgba(255,207,6,0.14); border: 1px solid rgba(255,207,6,0.50);
      border-radius: 999px; font-size: 13px; font-weight: 700; color: var(--ink);
      font-variant-numeric: tabular-nums;
      cursor: pointer; transition: background 0.15s, border-color 0.15s;
    }
    .etapa-count-btn:hover { background: rgba(255,207,6,0.28); border-color: var(--brand); }
    .table-header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .table-header-row h3 { margin: 0; font-size: 15px; font-weight: 700; letter-spacing: -0.01em; }
    .btn-table-download {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--card); border: 1px solid var(--border-2);
      color: var(--ink); border-radius: 8px; padding: 5px 12px;
      font-size: 12px; font-weight: 500; font-family: inherit; cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn-table-download:hover {
      background: rgba(255,207,6,0.10);
      border-color: var(--brand);
    }
    .num-input-wrap {
      display: flex; align-items: center; gap: 2px;
    }
    .num-input {
      width: 64px; padding: 4px 6px; border: 1px solid var(--border-2);
      border-radius: 8px; font-size: 14px; font-family: inherit;
      font-variant-numeric: tabular-nums;
      text-align: center; color: var(--ink); background: var(--card);
    }
    .num-arrow {
      width: 26px; height: 30px; border: 1px solid var(--border-2);
      border-radius: 8px; background: var(--card); cursor: pointer; font-size: 12px;
      display: flex; align-items: center; justify-content: center;
      color: var(--ink); font-family: inherit;
      transition: background 0.12s, border-color 0.12s;
    }
    .num-arrow:hover { background: rgba(255,207,6,0.15); border-color: var(--brand); }
    .num-arrow:active { background: rgba(255,207,6,0.30); }
    @media (max-width: 700px) {
      .sla-grid { grid-template-columns: 1fr; }
      .body { padding: 20px 16px 32px; }
      .summary-cards { flex-direction: column; }
    }
    /* telas estreitas: cards menores e mais compactos, sem quebrar/sobrepor */
    @media (max-width: 480px) {
      .kpi-grid { gap: 10px; }
      .kpi-card { min-height: 104px; padding: 14px; }
      .kpi-card .kpi-value { font-size: 22px; }
      .score-circle-wrap { padding: 20px 14px 16px; }
    }

    /* ══════════════════════════════════════════════════════════════
       ANÁLISES PERSONALIZADAS (módulo aditivo — reusa design tokens)
       ══════════════════════════════════════════════════════════════ */
    .cp-intro { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; flex-wrap: wrap; margin-bottom: 20px; }
    .cp-intro h2 { font-size: 18px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 4px; }
    .cp-intro p { font-size: 12px; color: var(--muted); max-width: 520px; }
    .cp-intro-actions {
      display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap;
    }
    .cp-slots-hint {
      font-size: 11px; color: var(--muted); font-weight: 600;
      cursor: default; user-select: none;
    }
    .cp-actions-buttons { display: flex; gap: 10px; flex-wrap: wrap; }
    @media (max-width: 720px) {
      .cp-intro-actions { flex-direction: column; align-items: stretch; }
      .cp-slots-hint { text-align: center; margin-bottom: 8px; }
      .cp-actions-buttons { width: 100%; }
    }
    .cp-empty {
      text-align: center; padding: 48px 24px; background: var(--card);
      border: 1px dashed var(--border-2); border-radius: var(--radius-lg); color: var(--muted);
    }
    .cp-empty h3 { font-size: 15px; color: var(--ink); margin-bottom: 6px; font-weight: 700; }
    .cp-empty p { font-size: 13px; margin-bottom: 16px; }
    /* ── card de painel ── */
    .cp-panel {
      background: var(--card); border: 1px solid var(--border);
      border-top: 3px solid var(--cp-color, var(--faint));
      border-radius: var(--radius-lg); box-shadow: var(--shadow-1);
      margin-bottom: 18px; overflow: hidden;
      transition: box-shadow 0.18s ease, border-color 0.18s ease;
    }
    .cp-panel:hover { box-shadow: var(--shadow-2); }
    .cp-panel-head { display: flex; align-items: center; gap: 12px; padding: 16px 18px; cursor: pointer; }
    .cp-panel-head:hover { background: rgba(10,10,15,0.015); }
    .cp-panel-swatch { width: 12px; height: 12px; border-radius: 4px; background: var(--cp-color); flex-shrink: 0; box-shadow: 0 0 0 3px color-mix(in srgb, var(--cp-color) 18%, transparent); }
    .cp-panel-titlewrap { flex: 1; min-width: 0; }
    .cp-panel-name { font-size: 15px; font-weight: 700; letter-spacing: -0.01em; color: var(--ink); }
    .cp-panel-meta { font-size: 11px; color: var(--muted); margin-top: 2px; display: flex; gap: 10px; flex-wrap: wrap; }
    .cp-panel-count { font-size: 22px; font-weight: 700; color: var(--ink); letter-spacing: -0.02em; font-variant-numeric: tabular-nums; }
    .cp-panel-count small { font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: 0; }
    .cp-panel-headactions { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .cp-icon-btn {
      width: 30px; height: 30px; display: inline-flex; align-items: center; justify-content: center;
      background: var(--card); border: 1px solid var(--border-2); border-radius: 8px;
      cursor: pointer; font-size: 13px; color: var(--ink-2); font-family: inherit;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
    }
    .cp-icon-btn:hover { background: rgba(255,207,6,0.14); border-color: var(--brand); color: var(--ink); }
    .cp-icon-btn.cp-danger:hover { background: var(--danger-bg); border-color: var(--danger-line); color: var(--danger-text); }
    .cp-chevron { transition: transform 0.2s ease; color: var(--faint); font-size: 12px; width: 20px; text-align: center; }

    .cp-ctable-head, .cp-crow {

<script>

  var MARCOS_ENTREGA = ['Revisão Externa 🧐', 'Concluído 🏆'];
  // Etapas detalhadas no breakdown até a 1ª entrega. "Outras etapas" é um bucket

  var ETAPAS_PRE_ENTREGA = ['Planejamento', 'A fazer 👇', 'Em andamento 💪', 'Alterações ✏️', 'Revisão Interna 🔎', 'Outras etapas'];

  var PRIMEIRA_ENTREGA_EPOCH = new Date('2026-05-04T00:00:00');

      var args = arguments, ctx = this;

    };
  }

  var CACHE_TTL = 300000;
  var FIELD_CACHE_TTL = 86400000;

  function getCacheKey(boardId) { return 'leadtime_cache_' + boardId; }

  function readCache(boardId) {
    try {
      var raw = localStorage.getItem(getCacheKey(boardId));
      if (!raw) return null;
      var obj = JSON.parse(raw);
      if (obj && obj.cachedAt && (Date.now() - obj.cachedAt < CACHE_TTL)) return obj;
    } catch(e) {}
    return null;
  }

  function writeCache(boardId, data) {
    try {
      data.cachedAt = Date.now();
      localStorage.setItem(getCacheKey(boardId), JSON.stringify(data));
    } catch(e) {}
  }

  function cacheAge(cachedAt) {
    var sec = Math.floor((Date.now() - cachedAt) / 1000);
    if (sec < 60) return sec + 's atrás';

  }

  var ACTIONS_CACHE_VERSION = 1; // bump se o filtro/fields do fetch de actions mudar
  function actionsCacheKey(boardId) { return 'leadtime_actions_' + boardId; }
  function readActionsCache(boardId) {
    try {
      var raw = localStorage.getItem(actionsCacheKey(boardId));

      var obj = JSON.parse(raw);
      if (obj && obj.v === ACTIONS_CACHE_VERSION && obj.cards) return obj.cards;
    } catch(e) {}
    return {};
  }
  function writeActionsCache(boardId, map) {
    try {
      localStorage.setItem(actionsCacheKey(boardId), JSON.stringify({ v: ACTIONS_CACHE_VERSION, cards: map }));

  }

  function updateSkeletonMsg(msg) {

  function countBusinessDays(from, to) {
    var s = new Date(from); s.setHours(0,0,0,0);
    var e = new Date(to);   e.setHours(0,0,0,0);
    var totalDays = Math.round((e - s) / 86400000);
    if (totalDays <= 0) return 0;
    var weeks = Math.floor(totalDays / 7);
    var remainder = totalDays % 7;
    var count = weeks * 5;
    var dayOfWeek = s.getDay();
    for (var i = 0; i < remainder; i++) {
      var d = (dayOfWeek + i) % 7;
      if (d !== 0 && d !== 6) count++;
    }
    return count;
  }

  // ─── TEMPO: DIAS/HORAS CORRIDAS E HORAS ÚTEIS ───
  // Jornada de trabalho considerada para "horas úteis" (seg–sex, fuso local).
  var WORK_START_HOUR = 9;   // 09:00
  var WORK_END_HOUR   = 18;  // 18:00 → 9h úteis/dia
  function round1(x) { return Math.round(x * 10) / 10; }
  function elapsedCalendarDays(from, to) { return round1((new Date(to) - new Date(from)) / 86400000); }
  function elapsedCalendarHours(from, to) { return round1((new Date(to) - new Date(from)) / 3600000); }

  // Horas úteis entre duas datas (SEM arredondar): soma a sobreposição com a janela
  // de trabalho de cada dia útil. Itera dia a dia (O(nº de dias)) — barato mesmo para
  // etapas longas. A versão raw é usada para o breakdown FECHAR com o total (somar
  // valores já arredondados por etapa introduz drift; somamos raw e arredondamos 1x).
  function businessHoursRaw(from, to) {
    from = new Date(from); to = new Date(to);
    if (to <= from) return 0;
    var total = 0;
    var cursor = new Date(from); cursor.setHours(0,0,0,0);
    while (cursor <= to) {
      var dow = cursor.getDay();
      if (dow !== 0 && dow !== 6) { // seg–sex
        var dayStart = new Date(cursor); dayStart.setHours(WORK_START_HOUR,0,0,0);
        var dayEnd   = new Date(cursor); dayEnd.setHours(WORK_END_HOUR,0,0,0);
        var s = from > dayStart ? from : dayStart;
        var e = to   < dayEnd   ? to   : dayEnd;
        if (e > s) total += (e - s) / 3600000;
      }
      cursor.setDate(cursor.getDate() + 1);
    }
    return total;
  }
  function countBusinessHours(from, to) { return round1(businessHoursRaw(from, to)); }

  // Data de criação embutida no ID do card do Trello: os 4 primeiros bytes (8 hex)
  // são o timestamp Unix em segundos. Permite filtrar arquivados por data de criação
  // ANTES de buscar as actions deles (barra o histórico antigo sem custo de fetch).
  function idToDate(id) {
    if (!id || id.length < 8) return null;
    var secs = parseInt(id.substring(0, 8), 16);
    if (isNaN(secs)) return null;
    return new Date(secs * 1000);
  }

  function buildTimeline(actions) {
    if (!Array.isArray(actions)) actions = [];
    actions.sort(function(a, b) {
      var diff = new Date(a.date) - new Date(b.date);
      if (diff !== 0) return diff;
      var priority = { createCard: 0, copyCard: 0, updateCard: 1 };
      return (priority[a.type] || 2) - (priority[b.type] || 2);
    });

    var createdAt = null;
    for (var k = 0; k < actions.length; k++) {
      if (actions[k].type === 'createCard' || actions[k].type === 'copyCard') {
        createdAt = new Date(actions[k].date);
        break;
      }
    }
    if (!createdAt && actions.length > 0) {
      createdAt = new Date(actions[0].date);
    }

    var stages = [];
    for (var i = 0; i < actions.length; i++) {
      var act = actions[i], date = new Date(act.date);
      if (createdAt && date < createdAt) continue;
      if ((act.type === 'createCard' || act.type === 'copyCard') && act.data.list) {
        if (stages.length === 0) {
          stages.push({ name: act.data.list.name, enteredAt: date, leftAt: null });
        }
      } else if (act.type === 'updateCard' && act.data.listAfter) {
        if (stages.length === 0 && act.data.listBefore) {
          var fallback = createdAt || date;
          stages.push({ name: act.data.listBefore.name, enteredAt: fallback, leftAt: date });
        }
        if (stages.length > 0) stages[stages.length - 1].leftAt = date;
        stages.push({ name: act.data.listAfter.name, enteredAt: date, leftAt: null });
      }
    }

    if (stages.length > 0) {
      for (var v = 0; v < stages.length; v++) {
        if (createdAt && stages[v].enteredAt < createdAt) {
          stages[v].enteredAt = createdAt;
        }
      }
    }

    var out = [];
    for (var j = 0; j < stages.length; j++) {
      var st = stages[j];
      var dur = (st.leftAt ? st.leftAt.getTime() : Date.now()) - st.enteredAt.getTime();
      if (dur < MIN_STAGE_MS && st.leftAt && out.length > 0) {
        out[out.length - 1].leftAt = st.leftAt;
      } else {
        out.push(st);
      }
    }

    if (out.length === 1 && !out[0].leftAt && createdAt) {
      out[0].enteredAt = createdAt;
    }

    return out;
  }

  // ─── UTILITÁRIOS DE DATA (reutilizáveis) ────────
  // Centralizam a comparação de datas para que vencidos, vazão e lead time usem
  // exatamente a mesma interpretação (mesmo "hoje", mesmo conceito de mês).
  function startOfToday() { var d = new Date(); d.setHours(0,0,0,0); return d; }

  // Card vencido = tem due, NÃO está marcado como concluído (dueComplete) e a data
  // de entrega já passou (compara dias no fuso local, ignorando horas). Excluir
  // dueComplete evita falso-positivo de card já entregue ainda contar como atrasado.
  function isOverdue(due, dueComplete) {
    if (!due || dueComplete === true) return false;
    var d = new Date(due); d.setHours(0,0,0,0);
    return d < startOfToday();
  }

  // Mesma competência (mês+ano) entre duas datas — base do recorte mensal da vazão.
  function sameMonth(date, ref) {
    return date.getMonth() === ref.getMonth() && date.getFullYear() === ref.getFullYear();
  }

  // ─── CONCLUSÃO & LEAD TIME ──────────────────────
  // Data em que o card entrou pela ÚLTIMA vez em "Concluído 🏆" (ou null).
  // Usar a timeline (e não o flag dueComplete + due date) torna a métrica robusta a
  // cards reabertos (pega a última conclusão) e a cards sem due date.
  function getConcludedAt(tl) {
    if (!Array.isArray(tl)) return null;
    var concludedAt = null;
    for (var i = 0; i < tl.length; i++) {
      var name = tl[i].name ? tl[i].name.trim() : '';
      if (name === 'Concluído 🏆') concludedAt = tl[i].enteredAt; // última vence
    }
    return concludedAt;
  }

  // Lead time real (atravessamento do fluxo), em dias úteis:
  //   início = primeira entrada numa etapa de PRODUÇÃO ATIVA (saiu do backlog)
  //   fim    = conclusão (getConcludedAt)
  // Retorna { leadTime, concludedAt } ou null se não atravessou o fluxo
  // (nunca foi produzido, ou ainda não concluído).
  function computeLeadTime(tl, concludedAt) {
    if (!Array.isArray(tl) || !tl.length) return null;
    var startProd = null;
    for (var i = 0; i < tl.length; i++) {
      var name = tl[i].name ? tl[i].name.trim() : '';
      if (PRODUCAO_ATIVA.indexOf(name) !== -1) { startProd = tl[i].enteredAt; break; }
    }
    if (concludedAt === undefined) concludedAt = getConcludedAt(tl); // reaproveita se já calculado
    if (!startProd || !concludedAt || concludedAt <= startProd) return null;
    return { leadTime: countBusinessDays(startProd, concludedAt), concludedAt: concludedAt };
  }

  // Normaliza o texto do "Nível de Esforço" para um dos buckets (BAIXO/MÉDIO/ALTO).
  // Tolerante a acentos e caixa: "Médio", "medio", "MEDIO" → "MÉDIO".
  function normalizeNivel(text) {
    if (!text) return null;
    var t = String(text).trim().toUpperCase()
      .replace(/[ÁÀÂÃÄ]/g,'A').replace(/[ÉÈÊË]/g,'E').replace(/[ÍÌÎÏ]/g,'I')
      .replace(/[ÓÒÔÕÖ]/g,'O').replace(/[ÚÙÛÜ]/g,'U');
    if (t.indexOf('BAIX') === 0) return 'BAIXO';
    if (t.indexOf('MED')  === 0) return 'MÉDIO';
    if (t.indexOf('ALT')  === 0) return 'ALTO';
    return null;
  }

  // Desvio padrão populacional (volatilidade) de um array de números.
  function stdDev(arr) {
    if (!arr || arr.length < 2) return 0;
    var m = arr.reduce(function(a,b){return a+b;},0) / arr.length;
    var v = arr.reduce(function(a,b){return a+(b-m)*(b-m);},0) / arr.length;
    return round1(Math.sqrt(v));
  }
  function mean(arr) {
    if (!arr || !arr.length) return 0;
    return round1(arr.reduce(function(a,b){return a+b;},0) / arr.length);
  }
  // Mediana (resistente a outliers) — aditiva; não altera nenhum KPI existente.
  function median(arr) {
    if (!arr || !arr.length) return 0;
    var s = arr.slice().sort(function(a,b){ return a-b; });
    var m = Math.floor(s.length / 2);
    return round1(s.length % 2 ? s[m] : (s[m-1] + s[m]) / 2);
  }

  // ─── TEMPO ATÉ PRIMEIRA ENTREGA ─────────────────
  // Da CRIAÇÃO do card até a 1ª CHEGADA a um marco de entrega (Revisão Externa 🧐 ou
  // Concluído 🏆).
  //   início = tl[0].enteredAt (createdAt, já clampado pela buildTimeline)
  //   fim    = enteredAt do PRIMEIRO estágio cujo nome ∈ MARCOS_ENTREGA
  // Retorna null se o card ainda não atingiu um marco de entrega.
  // Usar a CHEGADA ao marco (e não a saída de Revisão Interna) é robusto a reprovações
  // internas que voltam para retrabalho (não param o cronômetro) e a cards que pulam a
  // revisão interna. Também conta reentradas em "Em andamento" no percurso
  // (1 = original, 2+ = retrabalho).
  //
  // Breakdown: os estágios 0..idxFim-1 PARTICIONAM [início, fim] (contíguos, sem
  // gaps). Cada etapa nomeada acumula suas horas úteis; o restante (URGÊNCIAS,
  // Captação, Atrasos, …) cai em "Outras etapas". Somamos horas RAW e a headline é a
  // soma dos buckets já arredondados → o breakdown FECHA exatamente com o total.
  function computePrimeiraEntrega(tl) {
    if (!Array.isArray(tl) || !tl.length) return null;
    var inicio = tl[0].enteredAt;
    var fim = null, idxFim = -1;
    for (var i = 0; i < tl.length; i++) {
      if (MARCOS_ENTREGA.indexOf(tl[i].name ? tl[i].name.trim() : '') !== -1) {
        fim = tl[i].enteredAt; idxFim = i; break; // 1ª CHEGADA a um marco de entrega
      }
    }
    if (!fim || fim <= inicio) return null;

    var breakdown = {};
    ETAPAS_PRE_ENTREGA.forEach(function(n){ breakdown[n] = 0; });
    var entradasEmAndamento = 0;
    for (var j = 0; j < idxFim; j++) { // estágios ANTES do marco (particionam [início,fim])
      var nome = tl[j].name ? tl[j].name.trim() : '';
      var fimEtapa = tl[j].leftAt || fim; // o último pré-marco fecha em `fim`
      var horasEtapa = businessHoursRaw(tl[j].enteredAt, fimEtapa);
      if (breakdown.hasOwnProperty(nome)) breakdown[nome] += horasEtapa;
      else breakdown['Outras etapas'] += horasEtapa;
      if (nome === EM_ANDAMENTO) entradasEmAndamento++;
    }
    ETAPAS_PRE_ENTREGA.forEach(function(n){ breakdown[n] = round1(breakdown[n]); });

    // headline = soma dos buckets já arredondados → fecha com a soma exibida no breakdown.
    var horas = 0;
    ETAPAS_PRE_ENTREGA.forEach(function(n){ horas += breakdown[n]; });
    horas = round1(horas);

    return {
      inicio: inicio,
      horas: horas,
      dias: countBusinessDays(inicio, fim),
      breakdown: breakdown,
      entradasEmAndamento: entradasEmAndamento
    };
  }

  function apiUrl(path, token) {
    return 'https://api.trello.com/1'+path+(path.indexOf('?')>=0?'&':'?')+'key='+APP_KEY+'&token='+token;
  }

  // elemento único reutilizado (antes: um <span> novo por chamada, milhares em tabelas grandes)
  var _escEl = document.createElement('span');
  function escHtml(s) { _escEl.textContent = s; return _escEl.innerHTML; }

  function downloadCSV(filename, rows) {
    var csv = rows.map(function(row) {
      return row.map(function(cell) {
        // {raw: '...'} pula o escape de fórmula (usado pelo =HYPERLINK intencional)
        var isRaw = cell && typeof cell === 'object' && cell.raw !== undefined;
        var s = String(isRaw ? cell.raw : (cell === null || cell === undefined ? '' : cell));
        // anti formula-injection: célula iniciando com = + - @ vira texto no Excel
        if (!isRaw && /^[=+\-@]/.test(s)) s = "'" + s;
        if (s.indexOf(';') !== -1 || s.indexOf('"') !== -1 || s.indexOf('\n') !== -1) {
          s = '"' + s.replace(/"/g, '""') + '"';
        }
        return s;
      }).join(';');
    }).join('\r\n');
    var bom = '﻿';
    var blob = new Blob([bom + csv], { type: 'text/csv;charset=utf-8;' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = filename; a.click();
    setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
  }

  // ─── CARREGAMENTO PREGUIÇOSO DE LIBS (on-demand) ─
  // Carregadas só ao clicar em exportar → zero impacto na renderização em tempo real.
  function loadScriptOnce(src, globalName, cb) {
    if (window[globalName]) return cb();
    var s = document.createElement('script');
    s.src = src;
    s.onload = function() { cb(); };
    s.onerror = function() { cb(new Error('Falha ao carregar ' + src)); };
    document.head.appendChild(s);
  }
  function loadXLSXLib(cb) {
    loadScriptOnce('https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js', 'XLSX', cb);
  }
  function loadHtml2Canvas(cb) {
    loadScriptOnce('https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js', 'html2canvas', cb);
  }

  // ─── EXPORTAÇÃO: CARDS DE UMA ETAPA (XLSX, fallback CSV) ─
  // Reutiliza as funções de tempo (countBusinessDays/Hours, elapsed*) para que a
  // planilha seja idêntica ao que o dashboard calcula — sem lógica duplicada.
  function buildEtapaRows(nomeEtapa, cardsNaEtapa) {
    var now = new Date();
    var header = ['Título','Etapa atual','Entrada na etapa','Dias corridos','Dias úteis','Horas corridas','Horas úteis','Link'];
    var rows = cardsNaEtapa.map(function(c) {
      var ent = c.enteredCurrentAt ? new Date(c.enteredCurrentAt) : null;
      return {
        nome: c.name,
        etapa: c.currentListName,
        entrada: ent ? fmtDateTime(ent) : '—',
        diasCorr: ent ? elapsedCalendarDays(ent, now) : '',
        diasUteis: ent ? countBusinessDays(ent, now) : '',
        horasCorr: ent ? elapsedCalendarHours(ent, now) : '',
        horasUteis: ent ? countBusinessHours(ent, now) : '',
        link: c.url || ''
      };
    });
    return { header: header, rows: rows };
  }

  function exportEtapaCards(nomeEtapa, cardsNaEtapa, btn) {
    if (!cardsNaEtapa || !cardsNaEtapa.length) return;
    var data = buildEtapaRows(nomeEtapa, cardsNaEtapa);
    var safeName = nomeEtapa.replace(/[^a-zA-Z0-9]+/g, '_').replace(/^_+|_+$/g, '').toLowerCase();
    var fileBase = 'cards_' + (safeName || 'etapa');
    setBtnLoading(btn, true);

    loadXLSXLib(function(err) {
      try {
        if (err || typeof XLSX === 'undefined') { exportEtapaCSV(data, fileBase); return; }

        // ── Estilos executivos (mesma linguagem do relatório completo) ──
        var XB = { top:{style:'thin',color:{rgb:'DDDDDD'}}, bottom:{style:'thin',color:{rgb:'DDDDDD'}}, left:{style:'thin',color:{rgb:'DDDDDD'}}, right:{style:'thin',color:{rgb:'DDDDDD'}} };
        var head = {font:{bold:true,color:{rgb:'FFFFFF'},sz:11},fill:{fgColor:{rgb:'0A0A0A'}},border:XB,alignment:{horizontal:'center',vertical:'center',wrapText:true}};
        // alinhamento por coluna: texto à esquerda, data ao centro, números à direita
        var ALIGN = ['left','left','center','right','right','right','right','left'];
        var NUMFMT = { 3:'0.0', 4:'0', 5:'0.0', 6:'0.0' };
        function cellStyle(rowParity, col) {
          var s = { fill:{fgColor:{rgb: rowParity%2===0 ? 'FFFFFF' : 'F7F8F9'}}, border:XB, alignment:{horizontal:ALIGN[col]||'left',vertical:'center'} };
          if (NUMFMT[col]) s.numFmt = NUMFMT[col];
          return s;
        }

        var HEAD = 3;                         // faixa de título ocupa 3 linhas
        var aoa = [data.header];
        data.rows.forEach(function(r) {
          aoa.push([r.nome, r.etapa, r.entrada, r.diasCorr, r.diasUteis, r.horasCorr, r.horasUteis, r.link]);
        });
        var nCols = data.header.length;
        var ws = XLSX.utils.aoa_to_sheet([[]]);
        XLSX.utils.sheet_add_aoa(ws, aoa, { origin: { r: HEAD, c: 0 } });

        // faixa de título executivo (nome do relatório + metadados)
        ws['A1'] = { v:'Cards da etapa — ' + nomeEtapa, t:'s', s:{font:{bold:true,sz:15,color:{rgb:'0A0A0A'}},alignment:{vertical:'center'}} };
        ws['A2'] = { v:'Gerado em ' + fmtDateTime(new Date()) + ' · ' + data.rows.length + ' card' + (data.rows.length===1?'':'s'), t:'s', s:{font:{sz:10,color:{rgb:'6B6B70'}},alignment:{vertical:'center'}} };
        ws['!merges'] = [ {s:{r:0,c:0},e:{r:0,c:nCols-1}}, {s:{r:1,c:0},e:{r:1,c:nCols-1}} ];
        ws['!rows'] = [ {hpt:21}, {hpt:15}, {hpt:6} ];
        ws['!cols'] = [{wch:38},{wch:20},{wch:18},{wch:13},{wch:11},{wch:14},{wch:11},{wch:14}];

        // cabeçalho da tabela
        for (var c = 0; c < nCols; c++) ws[XLSX.utils.encode_cell({r:HEAD,c:c})].s = head;

        // linhas de dados: zebra + bordas + alinhamento/numFmt por tipo
        for (var i = 0; i < data.rows.length; i++) {
          var rr = HEAD + 1 + i;
          for (var cc = 0; cc < nCols; cc++) {
            var ref0 = XLSX.utils.encode_cell({r:rr,c:cc});
            if (!ws[ref0]) ws[ref0] = { v:'', t:'s' };
            ws[ref0].s = cellStyle(i, cc);
          }
          // coluna Link clicável (hyperlink nativo → Excel, Sheets, LibreOffice)
          var url = data.rows[i].link;
          if (url) {
            var lref = XLSX.utils.encode_cell({r:rr,c:7});
            ws[lref] = { t:'s', v:'Abrir card', l:{ Target:url, Tooltip:'Abrir no Trello' }, s:{font:{color:{rgb:'0B5FFF'},underline:true},border:XB,alignment:{vertical:'center'}} };
          }
        }

        var lastRow0 = HEAD + data.rows.length;
        ws['!ref'] = 'A1:' + XLSX.utils.encode_cell({r: lastRow0, c: nCols - 1});
        ws['!autofilter'] = { ref: XLSX.utils.encode_cell({r:HEAD,c:0}) + ':' + XLSX.utils.encode_cell({r:lastRow0,c:nCols-1}) };

        var wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'Cards');
        XLSX.writeFile(wb, fileBase + '.xlsx');
      } catch (e) {
        exportEtapaCSV(data, fileBase); // qualquer erro → CSV garante a entrega
      } finally {
        setBtnLoading(btn, false);
      }
    });
  }

  function exportEtapaCSV(data, fileBase) {
    var rows = [data.header];
    data.rows.forEach(function(r) {
      // =HYPERLINK mantém o link clicável também no CSV (Excel/Google Sheets);
      // {raw} sinaliza ao downloadCSV que esta fórmula é intencional (não escapar).
      var link = r.link ? { raw: '=HYPERLINK("' + r.link + '";"Abrir card")' } : '';
      rows.push([r.nome, r.etapa, r.entrada, r.diasCorr, r.diasUteis, r.horasCorr, r.horasUteis, link]);
    });
    downloadCSV(fileBase + '.csv', rows);
  }

  function fmtDateTime(d) {
    d = new Date(d);
    function p(n){ return String(n).padStart(2,'0'); }
    return p(d.getDate())+'/'+p(d.getMonth()+1)+'/'+d.getFullYear()+' '+p(d.getHours())+':'+p(d.getMinutes());
  }

  // ─── FEEDBACK DE LOADING NOS BOTÕES (reutilizável) ─
  function setBtnLoading(btn, on) {
    if (!btn) return;
    if (on) {
      btn.disabled = true;
      btn.dataset.label = btn.textContent;
      btn.textContent = '⏳ Exportando…';
    } else {

      if (btn.dataset.label) btn.textContent = btn.dataset.label;
    }
  }

  // ─── EXPORTAÇÃO: SNAPSHOT VISUAL DO DASHBOARD ────
  // Monta um layout LIMPO e dedicado (fora de tela) a partir dos dados já carregados
  // (cachedData) e o captura — em vez de fotografar o DOM vivo (com botões, scroll,
  // tabelas). Resultado: imagem focada nos indicadores, sem poluição, e sem depender
  // de qual aba está ativa.
  function exportDashboardImage(data, btn) {
    if (!data) { alert('Acesse a aba "Tempo real" primeiro para carregar os dados.'); return; }
    setBtnLoading(btn, true);
    loadHtml2Canvas(function(err) {
      if (err || typeof html2canvas === 'undefined') {
        setBtnLoading(btn, false);
        alert('Não foi possível carregar o gerador de imagem.');
        return;
      }
      var kpis = calcKPIs(data.cards, data.config);
      var node = buildExportNode(kpis, data.config, data.cards.length);
      document.body.appendChild(node);
      html2canvas(node, { scale: 2, backgroundColor: '#F9F9F9', logging: false, useCORS: true })
        .then(function(canvas) { downloadCanvas(canvas, 'dashboard_midiatica'); })
        .catch(function() { alert('Falha ao gerar a imagem do dashboard.'); })
        .then(function() {
          if (node.parentNode) node.parentNode.removeChild(node); // limpa o DOM temporário
          setBtnLoading(btn, false);
        });
    });
  }

  function buildExportNode(kpis, config, totalCards) {

    // fixo e fora da viewport: html2canvas renderiza pelo box do elemento, sem causar scroll
    wrap.style.cssText = 'position:fixed;left:-99999px;top:0;width:1000px;background:#F9F9F9;' +

    h += '<div><div style="font-size:22px;font-weight:700;color:#FFCF06;">Power Up Midiática</div>' +
         '<div style="font-size:13px;color:#A2A2AA;margin-top:2px;">Dashboard de produção</div></div>';
    h += '<div style="font-size:13px;color:#A2A2AA;">'+agora+'</div></div>';
    // Health hero: número em tinta; a cor de estado fica na barra e no ponto de status
    h += '<div style="background:#FFFFFF;border:1px solid #E8E8EC;border-radius:14px;padding:24px 26px;margin-bottom:20px;">';
    h += '<div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px;">' +
         '<div style="font-size:12px;font-weight:700;letter-spacing:0.08em;color:#75757F;text-transform:uppercase;">Health Score</div>' +

         '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:'+hsCor+';margin-right:7px;"></span>' +
         scoreStatus(kpis.healthScore)+'</div></div>';
    h += '<div style="display:flex;align-items:center;gap:18px;">' +
         '<div style="font-size:54px;font-weight:700;line-height:1;color:#0A0A0A;letter-spacing:-0.02em;min-width:92px;">'+kpis.healthScore+'</div>' +

         '<div style="height:100%;width:'+kpis.healthScore+'%;background:'+hsCor+';border-radius:999px;"></div></div></div></div>';
    // Grid de KPIs 3x2
    h += '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:18px;">';
    buildKpiCards(kpis, config).forEach(function(k) {
      var pct = kpiBarPct(k.valor, k.meta);
      var score = kpiHealth(k.valor, k.meta, k.tipo);
      var cor = statusColor(score);
      h += '<div style="background:#FFFFFF;border:1px solid #E8E8EC;border-radius:12px;padding:16px 18px;">' +

        '<div style="font-size:24px;font-weight:700;color:#0A0A0A;letter-spacing:-0.02em;">'+k.display+'</div>' +
        '<div style="font-size:11px;color:#75757F;margin-top:4px;">'+k.metaLabel+'</div>' +
        '<div style="height:6px;background:'+statusColorSoft(score)+';border-radius:999px;margin-top:14px;overflow:hidden;">' +
        '<div style="height:100%;width:'+pct+'%;background:'+cor+';border-radius:999px;"></div></div></div>';
    });
    h += '</div>';
    h += '<div style="font-size:12px;color:#75757F;text-align:right;">Gerado em '+agora+' · '+totalCards+' cards analisados</div>';

  function downloadCanvas(canvas, base) {
    // WEBP: menor que PNG e nítido como ele; se o browser não codificar WEBP, cai p/ PNG.
    canvas.toBlob(function(blob) {
      if (blob && blob.type === 'image/webp') { triggerDownload(blob, base + '.webp'); return; }
      canvas.toBlob(function(png) { if (png) triggerDownload(png, base + '.png'); }, 'image/png');
    }, 'image/webp', 0.92);
  }
  function triggerDownload(blob, filename) {
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = filename; a.click();
    setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
  }

  function validarTitulo(nome) {
    return typeof nome === 'string' && nome.trim().length > 0;
  }

  function mergeConfig(cfg) {
    var config = {};
    Object.keys(DEFAULTS).forEach(function(k) { config[k] = DEFAULTS[k]; });
    if (cfg) {
      Object.keys(cfg).forEach(function(k) { config[k] = cfg[k]; });
      // Configs antigas (sem peso5 ou sem peso6) somavam 100 com menos pesos.
      // Ao introduzir um novo peso, recalibramos todos para os defaults balanceados,
      // evitando que a soma fique != 100 e quebre o Health Score.
      if (cfg.peso5 === undefined || cfg.peso6 === undefined) {
        config.peso1 = DEFAULTS.peso1; config.peso2 = DEFAULTS.peso2;
        config.peso3 = DEFAULTS.peso3; config.peso4 = DEFAULTS.peso4;
        config.peso5 = DEFAULTS.peso5; config.peso6 = DEFAULTS.peso6;
      }
      if (!cfg.sla) config.sla = DEFAULT_SLA;
    }
    return config;
  }

  // ─── TABS ───────────────────────────────────────
  var tabs = document.querySelectorAll('.tab');
  var tabContents = document.querySelectorAll('.tab-content');

    tabs.forEach(function(t){ t.classList.remove('active'); });

    for (var i=0; i<tabs.length; i++) {
      if (tabs[i].getAttribute('data-tab') === name) tabs[i].classList.add('active');
    }
    setTimeout(function() {
      tabContents.forEach(function(tc){ tc.classList.remove('active'); });

      if (name === 'history' && !renderedTabs.history) { loadHistory(); renderedTabs.history = true; }
      if (name === 'config') renderConfig();
      if (name === 'funnel' && cachedData) { renderFunnel(); }
      else if (name === 'funnel' && !cachedData) { document.getElementById('funnel-content').innerHTML = '<div class="no-data"><p>Carregue os dados na aba "Tempo real" primeiro.</p></div>'; }
      if (name === 'custom') { CP.render(); }
      requestAnimationFrame(function() { target.classList.add('visible'); });
    }, 150);
  }
  tabs.forEach(function(tab) {
    tab.addEventListener('click', function() { switchTab(tab.getAttribute('data-tab')); });

  // ─── POPUP DE ETAPA + DELEGAÇÃO GLOBAL DE CLIQUES ─
  // Registrados UMA única vez. Antes, renderRealtime/renderFunnel adicionavam
  // listeners aos contêineres permanentes (e ao document) a cada re-render,
  // acumulando handlers duplicados (t.showCard disparado N vezes por clique).
  // Reutiliza o mesmo modal de cards da aba "Análises Personalizadas" (CP.openCards)
  // em vez de um popup próprio — mesma aparência, animações e comportamento nas duas abas.
  function abrirPopupEtapa(nomeEtapa) {
    var cards = cachedData && cachedData.cards ? cachedData.cards : [];
    var cardsNaEtapa = cards.filter(function(c) {
      return c.currentListName === nomeEtapa;

  document.addEventListener('click', function(e) {
    var btn = e.target.closest('.etapa-count-btn');
    if (btn) {
      abrirPopupEtapa(btn.getAttribute('data-etapa'));
      return;

      if (cid) t.showCard(cid);

  // ─── FETCH DATA (fila com pacing proativo) ──────
  // Antes: o burst inicial (lists/cards/members/customFields) saía direto via
  // Promise.all sem nenhum controle, e o loop de actions por card só limitava
  // CONCORRÊNCIA (lotes de 10 a cada 1200ms) — nada limitava a VELOCIDADE de
  // disparo. Com muitos cards, os dois juntos conseguiam ultrapassar os
  // ~100 req/10s do Trello antes do primeiro 429 voltar para acionar o
  // backoff (reativo por natureza — sempre tarde demais para evitar o burst).
  // Agora toda chamada — burst inicial incluído — passa pela MESMA fila com
  // teto de disparos por segundo (proativo) além do teto de concorrência.
  var API_CONCURRENCY = 4;
  var API_RATE_PER_SEC = 6;
  var API_MAX_RETRIES = 2;
  var _apiQueue = [];
  var _apiRunning = 0;
  var _apiDispatchTimes = [];       // timestamps dos disparos na janela de 1s corrente
  var _apiDrainScheduled = false;

  function apiWithinRateBudget() {
    var now = Date.now();
    while (_apiDispatchTimes.length && now - _apiDispatchTimes[0] >= 1000) _apiDispatchTimes.shift();
    return _apiDispatchTimes.length < API_RATE_PER_SEC;
  }

  function apiScheduleDrain() {
    if (_apiDrainScheduled) return;
    _apiDrainScheduled = true;
    setTimeout(function() { _apiDrainScheduled = false; apiDrainQueue(); }, 120);
  }

  function apiRetry(item, delay) {
    _apiRunning--;
    setTimeout(function() { _apiQueue.unshift(item); apiDrainQueue(); }, delay);
  }

  function apiDispatch(item) {
    fetch(apiUrl(item.url, item.token))
      .then(function(r) {
        if (r.status === 401) {
          console.error('[DASHBOARD] 401 Unauthorized — token expirado, url:', item.url.substring(0, 60));
          _apiRunning--;
          item.reject(new Error('401_UNAUTHORIZED'));
          apiDrainQueue();
          return;
        }
        if ((r.status === 429 || r.status >= 500) && item.attempt < API_MAX_RETRIES) {
          item.attempt++;
          var backoff = Math.min(1000 * Math.pow(2, item.attempt), 8000);
          console.warn('[DASHBOARD] ' + r.status + ' retry', item.attempt, 'in', backoff + 'ms');
          apiRetry(item, backoff);
          return;
        }
        return r.json().then(function(data) {
          if (data && data.error && item.attempt < API_MAX_RETRIES) {
            item.attempt++;
            apiRetry(item, 1500 * item.attempt);
            return;
          }
          _apiRunning--;
          item.resolve(data);
          apiDrainQueue();
        });
      })
      .catch(function(err) {
        if (err && err.message === '401_UNAUTHORIZED') { _apiRunning--; item.reject(err); apiDrainQueue(); return; }
        if (item.attempt < API_MAX_RETRIES) {
          item.attempt++;
          var backoff = Math.min(1000 * Math.pow(2, item.attempt), 8000);
          console.warn('[DASHBOARD] Network error, retry', item.attempt, ':', err.message || String(err));
          apiRetry(item, backoff);
        } else {
          _apiRunning--;
          item.reject(err);
          apiDrainQueue();
        }
      });
  }

  function apiDrainQueue() {
    while (_apiQueue.length > 0 && _apiRunning < API_CONCURRENCY) {
      if (!apiWithinRateBudget()) { apiScheduleDrain(); return; }
      _apiDispatchTimes.push(Date.now());
      _apiRunning++;
      apiDispatch(_apiQueue.shift());
    }
  }

  function fetchWithRetry(url, token) {
    return new Promise(function(resolve, reject) {
      _apiQueue.push({ url: url, token: token, resolve: resolve, reject: reject, attempt: 0 });
      apiDrainQueue();
    });
  }

  // Substitui o antigo throttledFetch de lotes manuais: a pacing já é feita
  // pela fila acima, então basta disparar tudo e deixar a fila regular a
  // velocidade real. Falha de UM card não derruba o load inteiro — fica
  // undefined (tratado como [] adiante), igual ao comportamento anterior.
  function throttledFetch(urls, token) {
    return Promise.all(urls.map(function(url) {
      return fetchWithRetry(url, token).catch(function(err) {
        console.warn('[DASHBOARD] Falha em', url.substring(0, 60), '—', err && err.message ? err.message : String(err));
        return undefined;
      });
    }));
  }

  function fetchData(token, boardId) {
    var fieldCachePromise = t.get('board', 'private', 'retrabalhoFieldCache').then(function(fc) {
      // Só confia no cache se o ID do campo "Nível de Esforço" já é CONHECIDO (truthy).
      // Se foi cacheado como null (campo ainda não existia), reprocessa /customFields
      // para captar o campo assim que for adicionado — sem esperar o TTL de 24h.
      if (fc && fc.id && fc.savedAt && fc.nivelEsforcoId &&
          (Date.now() - fc.savedAt < FIELD_CACHE_TTL)) return fc;
      return null;
    }).catch(function() { return null; });

    return fieldCachePromise.then(function(cachedField) {
      var phase1 = [
        fetchWithRetry('/boards/'+boardId+'/lists?fields=name', token),
        // idMembers adicionado de forma ADITIVA: alimenta só o campo "Responsáveis" do
        // módulo de Análises Personalizadas. Nenhum KPI/fórmula lê este campo.
        fetchWithRetry('/boards/'+boardId+'/cards?filter=all&fields=name,desc,due,dueComplete,dateLastActivity,labels,idList,idMembers,shortUrl,closed&customFieldItems=true', token),
        // membros do board (nome legível) — busca leve, uma vez por load; só para exibição.
        fetchWithRetry('/boards/'+boardId+'/members?fields=fullName,username', token)
      ];
      if (!cachedField) {
        phase1.push(fetchWithRetry('/boards/'+boardId+'/customFields', token));
      }
      return Promise.all(phase1).then(function(initial) {
        var lists = initial[0], allBoardCards = initial[1], boardMembers = initial[2], customFields = initial[3] || [];

        // idMembro → nome (só exibição; não participa de nenhum cálculo de KPI).
        var memberMap = {};
        if (Array.isArray(boardMembers)) {
          boardMembers.forEach(function(m) { memberMap[m.id] = m.fullName || m.username || m.id; });
        }

        var flowListIds = {};
        if (Array.isArray(lists)) {
          lists.forEach(function(l) {
            for (var fi=0; fi<FLOW_LISTS.length; fi++) {
              if (l.name.trim() === FLOW_LISTS[fi]) { flowListIds[l.id] = l.name.trim(); break; }
            }
          });
        }
        if (!Object.keys(flowListIds).length) throw new Error('Nenhuma lista do fluxo encontrada.');

        var retrabalhoFieldId = null;
        var retrabalhoOptions = {};
        var prioridadeFieldId = null;
        var nivelEsforcoFieldId = null;         // custom field "Nível de Esforço"
        var nivelEsforcoOptions = {};           // optionId → texto (ALTO/MÉDIO/BAIXO)
        if (cachedField) {
          retrabalhoFieldId = cachedField.id;
          retrabalhoOptions = cachedField.options || {};
          prioridadeFieldId = cachedField.prioridadeId || null;
          nivelEsforcoFieldId = cachedField.nivelEsforcoId || null;
          nivelEsforcoOptions = cachedField.nivelEsforcoOptions || {};
        } else if (Array.isArray(customFields)) {
          for (var fi=0; fi<customFields.length; fi++) {
            if (customFields[fi].name === 'Retrabalhos') {
              retrabalhoFieldId = customFields[fi].id;
              if (Array.isArray(customFields[fi].options)) {
                customFields[fi].options.forEach(function(o) {
                  retrabalhoOptions[o.id] = o.value && o.value.text ? o.value.text : '';
                });
              }
            }
            if (customFields[fi].name === 'Prioridade') {
              prioridadeFieldId = customFields[fi].id;
            }
            if (customFields[fi].name === 'Nível de Esforço') {
              nivelEsforcoFieldId = customFields[fi].id;
              if (Array.isArray(customFields[fi].options)) {
                customFields[fi].options.forEach(function(o) {
                  nivelEsforcoOptions[o.id] = o.value && o.value.text ? o.value.text : '';
                });
              }
            }
          }
          try {
