<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>Power Up Midiática</title>
  <style>
    @font-face {
      font-family: 'BW Modelica';
      src: url('./fonts/BWModelica-Regular.woff2') format('woff2'),
           url('./fonts/BWModelica-Regular.woff') format('woff');
      font-weight: 400;
    }
    @font-face {
      font-family: 'BW Modelica';
      src: url('./fonts/BWModelica-Bold.woff2') format('woff2'),
           url('./fonts/BWModelica-Bold.woff') format('woff');
      font-weight: 700;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'BW Modelica', 'Inter', 'Helvetica Neue', sans-serif;
      font-size: 14px;
      color: #0A0A0A;
      background: #F9F9F9;
      min-height: 100vh;
    }
    .header {
      background: #0A0A0A;
      color: #F9F9F9;
      padding: 16px 24px 0;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header h1 { font-size: 18px; font-weight: 400; margin-bottom: 12px; }
    .header h1 .brand-name { color: #FFCF06; font-weight: 700; }
    .tabs { display: flex; gap: 4px; }
    .tab {
      padding: 10px 20px;
      background: transparent;
      color: #ABABB0;
      border: none;
      border-bottom: 2px solid transparent;
      border-radius: 0;
      cursor: pointer;
      font-size: 14px;
      font-family: inherit;
      font-weight: 500;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .tab:hover { color: #F9F9F9; }
    .tab.active { background: rgba(255,207,6,0.15); color: #FFCF06; border-bottom: 2px solid #FFCF06; font-weight: 700; }
    .alert-banner {
      padding: 12px 24px;
      border-left: 3px solid;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
    }
    .alert-banner.danger { background: rgba(10,10,10,0.05); border-color: #0A0A0A; color: #0A0A0A; }
    .alert-banner.success { background: rgba(255,207,6,0.10); border-color: #FFCF06; color: #0A0A0A; }
    .body { padding: 24px; max-width: 960px; margin: 0 auto; position: relative; }
    .spinner-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 0; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid rgba(171,171,176,0.20);
      border-top-color: #FFCF06;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner-wrap p { margin-top: 12px; color: #ABABB0; }
    .error-box { text-align: center; padding: 60px 20px; color: #0A0A0A; }
    .error-box button { margin-top: 12px; }
    .auth-wrap { text-align: center; padding: 80px 20px; }
    .auth-wrap p { color: #ABABB0; margin-bottom: 16px; font-size: 16px; }
    .btn {
      background: #FFCF06; color: #0A0A0A; border: none; border-radius: 6px;
      padding: 10px 20px; font-size: 14px; font-family: inherit; font-weight: 700; cursor: pointer;
      transition: background 0.15s;
    }
    .btn:hover { background: rgba(255,207,6,0.85); }
    .btn:disabled { background: rgba(171,171,176,0.40); color: #ABABB0; cursor: not-allowed; }
    .btn-secondary { background: transparent; color: #0A0A0A; border: 1px solid rgba(10,10,10,0.25); }
    .btn-secondary:hover { background: rgba(10,10,10,0.05); }
    /* ── Health Score: painel hero centralizado ── */
    .score-circle-wrap {
      background: linear-gradient(180deg, #FFFFFF 0%, #FAFAFA 100%);
      border: 1px solid rgba(171,171,176,0.30);
      border-radius: 14px;
      padding: 26px 20px 22px;
      margin-bottom: 24px;
      text-align: center;
    }
    .score-ring-svg { display: block; margin: 0 auto 6px; }
    /* preenchimento do anel com easing suave; cor transiciona junto (só visual) */
    .score-ring-progress { transition: stroke-dashoffset 0.9s cubic-bezier(0.22,1,0.36,1), stroke 0.6s ease; }
    .score-status { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; }
    /* grid fluido: acomoda os 6 KPIs e quebra sozinho conforme a largura */
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(165px, 1fr)); gap: 14px; margin-bottom: 24px; }
    .kpi-card {
      background: #FFFFFF; border-radius: 12px; padding: 16px 18px; border: 1px solid rgba(171,171,176,0.30);
      display: flex; flex-direction: column; min-height: 120px;
      transition: box-shadow 0.18s ease, transform 0.18s ease, border-color 0.18s ease;
    }
    /* realce sutil ao passar o mouse (transform/box-shadow → barato p/ o compositor) */
    .kpi-card:hover { box-shadow: 0 4px 14px rgba(10,10,10,0.07); transform: translateY(-2px); border-color: rgba(171,171,176,0.50); }
    /* nome: rótulo discreto; min-height alinha os valores entre cards de 1 ou 2 linhas */
    .kpi-card .kpi-name { font-size: 10px; color: #ABABB0; font-weight: 600; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; line-height: 1.3; min-height: 26px; }
    /* valor: protagonista do card; dígitos tabulares mantêm o alinhamento e a leitura */
    .kpi-card .kpi-value { font-size: 25px; font-weight: 700; color: #0A0A0A; line-height: 1.05; letter-spacing: -0.01em; font-variant-numeric: tabular-nums; }
    .kpi-card .kpi-meta { font-size: 11px; color: #ABABB0; margin-top: 4px; }
    /* margin-top:auto empurra a barra para a base → todas alinhadas, qualquer que seja o texto */
    .kpi-bar-bg { height: 7px; background: rgba(171,171,176,0.18); border-radius: 4px; margin-top: auto; overflow: hidden; }
    /* transição suave de largura E cor, sem flicker (parent com overflow:hidden) */
    .kpi-bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s cubic-bezier(0.22,1,0.36,1), background 0.5s ease; }
    .footer-bar { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .footer-bar .info { font-size: 12px; color: #ABABB0; margin-left: auto; }
    .collapsible { margin-bottom: 20px; border-bottom: 1px solid rgba(171,171,176,0.30); padding-bottom: 20px; }
    .collapse-toggle {
      width: 100%; text-align: left; padding: 12px 16px;
      background: #FFFFFF; border: 1px solid rgba(171,171,176,0.40); border-radius: 8px;
      cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 700; color: #0A0A0A;
      text-transform: uppercase; letter-spacing: 0.04em;
    }
    .collapse-toggle.open { border-radius: 8px 8px 0 0; }
    .collapse-body {
      display: none; background: #FFFFFF; border: 1px solid rgba(171,171,176,0.40);
      border-top: none; border-radius: 0 0 8px 8px; padding: 0;
    }
    .collapse-body.open { display: block; }
    .collapse-body table { width: 100%; border-collapse: collapse; }
    .collapse-body th {
      text-align: left; padding: 8px 14px; background: #0A0A0A;
      font-size: 11px; text-transform: uppercase; color: #FFCF06; font-weight: 700;
      letter-spacing: 0.06em; border-bottom: none;
    }
    .collapse-body td { padding: 8px 14px; border-bottom: 1px solid rgba(171,171,176,0.20); font-size: 13px; }
    .collapse-body tr:nth-child(even) td { background: rgba(171,171,176,0.08); }
    .collapse-body tr:hover td { background: rgba(255,207,6,0.06); }
    .collapse-body tr.warn td { background: rgba(255,207,6,0.15); }
    /* ── Tempo até 1ª entrega por nível de esforço ── */
    .pe-section { margin-bottom: 24px; }
    .pe-title-row { display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
    .pe-title-row h3 { margin: 0; font-size: 15px; font-weight: 700; }
    .pe-hint { font-size: 12px; font-weight: 500; color: #ABABB0; }
    .pe-epoch { font-size: 11px; color: #ABABB0; }
    .pe-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
    /* Card: mesma linguagem do .kpi-card (raio/borda/hover) + acento de cor por nível no topo. */
    .pe-card {
      background: #FFFFFF; border: 1px solid rgba(171,171,176,0.30); border-radius: 12px;
      border-top: 3px solid var(--pe-cor, #ABABB0); overflow: hidden;
      transition: box-shadow 0.18s ease, transform 0.18s ease, border-color 0.18s ease;
    }
    .pe-card:hover { box-shadow: 0 4px 14px rgba(10,10,10,0.07); transform: translateY(-2px); }
    .pe-card.pe-nodata { border-top-color: rgba(171,171,176,0.35); }
    .pe-toggle {
      width: 100%; text-align: left; background: transparent; border: none; cursor: pointer;
      padding: 16px 18px; font-family: inherit; color: #0A0A0A; display: block;
      transition: background 0.14s;
    }
    .pe-toggle:hover:not(:disabled) { background: rgba(255,207,6,0.06); }
    .pe-toggle:disabled { cursor: default; }
    .pe-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    /* chip do nível: pílula neutra + ponto na cor do nível → diferenciação forte e limpa */
    .pe-chip { display: inline-flex; align-items: center; gap: 6px; padding: 3px 9px; border-radius: 999px;
      background: rgba(10,10,10,0.04); font-size: 10px; font-weight: 700; letter-spacing: 0.07em;
      text-transform: uppercase; color: var(--pe-cor, #0A0A0A); }
    .pe-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; background: var(--pe-cor, #ABABB0); }
    .pe-arrow { color: #ABABB0; font-size: 11px; }
    /* valor protagonista (tabular) + unidade subordinada; dias em linha própria discreta */
    .pe-main { display: flex; align-items: baseline; gap: 5px; }
    .pe-value { font-size: 27px; font-weight: 700; color: #0A0A0A; line-height: 1.0; letter-spacing: -0.01em; font-variant-numeric: tabular-nums; }
    .pe-unit { font-size: 13px; font-weight: 600; color: #6B6B70; }
    .pe-days { font-size: 12px; color: #ABABB0; margin-top: 3px; font-variant-numeric: tabular-nums; }
    .pe-main.pe-empty { font-size: 15px; color: #ABABB0; font-weight: 500; }
    /* mini-barra de comparação: escala COMPARTILHADA entre os 3 níveis (largura = avg/máx) */
    .pe-compare { height: 6px; background: rgba(171,171,176,0.18); border-radius: 4px; margin: 12px 0 8px; overflow: hidden; }
    .pe-compare-fill { height: 100%; border-radius: 4px; background: var(--pe-cor, #ABABB0); transition: width 0.6s cubic-bezier(0.22,1,0.36,1); }
    .pe-sub { font-size: 11px; color: #ABABB0; margin-top: 4px; }
    .pe-body { display: none; border-top: 1px solid rgba(171,171,176,0.25); padding: 4px 0 0; }
    .pe-body.open { display: block; }
    .pe-table { width: 100%; border-collapse: collapse; }
    .pe-table th { text-align: left; font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; color: #ABABB0; padding: 8px 18px 4px; font-weight: 600; }
    .pe-table td { padding: 6px 18px; font-size: 12px; border-bottom: 1px solid rgba(171,171,176,0.15); }
    .pe-table td:last-child { text-align: right; font-variant-numeric: tabular-nums; }
    .pe-stats { padding: 10px 18px 14px; }
    .pe-stats > div { display: flex; justify-content: space-between; gap: 10px; font-size: 12px; padding: 3px 0; }
    .pe-stats span { color: #ABABB0; }
    .pe-stats b { color: #0A0A0A; font-variant-numeric: tabular-nums; text-align: right; }
    .pe-foot { font-size: 11px; color: #ABABB0; margin-top: 10px; }
    @media (max-width: 700px) { .pe-grid { grid-template-columns: 1fr; } }
    .missing-tag {
      display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px;
      margin: 1px 3px; background: rgba(10,10,10,0.08); color: #0A0A0A; border: 1px solid rgba(10,10,10,0.25);
    }
    .summary-cards { display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
    .summary-card {
      flex: 1; min-width: 180px; background: #FFFFFF; border-radius: 8px;
      padding: 16px; border: 1px solid rgba(171,171,176,0.40); text-align: center;
    }
    .summary-card .sc-value { font-size: 28px; font-weight: 700; color: #0A0A0A; }
    .summary-card .sc-label { font-size: 12px; color: #ABABB0; margin-top: 4px; }
    .funnel-table { width: 100%; border-collapse: collapse; background: #FFFFFF; border-radius: 8px; overflow: hidden; border: 1px solid rgba(171,171,176,0.40); margin-bottom: 24px; }
    .funnel-table th {
      text-align: left; padding: 10px 14px; background: #0A0A0A;
      font-size: 11px; text-transform: uppercase; color: #FFCF06; font-weight: 700;
      letter-spacing: 0.06em; border-bottom: none;
    }
    .funnel-table td { padding: 10px 14px; border-bottom: 1px solid rgba(171,171,176,0.20); font-size: 13px; }
    .funnel-table tr:nth-child(even) td { background: rgba(171,171,176,0.08); }
    .funnel-table tr:hover td { background: rgba(255,207,6,0.06); }
    .funnel-bar { height: 10px; background: #FFCF06; border-radius: 5px; min-width: 4px; }
    .funnel-table .status-ok {
      color: #0A0A0A; background: rgba(255,207,6,0.15); padding: 2px 8px; border-radius: 4px;
      border: 1px solid rgba(255,207,6,0.40); display: inline-block;
    }
    .funnel-table .status-warn {
      color: #0A0A0A; background: rgba(171,171,176,0.15); padding: 2px 8px; border-radius: 4px;
      border: 1px solid rgba(171,171,176,0.40); display: inline-block;
    }
    .funnel-table .status-danger {
      color: #0A0A0A; background: rgba(10,10,10,0.08); padding: 2px 8px; border-radius: 4px;
      border: 1px solid rgba(10,10,10,0.25); display: inline-block;
    }
    .funnel-table tr.concluded td { background: rgba(255,207,6,0.12); }
    .detail-flex { display: flex; gap: 24px; margin-top: 24px; }
    .detail-flex > div { flex: 1; min-width: 0; }
    @media (max-width: 900px) { .detail-flex { flex-direction: column; } }
    .pag-controls { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 12px; }
    .pag-btn { background: #0A0A0A; color: #FFCF06; border: none; border-radius: 6px; padding: 6px 14px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }
    .pag-btn:disabled { opacity: 0.35; cursor: default; }
    .pag-btn:hover:not(:disabled) { background: #1a1a1a; }
    .pag-info { font-size: 12px; color: #ABABB0; }
    .alerts-section { margin-top: 0; }
    .alerts-section h3 { font-size: 15px; margin-bottom: 12px; color: #0A0A0A; font-weight: 700; }
    .alert-row { background: #FFFFFF; border: 1px solid rgba(171,171,176,0.40); border-radius: 8px; padding: 12px 16px; margin-bottom: 8px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .alert-row .ar-name { font-weight: 600; flex: 1; min-width: 200px; color: #0A0A0A; }
    .alert-row .ar-stage { color: #ABABB0; font-size: 13px; }
    .alert-row .ar-days { color: #0A0A0A; font-weight: 700; }
    .alert-row .ar-excess { background: rgba(10,10,10,0.08); color: #0A0A0A; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 600; border: 1px solid rgba(10,10,10,0.25); }
    .alert-row .ar-member { color: #ABABB0; font-size: 12px; }
    .alert-row .ar-member.none { color: #ABABB0; }
    .history-table { width: 100%; border-collapse: collapse; background: #FFFFFF; border-radius: 8px; overflow: hidden; border: 1px solid rgba(171,171,176,0.40); }
    .history-table th {
      text-align: left; padding: 10px 14px; background: #0A0A0A;
      font-size: 11px; text-transform: uppercase; color: #FFCF06; font-weight: 700;
      letter-spacing: 0.06em; border-bottom: none;
    }
    .history-table td { padding: 10px 14px; border-bottom: 1px solid rgba(171,171,176,0.20); font-size: 13px; }
    .history-table tr:nth-child(even) td { background: rgba(171,171,176,0.08); }
    .history-table tr:hover td { background: rgba(255,207,6,0.06); }
    .history-table tr.current-month td { background: rgba(255,207,6,0.12); border-left: 3px solid #FFCF06; font-weight: 600; }
    .history-empty { text-align: center; padding: 40px; color: #ABABB0; }
    .config-section { background: #FFFFFF; border-radius: 8px; padding: 20px; border: 1px solid rgba(171,171,176,0.40); margin-bottom: 20px; }
    .config-section h3 { font-size: 15px; margin-bottom: 16px; color: #0A0A0A; font-weight: 700; }
    .config-row { margin-bottom: 16px; }
    .config-row label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; color: #0A0A0A; }
    .config-row .slider-row { display: flex; align-items: center; gap: 12px; }
    .config-row input[type=range] { flex: 1; accent-color: #FFCF06; }
    .config-row .slider-unit { min-width: 70px; font-size: 12px; color: #ABABB0; }
    .sla-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .sla-row { display: flex; align-items: center; gap: 8px; }
    .sla-row label { flex: 1; font-size: 13px; margin-bottom: 0; }
    .sla-row input[type=number] { width: 60px; padding: 6px 8px; border: 1px solid rgba(171,171,176,0.40); border-radius: 4px; font-size: 14px; text-align: center; }
    .sla-row .sla-unit { font-size: 12px; color: #ABABB0; }
    .peso-sum { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
    .peso-sum.invalid { color: #0A0A0A; }
    .peso-sum.valid { color: #0A0A0A; }
    .config-footer { display: flex; gap: 12px; align-items: center; }
    .config-msg { font-size: 13px; color: #0A0A0A; font-weight: 500; }
    .tab-content { display: none; opacity: 0; transition: opacity 0.15s ease; }
    .tab-content.active { display: block; }
    .tab-content.visible { opacity: 1; }
    .rework-section { margin-top: 0; }
    .rework-section h3 { font-size: 15px; margin-bottom: 12px; color: #0A0A0A; font-weight: 700; }
    .rework-filters { display: flex; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; align-items: center; }
    .rework-filters select, .rework-filters input[type=number] {
      padding: 6px 10px; border: 1px solid rgba(171,171,176,0.40); border-radius: 4px;
      font-size: 13px; font-family: inherit; background: #FFFFFF; color: #0A0A0A;
    }
    .rework-filters label { font-size: 12px; color: #ABABB0; font-weight: 500; }
    .rework-filters .filter-group { display: flex; flex-direction: column; gap: 4px; }
    .rework-table { width: 100%; border-collapse: collapse; background: #FFFFFF; border-radius: 8px; overflow: hidden; border: 1px solid rgba(171,171,176,0.40); }
    .rework-table th {
      text-align: left; padding: 10px 14px; background: #0A0A0A;
      font-size: 11px; text-transform: uppercase; color: #FFCF06; font-weight: 700;
      letter-spacing: 0.06em; border-bottom: none;
    }
    .rework-table td { padding: 10px 14px; border-bottom: 1px solid rgba(171,171,176,0.20); font-size: 13px; }
    .rework-table tr:nth-child(even) td { background: rgba(171,171,176,0.08); }
    .rework-table tr:hover td { background: rgba(255,207,6,0.06); }
    .rework-rank { font-weight: 700; color: #0A0A0A; width: 40px; }
    .rework-val { font-weight: 700; }
    .rework-val.high { color: #0A0A0A; }
    .rework-val.med { color: #ABABB0; }
    .rework-val.low { color: #ABABB0; }
    .label-tag {
      display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px;
      margin: 1px 3px; background: rgba(255,207,6,0.15); color: #0A0A0A;
    }
    .rework-empty { text-align: center; padding: 24px; color: #ABABB0; font-style: italic; }
    .no-data { text-align: center; padding: 60px 20px; color: #ABABB0; }
    .card-link {
      color: #0A0A0A;
      text-decoration: underline;
      text-decoration-color: rgba(255,207,6,0.60);
      text-underline-offset: 3px;
      cursor: pointer;
      font-weight: 500;
      transition: color 0.15s, text-decoration-color 0.15s;
    }
    .card-link:hover {
      color: #0A0A0A;
      text-decoration-color: #FFCF06;
      background: rgba(255,207,6,0.10);
      border-radius: 3px;
      padding: 0 2px;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .skeleton {
      background: linear-gradient(90deg, rgba(171,171,176,0.15) 25%, rgba(171,171,176,0.30) 50%, rgba(171,171,176,0.15) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 6px;
    }
    .skeleton-circle { width: 120px; height: 120px; border-radius: 50%; margin: 0 auto 8px; }
    .skeleton-text { height: 16px; margin-bottom: 12px; }
    .skeleton-card { height: 100px; }
    .skeleton-wrap { max-width: 960px; margin: 0 auto; padding: 24px; }
    .skeleton-kpi-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; margin-top: 24px; }
    .skeleton-status { text-align: center; color: #ABABB0; font-size: 14px; margin-top: 16px; }
    .cache-indicator {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 12px; color: #ABABB0; background: rgba(171,171,176,0.08);
      padding: 4px 12px; border-radius: 4px;
    }
    .cache-indicator a { color: #0A0A0A; font-weight: 600; cursor: pointer; text-decoration: underline; }
    .fade-in { animation: fadeIn 0.2s ease-in; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .etapa-count-btn {

<script>
(function() {
  var APP_KEY = '35b840777660fac1ae7823df3d2398f6';
  var TRELLO_TOKEN = 'ATTAa452bde3af25da62c9bf3061e522b13a132b95f557ff528b4b3a5aaa8aac01165F42B089';
  var APP_NAME = 'Lead Time Midiática';
  var MIN_STAGE_MS = 600000;

  var FLOW_LISTS = [
    'Planejamento',
    'Captação de Imagem 🎥',
    '🛑URGÊNCIAS🛑',
    'A fazer 👇',
    'Em andamento 💪',
    'Alterações ✏️',

    'Revisões em Atraso ⏰',
    'Concluído 🏆'
  ];

  var PRODUCAO_ATIVA = [
    'Captação de Imagem 🎥',
    '🛑URGÊNCIAS🛑',
    'A fazer 👇',
    'Em andamento 💪',
    'Alterações ✏️',
    '⚠️Atrasos⚠️',
    'Revisão Interna 🔎',
    'Revisão Externa 🧐',
    'Revisões em Atraso ⏰'
  ];

  // ─── TEMPO ATÉ PRIMEIRA ENTREGA (por Nível de Esforço) ─
  var REVISAO_INTERNA = 'Revisão Interna 🔎';
  var EM_ANDAMENTO    = 'Em andamento 💪';
  // "Entrega" = 1ª CHEGADA a um marco de entrega (revisão externa ou concluído).
  // Usar a CHEGADA (e não a saída de Revisão Interna) evita parar o cronômetro em
  // reprovações internas que voltam para retrabalho e captura cards que pulam a
  // revisão interna. Ver computePrimeiraEntrega.
  var MARCOS_ENTREGA = ['Revisão Externa 🧐', 'Concluído 🏆'];
  // Etapas detalhadas no breakdown até a 1ª entrega. "Outras etapas" é um bucket
  // catch-all (URGÊNCIAS, Captação, Atrasos, etc.) para que a soma do breakdown
  // FECHE exatamente com o tempo total exibido — nada é descartado.
  var ETAPAS_PRE_ENTREGA = ['Planejamento', 'A fazer 👇', 'Em andamento 💪', 'Alterações ✏️', 'Revisão Interna 🔎', 'Outras etapas'];
  // Níveis de esforço esperados no custom field "Nível de Esforço".
  var NIVEIS_ESFORCO = ['BAIXO', 'MÉDIO', 'ALTO'];
  // Data de início do indicador: só entram cards CRIADOS a partir daqui (abertos E
  // arquivados). Antes 30/06/2026; recuada para 04/05/2026 para considerar cards mais
  // antigos. Também limita o fetch de arquivados (não puxa histórico anterior a esta data).
  var PRIMEIRA_ENTREGA_EPOCH = new Date('2026-05-04T00:00:00');

  var DEFAULT_SLA = {};
  var slaDefaults = [2, 5, 1, 3, 5, 2, 2, 2, 3, 2, 999];
  FLOW_LISTS.forEach(function(n, i) { DEFAULT_SLA[n] = slaDefaults[i]; });

  var DEFAULTS = {
    // meta_leadtime      = meta de AGING (dias úteis na etapa atual) — KPI antigo, mantido
    // meta_leadtime_real = meta de LEAD TIME real (atravessamento do fluxo até concluir) — KPI novo
    meta_prazo: 20, meta_rework: 120, meta_leadtime: 7, meta_leadtime_real: 15, meta_through: 12, meta_conformidade: 85,
    // peso3 = aging (era 20, dividido com o novo lead time real para não duplicar impacto)
    // peso6 = lead time real (novo)
    peso1: 30, peso2: 20, peso3: 10, peso4: 10, peso5: 20, peso6: 10,
    sla: DEFAULT_SLA
  };

  var t = TrelloPowerUp.iframe({ appKey: APP_KEY, appName: APP_NAME });
  var cachedData = null;
  var renderedTabs = {};

  function debounce(fn, delay) {
    var timer;
    return function() {
      clearTimeout(timer);
      var args = arguments, ctx = this;
      timer = setTimeout(function() { fn.apply(ctx, args); }, delay);
    };
  }

  var CACHE_TTL = 300000;
  var FIELD_CACHE_TTL = 86400000;

  function getCacheKey(boardId) { return 'leadtime_cache_' + boardId; }

  function readCache(boardId) {
    try {
      var raw = localStorage.getItem(getCacheKey(boardId));
      if (!raw) return null;
      var obj = JSON.parse(raw);
      if (obj && obj.cachedAt && (Date.now() - obj.cachedAt < CACHE_TTL)) return obj;
    } catch(e) {}
    return null;
  }

  function writeCache(boardId, data) {
    try {
      data.cachedAt = Date.now();
      localStorage.setItem(getCacheKey(boardId), JSON.stringify(data));
    } catch(e) {}
  }

  function cacheAge(cachedAt) {
    var sec = Math.floor((Date.now() - cachedAt) / 1000);
    if (sec < 60) return sec + 's atrás';
    return Math.floor(sec / 60) + 'min atrás';
  }

  function showSkeleton(msg) {
    var el = document.getElementById('rt-loading');
    el.innerHTML = '<div class="skeleton-wrap">' +
      '<div class="score-circle-wrap"><div class="skeleton skeleton-circle"></div></div>' +
      '<div class="skeleton-kpi-grid">' +
      '<div class="skeleton skeleton-card"></div>'.repeat(5) +
      '</div>' +
      '<p class="skeleton-status">' + (msg || 'Buscando cards do board…') + '</p>' +
      '</div>';
    el.style.display = '';
  }

  function updateSkeletonMsg(msg) {
    var p = document.querySelector('.skeleton-status');
    if (p) p.textContent = msg;
  }

  function countBusinessDays(from, to) {
    var s = new Date(from); s.setHours(0,0,0,0);
    var e = new Date(to);   e.setHours(0,0,0,0);
    var totalDays = Math.round((e - s) / 86400000);
    if (totalDays <= 0) return 0;
    var weeks = Math.floor(totalDays / 7);
    var remainder = totalDays % 7;
    var count = weeks * 5;
    var dayOfWeek = s.getDay();
    for (var i = 0; i < remainder; i++) {
      var d = (dayOfWeek + i) % 7;
      if (d !== 0 && d !== 6) count++;
    }
    return count;
  }

  // ─── TEMPO: DIAS/HORAS CORRIDAS E HORAS ÚTEIS ───
  // Jornada de trabalho considerada para "horas úteis" (seg–sex, fuso local).
  var WORK_START_HOUR = 9;   // 09:00
  var WORK_END_HOUR   = 18;  // 18:00 → 9h úteis/dia
  function round1(x) { return Math.round(x * 10) / 10; }
  function elapsedCalendarDays(from, to) { return round1((new Date(to) - new Date(from)) / 86400000); }
  function elapsedCalendarHours(from, to) { return round1((new Date(to) - new Date(from)) / 3600000); }

  // Horas úteis entre duas datas (SEM arredondar): soma a sobreposição com a janela
  // de trabalho de cada dia útil. Itera dia a dia (O(nº de dias)) — barato mesmo para
  // etapas longas. A versão raw é usada para o breakdown FECHAR com o total (somar
  // valores já arredondados por etapa introduz drift; somamos raw e arredondamos 1x).
  function businessHoursRaw(from, to) {
    from = new Date(from); to = new Date(to);
    if (to <= from) return 0;
    var total = 0;
    var cursor = new Date(from); cursor.setHours(0,0,0,0);
    while (cursor <= to) {
      var dow = cursor.getDay();
      if (dow !== 0 && dow !== 6) { // seg–sex
        var dayStart = new Date(cursor); dayStart.setHours(WORK_START_HOUR,0,0,0);
        var dayEnd   = new Date(cursor); dayEnd.setHours(WORK_END_HOUR,0,0,0);
        var s = from > dayStart ? from : dayStart;
        var e = to   < dayEnd   ? to   : dayEnd;
        if (e > s) total += (e - s) / 3600000;
      }
      cursor.setDate(cursor.getDate() + 1);
    }
    return total;
  }
  function countBusinessHours(from, to) { return round1(businessHoursRaw(from, to)); }

  // Data de criação embutida no ID do card do Trello: os 4 primeiros bytes (8 hex)
  // são o timestamp Unix em segundos. Permite filtrar arquivados por data de criação
  // ANTES de buscar as actions deles (barra o histórico antigo sem custo de fetch).
  function idToDate(id) {
    if (!id || id.length < 8) return null;
    var secs = parseInt(id.substring(0, 8), 16);
    if (isNaN(secs)) return null;
    return new Date(secs * 1000);
  }

  function buildTimeline(actions) {
    if (!Array.isArray(actions)) actions = [];
    actions.sort(function(a, b) {
      var diff = new Date(a.date) - new Date(b.date);
      if (diff !== 0) return diff;
      var priority = { createCard: 0, copyCard: 0, updateCard: 1 };
      return (priority[a.type] || 2) - (priority[b.type] || 2);
    });

    var createdAt = null;
    for (var k = 0; k < actions.length; k++) {
      if (actions[k].type === 'createCard' || actions[k].type === 'copyCard') {
        createdAt = new Date(actions[k].date);
        break;
      }
    }
    if (!createdAt && actions.length > 0) {
      createdAt = new Date(actions[0].date);
    }

    var stages = [];
    for (var i = 0; i < actions.length; i++) {
      var act = actions[i], date = new Date(act.date);
      if (createdAt && date < createdAt) continue;
      if ((act.type === 'createCard' || act.type === 'copyCard') && act.data.list) {
        if (stages.length === 0) {
          stages.push({ name: act.data.list.name, enteredAt: date, leftAt: null });
        }
      } else if (act.type === 'updateCard' && act.data.listAfter) {
        if (stages.length === 0 && act.data.listBefore) {
          var fallback = createdAt || date;
          stages.push({ name: act.data.listBefore.name, enteredAt: fallback, leftAt: date });
        }
        if (stages.length > 0) stages[stages.length - 1].leftAt = date;
        stages.push({ name: act.data.listAfter.name, enteredAt: date, leftAt: null });
      }
    }

    if (stages.length > 0) {
      for (var v = 0; v < stages.length; v++) {
        if (createdAt && stages[v].enteredAt < createdAt) {
          stages[v].enteredAt = createdAt;
        }
      }
    }

    var out = [];
    for (var j = 0; j < stages.length; j++) {
      var st = stages[j];
      var dur = (st.leftAt ? st.leftAt.getTime() : Date.now()) - st.enteredAt.getTime();
      if (dur < MIN_STAGE_MS && st.leftAt && out.length > 0) {
        out[out.length - 1].leftAt = st.leftAt;
      } else {
        out.push(st);
      }
    }

    if (out.length === 1 && !out[0].leftAt && createdAt) {
      out[0].enteredAt = createdAt;
    }

    console.log('[TIMELINE]', 'stages:', out.length, 'createdAt:', createdAt, 'actions:', actions.length);
    return out;
  }

  // ─── UTILITÁRIOS DE DATA (reutilizáveis) ────────
  // Centralizam a comparação de datas para que vencidos, vazão e lead time usem
  // exatamente a mesma interpretação (mesmo "hoje", mesmo conceito de mês).
  function startOfToday() { var d = new Date(); d.setHours(0,0,0,0); return d; }

  // Card vencido = tem due, NÃO está marcado como concluído (dueComplete) e a data
  // de entrega já passou (compara dias no fuso local, ignorando horas). Excluir
  // dueComplete evita falso-positivo de card já entregue ainda contar como atrasado.
  function isOverdue(due, dueComplete) {
    if (!due || dueComplete === true) return false;
    var d = new Date(due); d.setHours(0,0,0,0);
    return d < startOfToday();
  }

  // Mesma competência (mês+ano) entre duas datas — base do recorte mensal da vazão.
  function sameMonth(date, ref) {
    return date.getMonth() === ref.getMonth() && date.getFullYear() === ref.getFullYear();
  }

  // ─── CONCLUSÃO & LEAD TIME ──────────────────────
  // Data em que o card entrou pela ÚLTIMA vez em "Concluído 🏆" (ou null).
  // Usar a timeline (e não o flag dueComplete + due date) torna a métrica robusta a
  // cards reabertos (pega a última conclusão) e a cards sem due date.
  function getConcludedAt(tl) {
    if (!Array.isArray(tl)) return null;
    var concludedAt = null;
    for (var i = 0; i < tl.length; i++) {
      var name = tl[i].name ? tl[i].name.trim() : '';
      if (name === 'Concluído 🏆') concludedAt = tl[i].enteredAt; // última vence
    }
    return concludedAt;
  }

  // Lead time real (atravessamento do fluxo), em dias úteis:
  //   início = primeira entrada numa etapa de PRODUÇÃO ATIVA (saiu do backlog)
  //   fim    = conclusão (getConcludedAt)
  // Retorna { leadTime, concludedAt } ou null se não atravessou o fluxo
  // (nunca foi produzido, ou ainda não concluído).
  function computeLeadTime(tl, concludedAt) {
    if (!Array.isArray(tl) || !tl.length) return null;
    var startProd = null;
    for (var i = 0; i < tl.length; i++) {
      var name = tl[i].name ? tl[i].name.trim() : '';
      if (PRODUCAO_ATIVA.indexOf(name) !== -1) { startProd = tl[i].enteredAt; break; }
    }
    if (concludedAt === undefined) concludedAt = getConcludedAt(tl); // reaproveita se já calculado
    if (!startProd || !concludedAt || concludedAt <= startProd) return null;
    return { leadTime: countBusinessDays(startProd, concludedAt), concludedAt: concludedAt };
  }

  // Normaliza o texto do "Nível de Esforço" para um dos buckets (BAIXO/MÉDIO/ALTO).
  // Tolerante a acentos e caixa: "Médio", "medio", "MEDIO" → "MÉDIO".
  function normalizeNivel(text) {
    if (!text) return null;
    var t = String(text).trim().toUpperCase()
      .replace(/[ÁÀÂÃÄ]/g,'A').replace(/[ÉÈÊË]/g,'E').replace(/[ÍÌÎÏ]/g,'I')
      .replace(/[ÓÒÔÕÖ]/g,'O').replace(/[ÚÙÛÜ]/g,'U');
    if (t.indexOf('BAIX') === 0) return 'BAIXO';
    if (t.indexOf('MED')  === 0) return 'MÉDIO';
    if (t.indexOf('ALT')  === 0) return 'ALTO';
    return null;
  }

  // Desvio padrão populacional (volatilidade) de um array de números.
  function stdDev(arr) {
    if (!arr || arr.length < 2) return 0;
    var m = arr.reduce(function(a,b){return a+b;},0) / arr.length;
    var v = arr.reduce(function(a,b){return a+(b-m)*(b-m);},0) / arr.length;
    return round1(Math.sqrt(v));
  }
  function mean(arr) {
    if (!arr || !arr.length) return 0;
    return round1(arr.reduce(function(a,b){return a+b;},0) / arr.length);
  }

  // ─── TEMPO ATÉ PRIMEIRA ENTREGA ─────────────────
  // Da CRIAÇÃO do card até a 1ª CHEGADA a um marco de entrega (Revisão Externa 🧐 ou
  // Concluído 🏆).
  //   início = tl[0].enteredAt (createdAt, já clampado pela buildTimeline)
  //   fim    = enteredAt do PRIMEIRO estágio cujo nome ∈ MARCOS_ENTREGA
  // Retorna null se o card ainda não atingiu um marco de entrega.
  // Usar a CHEGADA ao marco (e não a saída de Revisão Interna) é robusto a reprovações
  // internas que voltam para retrabalho (não param o cronômetro) e a cards que pulam a
  // revisão interna. Também conta reentradas em "Em andamento" no percurso
  // (1 = original, 2+ = retrabalho).
  //
  // Breakdown: os estágios 0..idxFim-1 PARTICIONAM [início, fim] (contíguos, sem
  // gaps). Cada etapa nomeada acumula suas horas úteis; o restante (URGÊNCIAS,
  // Captação, Atrasos, …) cai em "Outras etapas". Somamos horas RAW e a headline é a
  // soma dos buckets já arredondados → o breakdown FECHA exatamente com o total.
  function computePrimeiraEntrega(tl) {
    if (!Array.isArray(tl) || !tl.length) return null;
    var inicio = tl[0].enteredAt;
    var fim = null, idxFim = -1;
    for (var i = 0; i < tl.length; i++) {
      if (MARCOS_ENTREGA.indexOf(tl[i].name ? tl[i].name.trim() : '') !== -1) {
        fim = tl[i].enteredAt; idxFim = i; break; // 1ª CHEGADA a um marco de entrega
      }
    }
    if (!fim || fim <= inicio) return null;

    var breakdown = {};
    ETAPAS_PRE_ENTREGA.forEach(function(n){ breakdown[n] = 0; });
    var entradasEmAndamento = 0;
    for (var j = 0; j < idxFim; j++) { // estágios ANTES do marco (particionam [início,fim])
      var nome = tl[j].name ? tl[j].name.trim() : '';
      var fimEtapa = tl[j].leftAt || fim; // o último pré-marco fecha em `fim`
      var horasEtapa = businessHoursRaw(tl[j].enteredAt, fimEtapa);
      if (breakdown.hasOwnProperty(nome)) breakdown[nome] += horasEtapa;
      else breakdown['Outras etapas'] += horasEtapa;
      if (nome === EM_ANDAMENTO) entradasEmAndamento++;
    }
    ETAPAS_PRE_ENTREGA.forEach(function(n){ breakdown[n] = round1(breakdown[n]); });

    // headline = soma dos buckets já arredondados → fecha com a soma exibida no breakdown.
    var horas = 0;
    ETAPAS_PRE_ENTREGA.forEach(function(n){ horas += breakdown[n]; });
    horas = round1(horas);

    return {
      inicio: inicio,
      horas: horas,
      dias: countBusinessDays(inicio, fim),
      breakdown: breakdown,
      entradasEmAndamento: entradasEmAndamento
    };
  }

  function apiUrl(path, token) {

  function escHtml(s) { var el = document.createElement('span'); el.appendChild(document.createTextNode(s)); return el.innerHTML; }

  function downloadCSV(filename, rows) {
    var csv = rows.map(function(row) {
      return row.map(function(cell) {
        var s = String(cell === null || cell === undefined ? '' : cell);
        if (s.indexOf(';') !== -1 || s.indexOf('"') !== -1 || s.indexOf('\n') !== -1) {
          s = '"' + s.replace(/"/g, '""') + '"';
        }
        return s;
      }).join(';');
    }).join('\r\n');
    var bom = '﻿';
    var blob = new Blob([bom + csv], { type: 'text/csv;charset=utf-8;' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = filename; a.click();
    setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
  }

  // ─── CARREGAMENTO PREGUIÇOSO DE LIBS (on-demand) ─
  // Carregadas só ao clicar em exportar → zero impacto na renderização em tempo real.
  function loadScriptOnce(src, globalName, cb) {
    if (window[globalName]) return cb();
    var s = document.createElement('script');
    s.src = src;
    s.onload = function() { cb(); };
    s.onerror = function() { cb(new Error('Falha ao carregar ' + src)); };
    document.head.appendChild(s);
  }

  // ─── EXPORTAÇÃO: CARDS DE UMA ETAPA (XLSX, fallback CSV) ─
  // Reutiliza as funções de tempo (countBusinessDays/Hours, elapsed*) para que a
  // planilha seja idêntica ao que o dashboard calcula — sem lógica duplicada.
  function buildEtapaRows(nomeEtapa, cardsNaEtapa) {
    var now = new Date();
    var header = ['Título','Etapa atual','Entrada na etapa','Dias corridos','Dias úteis','Horas corridas','Horas úteis','Link'];
    var rows = cardsNaEtapa.map(function(c) {
      var ent = c.enteredCurrentAt ? new Date(c.enteredCurrentAt) : null;
      return {
        nome: c.name,
        etapa: c.currentListName,
        entrada: ent ? fmtDateTime(ent) : '—',
        diasCorr: ent ? elapsedCalendarDays(ent, now) : '',
        diasUteis: ent ? countBusinessDays(ent, now) : '',
        horasCorr: ent ? elapsedCalendarHours(ent, now) : '',
        horasUteis: ent ? countBusinessHours(ent, now) : '',
        link: c.url || ''
      };
    });
    return { header: header, rows: rows };
  }

  function exportEtapaCards(nomeEtapa, cardsNaEtapa, btn) {
    if (!cardsNaEtapa || !cardsNaEtapa.length) return;
    var data = buildEtapaRows(nomeEtapa, cardsNaEtapa);
    var safeName = nomeEtapa.replace(/[^a-zA-Z0-9]+/g, '_').replace(/^_+|_+$/g, '').toLowerCase();
    var fileBase = 'cards_' + (safeName || 'etapa');
    setBtnLoading(btn, true);

    loadXLSXLib(function(err) {
      try {
        if (err || typeof XLSX === 'undefined') { exportEtapaCSV(data, fileBase); return; }
        var aoa = [data.header];
        data.rows.forEach(function(r) {
          aoa.push([r.nome, r.etapa, r.entrada, r.diasCorr, r.diasUteis, r.horasCorr, r.horasUteis, r.link]);
        });
        var ws = XLSX.utils.aoa_to_sheet(aoa);
        // largura das colunas
        ws['!cols'] = [{wch:38},{wch:20},{wch:18},{wch:12},{wch:11},{wch:13},{wch:11},{wch:32}];
        // estilo do cabeçalho (consistente com a identidade: fundo escuro, texto claro)
        var headStyle = {font:{bold:true,color:{rgb:'FFFFFF'}},fill:{fgColor:{rgb:'0A0A0A'}},alignment:{horizontal:'center'}};
        for (var c = 0; c < data.header.length; c++) {
          var ref = XLSX.utils.encode_cell({r:0,c:c});
          if (ws[ref]) ws[ref].s = headStyle;
        }
        // coluna Link clicável (hyperlink nativo do XLSX → funciona no Excel e Sheets)
        for (var i = 0; i < data.rows.length; i++) {
          var url = data.rows[i].link;
          if (!url) continue;
          var lref = XLSX.utils.encode_cell({r:i+1,c:7});
          ws[lref] = { t:'s', v:'Abrir card', l:{ Target:url, Tooltip:'Abrir no Trello' }, s:{font:{color:{rgb:'0B5FFF'},underline:true}} };
        }
        var wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'Cards');
        XLSX.writeFile(wb, fileBase + '.xlsx');
      } catch (e) {
        exportEtapaCSV(data, fileBase); // qualquer erro → CSV garante a entrega
      } finally {
        setBtnLoading(btn, false);
      }
    });
  }

  function exportEtapaCSV(data, fileBase) {
    var rows = [data.header];
    data.rows.forEach(function(r) {
      // =HYPERLINK mantém o link clicável também no CSV (Excel/Google Sheets)
      var link = r.link ? '=HYPERLINK("' + r.link + '";"Abrir card")' : '';
      rows.push([r.nome, r.etapa, r.entrada, r.diasCorr, r.diasUteis, r.horasCorr, r.horasUteis, link]);
    });
    downloadCSV(fileBase + '.csv', rows);
  }

  function downloadCanvas(canvas, base) {
    // WEBP: menor que PNG e nítido como ele; se o browser não codificar WEBP, cai p/ PNG.
    canvas.toBlob(function(blob) {
      if (blob && blob.type === 'image/webp') { triggerDownload(blob, base + '.webp'); return; }
      canvas.toBlob(function(png) { if (png) triggerDownload(png, base + '.png'); }, 'image/png');
    }, 'image/webp', 0.92);
  }
  function triggerDownload(blob, filename) {
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = filename; a.click();
    setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
  }
