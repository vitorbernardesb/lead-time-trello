  // ─── FETCH DATA ─────────────────────────────────
  function fetchWithRetry(url, token, maxRetries) {
    var attempt = 0;
    function tryFetch() {
      return fetch(apiUrl(url, token))
        .then(function(r) {
          if (r.status === 401) {
            console.error('[DASHBOARD] 401 Unauthorized — token expirado, url:', url.substring(0, 60));
            throw new Error('401_UNAUTHORIZED');
          }
          if ((r.status === 429 || r.status >= 500) && attempt < maxRetries) {
            attempt++;
            var backoff = Math.min(1000 * Math.pow(2, attempt), 8000);
            console.warn('[DASHBOARD] ' + r.status + ' retry', attempt, 'in', backoff + 'ms');
            return new Promise(function(resolve) { setTimeout(resolve, backoff); }).then(tryFetch);
          }
          return r.json();
        })
        .then(function(data) {
          if (data && data.error && attempt < maxRetries) {
            attempt++;
            var wait = 2000 * attempt;
            return new Promise(function(resolve){ setTimeout(resolve, wait); }).then(tryFetch);
          }
          return data;
        })
        .catch(function(err) {
          if (err && err.message === '401_UNAUTHORIZED') throw err;
          if (attempt < maxRetries) {
            attempt++;
            var backoff = Math.min(1000 * Math.pow(2, attempt), 8000);
            console.warn('[DASHBOARD] Network error, retry', attempt, ':', err.message || String(err));
            return new Promise(function(resolve) { setTimeout(resolve, backoff); }).then(tryFetch);
          }
          throw err;
        });
    }
    return tryFetch();
  }

  function throttledFetch(urls, token, batchSize, delayMs) {
    var results = new Array(urls.length);
    var idx = 0;
    function nextBatch() {
      if (idx >= urls.length) return Promise.resolve(results);
      var end = Math.min(idx + batchSize, urls.length);
      var batch = [];
      for (var b = idx; b < end; b++) {
        (function(i) {
          batch.push(
            fetchWithRetry(urls[i], token, 2)
              .then(function(data){ results[i] = data; })
          );
        })(b);
      }
      idx = end;
      return Promise.all(batch).then(function() {
        if (idx >= urls.length) return results;
        return new Promise(function(resolve){ setTimeout(resolve, delayMs); }).then(nextBatch);
      });
    }
    return nextBatch();
  }

  function fetchData(token, boardId) {
    var fieldCachePromise = t.get('board', 'private', 'retrabalhoFieldCache').then(function(fc) {
      // Só confia no cache se o ID do campo "Nível de Esforço" já é CONHECIDO (truthy).
      // Se foi cacheado como null (campo ainda não existia), reprocessa /customFields
      // para captar o campo assim que for adicionado — sem esperar o TTL de 24h.
      if (fc && fc.id && fc.savedAt && fc.nivelEsforcoId &&
          (Date.now() - fc.savedAt < FIELD_CACHE_TTL)) return fc;
      return null;
    }).catch(function() { return null; });

    return fieldCachePromise.then(function(cachedField) {
      var phase1 = [
        fetchWithRetry('/boards/'+boardId+'/lists?fields=name', token, 2),
        fetchWithRetry('/boards/'+boardId+'/cards?filter=all&fields=name,desc,due,dueComplete,dateLastActivity,labels,idList,shortUrl,closed&customFieldItems=true', token, 2)
      ];
      if (!cachedField) {
        phase1.push(fetchWithRetry('/boards/'+boardId+'/customFields', token, 2));
      }
      return Promise.all(phase1).then(function(initial) {
        var lists = initial[0], allBoardCards = initial[1], customFields = initial[2] || [];

        var flowListIds = {};
        if (Array.isArray(lists)) {
          lists.forEach(function(l) {
            for (var fi=0; fi<FLOW_LISTS.length; fi++) {
              if (l.name.trim() === FLOW_LISTS[fi]) { flowListIds[l.id] = l.name.trim(); break; }
            }
          });
        }
        if (!Object.keys(flowListIds).length) throw new Error('Nenhuma lista do fluxo encontrada.');

        var retrabalhoFieldId = null;
        var retrabalhoOptions = {};
        var prioridadeFieldId = null;
        var nivelEsforcoFieldId = null;         // custom field "Nível de Esforço"
        var nivelEsforcoOptions = {};           // optionId → texto (ALTO/MÉDIO/BAIXO)
        if (cachedField) {
          retrabalhoFieldId = cachedField.id;
          retrabalhoOptions = cachedField.options || {};
          prioridadeFieldId = cachedField.prioridadeId || null;
          nivelEsforcoFieldId = cachedField.nivelEsforcoId || null;
          nivelEsforcoOptions = cachedField.nivelEsforcoOptions || {};
        } else if (Array.isArray(customFields)) {
          for (var fi=0; fi<customFields.length; fi++) {
            if (customFields[fi].name === 'Retrabalhos') {
              retrabalhoFieldId = customFields[fi].id;
              if (Array.isArray(customFields[fi].options)) {
                customFields[fi].options.forEach(function(o) {
                  retrabalhoOptions[o.id] = o.value && o.value.text ? o.value.text : '';
                });
              }
            }
            if (customFields[fi].name === 'Prioridade') {
              prioridadeFieldId = customFields[fi].id;
            }
            if (customFields[fi].name === 'Nível de Esforço') {
              nivelEsforcoFieldId = customFields[fi].id;
              if (Array.isArray(customFields[fi].options)) {
                customFields[fi].options.forEach(function(o) {
                  nivelEsforcoOptions[o.id] = o.value && o.value.text ? o.value.text : '';
                });
              }
            }
          }
          try {
            t.set('board', 'private', 'retrabalhoFieldCache', {
              id: retrabalhoFieldId, options: retrabalhoOptions, prioridadeId: prioridadeFieldId,
              nivelEsforcoId: nivelEsforcoFieldId, nivelEsforcoOptions: nivelEsforcoOptions,
              savedAt: Date.now()
            });
          } catch(e) {}
        }

      // cards abertos → alimentam TODOS os KPIs (comportamento inalterado).
      // cards ARQUIVADOS elegíveis (criados a partir do epoch) → processados junto,
      // mas isolados via flag `closed`: entram SÓ no indicador de 1ª entrega, nunca
      // nos demais KPIs (ver split do retorno e guarda de throughput). O filtro por
      // data de criação (idToDate) evita puxar o histórico antigo do board.
      var cards = [];
      if (Array.isArray(allBoardCards)) {
        allBoardCards.forEach(function(c) {
          if (!flowListIds[c.idList]) return;
          if (c.closed) {
            var cd = idToDate(c.id);
            if (cd && cd >= PRIMEIRA_ENTREGA_EPOCH) cards.push(c);
          } else {
            cards.push(c);
          }
        });
      }

      var cfByCard = {};
      cards.forEach(function(c) {
        cfByCard[c.id] = Array.isArray(c.customFieldItems) ? c.customFieldItems : [];
      });

        updateSkeletonMsg('Calculando lead time de ' + cards.length + ' cards…');

        var actionUrls = cards.map(function(c) {
          // fields enxutos: só o que buildTimeline/vazão usam (type,date,data) — reduz payload/parse.
          return '/cards/'+c.id+'/actions?filter=updateCard:idList,createCard,copyCard&limit=1000&fields=type,date,data&memberCreator=false&member=false';
        });

        return throttledFetch(actionUrls, token, 10, 1200).then(function(allResults) {
        var allActions = allResults;
        var allCF = cards.map(function(c) { return cfByCard[c.id]; });

          var now = new Date();
          var curMonth = now.getMonth(), curYear = now.getFullYear();
          var throughput = {};
          FLOW_LISTS.forEach(function(n) { throughput[n] = 0; });

          var processed = [];
          for (var i=0; i<cards.length; i++) {
            var card = cards[i];
            var actions = Array.isArray(allActions[i]) ? allActions[i] : [];

            // Vazão/throughput considera apenas cards ABERTOS (arquivados entram só na
            // 1ª entrega). Evita que arquivar um card altere a vazão do mês.
            if (!card.closed) {
              actions.forEach(function(act) {
                if (act.type === 'updateCard' && act.data.listBefore) {
                  var d = new Date(act.date);
                  if (d.getMonth() === curMonth && d.getFullYear() === curYear) {
                    var fromList = act.data.listBefore.name;
                    if (throughput.hasOwnProperty(fromList)) throughput[fromList]++;
                  }
                }
              });
            }

            var rwVal = 0;
            var hasRetrabalho = false;
            var cfItems = Array.isArray(allCF[i]) ? allCF[i] : [];
            if (retrabalhoFieldId) {
              for (var cfi=0; cfi<cfItems.length; cfi++) {
                if (cfItems[cfi].idCustomField === retrabalhoFieldId) {
                  var cfItem = cfItems[cfi];
                  var v = cfItem.value;
                  if (v !== null && v !== undefined) {
                    if (v.number !== null && v.number !== undefined) { rwVal = parseFloat(v.number); if (isNaN(rwVal)) rwVal = 0; }
                    else if (v.text !== null && v.text !== undefined) { rwVal = parseFloat(v.text); if (isNaN(rwVal)) rwVal = 0; }
                    else if (v.checked !== undefined) { rwVal = v.checked === 'true' || v.checked === true ? 1 : 0; }
                    hasRetrabalho = true;
                  } else if (cfItem.idValue) {
                    hasRetrabalho = true;
                    var opt = retrabalhoOptions[cfItem.idValue];
                    if (opt !== undefined && opt !== '') {
                      rwVal = parseFloat(opt);
                      if (isNaN(rwVal)) rwVal = 1;
                    } else {
                      rwVal = 1;
                    }
                  }
                  break;
                }
              }
            }

            var tl = buildTimeline(actions);
            var currentStage = tl.length ? tl[tl.length-1] : null;
            var currentListName = currentStage ? currentStage.name : (flowListIds[card.idList] || '');
            var realListName = flowListIds[card.idList] || currentListName;

            // Conclusão (timeline) compartilhada por vazão E lead time — calculada uma vez
            // e reaproveitada em computeLeadTime (evita recomputar getConcludedAt).
            var concludedAt = getConcludedAt(tl);
            var ltReal = computeLeadTime(tl, concludedAt);
            // Tempo até 1ª entrega (criação → 1ª chegada a marco de entrega) e nível de esforço.
            var pe = computePrimeiraEntrega(tl);
            var createdAt = tl.length ? tl[0].enteredAt : null;
            var nivelEsforco = null;
            if (nivelEsforcoFieldId) {
              for (var ni=0; ni<cfItems.length; ni++) {
                if (cfItems[ni].idCustomField === nivelEsforcoFieldId && cfItems[ni].idValue) {
                  nivelEsforco = normalizeNivel(nivelEsforcoOptions[cfItems[ni].idValue]);
                  break;
                }
              }
            }
            var daysInCurrent = currentStage ? countBusinessDays(currentStage.enteredAt, now) : 0;

            // Vencido: due no passado e ainda não entregue (helper centralizado).
            var hasDue = !!card.due;
            var isLate = isOverdue(card.due, card.dueComplete);

            var hasLabels = card.labels && card.labels.length > 0;

            // Concluído no mês corrente = entrou em Concluído neste mês (pela data REAL
            // de conclusão, não pela due date). É isto que mede vazão/throughput.
            var concluidoNoMes = !!(concludedAt && sameMonth(concludedAt, now));

            var tituloValido = validarTitulo(card.name);
            var hasDesc = card.desc && card.desc.trim().length > 0;

            var hasPrio = false;
            if (prioridadeFieldId) {
              for (var pi=0; pi<cfItems.length; pi++) {
                if (cfItems[pi].idCustomField === prioridadeFieldId && cfItems[pi].idValue) {
                  hasPrio = true;
                  break;
                }
              }
            } else {
              hasPrio = true;
            }

            var missing = [];
            if (!tituloValido) missing.push('Título não preenchido');
            if (!hasLabels) missing.push('Etiqueta não definida');
            if (!hasDue) missing.push('Data de entrega não definida');
            if (!hasDesc) missing.push('Descrição não preenchida');
            if (!hasPrio) missing.push('Prioridade não definida');

            processed.push({
              id: card.id,
              name: card.name,
              isArchived: !!card.closed,
              retrabalho: rwVal,
              hasRetrabalho: hasRetrabalho,
              daysInCurrent: daysInCurrent,
              hasDue: hasDue,
              isLate: isLate,
              hasLabels: hasLabels,
              hasPrioridade: hasPrio,
              labels: (card.labels || []).map(function(l) { return l.name; }),
              currentListName: currentListName,
              // entrada na etapa atual (para tempos na etapa) e URL clicável do card
              enteredCurrentAt: currentStage ? currentStage.enteredAt.toISOString() : null,
              url: card.shortUrl || '',
              isConcluido: realListName === 'Concluído 🏆',
              concluidoNoMes: concluidoNoMes,
              // lead time real do fluxo (dias úteis) e quando o card foi concluído.
              // concludedAt vale para QUALQUER card concluído (independe de lead time).
              leadTimeReal: ltReal ? ltReal.leadTime : null,
              concludedAt: concludedAt ? concludedAt.toISOString() : null,
              // Tempo até 1ª entrega por nível de esforço (null se ainda não entregou).
              nivelEsforco: nivelEsforco,
              createdAt: createdAt ? createdAt.toISOString() : null,
              primeiraEntrega: pe ? {
                horas: pe.horas, dias: pe.dias,
                breakdown: pe.breakdown, entradasEmAndamento: pe.entradasEmAndamento
              } : null,
              missing: missing,
              isConforme: tituloValido && hasLabels && hasDue && hasDesc && hasPrio
            });
          }
          // Split: `cards` = só abertos (todos os KPIs, inalterado); `archived` =
          // arquivados elegíveis, consumidos EXCLUSIVAMENTE pela 1ª entrega.
          var openCards = [], archivedCards = [];
          for (var pi2 = 0; pi2 < processed.length; pi2++) {
            (processed[pi2].isArchived ? archivedCards : openCards).push(processed[pi2]);
          }
          return { cards: openCards, archived: archivedCards, throughput: throughput };
        });
      });
    });
  }


  // ─── CALCULATE KPIs ─────────────────────────────
  function calcKPIs(cards, config) {
    var withDue = cards.filter(function(c){ return c.hasDue && !c.isConcluido; });
    var vencidos = withDue.filter(function(c){ return c.isLate; });
    // KPI1 — CARDS VENCIDOS: % de cards ATIVOS (não concluídos) com due date que já
    // venceu. Denominador = só cards ativos com due (cards sem due/concluídos não entram).
    var kpi1 = withDue.length ? Math.round(vencidos.length / withDue.length * 1000) / 10 : 0;

    var totalRw = 0;
    cards.forEach(function(c){ totalRw += c.retrabalho; });
    var kpi2 = totalRw;

    // KPI3 — AGING / Tempo na etapa atual: média de dias úteis que os cards ativos
    // permanecem na etapa em que estão agora. Mede WIP aging (cards parados), NÃO lead time.
    var prodCards = cards.filter(function(c) {
      return PRODUCAO_ATIVA.indexOf(c.currentListName) !== -1;
    });
    var totalDays = 0;
    prodCards.forEach(function(c) { totalDays += c.daysInCurrent; });
    var kpi3 = prodCards.length ? Math.round(totalDays / prodCards.length * 10) / 10 : 0;

    // KPI4 — VAZÃO MENSAL / throughput: nº de cards CONCLUÍDOS no mês corrente
    // (pela data real de entrada em Concluído). Mede entregas no período, não due dates.
    var kpi4 = cards.filter(function(c){ return c.concluidoNoMes; }).length;

    var cardsParaConformidade = cards.filter(function(c){ return !c.isConcluido; });
    var conformes = cardsParaConformidade.filter(function(c){ return c.isConforme; }).length;
    var kpi5 = cardsParaConformidade.length ? Math.round(conformes / cardsParaConformidade.length * 1000) / 10 : 0;

    // KPI6 — LEAD TIME REAL / Tempo de entrega: tempo médio de atravessamento do fluxo
    // (entrada na produção → conclusão), em dias úteis, considerando apenas cards
    // concluídos numa janela móvel dos últimos 30 dias.
    var LEADTIME_WINDOW_MS = 30 * 86400000;
    var agora = Date.now();
    var concluidosNaJanela = cards.filter(function(c) {
      return c.leadTimeReal !== null && c.concludedAt &&
        (agora - new Date(c.concludedAt).getTime()) <= LEADTIME_WINDOW_MS;
    });
    var totalLeadTime = 0;
    concluidosNaJanela.forEach(function(c) { totalLeadTime += c.leadTimeReal; });
    var kpi6 = concluidosNaJanela.length ? Math.round(totalLeadTime / concluidosNaJanela.length * 10) / 10 : 0;

    // Scores padronizados pela MESMA função (kpiHealth) — sem fórmulas divergentes.
    // Tipo 'B' (quanto menor melhor): vencidos, rework, aging, lead time real.
    // Tipo 'A' (quanto maior melhor): throughput, conformidade.
    var score_prazo         = kpiHealth(kpi1, config.meta_prazo, 'B');
    var score_rework        = kpiHealth(kpi2, config.meta_rework, 'B');
    var score_aging         = kpiHealth(kpi3, config.meta_leadtime, 'B');
    var score_leadtime_real = kpiHealth(kpi6, config.meta_leadtime_real, 'B');
    var score_through       = kpiHealth(kpi4, config.meta_through, 'A');
    var score_conformidade  = kpiHealth(kpi5, config.meta_conformidade, 'A');

    // Health Score = média ponderada dos 6 scores. Aging e lead time real entram com
    // pesos separados (peso3 e peso6), evitando duplicidade de impacto temporal.
    var healthScore = Math.max(0, Math.min(100, Math.round(
      (score_prazo * config.peso1 + score_rework * config.peso2 +
       score_aging * config.peso3 + score_through * config.peso4 +
       score_conformidade * config.peso5 + score_leadtime_real * config.peso6) / 100
    )));

    return {
      kpi1: kpi1, kpi2: kpi2, kpi3: kpi3, kpi4: kpi4, kpi5: kpi5, kpi6: kpi6,
      noDueData: withDue.length === 0,
      score_prazo: score_prazo, score_rework: score_rework,
      score_aging: score_aging, score_leadtime_real: score_leadtime_real,
      score_through: score_through,
      score_conformidade: score_conformidade,
      healthScore: healthScore,
      totalCards: cards.length
    };
  }

  // ─── AGREGAÇÃO: TEMPO ATÉ 1ª ENTREGA POR NÍVEL ──
  // Agrupa por Nível de Esforço apenas cards CRIADOS a partir do epoch (daqui pra
  // frente) e que já tiveram 1ª entrega. Calcula média (h/d úteis), desvio padrão,
  // min/máx e o breakdown médio por etapa.
  function calcPrimeiraEntrega(cards) {
    var grupos = {};
    NIVEIS_ESFORCO.forEach(function(n){ grupos[n] = []; });
    var semNivel = 0, foraEpoch = 0;

    cards.forEach(function(c) {
      if (!c.primeiraEntrega) return;                               // ainda não entregou
      if (!c.createdAt || new Date(c.createdAt) < PRIMEIRA_ENTREGA_EPOCH) { foraEpoch++; return; }
      if (!c.nivelEsforco || !grupos[c.nivelEsforco]) { semNivel++; return; }
      grupos[c.nivelEsforco].push(c);
    });

    var out = { niveis: {}, semNivel: semNivel, foraEpoch: foraEpoch };
    NIVEIS_ESFORCO.forEach(function(nivel) {
      var lista = grupos[nivel];
      var horas = lista.map(function(c){ return c.primeiraEntrega.horas; });
      var dias  = lista.map(function(c){ return c.primeiraEntrega.dias; });
      var entradas = lista.map(function(c){ return c.primeiraEntrega.entradasEmAndamento; });

      // breakdown médio por etapa
      var breakdown = {};
      ETAPAS_PRE_ENTREGA.forEach(function(etapa) {
        breakdown[etapa] = mean(lista.map(function(c){ return (c.primeiraEntrega.breakdown[etapa] || 0); }));
      });
      // headline agregada = soma das médias do breakdown → FECHA com as linhas exibidas.
      var avgHorasFechada = 0;
      ETAPAS_PRE_ENTREGA.forEach(function(etapa){ avgHorasFechada += breakdown[etapa]; });
      avgHorasFechada = round1(avgHorasFechada);

      out.niveis[nivel] = {
        n: lista.length,
        avgHoras: avgHorasFechada, avgDias: mean(dias),
        stdHoras: stdDev(horas), stdDias: stdDev(dias),
        minHoras: horas.length ? Math.min.apply(null, horas) : 0,
        maxHoras: horas.length ? Math.max.apply(null, horas) : 0,
        minDias:  dias.length ? Math.min.apply(null, dias) : 0,
        maxDias:  dias.length ? Math.max.apply(null, dias) : 0,
        avgEntradas: mean(entradas),
        retrabalhoCount: entradas.filter(function(e){ return e > 1; }).length, // reentrou em Em andamento
        breakdown: breakdown
      };
    });
    return out;
  }

  // ─── SLA ALERTS ─────────────────────────────────
  function computeSLAAlerts(cards, config) {
    var sla = config.sla || DEFAULT_SLA;
    var alerts = [];
    cards.forEach(function(c) {
      if (!c.currentListName) return;
      var limit = sla[c.currentListName];
      if (limit === undefined || limit >= 999) return;
      if (c.daysInCurrent > limit) {
        alerts.push({
          id: c.id,
          name: c.name,
          list: c.currentListName,
          days: c.daysInCurrent,
          slaLimit: limit,
          excess: c.daysInCurrent - limit
        });
      }
    });
    alerts.sort(function(a,b) { return b.excess - a.excess; });
    return alerts;
  }

  // ─── RENDER ALERT BANNER ────────────────────────
  function renderAlertBanner(slaAlerts) {
    var banner = document.getElementById('alert-banner');
    if (slaAlerts.length > 0) {
      banner.className = 'alert-banner danger';
      banner.innerHTML = '🔴 ' + slaAlerts.length + ' card' + (slaAlerts.length > 1 ? 's estão' : ' está') + ' acima do SLA — ver no Detalhamento';
      banner.style.display = '';
      banner.onclick = function() { switchTab('funnel'); };
    } else {
      banner.className = 'alert-banner success';
      banner.innerHTML = '✅ Todos os cards estão dentro do SLA';
      banner.style.display = '';
      banner.onclick = null;
      banner.style.cursor = 'default';
    }
  }

  // ─── RENDER REALTIME ────────────────────────────
  function scoreColor(score) {
    if (score >= 80) return { border: '#FFCF06', bg: 'rgba(255,207,6,0.12)', text: '#0A0A0A' };
    if (score >= 60) return { border: '#FFCF06', bg: 'rgba(255,207,6,0.06)', text: '#0A0A0A' };
    if (score >= 40) return { border: '#ABABB0', bg: 'rgba(171,171,176,0.10)', text: '#0A0A0A' };
    return { border: '#0A0A0A', bg: 'rgba(10,10,10,0.06)', text: '#0A0A0A' };
  }
  function scoreStatus(score) {
    if (score >= 80) return 'Produção excelente';
    if (score >= 60) return 'Produção em dia';
    if (score >= 40) return 'Atenção necessária';
    return 'Situação crítica';
  }
  // ─── SCORE, BARRA & COR CENTRALIZADOS ───────────
  // Há DUAS grandezas distintas, cada uma com sua função:
  //
  //  1) kpiBarPct  → LARGURA da barra = proporção REAL valor/meta (quão "cheia" está
  //     a barra em relação à meta). É a MESMA fórmula para todos os KPIs, sem inversão.
  //     A direção (bom/ruim) NÃO é comunicada pela largura, e sim pela COR.
  //     ex.: meta 15, valor 6 → 40% (antes usávamos o score 80%, daí a barra "cheia demais").
  //
  //  2) kpiHealth  → SCORE de saúde (0..100) que alimenta a COR (statusColor), o status
  //     e o Health Score. AQUI sim a lógica diferencia "maior melhor" de "menor melhor".

  // LARGURA: proporção direta valor/meta, clamp [0,100], protegida contra meta <= 0.
  // Funciona com valores baixos/altos, metas decimais e sem ranges fixos/hardcoded —
  // qualquer mudança de meta recalcula a barra automaticamente.
  function kpiBarPct(valor, meta) {
    valor = parseFloat(valor); meta = parseFloat(meta);
    if (isNaN(valor) || isNaN(meta) || meta <= 0) return 0; // meta 0 → barra vazia (evita ÷0)
    return Math.max(0, Math.min(100, (valor / meta) * 100));
  }

  // SCORE de saúde padronizado (0..100). Fonte única da COR e do Health Score.
  //   tipo 'A' (quanto MAIOR melhor): score = valor/meta            (meta = alvo)
  //   tipo 'B' (quanto MENOR melhor): score = 1 - valor/(2*meta)    (meta = ponto de 50%)
  // Em 'B', a meta é o limite "aceitável": valor 0 → 100, valor = meta → 50,
  // valor >= 2*meta → 0. Padroniza a curva de criticidade entre todos os KPIs.
  function kpiHealth(valor, meta, tipo) {
    valor = parseFloat(valor); meta = parseFloat(meta);
    if (isNaN(valor) || isNaN(meta) || meta <= 0) return 0;
    var score = tipo === 'A' ? (valor / meta) * 100 : (1 - valor / (2 * meta)) * 100;
    return Math.max(0, Math.min(100, score)); // clamp garante comportamento são em extremos
  }

  // Interpola linearmente entre duas cores RGB (arrays [r,g,b]).
  function lerpColor(c1, c2, f) {
    f = Math.max(0, Math.min(1, f));
    return 'rgb(' +
      Math.round(c1[0] + (c2[0] - c1[0]) * f) + ',' +
      Math.round(c1[1] + (c2[1] - c1[1]) * f) + ',' +
      Math.round(c1[2] + (c2[2] - c1[2]) * f) + ')';
  }

  // Cor de status (semáforo) derivada do score 0..100, com transição suave:
  // vermelho (crítico) → amarelo (atenção) → verde (saudável). Tons suaves/acessíveis.
  var COR_CRITICO  = [229, 72, 77];   // vermelho suave
  var COR_ATENCAO  = [242, 183, 5];   // amarelo (alinhado ao brand #FFCF06)
  var COR_SAUDAVEL = [46, 158, 91];   // verde equilibrado
  function statusColor(score) {
    score = Math.max(0, Math.min(100, score));
    return score <= 50
      ? lerpColor(COR_CRITICO, COR_ATENCAO, score / 50)
      : lerpColor(COR_ATENCAO, COR_SAUDAVEL, (score - 50) / 50);
  }

  // Cores-rótulo por nível (apenas identificação visual, não é semáforo de saúde).
  var COR_NIVEL = { 'BAIXO': '#2E9E5B', 'MÉDIO': '#F2B705', 'ALTO': '#E5484D' };

  function fmtHoras(h) { return String(h).replace('.', ',') + 'h'; }
  function fmtDias(d)  { return String(d).replace('.', ',') + ' d.u.'; }

  // Monta os 3 cards expandíveis (BAIXO/MÉDIO/ALTO). Usa classe .pe-toggle própria
  // (não .collapse-toggle) para não colidir com o handler genérico que reescreve textContent.
  function renderPrimeiraEntregaHTML(cards) {
    var pe = calcPrimeiraEntrega(cards);
    var h = '';
    h += '<div class="pe-section">';
    h += '<div class="pe-title-row"><h3>Tempo até primeira entrega <span class="pe-hint">por nível de esforço</span></h3>';
    h += '<span class="pe-epoch">contando cards criados a partir de '+fmtDateBR(PRIMEIRA_ENTREGA_EPOCH)+'</span></div>';
    h += '<div class="pe-grid">';

    // Escala COMPARTILHADA para as mini-barras: maior média (h úteis) entre os 3 níveis.
    var maxAvg = 0;
    NIVEIS_ESFORCO.forEach(function(n){ if (pe.niveis[n].avgHoras > maxAvg) maxAvg = pe.niveis[n].avgHoras; });

    NIVEIS_ESFORCO.forEach(function(nivel) {
      var g = pe.niveis[nivel];
      var cor = COR_NIVEL[nivel] || '#ABABB0';
      var temDados = g.n > 0;
      h += '<div class="pe-card'+(temDados?'':' pe-nodata')+'" style="--pe-cor:'+cor+'">';
      h += '<button class="pe-toggle" data-pe="'+nivel+'"'+(temDados?'':' disabled')+'>';
      h += '<div class="pe-head"><span class="pe-chip"><span class="pe-dot"></span>'+nivel+'</span>';
      h += '<span class="pe-arrow">'+(temDados?'▼':'')+'</span></div>';
      if (temDados) {
        h += '<div class="pe-main"><span class="pe-value">'+fmtHoras(g.avgHoras)+'</span><span class="pe-unit">úteis</span></div>';
        h += '<div class="pe-days">'+fmtDias(g.avgDias)+'</div>';
        var pct = maxAvg > 0 ? Math.round(g.avgHoras / maxAvg * 100) : 0;
        h += '<div class="pe-compare"><div class="pe-compare-fill" style="width:'+pct+'%"></div></div>';
        h += '<div class="pe-sub">Tempo médio até 1ª entrega · '+g.n+' card'+(g.n>1?'s':'')+'</div>';
      } else {
        h += '<div class="pe-main pe-empty">Sem dados ainda</div>';
        h += '<div class="pe-sub">Nenhum card entregue neste nível</div>';
      }
      h += '</button>';

      // corpo expandível: breakdown por etapa + volatilidade + min/máx + retrabalho
      h += '<div class="pe-body" id="pe-body-'+nivel+'">';
      if (temDados) {
        h += '<table class="pe-table"><thead><tr><th>Etapa</th><th>h úteis médias</th></tr></thead><tbody>';
        ETAPAS_PRE_ENTREGA.forEach(function(etapa) {
          h += '<tr><td>'+escHtml(etapa)+'</td><td>'+fmtHoras(g.breakdown[etapa])+'</td></tr>';
        });
        h += '</tbody></table>';
        h += '<div class="pe-stats">';
        h += '<div><span>Desvio padrão</span><b>'+fmtHoras(g.stdHoras)+' · '+fmtDias(g.stdDias)+'</b></div>';
        h += '<div><span>Mín – Máx</span><b>'+fmtHoras(g.minHoras)+' – '+fmtHoras(g.maxHoras)+'</b></div>';
        h += '<div><span>Reentradas em "Em andamento" (retrabalho)</span><b>'+g.retrabalhoCount+' de '+g.n+'</b></div>';
        h += '</div>';
      }
      h += '</div></div>';
    });

    h += '</div>';
    if (pe.semNivel > 0) {
      h += '<div class="pe-foot">'+pe.semNivel+' card(s) entregues sem "Nível de Esforço" definido não estão nos grupos acima.</div>';
    }
    h += '</div>';
    return h;
  }

  function fmtDateBR(d) {
    d = new Date(d);
    function p(n){ return String(n).padStart(2,'0'); }
    return p(d.getDate())+'/'+p(d.getMonth()+1)+'/'+d.getFullYear();
  }

  function renderRealtime(kpis, config, cards, cachedAt, archived) {
    var sc = scoreColor(kpis.healthScore);
    var circumference = 2 * Math.PI * 52;
    var ringCor = statusColor(kpis.healthScore); // anel usa o mesmo semáforo dos KPIs
    var html = '';

    html += '<div class="score-circle-wrap">';
    html += '<svg class="score-ring-svg" width="120" height="120" viewBox="0 0 120 120">';
    html += '<circle cx="60" cy="60" r="52" stroke="rgba(171,171,176,0.25)" stroke-width="6" fill="none"/>';
    html += '<circle id="score-ring-progress" class="score-ring-progress" cx="60" cy="60" r="52" stroke="'+ringCor+'" stroke-width="6" fill="none" stroke-linecap="round" stroke-dasharray="'+circumference+'" stroke-dashoffset="'+circumference+'" transform="rotate(-90 60 60)"/>';
    html += '<circle cx="60" cy="60" r="46" fill="'+sc.bg+'"/>';
    html += '<text id="score-ring-number" x="60" y="55" text-anchor="middle" dominant-baseline="middle" font-size="31" font-weight="700" font-family="BW Modelica, Inter, Helvetica Neue, sans-serif" fill="'+ringCor+'">'+kpis.healthScore+'</text>';
    html += '<text x="60" y="73" text-anchor="middle" font-size="9" letter-spacing="0.6" font-family="BW Modelica, Inter, Helvetica Neue, sans-serif" fill="#ABABB0">HEALTH SCORE</text>';
    html += '</svg>';
    html += '<div class="score-status" style="color:'+sc.text+';">'+scoreStatus(kpis.healthScore)+'</div>';
    html += '</div>';

    // Definição única dos KPIs (compartilhada com a imagem exportada).
    var kpiCards = buildKpiCards(kpis, config);

    html += '<div class="kpi-grid">';
    kpiCards.forEach(function(k, i) {
      // largura = proporção real valor/meta; cor = criticidade (score de saúde).
      // Ambos calculados UMA vez e reutilizados na animação (sem recomputar por barra).
      k.pct = kpiBarPct(k.valor, k.meta);
      k.score = kpiHealth(k.valor, k.meta, k.tipo);
      var cor = statusColor(k.score);
      html += '<div class="kpi-card">';
      html += '<div class="kpi-name">'+k.name+'</div>';
      html += '<div class="kpi-value">'+k.display+'</div>';
      html += '<div class="kpi-meta">'+k.metaLabel+'</div>';
      html += '<div class="kpi-bar-bg"><div class="kpi-bar-fill" id="bar-kpi-'+i+'" style="width:0%;background:'+cor+';"></div></div>';
      html += '</div>';
    });
    html += '</div>';

    // Tempo até 1ª entrega por Nível de Esforço (3 cards expandíveis).
    // Inclui os arquivados elegíveis (só este indicador os vê).
    html += renderPrimeiraEntregaHTML(cards.concat(archived || []));

    // Non-conforming cards
    var nonConforming = cards.filter(function(c) { return !c.isConforme && !c.isConcluido; });
    if (nonConforming.length > 0) {
      var expanded = nonConforming.length > 3;
      html += '<div class="collapsible">';
      html += '<button class="collapse-toggle'+(expanded?' open':'')+'" data-collapse="nc">Cards com campos incompletos ('+nonConforming.length+') '+(expanded?'▲':'▼')+'</button>';
      html += '<div class="collapse-body'+(expanded?' open':'')+'" id="nc-body">';
      html += '<table><thead><tr><th>Card</th><th>Campos faltantes</th></tr></thead><tbody>';
      nonConforming.forEach(function(c) {
        html += '<tr><td><span class="card-link" data-card-id="'+escHtml(c.id)+'">'+escHtml(c.name)+'</span></td><td>';
        c.missing.forEach(function(m) { html += '<span class="missing-tag">⚠️ '+escHtml(m)+'</span>'; });
        html += '</td></tr>';
      });
      html += '</tbody></table></div></div>';
    }

    // Member distribution
    html += '<div class="footer-bar">';
    html += '<button class="btn btn-secondary" id="btn-refresh">Atualizar dados</button>';
    html += '<button class="btn" id="btn-export">Exportar relatório</button>';
    if (cachedAt) {
      html += '<span class="cache-indicator">dados de ' + cacheAge(cachedAt) + ' · <a id="btn-refresh-cache">Atualizar</a></span>';
    } else {
      html += '<span class="info">'+kpis.totalCards+' cards analisados · atualizado agora</span>';
    }
    html += '</div>';

    var el = document.getElementById('rt-content');
    el.innerHTML = html;
    el.style.display = '';
    el.classList.add('fade-in');
    document.getElementById('rt-loading').style.display = 'none';
    document.getElementById('rt-error').style.display = 'none';

    setTimeout(function() {
      var progressArc = document.getElementById('score-ring-progress');
      if (progressArc) {
        var offset = circumference - (kpis.healthScore / 100) * circumference;
        progressArc.style.strokeDashoffset = offset;
      }
    }, 100);

    // Anima a largura (proporção real) usando os valores já calculados — sem recomputar.
    setTimeout(function() {
      kpiCards.forEach(function(k, i) {
        var bar = document.getElementById('bar-kpi-'+i);
        if (bar) { bar.style.width = k.pct + '%'; bar.style.background = statusColor(k.score); }
      });
    }, 120);

    el.addEventListener('click', function(e) {
      var target = e.target.closest('.card-link');
      if (target) { var cid = target.getAttribute('data-card-id'); if (cid) t.showCard(cid); }
    });
    document.getElementById('btn-refresh').addEventListener('click', function() { loadRealtime(true); });
    var btnCache = document.getElementById('btn-refresh-cache');
    if (btnCache) btnCache.addEventListener('click', function() { loadRealtime(true); });
    document.getElementById('btn-export').addEventListener('click', function() {
      t.alert({message: 'Use o botão "Exportar Lead Time" no board para gerar o relatório XLSX.', display: 'info', duration: 5});
    });

    // Collapse toggles
    document.querySelectorAll('.collapse-toggle').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var bodyId = btn.getAttribute('data-collapse') + '-body';
        var body = document.getElementById(bodyId);
        if (body) {
          btn.classList.toggle('open');
          body.classList.toggle('open');
          var arrow = btn.textContent.trim();
          if (btn.classList.contains('open')) {
            btn.textContent = btn.textContent.replace('▼', '▲');
          } else {
            btn.textContent = btn.textContent.replace('▲', '▼');
          }
        }
      });
    });

    // Toggles do "Tempo até 1ª entrega" (handler próprio: não reescreve o innerHTML rico)
    document.querySelectorAll('.pe-toggle').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var body = document.getElementById('pe-body-' + btn.getAttribute('data-pe'));
        if (!body) return;
        var open = body.classList.toggle('open');
        btn.classList.toggle('open', open);
        var arrow = btn.querySelector('.pe-arrow');
        if (arrow) arrow.textContent = open ? '▲' : '▼';
      });
    });
  }

  // ─── RENDER FUNNEL ──────────────────────────────
  function renderFunnel() {
    var el = document.getElementById('funnel-content');
    if (!cachedData) {
      el.innerHTML = '<div class="no-data"><p>Carregue os dados na aba "Tempo real" primeiro.</p></div>';
      return;
    }
    var cards = cachedData.cards, config = cachedData.config, throughput = cachedData.throughput;
    var sla = config.sla || DEFAULT_SLA;
    var slaAlerts = computeSLAAlerts(cards, config);

    var perList = {};
    FLOW_LISTS.forEach(function(n) { perList[n] = { cards: [], aboveSLA: 0 }; });
    cards.forEach(function(c) {
      if (perList[c.currentListName]) {
        perList[c.currentListName].cards.push(c);
        var limit = sla[c.currentListName];
        if (limit !== undefined && limit < 999 && c.daysInCurrent > limit) {
          perList[c.currentListName].aboveSLA++;
        }
      }
    });

    var maxCards = 1;
    var totalInProgress = 0;
    var bottleneckName = '', bottleneckCount = 0;
    var totalAboveSLA = 0;
    FLOW_LISTS.forEach(function(n) {
      var cnt = perList[n].cards.length;
      if (cnt > maxCards) maxCards = cnt;
      if (n !== 'Concluído 🏆') {
        totalInProgress += cnt;
        if (cnt > bottleneckCount) { bottleneckCount = cnt; bottleneckName = n; }
      }
      totalAboveSLA += perList[n].aboveSLA;
    });

    var html = '';
    html += '<div class="summary-cards">';
    html += '<div class="summary-card"><div class="sc-value">'+totalInProgress+'</div><div class="sc-label">Cards em andamento</div></div>';
    html += '<div class="summary-card"><div class="sc-value">'+bottleneckCount+'</div><div class="sc-label">'+escHtml(bottleneckName)+'</div></div>';
    html += '<div class="summary-card"><div class="sc-value" style="color:'+(totalAboveSLA>0?'#eb5a46':'#36b37e')+'">'+totalAboveSLA+'</div><div class="sc-label">Cards acima do SLA</div></div>';
    html += '</div>';

    html += '<div class="table-header-row">';
    html += '<h3 style="font-size:15px;font-weight:700;">Etapas de produção</h3>';
    html += '<button class="btn-table-download" id="btn-dl-funnel">⬇ Exportar tabela</button>';
    html += '</div>';
    html += '<table class="funnel-table"><thead><tr>';
    html += '<th>Etapa</th><th>Cards agora</th><th>Acima do SLA</th><th>SLA</th><th>Saídas no mês</th><th>Status</th>';
    html += '</tr></thead><tbody>';

    FLOW_LISTS.forEach(function(n) {
      var p = perList[n];
      var cnt = p.cards.length;
      var abv = p.aboveSLA;
      var limit = sla[n];
      var tp = throughput[n] || 0;
      var isConcluido = n === 'Concluído 🏆';

      var status, statusClass;
      if (isConcluido) {
        status = '✅ Concluído'; statusClass = 'status-ok';
      } else if (cnt >= 3 && abv >= 1) {
        status = '🔴 Gargalo'; statusClass = 'status-danger';
      } else if (abv >= 1) {
        status = '⚠️ Atenção'; statusClass = 'status-warn';
      } else {
        status = '✅ Fluindo'; statusClass = 'status-ok';
      }

      var barW = maxCards > 0 ? Math.round(cnt / maxCards * 100) : 0;
      html += '<tr'+(isConcluido ? ' class="concluded"' : '')+'>';
      html += '<td>'+escHtml(n)+'</td>';
      html += '<td><div style="display:flex;align-items:center;gap:8px;"><span class="etapa-count-btn" data-etapa="'+escHtml(n)+'">'+cnt+'</span><div class="funnel-bar" style="width:'+barW+'%;"></div></div></td>';
      html += '<td style="color:'+(abv>0?'#eb5a46':'#36b37e')+';font-weight:600;">'+abv+'</td>';
      html += '<td>'+(limit >= 999 ? '—' : limit+'d úteis')+'</td>';
      html += '<td>'+tp+'</td>';
      html += '<td class="'+statusClass+'">'+status+'</td>';
      html += '</tr>';
    });
    html += '</tbody></table>';

    html += '<div class="detail-flex">';

    html += '<div class="alerts-section">';
    html += '<div class="table-header-row">';
    html += '<h3>Alertas ativos ('+slaAlerts.length+')</h3>';
    html += '<button class="btn-table-download" id="btn-dl-alerts">⬇ Exportar</button>';
    html += '</div>';
    html += '<div id="alerts-page-wrap"></div>';
    html += '</div>';

    // ─── REWORK RANKING ──────────────────────────────
    var reworkCards = cards.filter(function(c) { return c.retrabalho > 0; });
    reworkCards.sort(function(a, b) { return b.retrabalho - a.retrabalho; });

    var allLabels = {};
    cards.forEach(function(c) {
      (c.labels || []).forEach(function(l) { allLabels[l] = true; });
    });
    var labelList = Object.keys(allLabels).sort();

    html += '<div class="rework-section">';
    html += '<div class="table-header-row">';
    html += '<h3>🔄 Cards com mais retrabalho</h3>';
    html += '<button class="btn-table-download" id="btn-dl-rework">⬇ Exportar</button>';
    html += '</div>';
    html += '<div class="rework-filters">';
    html += '<div class="filter-group"><label>Etapa</label><select id="rw-filter-stage"><option value="">Todas</option>';
    FLOW_LISTS.forEach(function(n) {
      html += '<option value="'+escHtml(n)+'">'+escHtml(n)+'</option>';
    });
    html += '</select></div>';
    html += '<div class="filter-group"><label>Label</label><select id="rw-filter-label"><option value="">Todas</option>';
    labelList.forEach(function(l) {
      html += '<option value="'+escHtml(l)+'">'+escHtml(l)+'</option>';
    });
    html += '</select></div>';
    html += '<div class="filter-group"><label>Retrabalho mínimo</label><input type="number" id="rw-filter-min" value="0" min="0" step="1" style="width:70px;"></div>';
    html += '</div>';
    html += '<div id="rework-table-wrap"></div>';
    html += '</div>';

    html += '</div>'; // close detail-flex

    el.innerHTML = html;
    el.addEventListener('click', function(e) {
      var target = e.target.closest('.card-link');
      if (target) { var cid = target.getAttribute('data-card-id'); if (cid) t.showCard(cid); }
    });

    document.getElementById('btn-dl-funnel').addEventListener('click', function() {
      var rows = [['Etapa','Cards agora','Acima do SLA','SLA','Saídas no mês','Status']];
      FLOW_LISTS.forEach(function(n) {
        var p = perList[n];
        var limit = sla[n];
        rows.push([
          n, p.cards.length, p.aboveSLA,
          limit >= 999 ? '—' : limit + ' d.u.',
          throughput[n] || 0,
          p.cards.length >= 3 && p.aboveSLA >= 1 ? 'Gargalo' :
          p.aboveSLA >= 1 ? 'Atenção' : 'Fluindo'
        ]);
      });
      downloadCSV('funil_midiatica.csv', rows);
    });

    document.getElementById('btn-dl-alerts').addEventListener('click', function() {
      var rows = [['Card','Etapa','Dias úteis','SLA','Excesso']];
      slaAlerts.forEach(function(a) {
        rows.push([a.name, a.list, a.days, a.slaLimit, '+' + a.excess + 'd']);
      });
      downloadCSV('alertas_sla_midiatica.csv', rows);
    });

    document.getElementById('btn-dl-rework').addEventListener('click', function() {
      var rows = [['#','Card','Etapa','Retrabalhos','Labels']];
      reworkCards.forEach(function(c, i) {
        rows.push([i+1, c.name, c.currentListName, c.retrabalho, (c.labels||[]).join(' | ')]);
      });
      downloadCSV('retrabalho_midiatica.csv', rows);
    });

    function fecharPopup() {
      document.getElementById('etapa-popup').style.display = 'none';
    }

    function abrirPopupEtapa(nomeEtapa, trigger) {
      var cardsNaEtapa = cards.filter(function(c) {
        return c.currentListName === nomeEtapa;
      });

      var popup = document.getElementById('etapa-popup');
      var title = document.getElementById('etapa-popup-title');
      var body = document.getElementById('etapa-popup-body');

      title.textContent = nomeEtapa + ' (' + cardsNaEtapa.length + ')';
      body.innerHTML = '';

      // botão de exportar planilha desta etapa (onclick reatribuído a cada abertura)
      var dlBtn = document.getElementById('etapa-popup-dl');
      dlBtn.disabled = !cardsNaEtapa.length;
      dlBtn.onclick = function() { exportEtapaCards(nomeEtapa, cardsNaEtapa, dlBtn); };

      if (!cardsNaEtapa.length) {
        body.innerHTML = '<p class="etapa-popup-empty">Nenhum card nesta etapa.</p>';
      } else {
        var ul = document.createElement('ul');
        ul.className = 'etapa-popup-list';
        cardsNaEtapa.forEach(function(card) {
          var li = document.createElement('li');
          var span = document.createElement('span');
          span.textContent = card.name;
          span.className = 'card-link etapa-popup-card';
          span.addEventListener('click', function() { t.showCard(card.id); });
          li.appendChild(span);
          ul.appendChild(li);
        });
        body.appendChild(ul);
      }

      var rect = trigger.getBoundingClientRect();
      var bodyRect = document.querySelector('.body').getBoundingClientRect();

      popup.style.display = 'flex';

      var popupWidth = 280;
      var left = rect.right - bodyRect.left + 8;
      if (left + popupWidth > bodyRect.width) {
        left = rect.left - bodyRect.left - popupWidth - 8;
      }
      var top = rect.top - bodyRect.top;

      popup.style.left = Math.max(0, left) + 'px';
      popup.style.top = Math.max(0, top) + 'px';
    }

    el.addEventListener('click', function(e) {
      var btn = e.target.closest('.etapa-count-btn');
      if (btn) {
        e.stopPropagation();
        abrirPopupEtapa(btn.getAttribute('data-etapa'), btn);
      }
    });

    document.getElementById('etapa-popup-close').addEventListener('click', fecharPopup);

    document.addEventListener('click', function(e) {
      var popup = document.getElementById('etapa-popup');
      if (popup.style.display !== 'none' &&
          !popup.contains(e.target) &&
          !e.target.classList.contains('etapa-count-btn')) {
        fecharPopup();
      }
    });

    var ITEMS_PER_PAGE = 10;
    var alertPage = 0;

    function renderAlertsPaginated() {
      var wrap = document.getElementById('alerts-page-wrap');
      if (slaAlerts.length === 0) {
        wrap.innerHTML = '<p style="color:#ABABB0;font-size:13px;">Nenhum alerta ativo.</p>';
        return;
      }
      var totalPages = Math.ceil(slaAlerts.length / ITEMS_PER_PAGE);
      if (alertPage >= totalPages) alertPage = totalPages - 1;
      var start = alertPage * ITEMS_PER_PAGE;
      var pageItems = slaAlerts.slice(start, start + ITEMS_PER_PAGE);

      var h = '';
      pageItems.forEach(function(a) {
        h += '<div class="alert-row">';
        h += '<span class="ar-name"><span class="card-link" data-card-id="'+escHtml(a.id)+'">'+escHtml(a.name)+'</span></span>';
        h += '<span class="ar-stage">'+escHtml(a.list)+'</span>';
        h += '<span class="ar-days">'+a.days+' d.u.</span>';
        h += '<span class="ar-excess">+'+a.excess+' dias acima do limite</span>';
        h += '</div>';
      });
      if (totalPages > 1) {
        h += '<div class="pag-controls">';
        h += '<button class="pag-btn" id="alert-prev"'+(alertPage===0?' disabled':'')+'>← Anterior</button>';
        h += '<span class="pag-info">'+(alertPage+1)+' / '+totalPages+'</span>';
        h += '<button class="pag-btn" id="alert-next"'+(alertPage>=totalPages-1?' disabled':'')+'>Próximo →</button>';
        h += '</div>';
      }
      wrap.innerHTML = h;
      var prev = document.getElementById('alert-prev');
      var next = document.getElementById('alert-next');
      if (prev) prev.addEventListener('click', function() { alertPage--; renderAlertsPaginated(); });
      if (next) next.addEventListener('click', function() { alertPage++; renderAlertsPaginated(); });
    }
    renderAlertsPaginated();

    var reworkPage = 0;

    function renderReworkTable() {
      var stageF = document.getElementById('rw-filter-stage').value;
      var labelF = document.getElementById('rw-filter-label').value;
      var minF = parseFloat(document.getElementById('rw-filter-min').value) || 0;

      var filtered = reworkCards.filter(function(c) {
        if (stageF && c.currentListName !== stageF) return false;
        if (labelF && (c.labels || []).indexOf(labelF) === -1) return false;
        if (c.retrabalho < minF) return false;
        return true;
      });

      var wrap = document.getElementById('rework-table-wrap');
      if (filtered.length === 0) {
        wrap.innerHTML = '<p class="rework-empty">Nenhum card com retrabalho encontrado para os filtros selecionados.</p>';
        return;
      }

      var totalPages = Math.ceil(filtered.length / ITEMS_PER_PAGE);
      if (reworkPage >= totalPages) reworkPage = totalPages - 1;
      var start = reworkPage * ITEMS_PER_PAGE;
      var pageItems = filtered.slice(start, start + ITEMS_PER_PAGE);

      var h = '<table class="rework-table"><thead><tr>';
      h += '<th>#</th><th>Card</th><th>Retrabalho</th><th>Etapa atual</th><th>Labels</th>';
      h += '</tr></thead><tbody>';
      for (var ri = 0; ri < pageItems.length; ri++) {
        var rc = pageItems[ri];
        var globalIdx = start + ri;
        var rwClass = rc.retrabalho >= 3 ? 'high' : rc.retrabalho >= 2 ? 'med' : 'low';
        h += '<tr>';
        h += '<td class="rework-rank">'+(globalIdx+1)+'</td>';
        h += '<td><span class="card-link" data-card-id="'+escHtml(rc.id)+'">'+escHtml(rc.name)+'</span></td>';
        h += '<td class="rework-val '+rwClass+'">'+rc.retrabalho+'</td>';
        h += '<td>'+escHtml(rc.currentListName)+'</td>';
        h += '<td>';
        (rc.labels || []).forEach(function(l) { h += '<span class="label-tag">'+escHtml(l)+'</span>'; });
        h += '</td></tr>';
      }
      var totalRwFiltered = 0;
      for (var ti = 0; ti < filtered.length; ti++) { totalRwFiltered += filtered[ti].retrabalho; }
      h += '<tr style="background:#0A0A0A;">';
      h += '<td colspan="2" style="color:#FFCF06;font-weight:700;">Total</td>';
      h += '<td style="color:#FFCF06;font-weight:700;">'+totalRwFiltered+'</td>';
      h += '<td colspan="2" style="color:#ABABB0;font-size:12px;">'+filtered.length+' cards</td>';
      h += '</tr>';
      h += '</tbody></table>';
      if (totalPages > 1) {
        h += '<div class="pag-controls">';
        h += '<button class="pag-btn" id="rw-prev"'+(reworkPage===0?' disabled':'')+'>← Anterior</button>';
        h += '<span class="pag-info">'+(reworkPage+1)+' / '+totalPages+'</span>';
        h += '<button class="pag-btn" id="rw-next"'+(reworkPage>=totalPages-1?' disabled':'')+'>Próximo →</button>';
        h += '</div>';
      }
      wrap.innerHTML = h;
      var prev = document.getElementById('rw-prev');
      var next = document.getElementById('rw-next');
      if (prev) prev.addEventListener('click', function() { reworkPage--; renderReworkTable(); });
      if (next) next.addEventListener('click', function() { reworkPage++; renderReworkTable(); });
    }

    renderReworkTable();
    document.getElementById('rw-filter-stage').addEventListener('change', function() { reworkPage = 0; renderReworkTable(); });
    document.getElementById('rw-filter-label').addEventListener('change', function() { reworkPage = 0; renderReworkTable(); });
    document.getElementById('rw-filter-min').addEventListener('input', function() { reworkPage = 0; renderReworkTable(); });
  }

  // ─── SNAPSHOT ───────────────────────────────────
  function saveSnapshotIfNeeded(kpis, config) {
    var now = new Date();
    var key = 'snapshot_'+now.getFullYear()+'_'+String(now.getMonth()+1).padStart(2,'0');
    t.get('board', 'shared', key).then(function(existing) {
      if (!existing) {
        var snap = {
          score: kpis.healthScore,
          kpi1: kpis.kpi1, kpi2: kpis.kpi2, kpi3: kpis.kpi3, kpi4: kpis.kpi4, kpi5: kpis.kpi5, kpi6: kpis.kpi6,
          meta_prazo: config.meta_prazo, meta_rework: config.meta_rework,
          meta_leadtime: config.meta_leadtime, meta_leadtime_real: config.meta_leadtime_real,
          meta_through: config.meta_through,
          meta_conformidade: config.meta_conformidade,
          totalCards: kpis.totalCards,
          savedAt: now.toISOString()
        };
        t.set('board', 'shared', key, snap);
      }
    });
  }

  function forceSnapshot(kpis, config) {
    var now = new Date();
    var key = 'snapshot_'+now.getFullYear()+'_'+String(now.getMonth()+1).padStart(2,'0');
    var snap = {
      score: kpis.healthScore,
      kpi1: kpis.kpi1, kpi2: kpis.kpi2, kpi3: kpis.kpi3, kpi4: kpis.kpi4, kpi5: kpis.kpi5, kpi6: kpis.kpi6,
      meta_prazo: config.meta_prazo, meta_rework: config.meta_rework,
      meta_leadtime: config.meta_leadtime, meta_leadtime_real: config.meta_leadtime_real,
      meta_through: config.meta_through,
      meta_conformidade: config.meta_conformidade,
      totalCards: kpis.totalCards,
      savedAt: now.toISOString()
    };
    return t.set('board', 'shared', key, snap);
  }

  // ─── LOAD REALTIME ──────────────────────────────
  function loadRealtime(forceRefresh) {
    document.getElementById('rt-content').style.display = 'none';
    document.getElementById('rt-error').style.display = 'none';
    renderedTabs = {};

    var token = TRELLO_TOKEN, boardId, config;
    t.board('id')
      .then(function(board) { boardId = board.id; return t.get('board', 'shared', 'healthConfig'); })
      .then(function(cfg) {
        config = mergeConfig(cfg);

        if (!forceRefresh) {
          var cache = readCache(boardId);
          if (cache && cache.cards) {
            cachedData = { cards: cache.cards, config: config, throughput: cache.throughput, archived: cache.archived || [] };
            var kpis = calcKPIs(cache.cards, config);
            var slaAlerts = computeSLAAlerts(cache.cards, config);
            renderRealtime(kpis, config, cache.cards, cache.cachedAt, cache.archived || []);
            renderAlertBanner(slaAlerts);
            document.getElementById('rt-loading').style.display = 'none';
            return;
          }
        }

        showSkeleton('Buscando cards do board…');
        return fetchData(token, boardId).then(function(data) {
          cachedData = { cards: data.cards, config: config, throughput: data.throughput, archived: data.archived || [] };
          writeCache(boardId, { cards: data.cards, throughput: data.throughput, archived: data.archived || [] });
          var kpis = calcKPIs(data.cards, config);
          var slaAlerts = computeSLAAlerts(data.cards, config);
          renderRealtime(kpis, config, data.cards, null, data.archived || []);
          renderAlertBanner(slaAlerts);
          saveSnapshotIfNeeded(kpis, config);
        });
      })
      .catch(function(err) {
        document.getElementById('rt-loading').style.display = 'none';
        var errEl = document.getElementById('rt-error');
        errEl.style.display = '';
        errEl.querySelector('p').textContent = 'Erro ao carregar dados: '+(err.message||String(err));
      });
  }

  document.getElementById('rt-retry').addEventListener('click', function() { loadRealtime(); });

  // ─── HISTORY ────────────────────────────────────
  function loadHistory() {
    document.getElementById('hist-loading').style.display = '';
    document.getElementById('hist-content').style.display = 'none';

    t.get('board', 'shared').then(function(data) {
      var snapshots = [];
      if (data) {
        Object.keys(data).forEach(function(key) {
          if (key.indexOf('snapshot_') === 0) {
            var parts = key.replace('snapshot_','').split('_');
            snapshots.push({ key: key, year: parseInt(parts[0]), month: parseInt(parts[1]), data: data[key] });
          }
        });
      }
      snapshots.sort(function(a,b) { return b.year !== a.year ? b.year - a.year : b.month - a.month; });

      var now = new Date();
      var curMonth = now.getMonth()+1, curYear = now.getFullYear();
      var monthNames = ['','Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

      var html = '';
      if (!snapshots.length) {
        html = '<div class="history-empty"><p>O histórico será gerado automaticamente a partir do próximo acesso mensal.</p></div>';
      } else {
        html += '<div class="table-header-row">';
        html += '<span></span>';
        html += '<button class="btn-table-download" id="btn-dl-history">⬇ Exportar histórico</button>';
        html += '</div>';
        html += '<table class="history-table"><thead><tr>';
        html += '<th>Mês</th><th>Health Score</th><th>Vencidos</th><th>Rework</th><th>Entrega</th><th>Na etapa</th><th>Throughput</th><th>Conformidade</th><th>Cards</th>';
        html += '</tr></thead><tbody>';
        snapshots.forEach(function(s) {
          var isCurrent = s.month === curMonth && s.year === curYear;
          html += '<tr'+(isCurrent?' class="current-month"':'')+'>';
          html += '<td>'+monthNames[s.month]+'/'+s.year+'</td>';
          html += '<td>'+s.data.score+'</td>';
          html += '<td>'+s.data.kpi1+'%</td>';
          html += '<td>'+s.data.kpi2+'</td>';
          html += '<td>'+(s.data.kpi6 !== undefined ? s.data.kpi6+' d.u.' : '—')+'</td>';
          html += '<td>'+s.data.kpi3+' d.u.</td>';
          html += '<td>'+s.data.kpi4+'</td>';
          html += '<td>'+(s.data.kpi5 !== undefined ? s.data.kpi5+'%' : '—')+'</td>';
          html += '<td>'+s.data.totalCards+'</td>';
          html += '</tr>';
        });
        html += '</tbody></table>';
      }

      html += '<div style="margin-top:16px;display:flex;gap:10px;flex-wrap:wrap;">';
      html += '<button class="btn btn-secondary" id="btn-force-snap">Salvar snapshot agora</button>';
      html += '<button class="btn btn-secondary" id="btn-dl-image">⬇ Baixar imagem</button>';
      html += '</div>';

      var el = document.getElementById('hist-content');
      el.innerHTML = html;
      el.style.display = '';
      document.getElementById('hist-loading').style.display = 'none';

      document.getElementById('btn-force-snap').addEventListener('click', function() {
        if (!cachedData) {
          alert('Acesse a aba "Tempo real" primeiro para carregar os dados.');
          return;
        }
        var kpis = calcKPIs(cachedData.cards, cachedData.config);
        forceSnapshot(kpis, cachedData.config).then(function() { loadHistory(); });
      });

      // Snapshot VISUAL (imagem) do dashboard — usa os dados já carregados (cachedData)
      document.getElementById('btn-dl-image').addEventListener('click', function() {
        exportDashboardImage(cachedData, this);
      });

      var dlHist = document.getElementById('btn-dl-history');
      if (dlHist) dlHist.addEventListener('click', function() {
        var rows = [['Mês','Health Score','Vencidos','Rework','Entrega (lead time)','Na etapa (aging)','Throughput','Conformidade','Cards']];
        snapshots.forEach(function(s) {
          rows.push([
            monthNames[s.month]+'/'+s.year,
            s.data.score, s.data.kpi1+'%', s.data.kpi2,
            s.data.kpi6 !== undefined ? s.data.kpi6+' d.u.' : '—',
            s.data.kpi3+' d.u.', s.data.kpi4,
            s.data.kpi5 !== undefined ? s.data.kpi5+'%' : '—',
            s.data.totalCards
          ]);
        });
        downloadCSV('historico_midiatica.csv', rows);
      });
    });
  }

  // ─── CONFIG ─────────────────────────────────────
  function renderConfig() {
    t.get('board', 'shared', 'healthConfig').then(function(cfg) {
      var config = mergeConfig(cfg);
      var html = '';

      html += '<div class="config-section"><h3>Metas</h3>';
      // Métrica percentual: o range vai de 0 a 100% (antes ia só até 50, o que travava
      // o preenchimento da barra na metade e impedia metas acima de 50%).
      html += sliderRow('meta_prazo', 'Meta máx. de cards vencidos', config.meta_prazo, 0, 100, 5, '%');
      html += sliderRow('meta_rework', 'Meta retrabalhos máximo', config.meta_rework, 0, 1000, 5, ' retrabalhos');
      html += sliderRow('meta_leadtime_real', 'Meta tempo de entrega (lead time real)', config.meta_leadtime_real, 2, 60, 1, ' d.u.');
      html += sliderRow('meta_leadtime', 'Meta tempo na etapa (aging)', config.meta_leadtime, 2, 20, 1, ' d.u.');
      html += sliderRow('meta_through', 'Meta throughput mensal', config.meta_through, 5, 1000, 5, ' cards');
      html += sliderRow('meta_conformidade', 'Meta conformidade de processo', config.meta_conformidade, 50, 100, 5, '%');
      html += '</div>';

      html += '<div class="config-section"><h3>Pesos do Health Score</h3>';
      html += '<div class="peso-sum valid" id="peso-sum">Soma dos pesos: 100</div>';
      html += sliderRow('peso1', 'Peso cards vencidos', config.peso1, 10, 60, 5, '');
      html += sliderRow('peso2', 'Peso rework', config.peso2, 5, 40, 5, '');
      html += sliderRow('peso6', 'Peso tempo de entrega (lead time real)', config.peso6, 5, 40, 5, '');
      html += sliderRow('peso3', 'Peso tempo na etapa (aging)', config.peso3, 5, 40, 5, '');
      html += sliderRow('peso4', 'Peso throughput', config.peso4, 5, 30, 5, '');
      html += sliderRow('peso5', 'Peso conformidade', config.peso5, 5, 40, 5, '');
      html += '</div>';

      html += '<div class="config-section"><h3>SLA por etapa (dias úteis)</h3>';
      html += '<div class="sla-grid">';
      FLOW_LISTS.forEach(function(n, i) {
        if (n === 'Concluído 🏆') return;
        var val = config.sla && config.sla[n] !== undefined ? config.sla[n] : DEFAULT_SLA[n];
        html += '<div class="sla-row">';
        html += '<label>'+escHtml(n)+'</label>';
        html += '<input type="number" id="sla_'+i+'" min="1" max="30" value="'+val+'" data-list="'+escHtml(n)+'">';
        html += '<span class="sla-unit">d.u.</span>';
        html += '</div>';
      });
      html += '</div></div>';

      html += '<div class="config-footer">';
      html += '<button class="btn" id="btn-save-config">Salvar configurações</button>';
      html += '<span class="config-msg" id="cfg-msg" style="display:none;"></span>';
      html += '</div>';

      document.getElementById('cfg-content').innerHTML = html;

      var debouncedPesoSum = debounce(updatePesoSum, 200);

      // Slider arrastado → espelha no campo numérico (o campo não está em edição aqui)
      var sliders = document.querySelectorAll('#cfg-content input[type=range]');
      sliders.forEach(function(sl) {
        sl.addEventListener('input', function() {
          var numInput = document.getElementById('num-'+sl.id);
          if (numInput) numInput.value = sl.value;
          debouncedPesoSum();
        });
      });

      document.querySelectorAll('#cfg-content .num-input').forEach(function(numInput) {
        var targetId = numInput.id.replace('num-', '');
        var slider = document.getElementById(targetId);
        var min = parseFloat(slider.min), max = parseFloat(slider.max);
        // Enquanto digita: só reflete no slider, SEM reescrever o campo — reescrever o
        // value a cada tecla reposicionava o cursor e clampava valores parciais (ex.: ao
        // digitar "12" num campo de min 5, o "1" virava 5), causando o "travamento".
        numInput.addEventListener('input', function() {
          var raw = parseFloat(numInput.value);
          if (!isNaN(raw)) { slider.value = Math.min(max, Math.max(min, raw)); debouncedPesoSum(); }
        });
        // Ao sair do campo (blur/Enter): normaliza e clampa o valor exibido de uma vez.
        numInput.addEventListener('change', function() {
          var val = Math.min(max, Math.max(min, parseFloat(numInput.value) || min));
          numInput.value = val;
          slider.value = val;
          updatePesoSum();
        });
      });

      document.querySelectorAll('#cfg-content .num-arrow').forEach(function(btn) {
        btn.addEventListener('click', function() {
          var targetId = btn.getAttribute('data-target');
          var dir = parseInt(btn.getAttribute('data-dir'));
          var slider = document.getElementById(targetId);
          var numInput = document.getElementById('num-'+targetId);
          var min = parseFloat(slider.min), max = parseFloat(slider.max);
          // Incrementa pelo PASSO do slider (antes era +1 fixo: com step 5/10 o range
          // snapava para um valor diferente do campo, dessincronizando os dois).
          var step = parseFloat(slider.getAttribute('data-step')) || 1;
          var current = parseFloat(slider.value) || min;
          var novo = Math.min(max, Math.max(min, current + dir * step));
          slider.value = novo;
          if (numInput) numInput.value = novo;
          debouncedPesoSum();
        });
      });

      updatePesoSum();

      document.getElementById('btn-save-config').addEventListener('click', function() {
        var newConfig = {
          meta_prazo: parseInt(document.getElementById('meta_prazo').value),
          meta_rework: parseInt(document.getElementById('meta_rework').value),
          meta_leadtime: parseInt(document.getElementById('meta_leadtime').value),
          meta_leadtime_real: parseInt(document.getElementById('meta_leadtime_real').value),
          meta_through: parseInt(document.getElementById('meta_through').value),
          meta_conformidade: parseInt(document.getElementById('meta_conformidade').value),
          peso1: parseInt(document.getElementById('peso1').value),
          peso2: parseInt(document.getElementById('peso2').value),
          peso3: parseInt(document.getElementById('peso3').value),
          peso4: parseInt(document.getElementById('peso4').value),
          peso5: parseInt(document.getElementById('peso5').value),
          peso6: parseInt(document.getElementById('peso6').value),
          sla: {}
        };
        var sum = newConfig.peso1 + newConfig.peso2 + newConfig.peso3 + newConfig.peso4 + newConfig.peso5 + newConfig.peso6;
        if (sum !== 100) return;

        FLOW_LISTS.forEach(function(n, i) {
          if (n === 'Concluído 🏆') { newConfig.sla[n] = 999; return; }
          var input = document.getElementById('sla_'+i);
          newConfig.sla[n] = input ? parseInt(input.value) || DEFAULT_SLA[n] : DEFAULT_SLA[n];
        });

        t.set('board', 'shared', 'healthConfig', newConfig).then(function() {
          var msg = document.getElementById('cfg-msg');
          msg.textContent = 'Configurações salvas!';
          msg.style.display = '';
          if (cachedData) cachedData.config = newConfig;
          setTimeout(function() { switchTab('realtime'); loadRealtime(); }, 1000);
        });
      });
    });
  }

  function sliderRow(id, label, value, min, max, step, unit) {
    // Sem o antigo span "slider-val": o número editável já mostra o valor, então o
    // texto duplicado foi removido. Mantém-se apenas a unidade (estática) como contexto.
    var unidade = (unit || '').trim();
    return '<div class="config-row">' +
      '<label for="'+id+'">'+label+'</label>' +
      '<div class="slider-row">' +
        '<input type="range" id="'+id+'" min="'+min+'" max="'+max+'" step="'+step+'" value="'+value+'" data-min="'+min+'" data-max="'+max+'" data-step="'+step+'">' +
        '<div class="num-input-wrap">' +
          '<button class="num-arrow" type="button" data-target="'+id+'" data-dir="-1">▼</button>' +
          '<input type="number" class="num-input" id="num-'+id+'" value="'+value+'" min="'+min+'" max="'+max+'" step="'+step+'">' +
          '<button class="num-arrow" type="button" data-target="'+id+'" data-dir="1">▲</button>' +
        '</div>' +
        (unidade ? '<span class="slider-unit">'+unidade+'</span>' : '') +
      '</div>' +
    '</div>';
  }

  function updatePesoSum() {
    var ids = ['peso1','peso2','peso3','peso4','peso5','peso6'];
    var sum = 0;
    ids.forEach(function(id) { sum += parseInt(document.getElementById(id).value) || 0; });
    var el = document.getElementById('peso-sum');
    var btn = document.getElementById('btn-save-config');
    el.textContent = 'Soma dos pesos: '+sum;
    if (sum === 100) { el.className = 'peso-sum valid'; btn.disabled = false; }
    else { el.className = 'peso-sum invalid'; el.textContent += ' (deve ser 100)'; btn.disabled = true; }
  }

  // ─── INIT ───────────────────────────────────────
  checkAuth(loadRealtime);
})();
</script>
</body>
</html>
