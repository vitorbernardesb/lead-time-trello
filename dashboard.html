<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>Dashboard de Produção — Midiática</title>
  <style>
    @font-face {
      font-family: 'BW Modelica';
      src: url('./fonts/BWModelica-Regular.woff2') format('woff2'),
           url('./fonts/BWModelica-Regular.woff') format('woff');
      font-weight: 400;
    }
    @font-face {
      font-family: 'BW Modelica';
      src: url('./fonts/BWModelica-Bold.woff2') format('woff2'),
           url('./fonts/BWModelica-Bold.woff') format('woff');
      font-weight: 700;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'BW Modelica', 'Inter', 'Helvetica Neue', sans-serif;
      font-size: 14px;
      color: #0A0A0A;
      background: #F9F9F9;
      min-height: 100vh;
    }
    .header {
      background: #0A0A0A;
      color: #F9F9F9;
      padding: 16px 24px 0;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header h1 { font-size: 18px; font-weight: 400; margin-bottom: 12px; }
    .header h1 .brand-name { color: #FFCF06; font-weight: 700; }
    .tabs { display: flex; gap: 4px; }
    .tab {
      padding: 10px 20px;
      background: transparent;
      color: #ABABB0;
      border: none;
      border-bottom: 2px solid transparent;
      border-radius: 0;
      cursor: pointer;
      font-size: 14px;
      font-family: inherit;
      font-weight: 500;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .tab:hover { color: #F9F9F9; }
    .tab.active { background: rgba(255,207,6,0.15); color: #FFCF06; border-bottom: 2px solid #FFCF06; font-weight: 700; }
    .alert-banner {
      padding: 12px 24px;
      border-left: 3px solid;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
    }
    .alert-banner.danger { background: rgba(10,10,10,0.05); border-color: #0A0A0A; color: #0A0A0A; }
    .alert-banner.success { background: rgba(255,207,6,0.10); border-color: #FFCF06; color: #0A0A0A; }
    .body { padding: 24px; max-width: 960px; margin: 0 auto; }
    .spinner-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 0; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid rgba(171,171,176,0.20);
      border-top-color: #FFCF06;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner-wrap p { margin-top: 12px; color: #ABABB0; }
    .error-box { text-align: center; padding: 60px 20px; color: #0A0A0A; }
    .error-box button { margin-top: 12px; }
    .auth-wrap { text-align: center; padding: 80px 20px; }
    .auth-wrap p { color: #ABABB0; margin-bottom: 16px; font-size: 16px; }
    .btn {
      background: #FFCF06; color: #0A0A0A; border: none; border-radius: 6px;
      padding: 10px 20px; font-size: 14px; font-family: inherit; font-weight: 700; cursor: pointer;
      transition: background 0.15s;
    }
    .btn:hover { background: rgba(255,207,6,0.85); }
    .btn:disabled { background: rgba(171,171,176,0.40); color: #ABABB0; cursor: not-allowed; }
    .btn-secondary { background: transparent; color: #0A0A0A; border: 1px solid rgba(10,10,10,0.25); }
    .btn-secondary:hover { background: rgba(10,10,10,0.05); }
    .score-circle-wrap { text-align: center; margin-bottom: 28px; }
    .score-circle {
      width: 160px; height: 160px; border-radius: 50%; border: 3px solid;
      display: inline-flex; flex-direction: column; align-items: center;
      justify-content: center; margin-bottom: 8px;
    }
    .score-circle .number { font-size: 48px; font-weight: 700; line-height: 1; color: #0A0A0A; }
    .score-circle .label { font-size: 13px; font-weight: 500; margin-top: 2px; color: #ABABB0; }
    .score-status { font-size: 16px; font-weight: 600; }
    .kpi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; }
    .kpi-card {
      background: #FFFFFF; border-radius: 8px; padding: 16px; border: 1px solid rgba(171,171,176,0.40);
    }
    .kpi-card .kpi-name { font-size: 11px; color: #ABABB0; font-weight: 500; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.06em; }
    .kpi-card .kpi-value { font-size: 20px; font-weight: 700; color: #0A0A0A; }
    .kpi-card .kpi-meta { font-size: 11px; color: #ABABB0; margin-top: 4px; }
    .kpi-bar-bg { height: 8px; background: rgba(171,171,176,0.20); border-radius: 4px; margin-top: 10px; overflow: hidden; }
    .kpi-bar-fill { height: 100%; border-radius: 4px; transition: width 0.4s; }
    .footer-bar { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .footer-bar .info { font-size: 12px; color: #ABABB0; margin-left: auto; }
    .collapsible { margin-bottom: 20px; border-bottom: 1px solid rgba(171,171,176,0.30); padding-bottom: 20px; }
    .collapse-toggle {
      width: 100%; text-align: left; padding: 12px 16px;
      background: #FFFFFF; border: 1px solid rgba(171,171,176,0.40); border-radius: 8px;
      cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 700; color: #0A0A0A;
      text-transform: uppercase; letter-spacing: 0.04em;
    }
    .collapse-toggle.open { border-radius: 8px 8px 0 0; }
    .collapse-body {
      display: none; background: #FFFFFF; border: 1px solid rgba(171,171,176,0.40);
      border-top: none; border-radius: 0 0 8px 8px; padding: 0;
    }
    .collapse-body.open { display: block; }
    .collapse-body table { width: 100%; border-collapse: collapse; }
    .collapse-body th {
      text-align: left; padding: 8px 14px; background: #0A0A0A;
      font-size: 11px; text-transform: uppercase; color: #FFCF06; font-weight: 700;
      letter-spacing: 0.06em; border-bottom: none;
    }
    .collapse-body td { padding: 8px 14px; border-bottom: 1px solid rgba(171,171,176,0.20); font-size: 13px; }
    .collapse-body tr:nth-child(even) td { background: rgba(171,171,176,0.08); }
    .collapse-body tr:hover td { background: rgba(255,207,6,0.06); }
    .collapse-body tr.warn td { background: rgba(255,207,6,0.15); }
    .missing-tag {
      display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px;
      margin: 1px 3px; background: rgba(10,10,10,0.08); color: #0A0A0A; border: 1px solid rgba(10,10,10,0.25);
    }
    .summary-cards { display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
    .summary-card {
      flex: 1; min-width: 180px; background: #FFFFFF; border-radius: 8px;
      padding: 16px; border: 1px solid rgba(171,171,176,0.40); text-align: center;
    }
    .summary-card .sc-value { font-size: 28px; font-weight: 700; color: #0A0A0A; }
    .summary-card .sc-label { font-size: 12px; color: #ABABB0; margin-top: 4px; }
    .funnel-table { width: 100%; border-collapse: collapse; background: #FFFFFF; border-radius: 8px; overflow: hidden; border: 1px solid rgba(171,171,176,0.40); margin-bottom: 24px; }
    .funnel-table th {
      text-align: left; padding: 10px 14px; background: #0A0A0A;
      font-size: 11px; text-transform: uppercase; color: #FFCF06; font-weight: 700;
      letter-spacing: 0.06em; border-bottom: none;
    }
    .funnel-table td { padding: 10px 14px; border-bottom: 1px solid rgba(171,171,176,0.20); font-size: 13px; }
    .funnel-table tr:nth-child(even) td { background: rgba(171,171,176,0.08); }
    .funnel-table tr:hover td { background: rgba(255,207,6,0.06); }
    .funnel-bar { height: 10px; background: #FFCF06; border-radius: 5px; min-width: 4px; }
    .funnel-table .status-ok {
      color: #0A0A0A; background: rgba(255,207,6,0.15); padding: 2px 8px; border-radius: 4px;
      border: 1px solid rgba(255,207,6,0.40); display: inline-block;
    }
    .funnel-table .status-warn {
      color: #0A0A0A; background: rgba(171,171,176,0.15); padding: 2px 8px; border-radius: 4px;
      border: 1px solid rgba(171,171,176,0.40); display: inline-block;
    }
    .funnel-table .status-danger {
      color: #0A0A0A; background: rgba(10,10,10,0.08); padding: 2px 8px; border-radius: 4px;
      border: 1px solid rgba(10,10,10,0.25); display: inline-block;
    }
    .funnel-table tr.concluded td { background: rgba(255,207,6,0.12); }
    .alerts-section { margin-top: 24px; }
    .alerts-section h3 { font-size: 15px; margin-bottom: 12px; color: #0A0A0A; font-weight: 700; }
    .alert-row { background: #FFFFFF; border: 1px solid rgba(171,171,176,0.40); border-radius: 8px; padding: 12px 16px; margin-bottom: 8px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .alert-row .ar-name { font-weight: 600; flex: 1; min-width: 200px; color: #0A0A0A; }
    .alert-row .ar-stage { color: #ABABB0; font-size: 13px; }
    .alert-row .ar-days { color: #0A0A0A; font-weight: 700; }
    .alert-row .ar-excess { background: rgba(10,10,10,0.08); color: #0A0A0A; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 600; border: 1px solid rgba(10,10,10,0.25); }
    .alert-row .ar-member { color: #ABABB0; font-size: 12px; }
    .alert-row .ar-member.none { color: #ABABB0; }
    .history-table { width: 100%; border-collapse: collapse; background: #FFFFFF; border-radius: 8px; overflow: hidden; border: 1px solid rgba(171,171,176,0.40); }
    .history-table th {
      text-align: left; padding: 10px 14px; background: #0A0A0A;
      font-size: 11px; text-transform: uppercase; color: #FFCF06; font-weight: 700;
      letter-spacing: 0.06em; border-bottom: none;
    }
    .history-table td { padding: 10px 14px; border-bottom: 1px solid rgba(171,171,176,0.20); font-size: 13px; }
    .history-table tr:nth-child(even) td { background: rgba(171,171,176,0.08); }
    .history-table tr:hover td { background: rgba(255,207,6,0.06); }
    .history-table tr.current-month td { background: rgba(255,207,6,0.12); border-left: 3px solid #FFCF06; font-weight: 600; }
    .history-empty { text-align: center; padding: 40px; color: #ABABB0; }
    .config-section { background: #FFFFFF; border-radius: 8px; padding: 20px; border: 1px solid rgba(171,171,176,0.40); margin-bottom: 20px; }
    .config-section h3 { font-size: 15px; margin-bottom: 16px; color: #0A0A0A; font-weight: 700; }
    .config-row { margin-bottom: 16px; }
    .config-row label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; color: #0A0A0A; }
    .config-row .slider-row { display: flex; align-items: center; gap: 12px; }
    .config-row input[type=range] { flex: 1; accent-color: #FFCF06; }
    .config-row .slider-val { min-width: 50px; text-align: right; font-weight: 700; font-size: 14px; color: #0A0A0A; }
    .sla-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .sla-row { display: flex; align-items: center; gap: 8px; }
    .sla-row label { flex: 1; font-size: 13px; margin-bottom: 0; }
    .sla-row input[type=number] { width: 60px; padding: 6px 8px; border: 1px solid rgba(171,171,176,0.40); border-radius: 4px; font-size: 14px; text-align: center; }
    .sla-row .sla-unit { font-size: 12px; color: #ABABB0; }
    .peso-sum { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
    .peso-sum.invalid { color: #0A0A0A; }
    .peso-sum.valid { color: #0A0A0A; }
    .config-footer { display: flex; gap: 12px; align-items: center; }
    .config-msg { font-size: 13px; color: #0A0A0A; font-weight: 500; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .rework-section { margin-top: 28px; }
    .rework-section h3 { font-size: 15px; margin-bottom: 12px; color: #0A0A0A; font-weight: 700; }
    .rework-filters { display: flex; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; align-items: center; }
    .rework-filters select, .rework-filters input[type=number] {
      padding: 6px 10px; border: 1px solid rgba(171,171,176,0.40); border-radius: 4px;
      font-size: 13px; font-family: inherit; background: #FFFFFF; color: #0A0A0A;
    }
    .rework-filters label { font-size: 12px; color: #ABABB0; font-weight: 500; }
    .rework-filters .filter-group { display: flex; flex-direction: column; gap: 4px; }
    .rework-table { width: 100%; border-collapse: collapse; background: #FFFFFF; border-radius: 8px; overflow: hidden; border: 1px solid rgba(171,171,176,0.40); }
    .rework-table th {
      text-align: left; padding: 10px 14px; background: #0A0A0A;
      font-size: 11px; text-transform: uppercase; color: #FFCF06; font-weight: 700;
      letter-spacing: 0.06em; border-bottom: none;
    }
    .rework-table td { padding: 10px 14px; border-bottom: 1px solid rgba(171,171,176,0.20); font-size: 13px; }
    .rework-table tr:nth-child(even) td { background: rgba(171,171,176,0.08); }
    .rework-table tr:hover td { background: rgba(255,207,6,0.06); }
    .rework-rank { font-weight: 700; color: #0A0A0A; width: 40px; }
    .rework-val { font-weight: 700; }
    .rework-val.high { color: #0A0A0A; }
    .rework-val.med { color: #ABABB0; }
    .rework-val.low { color: #ABABB0; }
    .label-tag {
      display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px;
      margin: 1px 3px; background: rgba(255,207,6,0.15); color: #0A0A0A;
    }
    .rework-empty { text-align: center; padding: 24px; color: #ABABB0; font-style: italic; }
    .no-data { text-align: center; padding: 60px 20px; color: #ABABB0; }
    @media (max-width: 700px) {
      .kpi-grid { grid-template-columns: 1fr; }
      .sla-grid { grid-template-columns: 1fr; }
      .body { padding: 16px; }
      .summary-cards { flex-direction: column; }
    }
  </style>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
</head>
<body>
<div class="header">
  <h1>Dashboard de produção — <span class="brand-name">Midiática</span></h1>
  <div class="tabs">
    <button class="tab active" data-tab="realtime">Tempo real</button>
    <button class="tab" data-tab="funnel">Detalhamento</button>
    <button class="tab" data-tab="history">Histórico</button>
    <button class="tab" data-tab="config">Configurar metas</button>
  </div>
</div>

<div id="alert-banner" style="display:none;"></div>

<div class="body">
  <div id="auth-screen" class="auth-wrap" style="display:none;">
    <p>Autorize o Power-Up para acessar os dados do board.</p>
    <button class="btn" id="auth-btn">Autorizar Power-Up</button>
  </div>

  <div id="tab-realtime" class="tab-content active">
    <div class="spinner-wrap" id="rt-loading"><div class="spinner"></div><p>Carregando dados…</p></div>
    <div id="rt-error" class="error-box" style="display:none;"><p></p><button class="btn" id="rt-retry">Tentar novamente</button></div>
    <div id="rt-content" style="display:none;"></div>
  </div>

  <div id="tab-funnel" class="tab-content">
    <div id="funnel-content"></div>
  </div>

  <div id="tab-history" class="tab-content">
    <div class="spinner-wrap" id="hist-loading"><div class="spinner"></div><p>Carregando histórico…</p></div>
    <div id="hist-content" style="display:none;"></div>
  </div>

  <div id="tab-config" class="tab-content">
    <div id="cfg-content"></div>
  </div>
</div>

<script>
(function() {
  var APP_KEY = '35b840777660fac1ae7823df3d2398f6';
  var APP_NAME = 'Lead Time Midiática';
  var MIN_STAGE_MS = 600000;

  var FLOW_LISTS = [
    'Planejamento',
    'Captação de Imagem 🎥',
    '🛑URGÊNCIAS🛑',
    'A fazer 👇',
    'Em andamento 💪',
    'Alterações ✏️',
    '⚠️Atrasos⚠️',
    'Revisão Interna 🔎',
    'Revisão Externa 🧐',
    'Revisões em Atraso ⏰',
    'Concluído 🏆'
  ];

  var DEFAULT_SLA = {};
  var slaDefaults = [2, 5, 1, 3, 5, 2, 2, 2, 3, 2, 999];
  FLOW_LISTS.forEach(function(n, i) { DEFAULT_SLA[n] = slaDefaults[i]; });

  var DEFAULTS = {
    meta_prazo: 80, meta_rework: 30, meta_leadtime: 7, meta_through: 12, meta_conformidade: 85,
    peso1: 30, peso2: 20, peso3: 20, peso4: 10, peso5: 20,
    sla: DEFAULT_SLA
  };

  var t = TrelloPowerUp.iframe({ appKey: APP_KEY, appName: APP_NAME });
  var cachedData = null;

  function countBusinessDays(from, to) {
    var s = new Date(from); s.setHours(0,0,0,0);
    var e = new Date(to);   e.setHours(0,0,0,0);
    var c = 0, d = new Date(s);
    while (d < e) { if (d.getDay()!==0 && d.getDay()!==6) c++; d.setDate(d.getDate()+1); }
    return c;
  }

  function buildTimeline(actions) {
    if (!Array.isArray(actions)) actions = [];
    actions.sort(function(a,b){ return new Date(a.date)-new Date(b.date); });
    var stages = [];
    for (var i=0; i<actions.length; i++) {
      var act=actions[i], date=new Date(act.date);
      if ((act.type==='createCard'||act.type==='copyCard') && act.data.list) {
        stages.push({name:act.data.list.name, enteredAt:date, leftAt:null});
      } else if (act.type==='updateCard' && act.data.listAfter) {
        if (stages.length===0 && act.data.listBefore)
          stages.push({name:act.data.listBefore.name, enteredAt:date, leftAt:date});
        if (stages.length>0) stages[stages.length-1].leftAt = date;
        stages.push({name:act.data.listAfter.name, enteredAt:date, leftAt:null});
      }
    }
    var out = [];
    for (var j=0; j<stages.length; j++) {
      var st=stages[j], dur=(st.leftAt?st.leftAt.getTime():Date.now())-st.enteredAt.getTime();
      if (dur<MIN_STAGE_MS && st.leftAt && out.length>0) out[out.length-1].leftAt=st.leftAt;
      else out.push(st);
    }
    return out;
  }

  function apiUrl(path, token) {
    return 'https://api.trello.com/1'+path+(path.indexOf('?')>=0?'&':'?')+'key='+APP_KEY+'&token='+token;
  }

  function escHtml(s) { var el = document.createElement('span'); el.appendChild(document.createTextNode(s)); return el.innerHTML; }

  function mergeConfig(cfg) {
    var config = {};
    Object.keys(DEFAULTS).forEach(function(k) { config[k] = DEFAULTS[k]; });
    if (cfg) {
      Object.keys(cfg).forEach(function(k) { config[k] = cfg[k]; });
      if (cfg.peso5 === undefined) {
        config.peso1 = DEFAULTS.peso1; config.peso2 = DEFAULTS.peso2;
        config.peso3 = DEFAULTS.peso3; config.peso4 = DEFAULTS.peso4;
        config.peso5 = DEFAULTS.peso5;
      }
      if (!cfg.sla) config.sla = DEFAULT_SLA;
    }
    return config;
  }

  // ─── TABS ───────────────────────────────────────
  var tabs = document.querySelectorAll('.tab');
  var tabContents = document.querySelectorAll('.tab-content');
  function switchTab(name) {
    tabs.forEach(function(t){ t.classList.remove('active'); });
    tabContents.forEach(function(tc){ tc.classList.remove('active'); });
    for (var i=0; i<tabs.length; i++) {
      if (tabs[i].getAttribute('data-tab') === name) tabs[i].classList.add('active');
    }
    document.getElementById('tab-'+name).classList.add('active');
    if (name === 'history') loadHistory();
    if (name === 'config') renderConfig();
    if (name === 'funnel') renderFunnel();
  }
  tabs.forEach(function(tab) {
    tab.addEventListener('click', function() { switchTab(tab.getAttribute('data-tab')); });
  });

  // ─── AUTH ───────────────────────────────────────
  function checkAuth(cb) {
    t.getRestApi().isAuthorized().then(function(ok) {
      if (ok) { document.getElementById('auth-screen').style.display = 'none'; cb(); }
      else { document.getElementById('auth-screen').style.display = ''; document.getElementById('rt-loading').style.display = 'none'; }
    });
  }
  document.getElementById('auth-btn').addEventListener('click', function() {
    t.getRestApi().authorize({ scope: 'read', expiration: 'never' }).then(function() {
      document.getElementById('auth-screen').style.display = 'none';
      loadRealtime();
    });
  });

  // ─── FETCH DATA ─────────────────────────────────
  function fetchWithRetry(url, token, maxRetries) {
    var attempt = 0;
    function tryFetch() {
      return fetch(apiUrl(url, token))
        .then(function(r){ return r.json(); })
        .then(function(data) {
          if (data && data.error && attempt < maxRetries) {
            attempt++;
            var wait = 2000 * attempt;
            return new Promise(function(resolve){ setTimeout(resolve, wait); }).then(tryFetch);
          }
          return data;
        });
    }
    return tryFetch();
  }

  function throttledFetch(urls, token, batchSize, delayMs) {
    var results = new Array(urls.length);
    var idx = 0;
    function nextBatch() {
      if (idx >= urls.length) return Promise.resolve(results);
      var end = Math.min(idx + batchSize, urls.length);
      var batch = [];
      for (var b = idx; b < end; b++) {
        (function(i) {
          batch.push(
            fetchWithRetry(urls[i], token, 2)
              .then(function(data){ results[i] = data; })
          );
        })(b);
      }
      idx = end;
      return Promise.all(batch).then(function() {
        if (idx >= urls.length) return results;
        return new Promise(function(resolve){ setTimeout(resolve, delayMs); }).then(nextBatch);
      });
    }
    return nextBatch();
  }

  function fetchData(token, boardId) {
    return Promise.all([
      fetch(apiUrl('/boards/'+boardId+'/lists?fields=name', token)).then(function(r){ return r.json(); }),
      fetch(apiUrl('/boards/'+boardId+'/customFields', token)).then(function(r){ return r.json(); }),
      fetch(apiUrl('/boards/'+boardId+'/cards?filter=open&fields=name,due,dateLastActivity,labels,idList&customFieldItems=true', token)).then(function(r){ return r.json(); })
    ]).then(function(initial) {
      var lists = initial[0], customFields = initial[1], allBoardCards = initial[2];

      var flowListIds = {};
      if (Array.isArray(lists)) {
        lists.forEach(function(l) {
          for (var fi=0; fi<FLOW_LISTS.length; fi++) {
            if (l.name.trim() === FLOW_LISTS[fi]) { flowListIds[l.id] = l.name.trim(); break; }
          }
        });
      }
      if (!Object.keys(flowListIds).length) throw new Error('Nenhuma lista do fluxo encontrada.');

      var retrabalhoFieldId = null;
      var retrabalhoOptions = {};
      if (Array.isArray(customFields)) {
        for (var fi=0; fi<customFields.length; fi++) {
          if (customFields[fi].name === 'Retrabalhos') {
            retrabalhoFieldId = customFields[fi].id;
            if (Array.isArray(customFields[fi].options)) {
              customFields[fi].options.forEach(function(o) {
                retrabalhoOptions[o.id] = o.value && o.value.text ? o.value.text : '';
              });
            }
            break;
          }
        }
      }

      var cards = [];
      if (Array.isArray(allBoardCards)) {
        allBoardCards.forEach(function(c) {
          if (flowListIds[c.idList]) cards.push(c);
        });
      }

      var cfByCard = {};
      cards.forEach(function(c) {
        cfByCard[c.id] = Array.isArray(c.customFieldItems) ? c.customFieldItems : [];
      });
      var hasCFInline = false;
      if (retrabalhoFieldId && cards.length > 0) {
        for (var ci = 0; ci < cards.length; ci++) {
          var cfi = cards[ci].customFieldItems;
          if (Array.isArray(cfi) && cfi.length > 0) { hasCFInline = true; break; }
        }
      }

      var actionUrls = cards.map(function(c) {
        return '/cards/'+c.id+'/actions?filter=updateCard:idList,createCard,copyCard&limit=1000';
      });
      var cfUrls = [];
      if (retrabalhoFieldId && !hasCFInline) {
        cfUrls = cards.map(function(c) {
          return '/cards/'+c.id+'/customFieldItems';
        });
      }
      var allUrls = actionUrls.concat(cfUrls);

      return throttledFetch(allUrls, token, 20, 2500).then(function(allResults) {
        var allActions = allResults.slice(0, cards.length);
        var allCF;
        if (retrabalhoFieldId && !hasCFInline) {
          allCF = allResults.slice(cards.length);
        } else {
          allCF = cards.map(function(c) { return cfByCard[c.id]; });
        }

          var now = new Date();
          var curMonth = now.getMonth(), curYear = now.getFullYear();
          var throughput = {};
          FLOW_LISTS.forEach(function(n) { throughput[n] = 0; });

          var processed = [];
          for (var i=0; i<cards.length; i++) {
            var card = cards[i];
            var actions = Array.isArray(allActions[i]) ? allActions[i] : [];

            actions.forEach(function(act) {
              if (act.type === 'updateCard' && act.data.listBefore) {
                var d = new Date(act.date);
                if (d.getMonth() === curMonth && d.getFullYear() === curYear) {
                  var fromList = act.data.listBefore.name;
                  if (throughput.hasOwnProperty(fromList)) throughput[fromList]++;
                }
              }
            });

            var rwVal = 0;
            var hasRetrabalho = false;
            var cfItems = Array.isArray(allCF[i]) ? allCF[i] : [];
            if (retrabalhoFieldId) {
              for (var cfi=0; cfi<cfItems.length; cfi++) {
                if (cfItems[cfi].idCustomField === retrabalhoFieldId) {
                  var cfItem = cfItems[cfi];
                  var v = cfItem.value;
                  if (v !== null && v !== undefined) {
                    if (v.number !== null && v.number !== undefined) { rwVal = parseFloat(v.number); if (isNaN(rwVal)) rwVal = 0; }
                    else if (v.text !== null && v.text !== undefined) { rwVal = parseFloat(v.text); if (isNaN(rwVal)) rwVal = 0; }
                    else if (v.checked !== undefined) { rwVal = v.checked === 'true' || v.checked === true ? 1 : 0; }
                    hasRetrabalho = true;
                  } else if (cfItem.idValue) {
                    hasRetrabalho = true;
                    var opt = retrabalhoOptions[cfItem.idValue];
                    if (opt !== undefined && opt !== '') {
                      rwVal = parseFloat(opt);
                      if (isNaN(rwVal)) rwVal = 1;
                    } else {
                      rwVal = 1;
                    }
                  }
                  break;
                }
              }
            }

            var tl = buildTimeline(actions);
            var currentStage = tl.length ? tl[tl.length-1] : null;
            var currentListName = currentStage ? currentStage.name : (flowListIds[card.idList] || '');
            var daysInCurrent = currentStage ? countBusinessDays(currentStage.enteredAt, now) : 0;
            var totalBD = 0;
            for (var si = 0; si < tl.length; si++) {
              var stEnd = tl[si].leftAt || now;
              totalBD += countBusinessDays(tl[si].enteredAt, stEnd);
            }

            var isLate = false;
            var hasDue = !!card.due;
            if (hasDue) {
              var td = new Date(); td.setHours(0,0,0,0);
              var du = new Date(card.due); du.setHours(0,0,0,0);
              isLate = du < td;
            }

            var hasLabels = card.labels && card.labels.length > 0;

            var inConcluido = false;
            if (currentListName === 'Concluído 🏆') {
              var dla = new Date(card.dateLastActivity);
              if (dla.getMonth() === curMonth && dla.getFullYear() === curYear) inConcluido = true;
            }

            var missing = [];
            if (!hasDue) missing.push('Prazo');
            if (!hasLabels) missing.push('Label');

            processed.push({
              name: card.name,
              retrabalho: rwVal,
              hasRetrabalho: hasRetrabalho,
              totalBD: totalBD,
              daysInCurrent: daysInCurrent,
              hasDue: hasDue,
              isLate: isLate,
              hasLabels: hasLabels,
              labels: (card.labels || []).map(function(l) { return l.name; }),
              currentListName: currentListName,
              inConcluidoThisMonth: inConcluido,
              missing: missing,
              isConforme: missing.length === 0
            });
          }
          return { cards: processed, throughput: throughput };
        });
      });
    });
  }


  // ─── CALCULATE KPIs ─────────────────────────────
  function calcKPIs(cards, config) {
    var withDue = cards.filter(function(c){ return c.hasDue; });
    var onTime = withDue.filter(function(c){ return !c.isLate; });
    var kpi1 = withDue.length ? Math.round(onTime.length / withDue.length * 1000) / 10 : 100;

    var totalRw = 0;
    cards.forEach(function(c){ totalRw += c.retrabalho; });
    var avgRw = cards.length ? totalRw / cards.length : 0;
    var kpi2 = Math.min(100, Math.round(avgRw * 10 * 10) / 10);

    var totalDays = 0, countDays = 0;
    cards.forEach(function(c){ totalDays += c.totalBD; countDays++; });
    var kpi3 = countDays ? Math.round(totalDays / countDays * 10) / 10 : 0;

    var kpi4 = cards.filter(function(c){ return c.inConcluidoThisMonth; }).length;

    var conformes = cards.filter(function(c){ return c.isConforme; }).length;
    var kpi5 = cards.length ? Math.round(conformes / cards.length * 1000) / 10 : 100;

    var score_prazo = Math.min(100, (kpi1 / config.meta_prazo) * 100);
    var score_rework = Math.max(0, Math.min(100, ((config.meta_rework - kpi2) / config.meta_rework) * 100 + 50));
    var score_leadtime = kpi3 > 0 ? Math.max(0, Math.min(100, (config.meta_leadtime / kpi3) * 100)) : 100;
    var score_through = Math.min(100, (kpi4 / config.meta_through) * 100);
    var score_conformidade = Math.min(100, (kpi5 / config.meta_conformidade) * 100);

    var healthScore = Math.round(
      (score_prazo * config.peso1 + score_rework * config.peso2 +
       score_leadtime * config.peso3 + score_through * config.peso4 +
       score_conformidade * config.peso5) / 100
    );

    return {
      kpi1: kpi1, kpi2: kpi2, kpi3: kpi3, kpi4: kpi4, kpi5: kpi5,
      score_prazo: score_prazo, score_rework: score_rework,
      score_leadtime: score_leadtime, score_through: score_through,
      score_conformidade: score_conformidade,
      healthScore: healthScore,
      totalCards: cards.length
    };
  }

  // ─── SLA ALERTS ─────────────────────────────────
  function computeSLAAlerts(cards, config) {
    var sla = config.sla || DEFAULT_SLA;
    var alerts = [];
    cards.forEach(function(c) {
      if (!c.currentListName) return;
      var limit = sla[c.currentListName];
      if (limit === undefined || limit >= 999) return;
      if (c.daysInCurrent > limit) {
        alerts.push({
          name: c.name,
          list: c.currentListName,
          days: c.daysInCurrent,
          slaLimit: limit,
          excess: c.daysInCurrent - limit
        });
      }
    });
    alerts.sort(function(a,b) { return b.excess - a.excess; });
    return alerts;
  }

  // ─── RENDER REALTIME ────────────────────────────
  function scoreColor(score) {
    if (score >= 80) return { border: '#FFCF06', bg: 'rgba(255,207,6,0.12)', text: '#0A0A0A' };
    if (score >= 60) return { border: '#FFCF06', bg: 'rgba(255,207,6,0.06)', text: '#0A0A0A' };
    if (score >= 40) return { border: '#ABABB0', bg: 'rgba(171,171,176,0.10)', text: '#0A0A0A' };
    return { border: '#0A0A0A', bg: 'rgba(10,10,10,0.06)', text: '#0A0A0A' };
  }
  function scoreStatus(score) {
    if (score >= 80) return 'Produção excelente';
    if (score >= 60) return 'Produção em dia';
    if (score >= 40) return 'Atenção necessária';
    return 'Situação crítica';
  }
  function barColor(pct) {
    if (pct >= 75) return '#FFCF06';
    if (pct >= 50) return 'rgba(255,207,6,0.60)';
    return '#ABABB0';
  }

  function renderRealtime(kpis, config, cards) {
    var sc = scoreColor(kpis.healthScore);
    var html = '';

    html += '<div class="score-circle-wrap">';
    html += '<div class="score-circle" style="border-color:'+sc.border+';background:'+sc.bg+';">';
    html += '<span class="number" style="color:'+sc.text+';">'+kpis.healthScore+'</span>';
    html += '<span class="label" style="color:'+sc.text+';">Health Score</span>';
    html += '</div>';
    html += '<div class="score-status" style="color:'+sc.text+';">'+scoreStatus(kpis.healthScore)+'</div>';
    html += '</div>';

    var kpiCards = [
      { name: 'Entrega no prazo', value: kpis.kpi1+'%', meta: 'meta: '+config.meta_prazo+'%', pct: kpis.score_prazo },
      { name: 'Taxa de rework', value: kpis.kpi2+'%', meta: 'meta: ≤'+config.meta_rework+'%', pct: kpis.score_rework },
      { name: 'Lead time médio', value: kpis.kpi3+' d.u.', meta: 'meta: ≤'+config.meta_leadtime+' d.u.', pct: kpis.score_leadtime },
      { name: 'Throughput mensal', value: kpis.kpi4+' cards', meta: 'meta: '+config.meta_through+' cards', pct: kpis.score_through },
      { name: 'Conformidade', value: kpis.kpi5+'%', meta: 'meta: '+config.meta_conformidade+'%', pct: kpis.score_conformidade }
    ];

    html += '<div class="kpi-grid">';
    kpiCards.forEach(function(k) {
      var pct = Math.min(100, Math.max(0, Math.round(k.pct)));
      html += '<div class="kpi-card">';
      html += '<div class="kpi-name">'+k.name+'</div>';
      html += '<div class="kpi-value">'+k.value+'</div>';
      html += '<div class="kpi-meta">'+k.meta+'</div>';
      html += '<div class="kpi-bar-bg"><div class="kpi-bar-fill" style="width:'+pct+'%;background:'+barColor(pct)+';"></div></div>';
      html += '</div>';
    });
    html += '</div>';

    // Non-conforming cards

      html += '<div class="collapsible">';
      html += '<button class="collapse-toggle'+(expanded?' open':'')+'" data-collapse="nc">Cards com campos incompletos ('+nonConforming.length+') '+(expanded?'▲':'▼')+'</button>';
      html += '<div class="collapse-body'+(expanded?' open':'')+'" id="nc-body">';
      html += '<table><thead><tr><th>Card</th><th>Campos faltantes</th></tr></thead><tbody>';
      nonConforming.forEach(function(c) {
        html += '<tr><td>'+escHtml(c.name)+'</td><td>';
        c.missing.forEach(function(m) { html += '<span class="missing-tag">'+m+'</span>'; });
        html += '</td></tr>';
      });
      html += '</tbody></table></div></div>';
    }

    // Member distribution
    html += '<div class="footer-bar">';
    html += '<button class="btn btn-secondary" id="btn-refresh">Atualizar dados</button>';
    html += '<button class="btn" id="btn-export">Exportar relatório</button>';
    html += '<span class="info">'+kpis.totalCards+' cards analisados · atualizado agora</span>';
    html += '</div>';

    var el = document.getElementById('rt-content');
    el.innerHTML = html;
    el.style.display = '';
    document.getElementById('rt-loading').style.display = 'none';
    document.getElementById('rt-error').style.display = 'none';

    document.getElementById('btn-refresh').addEventListener('click', function() { loadRealtime(); });
    document.getElementById('btn-export').addEventListener('click', function() {
      t.alert({message: 'Use o botão "Exportar Lead Time" no board para gerar o relatório XLSX.', display: 'info', duration: 5});
    });

    // Collapse toggles
    document.querySelectorAll('.collapse-toggle').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var bodyId = btn.getAttribute('data-collapse') + '-body';
        var body = document.getElementById(bodyId);
        if (body) {
          btn.classList.toggle('open');
          body.classList.toggle('open');
          var arrow = btn.textContent.trim();
          if (btn.classList.contains('open')) {
            btn.textContent = btn.textContent.replace('▼', '▲');
          } else {
            btn.textContent = btn.textContent.replace('▲', '▼');
          }
        }

  // ─── RENDER FUNNEL ──────────────────────────────
  function renderFunnel() {
    var el = document.getElementById('funnel-content');
    if (!cachedData) {
      el.innerHTML = '<div class="no-data"><p>Carregue os dados na aba "Tempo real" primeiro.</p></div>';
      return;
    }
    var cards = cachedData.cards, config = cachedData.config, throughput = cachedData.throughput;
    var sla = config.sla || DEFAULT_SLA;
    var slaAlerts = computeSLAAlerts(cards, config);

    var perList = {};
    FLOW_LISTS.forEach(function(n) { perList[n] = { cards: [], aboveSLA: 0 }; });
    cards.forEach(function(c) {
      if (perList[c.currentListName]) {
        perList[c.currentListName].cards.push(c);
        var limit = sla[c.currentListName];
        if (limit !== undefined && limit < 999 && c.daysInCurrent > limit) {
          perList[c.currentListName].aboveSLA++;
        }
      }
    });

    var maxCards = 1;
    var totalInProgress = 0;
    var bottleneckName = '', bottleneckCount = 0;
    var totalAboveSLA = 0;
    FLOW_LISTS.forEach(function(n) {
      var cnt = perList[n].cards.length;
      if (cnt > maxCards) maxCards = cnt;
      if (n !== 'Concluído 🏆') {
        totalInProgress += cnt;
        if (cnt > bottleneckCount) { bottleneckCount = cnt; bottleneckName = n; }
      }
      totalAboveSLA += perList[n].aboveSLA;
    });

    var html = '';
    html += '<div class="summary-cards">';
    html += '<div class="summary-card"><div class="sc-value">'+totalInProgress+'</div><div class="sc-label">Cards em andamento</div></div>';
    html += '<div class="summary-card"><div class="sc-value">'+bottleneckCount+'</div><div class="sc-label">'+escHtml(bottleneckName)+'</div></div>';
    html += '<div class="summary-card"><div class="sc-value" style="color:'+(totalAboveSLA>0?'#eb5a46':'#36b37e')+'">'+totalAboveSLA+'</div><div class="sc-label">Cards acima do SLA</div></div>';
    html += '</div>';

    html += '<table class="funnel-table"><thead><tr>';
    html += '<th>Etapa</th><th>Cards agora</th><th>Acima do SLA</th><th>SLA</th><th>Saídas no mês</th><th>Status</th>';
    html += '</tr></thead><tbody>';

    FLOW_LISTS.forEach(function(n) {
      var p = perList[n];
      var cnt = p.cards.length;
      var abv = p.aboveSLA;
      var limit = sla[n];
      var tp = throughput[n] || 0;
      var isConcluido = n === 'Concluído 🏆';

      var status, statusClass;
      if (isConcluido) {
        status = '✅ Concluído'; statusClass = 'status-ok';
      } else if (cnt >= 3 && abv >= 1) {
        status = '🔴 Gargalo'; statusClass = 'status-danger';
      } else if (abv >= 1) {
        status = '⚠️ Atenção'; statusClass = 'status-warn';
      } else {
        status = '✅ Fluindo'; statusClass = 'status-ok';
      }

      var barW = maxCards > 0 ? Math.round(cnt / maxCards * 100) : 0;
      html += '<tr'+(isConcluido ? ' class="concluded"' : '')+'>';
      html += '<td>'+escHtml(n)+'</td>';
      html += '<td><div style="display:flex;align-items:center;gap:8px;"><span>'+cnt+'</span><div class="funnel-bar" style="width:'+barW+'%;"></div></div></td>';
      html += '<td style="color:'+(abv>0?'#eb5a46':'#36b37e')+';font-weight:600;">'+abv+'</td>';
      html += '<td>'+(limit >= 999 ? '—' : limit+'d úteis')+'</td>';
      html += '<td>'+tp+'</td>';
      html += '<td class="'+statusClass+'">'+status+'</td>';
      html += '</tr>';
    });
    html += '</tbody></table>';

    if (slaAlerts.length > 0) {
      html += '<div class="alerts-section">';
      html += '<h3>Alertas ativos ('+slaAlerts.length+')</h3>';
      slaAlerts.forEach(function(a) {
        html += '<div class="alert-row">';
        html += '<span class="ar-name">'+escHtml(a.name)+'</span>';
        html += '<span class="ar-stage">'+escHtml(a.list)+'</span>';
        html += '<span class="ar-days">'+a.days+' d.u.</span>';
        html += '<span class="ar-excess">+'+a.excess+' dias acima do limite</span>';
        html += '</div>';
      });
      html += '</div>';
    }

    // ─── REWORK RANKING ──────────────────────────────
    var reworkCards = cards.filter(function(c) { return c.retrabalho > 0; });
    reworkCards.sort(function(a, b) { return b.retrabalho - a.retrabalho; });

    var allLabels = {};
    cards.forEach(function(c) {
      (c.labels || []).forEach(function(l) { allLabels[l] = true; });
    });
    var labelList = Object.keys(allLabels).sort();

    html += '<div class="rework-section">';
    html += '<h3>🔄 Cards com mais retrabalho</h3>';
    html += '<div class="rework-filters">';
    html += '<div class="filter-group"><label>Etapa</label><select id="rw-filter-stage"><option value="">Todas</option>';
    FLOW_LISTS.forEach(function(n) {
      html += '<option value="'+escHtml(n)+'">'+escHtml(n)+'</option>';
    });
    html += '</select></div>';
    html += '<div class="filter-group"><label>Label</label><select id="rw-filter-label"><option value="">Todas</option>';
    labelList.forEach(function(l) {
      html += '<option value="'+escHtml(l)+'">'+escHtml(l)+'</option>';
    });
    html += '</select></div>';
    html += '<div class="filter-group"><label>Retrabalho mínimo</label><input type="number" id="rw-filter-min" value="0" min="0" step="1" style="width:70px;"></div>';
    html += '</div>';
    html += '<div id="rework-table-wrap"></div>';
    html += '</div>';

    el.innerHTML = html;

    function renderReworkTable() {
      var stageF = document.getElementById('rw-filter-stage').value;
      var labelF = document.getElementById('rw-filter-label').value;
      var minF = parseFloat(document.getElementById('rw-filter-min').value) || 0;

      var filtered = reworkCards.filter(function(c) {
        if (stageF && c.currentListName !== stageF) return false;
        if (labelF && (c.labels || []).indexOf(labelF) === -1) return false;
        if (c.retrabalho < minF) return false;
        return true;
      });

      var wrap = document.getElementById('rework-table-wrap');
      if (filtered.length === 0) {
        wrap.innerHTML = '<p class="rework-empty">Nenhum card com retrabalho encontrado para os filtros selecionados.</p>';
        return;
      }

      var h = '<table class="rework-table"><thead><tr>';
      h += '<th>#</th><th>Card</th><th>Retrabalho</th><th>Etapa atual</th><th>Labels</th>';
      h += '</tr></thead><tbody>';
      for (var ri = 0; ri < filtered.length; ri++) {
        var rc = filtered[ri];
        var rwClass = rc.retrabalho >= 3 ? 'high' : rc.retrabalho >= 2 ? 'med' : 'low';
        h += '<tr>';
        h += '<td class="rework-rank">'+(ri+1)+'</td>';
        h += '<td>'+escHtml(rc.name)+'</td>';
        h += '<td class="rework-val '+rwClass+'">'+rc.retrabalho+'</td>';
        h += '<td>'+escHtml(rc.currentListName)+'</td>';
        h += '<td>';
        (rc.labels || []).forEach(function(l) { h += '<span class="label-tag">'+escHtml(l)+'</span>'; });
        h += '</td></tr>';
      }
      var totalRwFiltered = 0;
      for (var ti = 0; ti < filtered.length; ti++) { totalRwFiltered += filtered[ti].retrabalho; }
      h += '<tr style="background:#0A0A0A;">';
      h += '<td colspan="2" style="color:#FFCF06;font-weight:700;">Total</td>';
      h += '<td style="color:#FFCF06;font-weight:700;">'+totalRwFiltered+'</td>';
      h += '<td colspan="2" style="color:#ABABB0;font-size:12px;">'+filtered.length+' cards</td>';
      h += '</tr>';
      h += '</tbody></table>';
      wrap.innerHTML = h;
    }

    renderReworkTable();
    document.getElementById('rw-filter-stage').addEventListener('change', renderReworkTable);
    document.getElementById('rw-filter-label').addEventListener('change', renderReworkTable);
    document.getElementById('rw-filter-min').addEventListener('input', renderReworkTable);
  }

  // ─── SNAPSHOT ───────────────────────────────────
  function saveSnapshotIfNeeded(kpis, config) {
    var now = new Date();
    var key = 'snapshot_'+now.getFullYear()+'_'+String(now.getMonth()+1).padStart(2,'0');
    t.get('board', 'shared', key).then(function(existing) {
      if (!existing) {
        var snap = {
          score: kpis.healthScore,
          kpi1: kpis.kpi1, kpi2: kpis.kpi2, kpi3: kpis.kpi3, kpi4: kpis.kpi4, kpi5: kpis.kpi5,
          meta_prazo: config.meta_prazo, meta_rework: config.meta_rework,
          meta_leadtime: config.meta_leadtime, meta_through: config.meta_through,
          meta_conformidade: config.meta_conformidade,
          totalCards: kpis.totalCards,
          savedAt: now.toISOString()
        };
        t.set('board', 'shared', key, snap);
      }
    });
  }

  function forceSnapshot(kpis, config) {
    var now = new Date();
    var key = 'snapshot_'+now.getFullYear()+'_'+String(now.getMonth()+1).padStart(2,'0');
    var snap = {
      score: kpis.healthScore,
      kpi1: kpis.kpi1, kpi2: kpis.kpi2, kpi3: kpis.kpi3, kpi4: kpis.kpi4, kpi5: kpis.kpi5,
      meta_prazo: config.meta_prazo, meta_rework: config.meta_rework,
      meta_leadtime: config.meta_leadtime, meta_through: config.meta_through,
      meta_conformidade: config.meta_conformidade,
      totalCards: kpis.totalCards,
      savedAt: now.toISOString()
    };
    return t.set('board', 'shared', key, snap);
  }

  // ─── LOAD REALTIME ──────────────────────────────
  function loadRealtime() {
    document.getElementById('rt-loading').style.display = '';
    document.getElementById('rt-content').style.display = 'none';
    document.getElementById('rt-error').style.display = 'none';

    var token, boardId;
    t.getRestApi().getToken()
      .then(function(tok) { token = tok; return t.board('id'); })
      .then(function(board) { boardId = board.id; return t.get('board', 'shared', 'healthConfig'); })
      .then(function(cfg) {
        var config = mergeConfig(cfg);
        return fetchData(token, boardId).then(function(data) {
          cachedData = { cards: data.cards, config: config, throughput: data.throughput };
          var kpis = calcKPIs(data.cards, config);
          var slaAlerts = computeSLAAlerts(data.cards, config);
          renderRealtime(kpis, config, data.cards);
          renderAlertBanner(slaAlerts);
          saveSnapshotIfNeeded(kpis, config);
        });
      })
      .catch(function(err) {
        document.getElementById('rt-loading').style.display = 'none';
        var errEl = document.getElementById('rt-error');
        errEl.style.display = '';
        errEl.querySelector('p').textContent = 'Erro ao carregar dados: '+(err.message||String(err));
      });
  }

  document.getElementById('rt-retry').addEventListener('click', function() { loadRealtime(); });

  // ─── HISTORY ────────────────────────────────────
  function loadHistory() {
    document.getElementById('hist-loading').style.display = '';
    document.getElementById('hist-content').style.display = 'none';

    t.get('board', 'shared').then(function(data) {
      var snapshots = [];
      if (data) {
        Object.keys(data).forEach(function(key) {
          if (key.indexOf('snapshot_') === 0) {
            var parts = key.replace('snapshot_','').split('_');
            snapshots.push({ key: key, year: parseInt(parts[0]), month: parseInt(parts[1]), data: data[key] });
          }
        });
      }
      snapshots.sort(function(a,b) { return b.year !== a.year ? b.year - a.year : b.month - a.month; });

      var now = new Date();
      var curMonth = now.getMonth()+1, curYear = now.getFullYear();
      var monthNames = ['','Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

      var html = '';
      if (!snapshots.length) {
        html = '<div class="history-empty"><p>O histórico será gerado automaticamente a partir do próximo acesso mensal.</p></div>';
      } else {
        html += '<table class="history-table"><thead><tr>';
        html += '<th>Mês</th><th>Health Score</th><th>No prazo</th><th>Rework</th><th>Lead time</th><th>Throughput</th><th>Conformidade</th><th>Cards</th>';
        html += '</tr></thead><tbody>';
        snapshots.forEach(function(s) {
          var isCurrent = s.month === curMonth && s.year === curYear;
          html += '<tr'+(isCurrent?' class="current-month"':'')+'>';
          html += '<td>'+monthNames[s.month]+'/'+s.year+'</td>';
          html += '<td>'+s.data.score+'</td>';
          html += '<td>'+s.data.kpi1+'%</td>';
          html += '<td>'+s.data.kpi2+'%</td>';
          html += '<td>'+s.data.kpi3+' d.u.</td>';
          html += '<td>'+s.data.kpi4+'</td>';
          html += '<td>'+(s.data.kpi5 !== undefined ? s.data.kpi5+'%' : '—')+'</td>';
          html += '<td>'+s.data.totalCards+'</td>';
          html += '</tr>';
        });
        html += '</tbody></table>';
      }

      html += '<div style="margin-top:16px;">';
      html += '<button class="btn btn-secondary" id="btn-force-snap">Salvar snapshot agora</button>';
      html += '</div>';

      var el = document.getElementById('hist-content');
      el.innerHTML = html;
      el.style.display = '';
      document.getElementById('hist-loading').style.display = 'none';

      document.getElementById('btn-force-snap').addEventListener('click', function() {
        if (!cachedData) {
          alert('Acesse a aba "Tempo real" primeiro para carregar os dados.');
          return;
        }
        var kpis = calcKPIs(cachedData.cards, cachedData.config);
        forceSnapshot(kpis, cachedData.config).then(function() { loadHistory(); });
      });
    });
  }

  // ─── CONFIG ─────────────────────────────────────
  function renderConfig() {
    t.get('board', 'shared', 'healthConfig').then(function(cfg) {
      var config = mergeConfig(cfg);
      var html = '';

      html += '<div class="config-section"><h3>Metas</h3>';
      html += sliderRow('meta_prazo', 'Meta entrega no prazo', config.meta_prazo, 50, 100, 5, '%');
      html += sliderRow('meta_rework', 'Meta rework máximo', config.meta_rework, 5, 60, 5, '%');
      html += sliderRow('meta_leadtime', 'Meta lead time máximo', config.meta_leadtime, 2, 20, 1, ' d.u.');
      html += sliderRow('meta_through', 'Meta throughput mensal', config.meta_through, 5, 1000, 5, ' cards');
      html += sliderRow('meta_conformidade', 'Meta conformidade de processo', config.meta_conformidade, 50, 100, 5, '%');
      html += '</div>';

      html += '<div class="config-section"><h3>Pesos do Health Score</h3>';
      html += '<div class="peso-sum valid" id="peso-sum">Soma dos pesos: 100</div>';
      html += sliderRow('peso1', 'Peso entrega no prazo', config.peso1, 10, 60, 5, '');
      html += sliderRow('peso2', 'Peso rework', config.peso2, 5, 40, 5, '');
      html += sliderRow('peso3', 'Peso lead time', config.peso3, 5, 40, 5, '');
      html += sliderRow('peso4', 'Peso throughput', config.peso4, 5, 30, 5, '');
      html += sliderRow('peso5', 'Peso conformidade', config.peso5, 5, 40, 5, '');
      html += '</div>';

      html += '<div class="config-section"><h3>SLA por etapa (dias úteis)</h3>';
      html += '<div class="sla-grid">';
      FLOW_LISTS.forEach(function(n, i) {
        if (n === 'Concluído 🏆') return;
        var val = config.sla && config.sla[n] !== undefined ? config.sla[n] : DEFAULT_SLA[n];
        html += '<div class="sla-row">';
        html += '<label>'+escHtml(n)+'</label>';
        html += '<input type="number" id="sla_'+i+'" min="1" max="30" value="'+val+'" data-list="'+escHtml(n)+'">';
        html += '<span class="sla-unit">d.u.</span>';
        html += '</div>';
      });
      html += '</div></div>';

      html += '<div class="config-footer">';
      html += '<button class="btn" id="btn-save-config">Salvar configurações</button>';
      html += '<span class="config-msg" id="cfg-msg" style="display:none;"></span>';
      html += '</div>';

      document.getElementById('cfg-content').innerHTML = html;

      var sliders = document.querySelectorAll('#cfg-content input[type=range]');
      sliders.forEach(function(sl) {
        sl.addEventListener('input', function() {
          document.getElementById('val-'+sl.id).textContent = sl.value + (sl.getAttribute('data-unit')||'');
          updatePesoSum();
        });
      });
      updatePesoSum();

      document.getElementById('btn-save-config').addEventListener('click', function() {
        var newConfig = {
          meta_prazo: parseInt(document.getElementById('meta_prazo').value),
          meta_rework: parseInt(document.getElementById('meta_rework').value),
          meta_leadtime: parseInt(document.getElementById('meta_leadtime').value),
          meta_through: parseInt(document.getElementById('meta_through').value),
          meta_conformidade: parseInt(document.getElementById('meta_conformidade').value),
          peso1: parseInt(document.getElementById('peso1').value),
          peso2: parseInt(document.getElementById('peso2').value),
          peso3: parseInt(document.getElementById('peso3').value),
          peso4: parseInt(document.getElementById('peso4').value),
          peso5: parseInt(document.getElementById('peso5').value),
          sla: {}
        };
        var sum = newConfig.peso1 + newConfig.peso2 + newConfig.peso3 + newConfig.peso4 + newConfig.peso5;
        if (sum !== 100) return;

        FLOW_LISTS.forEach(function(n, i) {
          if (n === 'Concluído 🏆') { newConfig.sla[n] = 999; return; }
          var input = document.getElementById('sla_'+i);
          newConfig.sla[n] = input ? parseInt(input.value) || DEFAULT_SLA[n] : DEFAULT_SLA[n];
        });

        t.set('board', 'shared', 'healthConfig', newConfig).then(function() {
          var msg = document.getElementById('cfg-msg');
          msg.textContent = 'Configurações salvas!';
          msg.style.display = '';
          if (cachedData) cachedData.config = newConfig;
          setTimeout(function() { switchTab('realtime'); loadRealtime(); }, 1000);
        });
      });
    });
  }

  function sliderRow(id, label, value, min, max, step, unit) {
    return '<div class="config-row"><label for="'+id+'">'+label+'</label>' +
      '<div class="slider-row"><input type="range" id="'+id+'" min="'+min+'" max="'+max+'" step="'+step+'" value="'+value+'" data-unit="'+unit+'">' +
      '<span class="slider-val" id="val-'+id+'">'+value+unit+'</span></div></div>';
  }

  function updatePesoSum() {
    var ids = ['peso1','peso2','peso3','peso4','peso5'];
    var sum = 0;
    ids.forEach(function(id) { sum += parseInt(document.getElementById(id).value) || 0; });
    var el = document.getElementById('peso-sum');
    var btn = document.getElementById('btn-save-config');
    el.textContent = 'Soma dos pesos: '+sum;
    if (sum === 100) { el.className = 'peso-sum valid'; btn.disabled = false; }
    else { el.className = 'peso-sum invalid'; el.textContent += ' (deve ser 100)'; btn.disabled = true; }
  }

  // ─── INIT ───────────────────────────────────────
  checkAuth(loadRealtime);
})();
</script>
</body>
</html>
