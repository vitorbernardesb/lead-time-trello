            t.set('board', 'private', 'retrabalhoFieldCache', {
              id: retrabalhoFieldId, options: retrabalhoOptions, prioridadeId: prioridadeFieldId,
              nivelEsforcoId: nivelEsforcoFieldId, nivelEsforcoOptions: nivelEsforcoOptions,
              savedAt: Date.now()
            });
          } catch(e) {}
        }

      // cards abertos → alimentam TODOS os KPIs (comportamento inalterado).
      // cards ARQUIVADOS elegíveis (criados a partir do epoch) → processados junto,
      // mas isolados via flag `closed`: entram SÓ no indicador de 1ª entrega, nunca
      // nos demais KPIs (ver split do retorno e guarda de throughput). O filtro por
      // data de criação (idToDate) evita puxar o histórico antigo do board.
      var cards = [];
      if (Array.isArray(allBoardCards)) {
        allBoardCards.forEach(function(c) {
          if (!flowListIds[c.idList]) return;
          if (c.closed) {
            var cd = idToDate(c.id);
            if (cd && cd >= PRIMEIRA_ENTREGA_EPOCH) cards.push(c);
          } else {
            cards.push(c);
          }
        });
      }

      var cfByCard = {};
      cards.forEach(function(c) {
        cfByCard[c.id] = Array.isArray(c.customFieldItems) ? c.customFieldItems : [];
      });

        updateSkeletonMsg('Calculando lead time de ' + cards.length + ' cards…');

        // Cache incremental: só busca actions de cards cujo dateLastActivity mudou
        // desde o último load (cards sem atividade nova — e todos os arquivados —
        // reutilizam as actions cacheadas, com resultado idêntico ao refetch).
        var actCache = readActionsCache(boardId);
        var allActions = new Array(cards.length);
        var toFetch = [];
        cards.forEach(function(c, i) {
          var hit = actCache[c.id];
          if (hit && hit.la === c.dateLastActivity && Array.isArray(hit.a)) {
            allActions[i] = hit.a;
          } else {
            toFetch.push(i);
          }
        });

        var actionUrls = toFetch.map(function(i) {
          // fields enxutos: só o que buildTimeline/vazão usam (type,date,data) — reduz payload/parse.
          return '/cards/'+cards[i].id+'/actions?filter=updateCard:idList,createCard,copyCard&limit=1000&fields=type,date,data&memberCreator=false&member=false';
        });

        return throttledFetch(actionUrls, token).then(function(fetched) {
          // falha de fetch fica undefined (processada como []), mas NUNCA entra no cache
          toFetch.forEach(function(cardIdx, j) {
            if (Array.isArray(fetched[j])) allActions[cardIdx] = fetched[j];
          });
          // regrava o cache só com os cards atuais do board (prune automático dos removidos)
          var newCache = {};
          cards.forEach(function(c, i) {
            if (Array.isArray(allActions[i])) newCache[c.id] = { la: c.dateLastActivity, a: allActions[i] };
          });
          writeActionsCache(boardId, newCache);

        var allCF = cards.map(function(c) { return cfByCard[c.id]; });

          var now = new Date();
          var curMonth = now.getMonth(), curYear = now.getFullYear();
          var throughput = {};
          FLOW_LISTS.forEach(function(n) { throughput[n] = 0; });

          var processed = [];
          for (var i=0; i<cards.length; i++) {
            var card = cards[i];
            var actions = Array.isArray(allActions[i]) ? allActions[i] : [];

            // Vazão/throughput considera apenas cards ABERTOS (arquivados entram só na
            // 1ª entrega). Evita que arquivar um card altere a vazão do mês.
            if (!card.closed) {
              actions.forEach(function(act) {
                if (act.type === 'updateCard' && act.data.listBefore) {
                  var d = new Date(act.date);
                  if (d.getMonth() === curMonth && d.getFullYear() === curYear) {
                    var fromList = act.data.listBefore.name;
                    if (throughput.hasOwnProperty(fromList)) throughput[fromList]++;
                  }
                }
              });
            }

            var rwVal = 0;
            var hasRetrabalho = false;
            var cfItems = Array.isArray(allCF[i]) ? allCF[i] : [];
            if (retrabalhoFieldId) {
              for (var cfi=0; cfi<cfItems.length; cfi++) {
                if (cfItems[cfi].idCustomField === retrabalhoFieldId) {
                  var cfItem = cfItems[cfi];
                  var v = cfItem.value;
                  if (v !== null && v !== undefined) {
                    if (v.number !== null && v.number !== undefined) { rwVal = parseFloat(v.number); if (isNaN(rwVal)) rwVal = 0; }
                    else if (v.text !== null && v.text !== undefined) { rwVal = parseFloat(v.text); if (isNaN(rwVal)) rwVal = 0; }
                    else if (v.checked !== undefined) { rwVal = v.checked === 'true' || v.checked === true ? 1 : 0; }
                    hasRetrabalho = true;
                  } else if (cfItem.idValue) {
                    hasRetrabalho = true;
                    var opt = retrabalhoOptions[cfItem.idValue];
                    if (opt !== undefined && opt !== '') {
                      rwVal = parseFloat(opt);
                      if (isNaN(rwVal)) rwVal = 1;
                    } else {
                      rwVal = 1;
                    }
                  }
                  break;
                }
              }
            }

            var tl = buildTimeline(actions);
            var currentStage = tl.length ? tl[tl.length-1] : null;
            var currentListName = currentStage ? currentStage.name : (flowListIds[card.idList] || '');
            var realListName = flowListIds[card.idList] || currentListName;

            // Conclusão (timeline) compartilhada por vazão E lead time — calculada uma vez
            // e reaproveitada em computeLeadTime (evita recomputar getConcludedAt).
            var concludedAt = getConcludedAt(tl);
            var ltReal = computeLeadTime(tl, concludedAt);
            // Tempo até 1ª entrega (criação → 1ª chegada a marco de entrega) e nível de esforço.
            var pe = computePrimeiraEntrega(tl);
            var createdAt = tl.length ? tl[0].enteredAt : null;
            var nivelEsforco = null;
            if (nivelEsforcoFieldId) {
              for (var ni=0; ni<cfItems.length; ni++) {
                if (cfItems[ni].idCustomField === nivelEsforcoFieldId && cfItems[ni].idValue) {
                  nivelEsforco = normalizeNivel(nivelEsforcoOptions[cfItems[ni].idValue]);
                  break;
                }
              }
            }
            var daysInCurrent = currentStage ? countBusinessDays(currentStage.enteredAt, now) : 0;

            // Vencido: due no passado e ainda não entregue (helper centralizado).
            var hasDue = !!card.due;
            var isLate = isOverdue(card.due, card.dueComplete);

            var hasLabels = card.labels && card.labels.length > 0;

            // Concluído no mês corrente = entrou em Concluído neste mês (pela data REAL
            // de conclusão, não pela due date). É isto que mede vazão/throughput.
            var concluidoNoMes = !!(concludedAt && sameMonth(concludedAt, now));

            var tituloValido = validarTitulo(card.name);
            var hasDesc = card.desc && card.desc.trim().length > 0;

            var hasPrio = false;
            if (prioridadeFieldId) {
              for (var pi=0; pi<cfItems.length; pi++) {
                if (cfItems[pi].idCustomField === prioridadeFieldId && cfItems[pi].idValue) {
                  hasPrio = true;
                  break;
                }
              }
            } else {
              hasPrio = true;
            }

            var missing = [];
            if (!tituloValido) missing.push('Título não preenchido');
            if (!hasLabels) missing.push('Etiqueta não definida');
            if (!hasDue) missing.push('Data de entrega não definida');
            if (!hasDesc) missing.push('Descrição não preenchida');
            if (!hasPrio) missing.push('Prioridade não definida');

            processed.push({
              id: card.id,
              name: card.name,
              isArchived: !!card.closed,
              retrabalho: rwVal,
              hasRetrabalho: hasRetrabalho,
              daysInCurrent: daysInCurrent,
              hasDue: hasDue,
              isLate: isLate,
              hasLabels: hasLabels,
              hasPrioridade: hasPrio,
              labels: (card.labels || []).map(function(l) { return l.name; }),
              // Responsáveis (membros do card) — aditivo, só p/ o modal de Análises
              // Personalizadas. Resolvido para nome; não entra em nenhum KPI.
              members: Array.isArray(card.idMembers) ? card.idMembers.map(function(mid){ return memberMap[mid] || null; }).filter(Boolean) : [],
              currentListName: currentListName,
              // entrada na etapa atual (para tempos na etapa) e URL clicável do card
              enteredCurrentAt: currentStage ? currentStage.enteredAt.toISOString() : null,
              url: card.shortUrl || '',
              isConcluido: realListName === 'Concluído 🏆',
              concluidoNoMes: concluidoNoMes,
              // lead time real do fluxo (dias úteis) e quando o card foi concluído.
              // concludedAt vale para QUALQUER card concluído (independe de lead time).
              leadTimeReal: ltReal ? ltReal.leadTime : null,
              concludedAt: concludedAt ? concludedAt.toISOString() : null,
              // Tempo até 1ª entrega por nível de esforço (null se ainda não entregou).
              nivelEsforco: nivelEsforco,
              createdAt: createdAt ? createdAt.toISOString() : null,
              primeiraEntrega: pe ? {
                horas: pe.horas, dias: pe.dias,
                breakdown: pe.breakdown, entradasEmAndamento: pe.entradasEmAndamento
              } : null,
              missing: missing,
              isConforme: tituloValido && hasLabels && hasDue && hasDesc && hasPrio
            });
          }
          // Split: `cards` = só abertos (todos os KPIs, inalterado); `archived` =
          // arquivados elegíveis, consumidos EXCLUSIVAMENTE pela 1ª entrega.
          var openCards = [], archivedCards = [];
          for (var pi2 = 0; pi2 < processed.length; pi2++) {
            (processed[pi2].isArchived ? archivedCards : openCards).push(processed[pi2]);
          }
          return { cards: openCards, archived: archivedCards, throughput: throughput };
        });
      });
    });
  }


  // ─── CALCULATE KPIs ─────────────────────────────
  function calcKPIs(cards, config) {
    var withDue = cards.filter(function(c){ return c.hasDue && !c.isConcluido; });
    var vencidos = withDue.filter(function(c){ return c.isLate; });
    // KPI1 — CARDS VENCIDOS: % de cards ATIVOS (não concluídos) com due date que já
    // venceu. Denominador = só cards ativos com due (cards sem due/concluídos não entram).
    var kpi1 = withDue.length ? Math.round(vencidos.length / withDue.length * 1000) / 10 : 0;

    var totalRw = 0;
    cards.forEach(function(c){ totalRw += c.retrabalho; });
    var kpi2 = totalRw;
    var cardsComRetrabalho = cards.filter(function(c){ return c.retrabalho > 0; }); // subconjunto p/ click-through

    // KPI3 — AGING / Tempo na etapa atual: média de dias úteis que os cards ativos
    // permanecem na etapa em que estão agora. Mede WIP aging (cards parados), NÃO lead time.
    var prodCards = cards.filter(function(c) {
      return PRODUCAO_ATIVA.indexOf(c.currentListName) !== -1;
    });
    var totalDays = 0;
    prodCards.forEach(function(c) { totalDays += c.daysInCurrent; });
    var kpi3 = prodCards.length ? Math.round(totalDays / prodCards.length * 10) / 10 : 0;

    // KPI4 — VAZÃO MENSAL / throughput: nº de cards CONCLUÍDOS no mês corrente
    // (pela data real de entrada em Concluído). Mede entregas no período, não due dates.
    var cardsVazao = cards.filter(function(c){ return c.concluidoNoMes; });
    var kpi4 = cardsVazao.length;

    var cardsParaConformidade = cards.filter(function(c){ return !c.isConcluido; });
    var cardsNaoConformes = cardsParaConformidade.filter(function(c){ return !c.isConforme; }); // subconjunto p/ click-through
    var conformes = cardsParaConformidade.length - cardsNaoConformes.length;
    var kpi5 = cardsParaConformidade.length ? Math.round(conformes / cardsParaConformidade.length * 1000) / 10 : 0;

    // KPI6 — LEAD TIME REAL / Tempo de entrega: tempo médio de atravessamento do fluxo
    // (entrada na produção → conclusão), em dias úteis, considerando apenas cards
    // concluídos numa janela móvel dos últimos 30 dias.
    var LEADTIME_WINDOW_MS = 30 * 86400000;
    var agora = Date.now();
    var concluidosNaJanela = cards.filter(function(c) {
      return c.leadTimeReal !== null && c.concludedAt &&
        (agora - new Date(c.concludedAt).getTime()) <= LEADTIME_WINDOW_MS;
    });
    var totalLeadTime = 0;
    concluidosNaJanela.forEach(function(c) { totalLeadTime += c.leadTimeReal; });
    var kpi6 = concluidosNaJanela.length ? Math.round(totalLeadTime / concluidosNaJanela.length * 10) / 10 : 0;

    // Scores padronizados pela MESMA função (kpiHealth) — sem fórmulas divergentes.
    // Tipo 'B' (quanto menor melhor): vencidos, rework, aging, lead time real.
    // Tipo 'A' (quanto maior melhor): throughput, conformidade.
    var score_prazo         = kpiHealth(kpi1, config.meta_prazo, 'B');
    var score_rework        = kpiHealth(kpi2, config.meta_rework, 'B');
    var score_aging         = kpiHealth(kpi3, config.meta_leadtime, 'B');
    var score_leadtime_real = kpiHealth(kpi6, config.meta_leadtime_real, 'B');
    var score_through       = kpiHealth(kpi4, config.meta_through, 'A');
    var score_conformidade  = kpiHealth(kpi5, config.meta_conformidade, 'A');

    // Health Score = média ponderada dos 6 scores. Aging e lead time real entram com
    // pesos separados (peso3 e peso6), evitando duplicidade de impacto temporal.
    var healthScore = Math.max(0, Math.min(100, Math.round(
      (score_prazo * config.peso1 + score_rework * config.peso2 +
       score_aging * config.peso3 + score_through * config.peso4 +
       score_conformidade * config.peso5 + score_leadtime_real * config.peso6) / 100
    )));

    return {
      kpi1: kpi1, kpi2: kpi2, kpi3: kpi3, kpi4: kpi4, kpi5: kpi5, kpi6: kpi6,
      noDueData: withDue.length === 0,
      score_prazo: score_prazo, score_rework: score_rework,
      score_aging: score_aging, score_leadtime_real: score_leadtime_real,
      score_through: score_through,
      score_conformidade: score_conformidade,
      healthScore: healthScore,
      totalCards: cards.length,
      // Subconjuntos de cards por KPI (ADITIVO — não entram em nenhum cálculo; servem só
      // para o click-through abrir os cards subjacentes no modal, como na aba Análises).
      cardsVencidos: vencidos,
      cardsComRetrabalho: cardsComRetrabalho,
      cardsAging: prodCards,
      cardsLeadTime: concluidosNaJanela,
      cardsVazao: cardsVazao,
      cardsNaoConformes: cardsNaoConformes
    };
  }

  // ─── AGREGAÇÃO: TEMPO ATÉ 1ª ENTREGA POR NÍVEL ──
  // Agrupa por Nível de Esforço apenas cards CRIADOS a partir do epoch (daqui pra
  // frente) e que já tiveram 1ª entrega. Calcula média (h/d úteis), desvio padrão,
  // min/máx e o breakdown médio por etapa.
  function calcPrimeiraEntrega(cards) {
    var grupos = {};
    NIVEIS_ESFORCO.forEach(function(n){ grupos[n] = []; });
    var semNivel = 0, foraEpoch = 0;

    cards.forEach(function(c) {
      if (!c.primeiraEntrega) return;                               // ainda não entregou
      if (!c.createdAt || new Date(c.createdAt) < PRIMEIRA_ENTREGA_EPOCH) { foraEpoch++; return; }
      if (!c.nivelEsforco || !grupos[c.nivelEsforco]) { semNivel++; return; }
      grupos[c.nivelEsforco].push(c);
    });

    var out = { niveis: {}, semNivel: semNivel, foraEpoch: foraEpoch };
    NIVEIS_ESFORCO.forEach(function(nivel) {
      var lista = grupos[nivel];
      var horas = lista.map(function(c){ return c.primeiraEntrega.horas; });
      var dias  = lista.map(function(c){ return c.primeiraEntrega.dias; });
      var entradas = lista.map(function(c){ return c.primeiraEntrega.entradasEmAndamento; });

      // breakdown médio por etapa
      var breakdown = {};
      ETAPAS_PRE_ENTREGA.forEach(function(etapa) {
        breakdown[etapa] = mean(lista.map(function(c){ return (c.primeiraEntrega.breakdown[etapa] || 0); }));
      });
      // breakdown MEDIANO por etapa (aditivo; alimenta a visão "mediana" resistente a outliers).
      var breakdownMed = {};
      ETAPAS_PRE_ENTREGA.forEach(function(etapa) {
        breakdownMed[etapa] = median(lista.map(function(c){ return (c.primeiraEntrega.breakdown[etapa] || 0); }));
      });
      // headline agregada = soma das médias do breakdown → FECHA com as linhas exibidas.
      var avgHorasFechada = 0;
      ETAPAS_PRE_ENTREGA.forEach(function(etapa){ avgHorasFechada += breakdown[etapa]; });
      avgHorasFechada = round1(avgHorasFechada);

      // cards que reentraram em "Em andamento" (retrabalho) — subconjunto para click-through.
      var retrabalhoCards = lista.filter(function(c){ return c.primeiraEntrega.entradasEmAndamento > 1; });

      out.niveis[nivel] = {
        n: lista.length,
        cards: lista,                                 // ◀ retido p/ o modal de detalhes (não entra em KPI)
        avgHoras: avgHorasFechada, avgDias: mean(dias),
        medHoras: median(horas), medDias: median(dias),
        stdHoras: stdDev(horas), stdDias: stdDev(dias),
        minHoras: horas.length ? Math.min.apply(null, horas) : 0,
        maxHoras: horas.length ? Math.max.apply(null, horas) : 0,
        minDias:  dias.length ? Math.min.apply(null, dias) : 0,
        maxDias:  dias.length ? Math.max.apply(null, dias) : 0,
        avgEntradas: mean(entradas),
        retrabalhoCount: entradas.filter(function(e){ return e > 1; }).length, // reentrou em Em andamento
        retrabalhoCards: retrabalhoCards,
        retrabalhoPct: lista.length ? round1(retrabalhoCards.length / lista.length * 100) : 0,
        breakdown: breakdown,
        breakdownMed: breakdownMed
      };
    });
    return out;
  }

  // ─── SLA ALERTS ─────────────────────────────────
  function computeSLAAlerts(cards, config) {
    var sla = config.sla || DEFAULT_SLA;
    var alerts = [];
    cards.forEach(function(c) {
      if (!c.currentListName) return;
      var limit = sla[c.currentListName];
      if (limit === undefined || limit >= 999) return;
      if (c.daysInCurrent > limit) {
        alerts.push({
          id: c.id,
          name: c.name,
          list: c.currentListName,
          days: c.daysInCurrent,
          slaLimit: limit,
          excess: c.daysInCurrent - limit
        });
      }
    });
    alerts.sort(function(a,b) { return b.excess - a.excess; });
    return alerts;
  }

  // ─── RENDER ALERT BANNER ────────────────────────
  function renderAlertBanner(slaAlerts) {
    var banner = document.getElementById('alert-banner');
    if (slaAlerts.length > 0) {
      banner.className = 'alert-banner danger';
      banner.innerHTML = '🔴 ' + slaAlerts.length + ' card' + (slaAlerts.length > 1 ? 's estão' : ' está') + ' acima do SLA — ver no Detalhamento';
      banner.style.display = '';
      banner.onclick = function() { switchTab('funnel'); };
    } else {
      banner.className = 'alert-banner success';
      banner.innerHTML = '✅ Todos os cards estão dentro do SLA';
      banner.style.display = '';
      banner.onclick = null;
      banner.style.cursor = 'default';
    }
  }

  // ─── RENDER REALTIME ────────────────────────────
  function scoreTint(score) {
    if (score >= 80) return 'rgba(255,207,6,0.12)';
    if (score >= 60) return 'rgba(255,207,6,0.06)';
    if (score >= 40) return 'rgba(171,171,176,0.10)';
    return 'rgba(10,10,15,0.06)';
  }
  function scoreStatus(score) {
    if (score >= 80) return 'Produção excelente';
    if (score >= 60) return 'Produção em dia';
    if (score >= 40) return 'Atenção necessária';
    return 'Situação crítica';
  }
  // ─── SCORE, BARRA & COR CENTRALIZADOS ───────────
  // Há DUAS grandezas distintas, cada uma com sua função:
  //
  //  1) kpiBarPct  → LARGURA da barra = proporção REAL valor/meta (quão "cheia" está
  //     a barra em relação à meta). É a MESMA fórmula para todos os KPIs, sem inversão.
  //     A direção (bom/ruim) NÃO é comunicada pela largura, e sim pela COR.
  //     ex.: meta 15, valor 6 → 40% (antes usávamos o score 80%, daí a barra "cheia demais").
  //
  //  2) kpiHealth  → SCORE de saúde (0..100) que alimenta a COR (statusColor), o status
  //     e o Health Score. AQUI sim a lógica diferencia "maior melhor" de "menor melhor".

  // LARGURA: proporção direta valor/meta, clamp [0,100], protegida contra meta <= 0.
  // Funciona com valores baixos/altos, metas decimais e sem ranges fixos/hardcoded —
  // qualquer mudança de meta recalcula a barra automaticamente.
  function kpiBarPct(valor, meta) {
    valor = parseFloat(valor); meta = parseFloat(meta);
    if (isNaN(valor) || isNaN(meta) || meta <= 0) return 0; // meta 0 → barra vazia (evita ÷0)
    return Math.max(0, Math.min(100, (valor / meta) * 100));
  }

  // SCORE de saúde padronizado (0..100). Fonte única da COR e do Health Score.
  //   tipo 'A' (quanto MAIOR melhor): score = valor/meta            (meta = alvo)
  //   tipo 'B' (quanto MENOR melhor): score = 1 - valor/(2*meta)    (meta = ponto de 50%)
  // Em 'B', a meta é o limite "aceitável": valor 0 → 100, valor = meta → 50,
  // valor >= 2*meta → 0. Padroniza a curva de criticidade entre todos os KPIs.
  function kpiHealth(valor, meta, tipo) {
    valor = parseFloat(valor); meta = parseFloat(meta);
    if (isNaN(valor) || isNaN(meta) || meta <= 0) return 0;
    var score = tipo === 'A' ? (valor / meta) * 100 : (1 - valor / (2 * meta)) * 100;
    return Math.max(0, Math.min(100, score)); // clamp garante comportamento são em extremos
  }

  // Interpola linearmente entre duas cores RGB (arrays [r,g,b]).
  function lerpColor(c1, c2, f) {
    f = Math.max(0, Math.min(1, f));
    return 'rgb(' +
      Math.round(c1[0] + (c2[0] - c1[0]) * f) + ',' +
      Math.round(c1[1] + (c2[1] - c1[1]) * f) + ',' +
      Math.round(c1[2] + (c2[2] - c1[2]) * f) + ')';
  }

  // Cor de status (semáforo) derivada do score 0..100, com transição suave:
  // vermelho (crítico) → amarelo (atenção) → verde (saudável). Tons suaves/acessíveis.
  var COR_CRITICO  = [229, 72, 77];   // vermelho suave
  var COR_ATENCAO  = [242, 183, 5];   // amarelo (alinhado ao brand #FFCF06)
  var COR_SAUDAVEL = [46, 158, 91];   // verde equilibrado
  function statusColor(score) {
    score = Math.max(0, Math.min(100, score));
    return score <= 50
      ? lerpColor(COR_CRITICO, COR_ATENCAO, score / 50)
      : lerpColor(COR_ATENCAO, COR_SAUDAVEL, (score - 50) / 50);
  }

  // Tom claro da PRÓPRIA cor de status: usado como trilha dos medidores, para que
  // o estado leia na barra inteira (preenchido + não preenchido na mesma rampa).
  function statusColorSoft(score) {
    return statusColor(score).replace('rgb(', 'rgba(').replace(')', ',0.16)');
  }

  // Cores-rótulo por nível (apenas identificação visual, não é semáforo de saúde).
  var COR_NIVEL = { 'BAIXO': '#2E9E5B', 'MÉDIO': '#F2B705', 'ALTO': '#E5484D' };

  function fmtHoras(h) { return String(h).replace('.', ',') + 'h'; }
  function fmtDias(d)  { return String(d).replace('.', ',') + ' d.u.'; }
  function fmtPct(p)   { return String(round1(p)).replace('.', ',') + '%'; }

  // Modo de tendência central da seção "Tempo até 1ª entrega": 'mean' (média) | 'median' (mediana).
  // Transiente (não persiste) — apenas alterna a visualização sobre os dados JÁ carregados.
  var peMetricMode = 'mean';

  // Monta os 3 cards expandíveis (BAIXO/MÉDIO/ALTO). Usa classe .pe-toggle própria
  // (não .collapse-toggle) para não colidir com o handler genérico que reescreve textContent.
  // `mode` = 'mean' | 'median' controla a tendência central exibida (headline, barra, breakdown).
  function renderPrimeiraEntregaHTML(cards, mode) {
    mode = mode === 'median' ? 'median' : 'mean';
    var isMed = mode === 'median';
    var pe = calcPrimeiraEntrega(cards);
    // seletor por modo (mantém o pipeline intocado — só escolhe qual saída exibir)
    function central(g)   { return isMed ? g.medHoras : g.avgHoras; }
    function centralD(g)  { return isMed ? g.medDias  : g.avgDias;  }
    function stageVal(g,e) { return isMed ? g.breakdownMed[e] : g.breakdown[e]; }
    var centralLabel = isMed ? 'Tempo mediano até 1ª entrega' : 'Tempo médio até 1ª entrega';

    var h = '';
    h += '<div class="pe-section">';
    h += '<div class="pe-title-row"><div class="pe-title-left"><h3>Tempo até primeira entrega <span class="pe-hint">por nível de esforço</span></h3>';
    h += '<span class="pe-epoch">contando cards criados a partir de '+fmtDateBR(PRIMEIRA_ENTREGA_EPOCH)+'</span></div>';
    // seletor Média / Mediana (segmented control) — resistente a outliers na opção Mediana
    h += '<div class="pe-metric" role="group" aria-label="Métrica de tendência central">';
    h += '<button class="pe-metric-opt'+(isMed?'':' on')+'" data-metric="mean" aria-pressed="'+(!isMed)+'">Média</button>';
    h += '<button class="pe-metric-opt'+(isMed?' on':'')+'" data-metric="median" aria-pressed="'+isMed+'">Mediana</button>';
    h += '</div></div>';
    h += '<div class="pe-grid">';

    // Escala COMPARTILHADA para as mini-barras: maior valor central (h úteis) do modo atual.
    var maxCentral = 0;
    NIVEIS_ESFORCO.forEach(function(n){ var v = central(pe.niveis[n]); if (v > maxCentral) maxCentral = v; });

    NIVEIS_ESFORCO.forEach(function(nivel) {
      var g = pe.niveis[nivel];
      var cor = COR_NIVEL[nivel] || '#A9A9B2';
      var temDados = g.n > 0;
      h += '<div class="pe-card'+(temDados?'':' pe-nodata')+'" style="--pe-cor:'+cor+'">';
      h += '<button class="pe-toggle" data-pe="'+nivel+'"'+(temDados?'':' disabled')+'>';
      h += '<div class="pe-head"><span class="pe-chip"><span class="pe-dot"></span>'+nivel+'</span>';
      h += '<span class="pe-arrow">'+(temDados?'▼':'')+'</span></div>';
      if (temDados) {
        h += '<div class="pe-main"><span class="pe-value">'+fmtHoras(central(g))+'</span><span class="pe-unit">úteis</span></div>';
        h += '<div class="pe-days">'+fmtDias(centralD(g))+'</div>';
        var pct = maxCentral > 0 ? Math.round(central(g) / maxCentral * 100) : 0;
        h += '<div class="pe-compare"><div class="pe-compare-fill" style="width:'+pct+'%"></div></div>';
        h += '<div class="pe-sub">'+centralLabel+' · '+g.n+' card'+(g.n>1?'s':'')+'</div>';
      } else {
        h += '<div class="pe-main pe-empty">Sem dados ainda</div>';
        h += '<div class="pe-sub">Nenhum card entregue neste nível</div>';
      }
      h += '</button>';

      // corpo expandível: breakdown por etapa + tiles premium (volatilidade / amplitude / retrabalho)
      h += '<div class="pe-body" id="pe-body-'+nivel+'">';
      if (temDados) {
        h += '<table class="pe-table"><thead><tr><th>Etapa</th><th>'+(isMed?'h úteis medianas':'h úteis médias')+'</th></tr></thead><tbody>';
        ETAPAS_PRE_ENTREGA.forEach(function(etapa) {
          h += '<tr><td>'+escHtml(etapa)+'</td><td>'+fmtHoras(stageVal(g, etapa))+'</td></tr>';
        });
        h += '</tbody></table>';

        // ── stat tiles (padrão SaaS premium) ──
        h += '<div class="pe-stats-grid">';
        // Desvio padrão (dispersão)
        h += '<div class="pe-stat"><span class="pe-stat-label">Desvio padrão</span>'
          +  '<span class="pe-stat-value">'+fmtHoras(g.stdHoras)+'</span>'
          +  '<span class="pe-stat-note">'+fmtDias(g.stdDias)+'</span></div>';
        // Amplitude Mín–Máx (com marcador da tendência central na posição real)
        var span = g.maxHoras - g.minHoras;
        var markPct = span > 0 ? Math.round((central(g) - g.minHoras) / span * 100) : 50;
        markPct = Math.max(0, Math.min(100, markPct));
        h += '<div class="pe-stat pe-stat-range"><span class="pe-stat-label">Amplitude (mín–máx)</span>'
          +  '<div class="pe-range"><span class="pe-range-cap">'+fmtHoras(g.minHoras)+'</span>'
          +  '<div class="pe-range-track"><span class="pe-range-mark" style="left:'+markPct+'%" title="'+escHtml(centralLabel)+': '+fmtHoras(central(g))+'"></span></div>'
          +  '<span class="pe-range-cap">'+fmtHoras(g.maxHoras)+'</span></div></div>';
        // Reentradas em "Em andamento" (retrabalho) — clicável → abre os cards (interação estilo Análises)
        var rwClickable = g.retrabalhoCount > 0;
        h += '<button class="pe-stat pe-stat-rw'+(rwClickable?' pe-stat-click':'')+'"'
          +  (rwClickable ? ' data-pe-rw="'+nivel+'" title="Ver os cards que reentraram em Em andamento"' : ' disabled')+'>'
          +  '<span class="pe-stat-label">Reentradas em “Em andamento” <span class="pe-stat-tag">retrabalho</span></span>'
          +  '<span class="pe-stat-value">'+g.retrabalhoCount+' <span class="pe-stat-of">de '+g.n+'</span>'
          +  '<span class="pe-stat-pct">'+fmtPct(g.retrabalhoPct)+'</span></span></button>';
        h += '</div>';

        // link de detalhamento (abre o MESMO modal de cards da aba Análises Personalizadas)
        h += '<button class="pe-cards-link" data-pe-cards="'+nivel+'">Ver os '+g.n+' card'+(g.n>1?'s':'')+' deste nível →</button>';
      }
      h += '</div></div>';
    });

    h += '</div>';
    if (pe.semNivel > 0) {
      h += '<div class="pe-foot">'+pe.semNivel+' card(s) entregues sem "Nível de Esforço" definido não estão nos grupos acima.</div>';
    }
    h += '</div>';
    return h;
  }

  // Renderiza (ou re-renderiza) a seção "Tempo até 1ª entrega" no host dedicado, preservando
  // quais níveis estão expandidos, e re-conecta os handlers. Lê os dados JÁ em cache — sem
  // novas consultas ao Trello (mesma filosofia da aba Análises Personalizadas).
  function renderPESection() {
    var host = document.getElementById('pe-host');
    if (!host || !cachedData) return;
    // preserva estado de expansão entre alternâncias de métrica
    var openSet = {};
    host.querySelectorAll('.pe-body.open').forEach(function(b) {
      var id = b.id.replace('pe-body-', ''); openSet[id] = true;
    });
    var lista = (cachedData.cards || []).concat(cachedData.archived || []);
    host.innerHTML = renderPrimeiraEntregaHTML(lista, peMetricMode);
    // reabre os que estavam abertos
    Object.keys(openSet).forEach(function(nivel) {
      var body = document.getElementById('pe-body-' + nivel);
      var btn = host.querySelector('.pe-toggle[data-pe="' + nivel + '"]');
      if (body && btn) {
        body.classList.add('open'); btn.classList.add('open');
        var arrow = btn.querySelector('.pe-arrow'); if (arrow) arrow.textContent = '▲';
      }
    });
    wirePE();
  }

  // Conecta interações da seção PE: expandir/colapsar, seletor Média/Mediana e click-through
  // para o modal de detalhes de cards (CP.openCards — reutilizado, sem componente duplicado).
  function wirePE() {
    var host = document.getElementById('pe-host');
    if (!host) return;
    var pe = cachedData ? calcPrimeiraEntrega((cachedData.cards || []).concat(cachedData.archived || [])) : null;

    host.querySelectorAll('.pe-toggle').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var body = document.getElementById('pe-body-' + btn.getAttribute('data-pe'));
        if (!body) return;
        var open = body.classList.toggle('open');
        btn.classList.toggle('open', open);
        var arrow = btn.querySelector('.pe-arrow');
        if (arrow) arrow.textContent = open ? '▲' : '▼';
      });
    });

    host.querySelectorAll('.pe-metric-opt').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var m = btn.getAttribute('data-metric');
        if (m === peMetricMode) return;
        peMetricMode = m;
        renderPESection();
      });
    });

    if (pe && typeof CP !== 'undefined' && CP && typeof CP.openCards === 'function') {
      host.querySelectorAll('[data-pe-rw]').forEach(function(el) {
        el.addEventListener('click', function() {
          var nivel = el.getAttribute('data-pe-rw'); var g = pe.niveis[nivel];
          if (g && g.retrabalhoCards.length) CP.openCards('Retrabalho · ' + nivel + ' — 1ª entrega', g.retrabalhoCards, COR_NIVEL[nivel] || '#0A0A0A');
        });
      });
      host.querySelectorAll('[data-pe-cards]').forEach(function(el) {
        el.addEventListener('click', function() {
          var nivel = el.getAttribute('data-pe-cards'); var g = pe.niveis[nivel];
          if (g && g.cards.length) CP.openCards('1ª entrega · ' + nivel, g.cards, COR_NIVEL[nivel] || '#0A0A0A');
        });
      });
    }
  }

  function fmtDateBR(d) {
    d = new Date(d);
    function p(n){ return String(n).padStart(2,'0'); }
    return p(d.getDate())+'/'+p(d.getMonth()+1)+'/'+d.getFullYear();
  }

  function renderRealtime(kpis, config, cards, cachedAt, archived) {
    var circumference = 2 * Math.PI * 52;
    var ringCor = statusColor(kpis.healthScore); // anel usa o mesmo semáforo dos KPIs
    var ringTrilha = statusColorSoft(kpis.healthScore); // trilha = passo claro da mesma rampa
    var html = '';

    html += '<div class="score-circle-wrap">';
    html += '<svg class="score-ring-svg" width="120" height="120" viewBox="0 0 120 120">';
    html += '<circle cx="60" cy="60" r="52" stroke="'+ringTrilha+'" stroke-width="6" fill="none"/>';
    html += '<circle id="score-ring-progress" class="score-ring-progress" cx="60" cy="60" r="52" stroke="'+ringCor+'" stroke-width="6" fill="none" stroke-linecap="round" stroke-dasharray="'+circumference+'" stroke-dashoffset="'+circumference+'" transform="rotate(-90 60 60)"/>';
    html += '<circle cx="60" cy="60" r="46" fill="'+scoreTint(kpis.healthScore)+'"/>';
    // número hero em tinta (o anel colorido carrega o estado; texto não veste cor de dado)
    html += '<text id="score-ring-number" x="60" y="55" text-anchor="middle" dominant-baseline="middle" font-size="31" font-weight="700" font-family="BW Modelica, Inter, Helvetica Neue, sans-serif" fill="#0A0A0A">'+kpis.healthScore+'</text>';
    html += '<text x="60" y="73" text-anchor="middle" font-size="9" letter-spacing="0.6" font-family="BW Modelica, Inter, Helvetica Neue, sans-serif" fill="#75757F">HEALTH SCORE</text>';
    html += '</svg>';
    html += '<div class="score-status"><span class="score-status-dot" style="background:'+ringCor+'"></span>'+scoreStatus(kpis.healthScore)+'</div>';
    html += '</div>';

    // Definição única dos KPIs (compartilhada com a imagem exportada).
    var kpiCards = buildKpiCards(kpis, config);

    html += '<div class="kpi-grid">';
    kpiCards.forEach(function(k, i) {
      // largura = proporção real valor/meta; cor = criticidade (score de saúde).
      // Ambos calculados UMA vez e reutilizados na animação (sem recomputar por barra).
      k.pct = kpiBarPct(k.valor, k.meta);
      k.score = kpiHealth(k.valor, k.meta, k.tipo);
      var cor = statusColor(k.score);
      // clicável quando há cards subjacentes → abre o mesmo modal da aba Análises
      var subCount = (kpis[k.bucket] || []).length;
      var clickable = subCount > 0;
      html += '<div class="kpi-card'+(clickable?' kpi-clickable':'')+'"'+(clickable?' data-kpi="'+i+'" role="button" tabindex="0" title="Ver os '+subCount+' card'+(subCount>1?'s':'')+'"':'')+'>';
      html += '<div class="kpi-name">'+k.name+'</div>';
      html += '<div class="kpi-value">'+k.display+'</div>';
      html += '<div class="kpi-meta">'+k.metaLabel+'</div>';
      html += '<div class="kpi-bar-bg" style="background:'+statusColorSoft(k.score)+'"><div class="kpi-bar-fill" id="bar-kpi-'+i+'" style="width:0%;background:'+cor+';"></div></div>';
      if (clickable) html += '<span class="kpi-cardcount">'+subCount+' card'+(subCount>1?'s':'')+' →</span>';
      html += '</div>';
    });
    html += '</div>';

    // Tempo até 1ª entrega por Nível de Esforço (3 cards expandíveis).
    // Host dedicado: a seção é renderizada por renderPESection() para permitir alternar
    // Média/Mediana sem recarregar dados. Inclui os arquivados elegíveis (só este indicador os vê).
    html += '<div id="pe-host"></div>';

    // Non-conforming cards
    var nonConforming = cards.filter(function(c) { return !c.isConforme && !c.isConcluido; });
    if (nonConforming.length > 0) {
      var expanded = nonConforming.length > 3;
      html += '<div class="collapsible">';
      html += '<button class="collapse-toggle'+(expanded?' open':'')+'" data-collapse="nc">Cards com campos incompletos ('+nonConforming.length+') '+(expanded?'▲':'▼')+'</button>';
      html += '<div class="collapse-body'+(expanded?' open':'')+'" id="nc-body">';
      html += '<table><thead><tr><th>Card</th><th>Campos faltantes</th></tr></thead><tbody>';
      nonConforming.forEach(function(c) {
        html += '<tr><td><span class="card-link" data-card-id="'+escHtml(c.id)+'">'+escHtml(c.name)+'</span></td><td>';
        c.missing.forEach(function(m) { html += '<span class="missing-tag">⚠️ '+escHtml(m)+'</span>'; });
        html += '</td></tr>';
      });
      html += '</tbody></table></div></div>';
    }

    // Member distribution
    html += '<div class="footer-bar">';
    html += '<button class="btn btn-secondary" id="btn-refresh">Atualizar dados</button>';
    html += '<button class="btn" id="btn-export">Exportar relatório</button>';
    if (cachedAt) {
      html += '<span class="cache-indicator">dados de ' + cacheAge(cachedAt) + ' · <a id="btn-refresh-cache">Atualizar</a></span>';
    } else {
      html += '<span class="info">'+kpis.totalCards+' cards analisados · atualizado agora</span>';
    }
    html += '</div>';

    var el = document.getElementById('rt-content');
    el.innerHTML = html;
    el.style.display = '';
    el.classList.add('fade-in');
    document.getElementById('rt-loading').style.display = 'none';
    document.getElementById('rt-error').style.display = 'none';

    // Renderiza a seção "Tempo até 1ª entrega" no host e conecta suas interações.
    renderPESection();

    setTimeout(function() {
      var progressArc = document.getElementById('score-ring-progress');
      if (progressArc) {
        var offset = circumference - (kpis.healthScore / 100) * circumference;
        progressArc.style.strokeDashoffset = offset;
      }
    }, 100);

    // Anima a largura (proporção real) usando os valores já calculados — sem recomputar.
    setTimeout(function() {
      kpiCards.forEach(function(k, i) {
        var bar = document.getElementById('bar-kpi-'+i);
        if (bar) { bar.style.width = k.pct + '%'; bar.style.background = statusColor(k.score); }
      });
    }, 120);

    // Click-through dos KPI cards → abre os cards subjacentes no MESMO modal da aba
    // Análises Personalizadas (CP.openCards). Reutiliza componente, sem duplicar.
    if (typeof CP !== 'undefined' && CP && typeof CP.openCards === 'function') {
      document.querySelectorAll('.kpi-clickable').forEach(function(cardEl) {
        var k = kpiCards[+cardEl.getAttribute('data-kpi')];
        function open() {
          var sub = kpis[k.bucket] || [];
          if (sub.length) CP.openCards(k.bucketTitle, sub, '#0A0A0A');
        }
        cardEl.addEventListener('click', open);
        cardEl.addEventListener('keydown', function(e) {
          if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); open(); }
        });
      });
    }

    // cliques em .card-link são tratados pela delegação global (registrada 1x)
    document.getElementById('btn-refresh').addEventListener('click', function() { loadRealtime(true); });
    var btnCache = document.getElementById('btn-refresh-cache');
    if (btnCache) btnCache.addEventListener('click', function() { loadRealtime(true); });
    document.getElementById('btn-export').addEventListener('click', function() {
      t.alert({message: 'Use o botão "Exportar Lead Time" no board para gerar o relatório XLSX.', display: 'info', duration: 5});
    });

    // Collapse toggles
    document.querySelectorAll('.collapse-toggle').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var bodyId = btn.getAttribute('data-collapse') + '-body';
        var body = document.getElementById(bodyId);
        if (body) {
          btn.classList.toggle('open');
          body.classList.toggle('open');
          if (btn.classList.contains('open')) {
            btn.textContent = btn.textContent.replace('▼', '▲');
          } else {
            btn.textContent = btn.textContent.replace('▲', '▼');
          }
        }
      });
    });

    // Interações da seção "Tempo até 1ª entrega" (expandir, métrica, click-through) são
    // conectadas por wirePE(), chamado dentro de renderPESection() acima.
  }

  // ─── RENDER FUNNEL ──────────────────────────────
  function renderFunnel() {
    var el = document.getElementById('funnel-content');
    if (!cachedData) {
      el.innerHTML = '<div class="no-data"><p>Carregue os dados na aba "Tempo real" primeiro.</p></div>';
      return;
    }
    var cards = cachedData.cards, config = cachedData.config, throughput = cachedData.throughput;
    var sla = config.sla || DEFAULT_SLA;
    var slaAlerts = computeSLAAlerts(cards, config);

    var perList = {};
    var aboveSLACards = []; // subconjunto p/ click-through do quadro "Cards acima do SLA"
    FLOW_LISTS.forEach(function(n) { perList[n] = { cards: [], aboveSLA: 0 }; });
    cards.forEach(function(c) {
      if (perList[c.currentListName]) {
        perList[c.currentListName].cards.push(c);
        var limit = sla[c.currentListName];
        if (limit !== undefined && limit < 999 && c.daysInCurrent > limit) {
          perList[c.currentListName].aboveSLA++;
          aboveSLACards.push(c);
        }
      }
    });

    var maxCards = 1;
    var totalInProgress = 0;
    var bottleneckName = '', bottleneckCount = 0;
    var totalAboveSLA = 0;
    var cardsInProgress = []; // subconjunto p/ click-through do quadro "Cards em andamento"
    FLOW_LISTS.forEach(function(n) {
      var cnt = perList[n].cards.length;
      if (cnt > maxCards) maxCards = cnt;
      if (n !== 'Concluído 🏆') {
        totalInProgress += cnt;
        cardsInProgress = cardsInProgress.concat(perList[n].cards);
        if (cnt > bottleneckCount) { bottleneckCount = cnt; bottleneckName = n; }
      }
      totalAboveSLA += perList[n].aboveSLA;
    });

    var html = '';
    // quadros-resumo clicáveis → abrem os cards subjacentes no mesmo modal (CP.openCards)
    function scCard(count, label, bucket, color) {
      var clickable = count > 0;
      return '<div class="summary-card'+(clickable?' sc-clickable':'')+'"'+(clickable?' data-sc="'+bucket+'" role="button" tabindex="0" title="Ver os cards"':'')+'>'
        + '<div class="sc-value"'+(color?' style="color:'+color+'"':'')+'>'+count+'</div>'
        + '<div class="sc-label">'+label+'</div>'
        + (clickable?'<span class="sc-cardcount">ver cards →</span>':'') + '</div>';
    }
    html += '<div class="summary-cards">';
    html += scCard(totalInProgress, 'Cards em andamento', 'inprogress', null);
    html += scCard(bottleneckCount, escHtml(bottleneckName), 'bottleneck', null);
    html += scCard(totalAboveSLA, 'Cards acima do SLA', 'abovesla', totalAboveSLA>0?'#B3272F':'#1E7A46');
    html += '</div>';

    html += '<div class="table-header-row">';
    html += '<h3>Etapas de produção</h3>';
    html += '<button class="btn-table-download" id="btn-dl-funnel">⬇ Exportar tabela</button>';
    html += '</div>';
    html += '<div class="table-scroll"><table class="funnel-table"><thead><tr>';
    html += '<th>Etapa</th><th>Cards agora</th><th>Acima do SLA</th><th>SLA</th><th>Saídas no mês</th><th>Status</th>';
    html += '</tr></thead><tbody>';

    FLOW_LISTS.forEach(function(n) {
      var p = perList[n];
      var cnt = p.cards.length;
      var abv = p.aboveSLA;
      var limit = sla[n];
      var tp = throughput[n] || 0;
      var isConcluido = n === 'Concluído 🏆';

      var status, statusClass;
      if (isConcluido) {
        status = '✅ Concluído'; statusClass = 'status-ok';
      } else if (cnt >= 3 && abv >= 1) {
        status = '🔴 Gargalo'; statusClass = 'status-danger';
      } else if (abv >= 1) {
        status = '⚠️ Atenção'; statusClass = 'status-warn';
      } else {
        status = '✅ Fluindo'; statusClass = 'status-ok';
      }

      var barW = maxCards > 0 ? Math.round(cnt / maxCards * 100) : 0;
      html += '<tr'+(isConcluido ? ' class="concluded"' : '')+'>';
      html += '<td>'+escHtml(n)+'</td>';
      html += '<td><div style="display:flex;align-items:center;gap:8px;"><span class="etapa-count-btn" data-etapa="'+escHtml(n)+'">'+cnt+'</span><div class="funnel-bar" style="width:'+barW+'%;"></div></div></td>';
      html += '<td style="color:'+(abv>0?'#B3272F':'#1E7A46')+';font-weight:600;">'+abv+'</td>';
      html += '<td>'+(limit >= 999 ? '—' : limit+'d úteis')+'</td>';
      html += '<td>'+tp+'</td>';
      html += '<td><span class="'+statusClass+'">'+status+'</span></td>';
      html += '</tr>';
    });
    html += '</tbody></table></div>';

    html += '<div class="detail-flex">';

    html += '<div class="alerts-section">';
    html += '<div class="table-header-row">';
    html += '<h3>Alertas ativos ('+slaAlerts.length+')</h3>';
    html += '<button class="btn-table-download" id="btn-dl-alerts">⬇ Exportar</button>';
    html += '</div>';
    html += '<div id="alerts-page-wrap"></div>';
    html += '</div>';

    // ─── REWORK RANKING ──────────────────────────────
    var reworkCards = cards.filter(function(c) { return c.retrabalho > 0; });
    reworkCards.sort(function(a, b) { return b.retrabalho - a.retrabalho; });

    var allLabels = {};
    cards.forEach(function(c) {
      (c.labels || []).forEach(function(l) { allLabels[l] = true; });
    });
    var labelList = Object.keys(allLabels).sort();

    html += '<div class="rework-section">';
    html += '<div class="table-header-row">';
    html += '<h3>🔄 Cards com mais retrabalho</h3>';
    html += '<button class="btn-table-download" id="btn-dl-rework">⬇ Exportar</button>';
    html += '</div>';
    html += '<div class="rework-filters">';
    html += '<div class="filter-group"><label>Etapa</label><select id="rw-filter-stage"><option value="">Todas</option>';
    FLOW_LISTS.forEach(function(n) {
      html += '<option value="'+escHtml(n)+'">'+escHtml(n)+'</option>';
    });
    html += '</select></div>';
    html += '<div class="filter-group"><label>Label</label><select id="rw-filter-label"><option value="">Todas</option>';
    labelList.forEach(function(l) {
      html += '<option value="'+escHtml(l)+'">'+escHtml(l)+'</option>';
    });
    html += '</select></div>';
    html += '<div class="filter-group"><label>Retrabalho mínimo</label><input type="number" id="rw-filter-min" value="0" min="0" step="1" style="width:70px;"></div>';
    html += '</div>';
    html += '<div id="rework-table-wrap"></div>';
    html += '</div>';

    html += '</div>'; // close detail-flex

    el.innerHTML = html;
    // cliques em .card-link e .etapa-count-btn são tratados pela delegação global

    // Click-through dos quadros-resumo → mesmo modal de cards da aba Análises (CP.openCards).
    if (typeof CP !== 'undefined' && CP && typeof CP.openCards === 'function') {
      var scBuckets = {
        inprogress: { title: 'Cards em andamento', cards: cardsInProgress },
        bottleneck: { title: 'Gargalo · ' + bottleneckName, cards: (perList[bottleneckName] ? perList[bottleneckName].cards : []) },
        abovesla:   { title: 'Cards acima do SLA', cards: aboveSLACards }
      };
      el.querySelectorAll('.sc-clickable').forEach(function(scEl) {
        var b = scBuckets[scEl.getAttribute('data-sc')];
        function open() { if (b && b.cards.length) CP.openCards(b.title, b.cards, '#0A0A0A'); }
        scEl.addEventListener('click', open);
        scEl.addEventListener('keydown', function(e) {
          if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); open(); }
        });
      });
    }

    document.getElementById('btn-dl-funnel').addEventListener('click', function() {
      var rows = [['Etapa','Cards agora','Acima do SLA','SLA','Saídas no mês','Status']];
      FLOW_LISTS.forEach(function(n) {
        var p = perList[n];
        var limit = sla[n];
        rows.push([
          n, p.cards.length, p.aboveSLA,
          limit >= 999 ? '—' : limit + ' d.u.',
          throughput[n] || 0,
          p.cards.length >= 3 && p.aboveSLA >= 1 ? 'Gargalo' :
          p.aboveSLA >= 1 ? 'Atenção' : 'Fluindo'
        ]);
      });
      downloadCSV('funil_midiatica.csv', rows);
    });

    document.getElementById('btn-dl-alerts').addEventListener('click', function() {
      var rows = [['Card','Etapa','Dias úteis','SLA','Excesso']];
      slaAlerts.forEach(function(a) {
        rows.push([a.name, a.list, a.days, a.slaLimit, '+' + a.excess + 'd']);
      });
      downloadCSV('alertas_sla_midiatica.csv', rows);
    });

    document.getElementById('btn-dl-rework').addEventListener('click', function() {
      var rows = [['#','Card','Etapa','Retrabalhos','Labels']];
      reworkCards.forEach(function(c, i) {
        rows.push([i+1, c.name, c.currentListName, c.retrabalho, (c.labels||[]).join(' | ')]);
      });
      downloadCSV('retrabalho_midiatica.csv', rows);
    });

    var ITEMS_PER_PAGE = 10;
    var alertPage = 0;

    function renderAlertsPaginated() {
      var wrap = document.getElementById('alerts-page-wrap');
      if (slaAlerts.length === 0) {
        wrap.innerHTML = '<p style="color:#75757F;font-size:13px;">Nenhum alerta ativo.</p>';
        return;
      }
      var totalPages = Math.ceil(slaAlerts.length / ITEMS_PER_PAGE);
      if (alertPage >= totalPages) alertPage = totalPages - 1;
      var start = alertPage * ITEMS_PER_PAGE;
      var pageItems = slaAlerts.slice(start, start + ITEMS_PER_PAGE);

      var h = '';
      pageItems.forEach(function(a) {
        h += '<div class="alert-row">';
        h += '<span class="ar-name"><span class="card-link" data-card-id="'+escHtml(a.id)+'">'+escHtml(a.name)+'</span></span>';
        h += '<span class="ar-stage">'+escHtml(a.list)+'</span>';
        h += '<span class="ar-days">'+a.days+' d.u.</span>';
        h += '<span class="ar-excess">+'+a.excess+' dias acima do limite</span>';
        h += '</div>';
      });
      if (totalPages > 1) {
        h += '<div class="pag-controls">';
        h += '<button class="pag-btn" id="alert-prev"'+(alertPage===0?' disabled':'')+'>← Anterior</button>';
        h += '<span class="pag-info">'+(alertPage+1)+' / '+totalPages+'</span>';
        h += '<button class="pag-btn" id="alert-next"'+(alertPage>=totalPages-1?' disabled':'')+'>Próximo →</button>';
        h += '</div>';
      }
      wrap.innerHTML = h;
      var prev = document.getElementById('alert-prev');
      var next = document.getElementById('alert-next');
      if (prev) prev.addEventListener('click', function() { alertPage--; renderAlertsPaginated(); });
      if (next) next.addEventListener('click', function() { alertPage++; renderAlertsPaginated(); });
    }
    renderAlertsPaginated();

    var reworkPage = 0;

    function renderReworkTable() {
      var stageF = document.getElementById('rw-filter-stage').value;
      var labelF = document.getElementById('rw-filter-label').value;
      var minF = parseFloat(document.getElementById('rw-filter-min').value) || 0;

      var filtered = reworkCards.filter(function(c) {
        if (stageF && c.currentListName !== stageF) return false;
        if (labelF && (c.labels || []).indexOf(labelF) === -1) return false;
        if (c.retrabalho < minF) return false;
        return true;
      });

      var wrap = document.getElementById('rework-table-wrap');
      if (filtered.length === 0) {
        wrap.innerHTML = '<p class="rework-empty">Nenhum card com retrabalho encontrado para os filtros selecionados.</p>';
        return;
      }

      var totalPages = Math.ceil(filtered.length / ITEMS_PER_PAGE);
      if (reworkPage >= totalPages) reworkPage = totalPages - 1;
      var start = reworkPage * ITEMS_PER_PAGE;
      var pageItems = filtered.slice(start, start + ITEMS_PER_PAGE);

      var h = '<div class="table-scroll"><table class="rework-table"><thead><tr>';
      h += '<th>#</th><th>Card</th><th>Retrabalho</th><th>Etapa atual</th><th>Labels</th>';
      h += '</tr></thead><tbody>';
      for (var ri = 0; ri < pageItems.length; ri++) {
        var rc = pageItems[ri];
        var globalIdx = start + ri;
        var rwClass = rc.retrabalho >= 3 ? 'high' : rc.retrabalho >= 2 ? 'med' : 'low';
        h += '<tr>';
        h += '<td class="rework-rank">'+(globalIdx+1)+'</td>';
        h += '<td><span class="card-link" data-card-id="'+escHtml(rc.id)+'">'+escHtml(rc.name)+'</span></td>';
        h += '<td class="rework-val '+rwClass+'">'+rc.retrabalho+'</td>';
        h += '<td>'+escHtml(rc.currentListName)+'</td>';
        h += '<td>';
        (rc.labels || []).forEach(function(l) { h += '<span class="label-tag">'+escHtml(l)+'</span>'; });
        h += '</td></tr>';
      }
      var totalRwFiltered = 0;
      for (var ti = 0; ti < filtered.length; ti++) { totalRwFiltered += filtered[ti].retrabalho; }
      h += '<tr style="background:#FAFAFB;border-top:1px solid #DBDBE1;">';
      h += '<td colspan="2" style="font-weight:700;">Total</td>';
      h += '<td style="font-weight:700;font-variant-numeric:tabular-nums;">'+totalRwFiltered+'</td>';
      h += '<td colspan="2" style="color:#75757F;font-size:12px;">'+filtered.length+' cards</td>';
      h += '</tr>';
      h += '</tbody></table></div>';
      if (totalPages > 1) {
        h += '<div class="pag-controls">';
        h += '<button class="pag-btn" id="rw-prev"'+(reworkPage===0?' disabled':'')+'>← Anterior</button>';
        h += '<span class="pag-info">'+(reworkPage+1)+' / '+totalPages+'</span>';
        h += '<button class="pag-btn" id="rw-next"'+(reworkPage>=totalPages-1?' disabled':'')+'>Próximo →</button>';
        h += '</div>';
      }
      wrap.innerHTML = h;
      var prev = document.getElementById('rw-prev');
      var next = document.getElementById('rw-next');
      if (prev) prev.addEventListener('click', function() { reworkPage--; renderReworkTable(); });
      if (next) next.addEventListener('click', function() { reworkPage++; renderReworkTable(); });
    }

    renderReworkTable();
    document.getElementById('rw-filter-stage').addEventListener('change', function() { reworkPage = 0; renderReworkTable(); });
    document.getElementById('rw-filter-label').addEventListener('change', function() { reworkPage = 0; renderReworkTable(); });
    document.getElementById('rw-filter-min').addEventListener('input', function() { reworkPage = 0; renderReworkTable(); });
  }

  // ─── SNAPSHOT ───────────────────────────────────
  function saveSnapshotIfNeeded(kpis, config) {
    var now = new Date();
    var key = 'snapshot_'+now.getFullYear()+'_'+String(now.getMonth()+1).padStart(2,'0');
    t.get('board', 'shared', key).then(function(existing) {
      if (!existing) {
        var snap = {
          score: kpis.healthScore,
          kpi1: kpis.kpi1, kpi2: kpis.kpi2, kpi3: kpis.kpi3, kpi4: kpis.kpi4, kpi5: kpis.kpi5, kpi6: kpis.kpi6,
          meta_prazo: config.meta_prazo, meta_rework: config.meta_rework,
          meta_leadtime: config.meta_leadtime, meta_leadtime_real: config.meta_leadtime_real,
          meta_through: config.meta_through,
          meta_conformidade: config.meta_conformidade,
          totalCards: kpis.totalCards,
          savedAt: now.toISOString()
        };
        return t.set('board', 'shared', key, snap);
      }
    }).catch(function(err) {
      console.warn('[SNAPSHOT] Falha ao salvar snapshot mensal:', err && err.message ? err.message : String(err));
    });
  }

  function forceSnapshot(kpis, config) {
    var now = new Date();
    var key = 'snapshot_'+now.getFullYear()+'_'+String(now.getMonth()+1).padStart(2,'0');
    var snap = {
      score: kpis.healthScore,
      kpi1: kpis.kpi1, kpi2: kpis.kpi2, kpi3: kpis.kpi3, kpi4: kpis.kpi4, kpi5: kpis.kpi5, kpi6: kpis.kpi6,
      meta_prazo: config.meta_prazo, meta_rework: config.meta_rework,
      meta_leadtime: config.meta_leadtime, meta_leadtime_real: config.meta_leadtime_real,
      meta_through: config.meta_through,
      meta_conformidade: config.meta_conformidade,
      totalCards: kpis.totalCards,
      savedAt: now.toISOString()
    };
    return t.set('board', 'shared', key, snap);
  }

  // ─── SNAPSHOT SEMANAL ───────────────────────────
  // Os 5 KPIs "fotografia do momento" (vencidos, retrabalho, aging, conformidade,
  // health) não são reconstruíveis no passado — por isso passamos a REGISTRÁ-LOS por
  // semana daqui pra frente. Guardados num ÚNICO objeto (não uma chave por semana),
  // podado às últimas WEEKLY_KEEP semanas: evita explodir o storage do Power-Up e
  // mantém a leitura barata (o t.get('board','shared') do Histórico já traz tudo).
  var WEEKLY_KEY = 'weeklySnaps';
  var WEEKLY_KEEP = 26;

  // Semana ISO (segunda a domingo) — a mesma convenção de semana usada nos gráficos.
  function isoWeekOf(d) {
    var dt = new Date(d.getFullYear(), d.getMonth(), d.getDate());
    var dow = (dt.getDay() + 6) % 7;          // 0 = segunda
    dt.setDate(dt.getDate() - dow + 3);       // quinta-feira da semana ISO
    var firstThu = new Date(dt.getFullYear(), 0, 4);
    var fdow = (firstThu.getDay() + 6) % 7;
    firstThu.setDate(firstThu.getDate() - fdow + 3);
    return { year: dt.getFullYear(), week: 1 + Math.round((dt - firstThu) / 604800000) };
  }
  function weekKeyOf(d) {
    var w = isoWeekOf(d);
    return w.year + '_W' + String(w.week).padStart(2, '0');
  }
  // Segunda-feira da semana de `d` (mesma regra do gráfico de evolução das Análises).
  function weekStartOf(d) {
    var x = new Date(d); x.setHours(0, 0, 0, 0);
    x.setDate(x.getDate() - ((x.getDay() + 6) % 7));
    return x;
  }
  function weekLabel(d) { return fmtDateBR(d).slice(0, 5); }   // dd/mm

  function weeklySnapPayload(kpis, now) {
    return {
      score: kpis.healthScore,
      kpi1: kpis.kpi1, kpi2: kpis.kpi2, kpi3: kpis.kpi3,
      kpi4: kpis.kpi4, kpi5: kpis.kpi5, kpi6: kpis.kpi6,
      totalCards: kpis.totalCards,
      savedAt: now.toISOString()
    };
  }
  function pruneWeekly(map) {
    var keys = Object.keys(map).sort();                  // "YYYY_Www" ordena cronologicamente
    while (keys.length > WEEKLY_KEEP) { delete map[keys.shift()]; }
    return map;
  }
  // Grava a semana corrente se ainda não existir (idempotente). `force` sobrescreve.
  function saveWeeklySnapshot(kpis, force) {
    var now = new Date();
    var wk = weekKeyOf(now);
    return t.get('board', 'shared', WEEKLY_KEY).then(function(map) {
      map = (map && typeof map === 'object') ? map : {};
      if (!force && map[wk]) return;                     // semana já registrada
      map[wk] = weeklySnapPayload(kpis, now);
      return t.set('board', 'shared', WEEKLY_KEY, pruneWeekly(map));
    }).catch(function(err) {
      console.warn('[SNAPSHOT] Falha ao salvar snapshot semanal:', err && err.message ? err.message : String(err));
    });
  }

  // ─── LOAD REALTIME ──────────────────────────────
  function loadRealtime(forceRefresh) {
    document.getElementById('rt-content').style.display = 'none';
    document.getElementById('rt-error').style.display = 'none';
    renderedTabs = {};

    var token = TRELLO_TOKEN, boardId, config;
    t.board('id')
      .then(function(board) { boardId = board.id; return t.get('board', 'shared', 'healthConfig'); })
      .then(function(cfg) {
        config = mergeConfig(cfg);

        if (!forceRefresh) {
          var cache = readCache(boardId);
          if (cache && cache.cards) {
            cachedData = { cards: cache.cards, config: config, throughput: cache.throughput, archived: cache.archived || [] };
            var kpis = calcKPIs(cache.cards, config);
            var slaAlerts = computeSLAAlerts(cache.cards, config);
            renderRealtime(kpis, config, cache.cards, cache.cachedAt, cache.archived || []);
            renderAlertBanner(slaAlerts);
            document.getElementById('rt-loading').style.display = 'none';
            return;
          }
        }

        showSkeleton('Buscando cards do board…');
        return fetchData(token, boardId).then(function(data) {
          cachedData = { cards: data.cards, config: config, throughput: data.throughput, archived: data.archived || [] };
          writeCache(boardId, { cards: data.cards, throughput: data.throughput, archived: data.archived || [] });
          var kpis = calcKPIs(data.cards, config);
          var slaAlerts = computeSLAAlerts(data.cards, config);
          renderRealtime(kpis, config, data.cards, null, data.archived || []);
          renderAlertBanner(slaAlerts);
          saveSnapshotIfNeeded(kpis, config);
          saveWeeklySnapshot(kpis, false);   // registra a semana corrente (1x por semana)
        });
      })
      .catch(function(err) {
        document.getElementById('rt-loading').style.display = 'none';
        var errEl = document.getElementById('rt-error');
        errEl.style.display = '';
        errEl.querySelector('p').textContent = 'Erro ao carregar dados: '+(err.message||String(err));
      });
  }

  document.getElementById('rt-retry').addEventListener('click', function() { loadRealtime(); });

  // ─── HISTORY: CARDS DE TENDÊNCIA ────────────────
  // Derivado 100% dos snapshots JÁ lidos por loadHistory (t.get 'board','shared') —
  // nenhuma consulta nova ao Trello, nenhum KPI recalculado: apenas lê os agregados
  // já persistidos e faz a diferença vs. o snapshot anterior.
  // `tipo` segue a MESMA convenção de buildKpiCards/kpiHealth:
  //   'A' = quanto maior melhor · 'B' = quanto menor melhor.
  var HIST_METRICS = [
    { key: 'score', name: 'Health Score',      tipo: 'A', unit: '',       du: ''     },
    { key: 'kpi1',  name: 'Cards vencidos',    tipo: 'B', unit: '%',      du: ' pp'  },
    { key: 'kpi2',  name: 'Retrabalhos',       tipo: 'B', unit: '',       du: ''     },
    { key: 'kpi6',  name: 'Tempo de entrega',  tipo: 'B', unit: ' d.u.',  du: ' d.u.'},
    { key: 'kpi3',  name: 'Tempo na etapa',    tipo: 'B', unit: ' d.u.',  du: ' d.u.'},
    { key: 'kpi4',  name: 'Vazão mensal',      tipo: 'A', unit: '',       du: ''     },
    { key: 'kpi5',  name: 'Conformidade',      tipo: 'A', unit: '%',      du: ' pp'  }
  ];
  var HIST_COR = { good: '#1E7A46', bad: '#B3272F', neutral: '#75757F' };

  function histNum(v) { return String(round1(v)).replace('.', ','); }
  function histHas(v) { return v !== undefined && v !== null && !isNaN(v); }

  // Sparkline (linha + área) — SVG inline, sem eixos nem libs. Estica na horizontal
  // (preserveAspectRatio="none") e mantém a espessura do traço via vector-effect.
  function histSpark(values, cor) {
    if (!values || values.length < 2) return '';
    var W = 120, H = 26, pad = 2;
    var min = Math.min.apply(null, values), max = Math.max.apply(null, values);
    var span = max - min;
    var n = values.length;
    function px(i) { return pad + (i / (n - 1)) * (W - pad * 2); }
    function py(v) { return span > 0 ? (H - pad) - ((v - min) / span) * (H - pad * 2) : H / 2; }
    var d = '';
    values.forEach(function(v, i) { d += (i ? 'L' : 'M') + px(i).toFixed(1) + ' ' + py(v).toFixed(1) + ' '; });
    var area = 'M' + px(0).toFixed(1) + ' ' + H + ' ' + d.replace('M', 'L') + 'L' + px(n - 1).toFixed(1) + ' ' + H + ' Z';
    return '<svg class="hist-spark" viewBox="0 0 ' + W + ' ' + H + '" preserveAspectRatio="none" aria-hidden="true" focusable="false">' +
      '<path d="' + area + '" fill="' + cor + '" opacity="0.10"/>' +
      '<path d="' + d + '" fill="none" stroke="' + cor + '" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" vector-effect="non-scaling-stroke"/>' +
      '</svg>';
  }

  // ── SÉRIES SEMANAIS E DIÁRIAS ────────────────────
  // Dois regimes, por natureza do indicador:
  //  • DERIVADO (retroativo): kpi4/Vazão e kpi6/Tempo de entrega saem dos próprios cards
  //    (concludedAt + leadTimeReal) — timestamp fixo no passado, então dá pra reconstruir
  //    série semanal OU diária para qualquer período já coberto pelos cards em cache.
  //  • REGISTRADO: os demais são "fotografia do momento" (estado do board AGORA) e só
  //    existem daqui pra frente — vêm dos snapshots semanais (weeklySnaps) ou mensais
  //    (histSnapshots), sem versão diária possível.
  var HIST_DERIVAVEL = { kpi4: true, kpi6: true };

  // Vazão e Tempo de entrega por semana, dentro de [start, end] — a partir dos
  // cards já em cache (filter=all cobre abertos + arquivados). Sem consulta nova.
  function histWeeklyDerived(metricKey, cards, start, end) {
    var done = (cards || []).filter(function(c) { return c.concludedAt; });
    var byWeek = {};
    done.forEach(function(c) {
      var k = weekStartOf(new Date(c.concludedAt)).getTime();
      (byWeek[k] = byWeek[k] || []).push(c);
    });
    var startWeek = weekStartOf(start).getTime(), endWeek = weekStartOf(end).getTime(), WEEK = 604800000;
    var pts = [];
    for (var k = startWeek; k <= endWeek; k += WEEK) {
      var cs = byWeek[k] || [];
      var label = weekLabel(new Date(k));
      if (metricKey === 'kpi4') {
        pts.push({ label: label, value: cs.length, n: cs.length });
      } else { // kpi6 — média do lead time real das conclusões da semana
        var lts = cs.map(function(c) { return c.leadTimeReal; }).filter(function(v) { return v !== null && v !== undefined; });
        if (!lts.length) continue;               // semana sem entrega: não plota "0 d.u." (seria mentira)
        pts.push({ label: label, value: mean(lts), n: lts.length });
      }
    }
    return pts;
  }

  // Vazão e Tempo de entrega por DIA, dentro de [start, end] — mesmo princípio
  // do semanal, só que agrupando por dia em vez de semana ISO. Antes, o toggle
  // "Mensal" plotava 1 ponto por SNAPSHOT mensal já registrado (não por dia);
  // com poucos meses de histórico isso desenhava quase nenhum ponto. Só se
  // aplica aos indicadores DERIVÁVEIS pelo mesmo motivo do semanal.
  function histDailyDerived(metricKey, cards, start, end) {
    var done = (cards || []).filter(function(c) { return c.concludedAt; });
    var byDay = {};
    done.forEach(function(c) {
      var d = new Date(c.concludedAt); d.setHours(0, 0, 0, 0);
      (byDay[d.getTime()] = byDay[d.getTime()] || []).push(c);
    });
    var DAY = 86400000;
    var s = new Date(start.getFullYear(), start.getMonth(), start.getDate()).getTime();
    var e = new Date(end.getFullYear(), end.getMonth(), end.getDate()).getTime();
    var pts = [];
    for (var k = s; k <= e; k += DAY) {
      var cs = byDay[k] || [];
      var label = fmtDateBR(new Date(k)).slice(0, 5); // dd/mm
      if (metricKey === 'kpi4') {
        pts.push({ label: label, value: cs.length, n: cs.length });
      } else {
        var lts = cs.map(function(c) { return c.leadTimeReal; }).filter(function(v) { return v !== null && v !== undefined; });
        if (!lts.length) continue;               // dia sem entrega: não plota "0 d.u." (seria mentira)
        pts.push({ label: label, value: mean(lts), n: lts.length });
      }
    }
    return pts;
  }

  // Série semanal registrada (weeklySnaps) → pontos cronológicos dentro de [start, end].
  function histWeeklyRecorded(metricKey, weeklyMap, start, end) {
    var keys = Object.keys(weeklyMap || {}).sort().filter(function(k) {
      var monday = isoWeekKeyToMonday(k);
      return monday >= start && monday <= end;
    });
    var pts = [];
    keys.forEach(function(k) {
      var v = weeklyMap[k][metricKey];
      if (!histHas(v)) return;
      var wk = k.split('_W');
      pts.push({ label: 'S' + wk[1], value: v, n: 1 });
    });
    return pts;
  }

  // Inverso de weekKeyOf: reconstrói a segunda-feira da semana ISO representada
  // pela chave "YYYY_Www" (mesma convenção usada para gravar weeklySnaps).
  function isoWeekKeyToMonday(key) {
    var parts = key.split('_W');
    var year = parseInt(parts[0], 10), week = parseInt(parts[1], 10);
    var jan4 = new Date(year, 0, 4);
    var jan4Dow = (jan4.getDay() + 6) % 7;
    var week1Monday = new Date(year, 0, 4 - jan4Dow);
    return new Date(week1Monday.getFullYear(), week1Monday.getMonth(), week1Monday.getDate() + (week - 1) * 7);
  }

  function histEarliestWeeklyMonday(weeklyMap) {
    var keys = Object.keys(weeklyMap || {}).sort(); // "YYYY_Www" ordena cronologicamente
    return keys.length ? isoWeekKeyToMonday(keys[0]) : null;
  }

  function histMonthlyPoints(metricKey, snapshots, monthNames) {
    return snapshots.slice().reverse()                     // cronológico
      .map(function(s) { return { label: monthNames[s.month] + '/' + String(s.year).slice(2), value: s.data[metricKey] }; })
      .filter(function(p) { return histHas(p.value); });
  }

  // ── estado da comparação (transiente; nada persistido) ──
  var histSnapshots = [];       // ordenados do mais recente p/ o mais antigo
  var histWeekly = {};          // mapa weeklySnaps
  var histMonthNames = [];
  var histBaseIdx = 0;          // índice em histSnapshots do mês "atual" da comparação
  var histRefIdx = 1;           // índice do mês de referência (base de comparação)

  function histMetricByKey(k) {
    for (var i = 0; i < HIST_METRICS.length; i++) if (HIST_METRICS[i].key === k) return HIST_METRICS[i];
    return null;
  }
  function histMonthLabel(s) { return histMonthNames[s.month] + '/' + s.year; }

  // ─── HIST: SELETOR DE PERÍODO (dd/mm/aaaa + calendário) ─────────────
  // Cada snapshot é mensal, então "escolher um período" aqui significa escolher
  // 2 meses já registrados para comparar — o texto/calendário só é uma forma
  // mais direta de apontar esses 2 meses. "Fim" vira o mês base (o que está
  // sendo avaliado agora, 1º dropdown de antes) e "Início" vira o mês de
  // referência (2º dropdown) — reaproveita 100% do motor de tendência já
  // existente (histTileState, sparkline, drill-down), sem lógica de cálculo nova.
  var HISTDATE_WEEKDAYS = ['D','S','T','Q','Q','S','S'];
  var histCalViewDate = new Date();
  var histCalPendingStart = null;  // seleção em andamento no popover, antes de "Aplicar"
  var histCalPendingEnd = null;

  function formatBRDate(date) {
    if (!date) return '';
    return String(date.getDate()).padStart(2,'0')+'/'+String(date.getMonth()+1).padStart(2,'0')+'/'+date.getFullYear();
  }

  function parseBRDate(str) {
    if (typeof str !== 'string') return null;
    var m = str.trim().match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
    if (!m) return null;
    var day = parseInt(m[1], 10), month = parseInt(m[2], 10), year = parseInt(m[3], 10);
    if (month < 1 || month > 12) return null;
    var date = new Date(year, month - 1, day);
    // new Date() rola dias inválidos (ex: 31/02) para o mês seguinte; comparar
    // os componentes de volta garante que só aceitamos datas de calendário reais.
    if (date.getDate() !== day || date.getMonth() !== month - 1 || date.getFullYear() !== year) return null;
    date.setHours(0,0,0,0);
    return date;
  }

  function attachDateMask(input) {
    input.addEventListener('input', function() {
      var digits = input.value.replace(/\D/g, '').slice(0, 8);
      var out = digits;
      if (digits.length > 4) out = digits.slice(0,2)+'/'+digits.slice(2,4)+'/'+digits.slice(4);
      else if (digits.length > 2) out = digits.slice(0,2)+'/'+digits.slice(2);
      input.value = out;
    });
  }

  function histIndexForMonth(year, month1) {
    for (var i = 0; i < histSnapshots.length; i++) {
      if (histSnapshots[i].year === year && histSnapshots[i].month === month1) return i;
    }
    return -1;
  }

  function histSnapshotDate(s) { return new Date(s.year, s.month - 1, 1); }
  function histMonthLabelOf(date) { return histMonthNames[date.getMonth()+1] + '/' + date.getFullYear(); }

  // Janela do drill-down (Semanal/Mensal) = o período escolhido no seletor
  // Início/Fim acima (histRefIdx → histBaseIdx), não mais um "últimas N
  // semanas"/"todos os meses" fixo — conecta o seletor de período à evolução
  // mostrada no modal de cada tile.
  function histSelectedPeriod() {
    var base = histSnapshots[histBaseIdx] || histSnapshots[0];
    if (!base) return null;
    var ref = histSnapshots[histRefIdx];
    var baseMonthStart = histSnapshotDate(base);
    var start = (ref && histSnapshotDate(ref) <= baseMonthStart) ? histSnapshotDate(ref) : baseMonthStart;
    var end = new Date(baseMonthStart.getFullYear(), baseMonthStart.getMonth() + 1, 0); // último dia do mês base
    var today = new Date(); today.setHours(0, 0, 0, 0);
    if (end > today) end = today; // mês corrente ainda não terminou
    return { start: start, end: end };
  }

  function showHistDateError(msg) {
    var el = document.getElementById('hist-date-error');
    if (!el) return;
    el.textContent = msg || '';
    el.style.display = msg ? '' : 'none';
  }

  function applyHistDateRange(startDate, endDate) {
    if (startDate > endDate) { showHistDateError('A data de início deve ser anterior à data de fim.'); return; }
    var startIdx = histIndexForMonth(startDate.getFullYear(), startDate.getMonth() + 1);
    var endIdx = histIndexForMonth(endDate.getFullYear(), endDate.getMonth() + 1);
    if (startIdx !== -1 && startIdx === endIdx) { showHistDateError('Escolha datas em meses diferentes para comparar.'); return; }
    if (startIdx === -1 || endIdx === -1) {
      var faltante = startIdx === -1 ? histMonthLabelOf(startDate) : histMonthLabelOf(endDate);
      showHistDateError('Não há snapshot registrado em ' + faltante + '.');
      return;
    }
    histBaseIdx = endIdx;
    histRefIdx = startIdx;
    showHistDateError('');
    renderHistTrendInto();
  }

  var handleHistDateTextChange = debounce(function() {
    var startEl = document.getElementById('hist-date-start');
    var endEl = document.getElementById('hist-date-end');
    if (!startEl || !endEl) return;
    var startVal = startEl.value.trim(), endVal = endEl.value.trim();
    if (!startVal || !endVal) return; // aguarda os dois campos antes de validar
    var start = parseBRDate(startVal), end = parseBRDate(endVal);
    if (!start) { showHistDateError('Data de início inválida. Use dd/mm/aaaa.'); return; }
    if (!end) { showHistDateError('Data de fim inválida. Use dd/mm/aaaa.'); return; }
    applyHistDateRange(start, end);
  }, 400);

  function histDaysInMonth(year, month0) { return new Date(year, month0 + 1, 0).getDate(); }
  function histIsSameDay(a, b) { return !!a && !!b && a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate(); }
  function histIsDateInRange(d, start, end) { return !!start && !!end && d > start && d < end; }

  function renderHistCalendarGrid(viewDate, start, end) {
    var year = viewDate.getFullYear(), month0 = viewDate.getMonth();
    var firstDow = new Date(year, month0, 1).getDay();
    var total = histDaysInMonth(year, month0);
    var temSnapshotNoMes = histIndexForMonth(year, month0 + 1) !== -1;
    var h = '<div class="histdate-cal-header">';
    h += '<button type="button" class="histdate-cal-nav" id="histdate-cal-prev">‹</button>';
    h += '<span class="histdate-cal-title">' + histMonthNames[month0+1] + ' de ' + year + '</span>';
    if (!temSnapshotNoMes) h += '<span class="histdate-cal-nodata">sem snapshot</span>';
    h += '<button type="button" class="histdate-cal-nav" id="histdate-cal-next">›</button>';
    h += '</div>';
    h += '<div class="histdate-cal-weekdays">';
    HISTDATE_WEEKDAYS.forEach(function(w) { h += '<span>' + w + '</span>'; });
    h += '</div><div class="histdate-cal-days">';
    for (var blank=0; blank<firstDow; blank++) h += '<span class="histdate-cal-day empty"></span>';
    for (var day=1; day<=total; day++) {
      var d = new Date(year, month0, day);
      var cls = 'histdate-cal-day' + (temSnapshotNoMes ? ' has-data' : '');
      if (histIsSameDay(d, start) || histIsSameDay(d, end)) cls += ' selected';
      else if (histIsDateInRange(d, start, end)) cls += ' in-range';
      if (histIsSameDay(d, new Date())) cls += ' today';
      h += '<span class="' + cls + '" data-date="' + d.getTime() + '">' + day + '</span>';
    }
    h += '</div>';
    return h;
  }

  // Escolha rápida e confiável dos meses com snapshot (navegar mês a mês no
  // calendário até achar um mês com dado seria tedioso se houver lacunas).
  function renderHistMonthChips() {
    if (!histSnapshots.length) return '';
    var h = '<div class="histdate-chips">';
    histSnapshots.slice().reverse().forEach(function(s) { // cronológico, mais antigo primeiro
      h += '<button type="button" class="histdate-chip" data-chip-date="' + histSnapshotDate(s).getTime() + '">' + escHtml(histMonthLabel(s)) + '</button>';
    });
    h += '</div>';
    return h;
  }

  function histDateOutsideClick(e) {
    var pop = document.getElementById('hist-date-popover');
    var btn = document.getElementById('hist-date-cal-btn');
    if (pop && btn && !pop.contains(e.target) && !btn.contains(e.target)) closeHistDatePopover();
  }

  function pickHistCalDate(clicked) {
    if (!histCalPendingStart || histCalPendingEnd) { histCalPendingStart = clicked; histCalPendingEnd = null; }
    else if (clicked < histCalPendingStart) { histCalPendingEnd = histCalPendingStart; histCalPendingStart = clicked; }
    else { histCalPendingEnd = clicked; }
  }

  function renderHistDatePopover() {
    var pop = document.getElementById('hist-date-popover');
    if (!pop) return;
    var h = renderHistMonthChips();
    h += renderHistCalendarGrid(histCalViewDate, histCalPendingStart, histCalPendingEnd);
    h += '<div class="histdate-cal-footer">';
    h += '<button type="button" class="btn btn-secondary" id="histdate-cal-cancel">Cancelar</button>';
    h += '<button type="button" class="btn" id="histdate-cal-apply">Aplicar</button>';
    h += '</div>';
    pop.innerHTML = h;

    pop.querySelector('#histdate-cal-prev').addEventListener('click', function() {
      histCalViewDate = new Date(histCalViewDate.getFullYear(), histCalViewDate.getMonth()-1, 1);
      renderHistDatePopover();
    });
    pop.querySelector('#histdate-cal-next').addEventListener('click', function() {
      histCalViewDate = new Date(histCalViewDate.getFullYear(), histCalViewDate.getMonth()+1, 1);
      renderHistDatePopover();
    });
    pop.querySelectorAll('.histdate-cal-day:not(.empty)').forEach(function(el) {
      el.addEventListener('click', function() {
        pickHistCalDate(new Date(parseInt(this.getAttribute('data-date'), 10)));
        renderHistDatePopover();
      });
    });
    pop.querySelectorAll('.histdate-chip').forEach(function(el) {
      el.addEventListener('click', function() {
        var clicked = new Date(parseInt(this.getAttribute('data-chip-date'), 10));
        pickHistCalDate(clicked);
        histCalViewDate = clicked;
        renderHistDatePopover();
      });
    });
    pop.querySelector('#histdate-cal-cancel').addEventListener('click', closeHistDatePopover);
    pop.querySelector('#histdate-cal-apply').addEventListener('click', function() {
      if (histCalPendingStart && histCalPendingEnd) applyHistDateRange(histCalPendingStart, histCalPendingEnd);
      closeHistDatePopover();
    });
  }

  function openHistDatePopover() {
    var base = histSnapshots[histBaseIdx], ref = histSnapshots[histRefIdx];
    histCalPendingStart = ref ? histSnapshotDate(ref) : null;
    histCalPendingEnd = base ? histSnapshotDate(base) : null;
