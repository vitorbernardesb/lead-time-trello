<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>Lead Time Midiática – Histórico</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      font-size: 14px;
      color: #172b4d;
      background: transparent;
      padding: 4px 0;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }
    #content { width: 100%; overflow: visible; }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      text-align: left;
      padding: 4px 8px 6px;
      border-bottom: 1px solid #dfe1e6;
      font-size: 11px;
      font-weight: 700;
      color: #6b778c;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    /* coluna de tempo alinhada à direita + dígitos tabulares → valores escaneáveis */
    thead th:last-child { text-align: right; }
    tbody td {
      padding: 6px 8px;
      border-bottom: 1px solid #f0f1f3;
      font-size: 13px;
      color: #172b4d;
    }
    td.time-val { text-align: right; font-variant-numeric: tabular-nums; }
    tbody tr:last-child td { border-bottom: none; }
    tr.current td { background: #e8f6ee; font-weight: 600; }
    tr.current td:first-child { box-shadow: inset 3px 0 0 #2E9E5B; }
    tr.total td {
      font-weight: 700;
      border-top: 1px solid #dfe1e6;
      border-bottom: none;
      background: #f7f8f9;
      font-size: 13px;
    }
    /* controle segmentado: trilho cinza + segmento ativo em "cartão" branco elevado */
    .toggle-bar {
      display: flex; gap: 2px;
      width: max-content; margin: 0 0 10px auto;
      background: #f1f2f4; border-radius: 8px; padding: 2px;
    }
    .toggle-btn {
      font-size: 11px;
      font-weight: 500;
      padding: 4px 9px;
      border-radius: 6px;
      border: none;
      background: transparent;
      color: #6b778c;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.12s, color 0.12s;
    }
    .toggle-btn:hover { color: #172b4d; }
    .toggle-btn:focus-visible { outline: 2px solid #172b4d; outline-offset: 1px; }
    .toggle-btn.active {
      background: #ffffff;
      color: #172b4d;
      font-weight: 700;
      box-shadow: 0 1px 2px rgba(9,30,66,0.15);
    }
    .msg { text-align: center; padding: 16px 8px; color: #6b778c; font-size: 13px; }
  </style>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
</head>
<body>
<div id="content">
  <p class="msg">Carregando histórico…</p>
</div>
<script>
(function () {
  var APP_KEY = '35b840777660fac1ae7823df3d2398f6';
  var TRELLO_TOKEN = 'ATTAa452bde3af25da62c9bf3061e522b13a132b95f557ff528b4b3a5aaa8aac01165F42B089';
  var t = TrelloPowerUp.iframe({ appKey: APP_KEY, appName: 'Lead Time Midiática' });
  var content = document.getElementById('content');
  // Etapas com permanência menor que isto são fundidas na etapa anterior
  // (mesma regra do dashboard — mantém os três contextos consistentes).
  var MIN_STAGE_MS = 600000;
  // switchMode grava leadTimeViewMode via t.set, o que dispara um novo t.render;
  // como o DOM já foi atualizado manualmente, esse render extra (com refetch das
  // actions) é suprimido uma única vez.
  var selfUpdate = false;

  var MODES = [
    { key: 'businessDays', label: 'Dias úteis', header: 'Dias úteis' },
    { key: 'elapsedDays', label: 'Dias corridos', header: 'Dias corridos' },
    { key: 'workingHours', label: 'Horas úteis', header: 'Horas úteis' },
    { key: 'elapsedHours', label: 'Horas corridas', header: 'Horas corridas' }
  ];

  function escapeHtml(str) {
    var el = document.createElement('span');
    el.appendChild(document.createTextNode(str));
    return el.innerHTML;
  }

  function adjustHeight() {
    var height = content.scrollHeight;
    t.sizeTo(height + 16);
  }

  function countBusinessDays(from, to) {
    var s = new Date(from); s.setHours(0,0,0,0);
    var e = new Date(to);   e.setHours(0,0,0,0);
    var totalDays = Math.round((e - s) / 86400000);
    if (totalDays <= 0) return 0;
    var weeks = Math.floor(totalDays / 7);
    var remainder = totalDays % 7;
    var count = weeks * 5;
    var dayOfWeek = s.getDay();
    for (var i = 0; i < remainder; i++) {
      var d = (dayOfWeek + i) % 7;
      if (d !== 0 && d !== 6) count++;
    }
    return count;
  }

  // Janela de trabalho unificada com o dashboard (seg–sex, 09:00–18:00).
  // Algoritmo por sobreposição diária (mesmo do dashboard): soma, para cada dia
  // útil, a interseção do intervalo com a janela de trabalho. Retorna MINUTOS.
  // Substitui a versão anterior que pulava uma hora inteira após a primeira
  // hora parcial e usava janela divergente (08:00–18:00).
  var WORK_START_HOUR = 9;
  var WORK_END_HOUR = 18;

  function countWorkingHours(from, to) {
    from = new Date(from); to = new Date(to);
    if (to <= from) return 0;
    var totalMs = 0;
    var cursor = new Date(from); cursor.setHours(0, 0, 0, 0);
    while (cursor <= to) {
      var dow = cursor.getDay();
      if (dow !== 0 && dow !== 6) {
        var dayStart = new Date(cursor); dayStart.setHours(WORK_START_HOUR, 0, 0, 0);
        var dayEnd   = new Date(cursor); dayEnd.setHours(WORK_END_HOUR, 0, 0, 0);
        var s = from > dayStart ? from : dayStart;
        var e = to   < dayEnd   ? to   : dayEnd;
        if (e > s) totalMs += (e - s);
      }
      cursor.setDate(cursor.getDate() + 1);
    }
    return Math.round(totalMs / 60000);
  }

  function formatBusinessDays(v) { return v + ' d.u.'; }
  function formatElapsedDays(v) { return v < 1 ? '< 1 dia' : v + (v === 1 ? ' dia' : ' dias'); }

  function formatHHMM(totalMinutes) {
    if (totalMinutes < 0) totalMinutes = 0;
    var h = Math.floor(totalMinutes / 60);
    var m = totalMinutes % 60;
    return String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0');
  }

  function formatWorkingHours(v) {
    return formatHHMM(v);
  }
  function formatElapsedHours(v) {
    return formatHHMM(v);
  }

  var FORMATTERS = {
    businessDays: formatBusinessDays,
    elapsedDays: formatElapsedDays,
    workingHours: formatWorkingHours,
    elapsedHours: formatElapsedHours
  };

  function buildTimeline(actions) {
    if (!Array.isArray(actions)) actions = [];
    actions.sort(function(a, b) {
      var diff = new Date(a.date) - new Date(b.date);
      if (diff !== 0) return diff;
      var priority = { createCard: 0, copyCard: 0, updateCard: 1 };
      return (priority[a.type] || 2) - (priority[b.type] || 2);
    });

    var createdAt = null;
    for (var k = 0; k < actions.length; k++) {
      if (actions[k].type === 'createCard' || actions[k].type === 'copyCard') {
        createdAt = new Date(actions[k].date);
        break;
      }
    }
    if (!createdAt && actions.length > 0) {
      createdAt = new Date(actions[0].date);
    }

    var stages = [];
    for (var i = 0; i < actions.length; i++) {
      var act = actions[i], date = new Date(act.date);
      if (createdAt && date < createdAt) continue;
      if ((act.type === 'createCard' || act.type === 'copyCard') && act.data.list) {
        if (stages.length === 0) {
          stages.push({ name: act.data.list.name, enteredAt: date, leftAt: null });
        }
      } else if (act.type === 'updateCard' && act.data.listAfter) {
        if (stages.length === 0 && act.data.listBefore) {
          var fallback = createdAt || date;
          stages.push({ name: act.data.listBefore.name, enteredAt: fallback, leftAt: date });
        }
        if (stages.length > 0) stages[stages.length - 1].leftAt = date;
        stages.push({ name: act.data.listAfter.name, enteredAt: date, leftAt: null });
      }
    }

    if (stages.length > 0) {
      for (var v = 0; v < stages.length; v++) {
        if (createdAt && stages[v].enteredAt < createdAt) {
          stages[v].enteredAt = createdAt;
        }
      }
    }

    var out = [];
    for (var j = 0; j < stages.length; j++) {
      var st = stages[j];
      var dur = (st.leftAt ? st.leftAt.getTime() : Date.now()) - st.enteredAt.getTime();
      if (dur < MIN_STAGE_MS && st.leftAt && out.length > 0) {
        out[out.length - 1].leftAt = st.leftAt;
      } else {
        out.push(st);
      }
    }

    if (out.length === 1 && !out[0].leftAt && createdAt) {
      out[0].enteredAt = createdAt;
    }

    return out;
  }

  function computeSegments(stages) {
    var now = new Date();
    var segments = [];
    for (var i = 0; i < stages.length; i++) {
      var s = stages[i];
      var end = s.leftAt || now;
      var ms = end.getTime() - s.enteredAt.getTime();
      segments.push({
        name: s.name,
        current: !s.leftAt,
        businessDays: countBusinessDays(s.enteredAt, end),
        elapsedDays: Math.floor(ms / 86400000),
        workingHours: countWorkingHours(s.enteredAt, end),
        elapsedHours: Math.round(ms / 60000)
      });
    }
    return segments;
  }

  function mergeByStage(segments) {
    var merged = [];
    var indexMap = {};
    for (var i = 0; i < segments.length; i++) {
      var seg = segments[i];
      if (indexMap.hasOwnProperty(seg.name)) {
        var existing = merged[indexMap[seg.name]];
        existing.businessDays += seg.businessDays;
        existing.elapsedDays += seg.elapsedDays;
        existing.workingHours += seg.workingHours;
        existing.elapsedHours += seg.elapsedHours;
        if (seg.current) existing.current = true;
      } else {
        indexMap[seg.name] = merged.length;
        merged.push({
          name: seg.name,
          current: seg.current,
          businessDays: seg.businessDays,
          elapsedDays: seg.elapsedDays,
          workingHours: seg.workingHours,
          elapsedHours: seg.elapsedHours
        });
      }
    }
    return merged;
  }

  function computeTotals(segments) {
    var totals = { businessDays: 0, elapsedDays: 0, workingHours: 0, elapsedHours: 0 };
    for (var i = 0; i < segments.length; i++) {
      totals.businessDays += segments[i].businessDays;
      totals.elapsedDays += segments[i].elapsedDays;
      totals.workingHours += segments[i].workingHours;
      totals.elapsedHours += segments[i].elapsedHours;
    }
    return totals;
  }

  function renderTable(segments, totals, mode) {
    var modeObj = MODES[0];
    for (var mi = 0; mi < MODES.length; mi++) {
      if (MODES[mi].key === mode) { modeObj = MODES[mi]; break; }
    }
    var fmt = FORMATTERS[modeObj.key];

    var html = '<div class="toggle-bar">';
    for (var bi = 0; bi < MODES.length; bi++) {
      var cls = MODES[bi].key === modeObj.key ? 'toggle-btn active' : 'toggle-btn';
      html += '<button class="' + cls + '" data-mode="' + MODES[bi].key + '">' + MODES[bi].label + '</button>';
    }
    html += '</div>';

    html += '<table><thead><tr>';
    html += '<th>Etapa</th><th id="th-time">' + modeObj.header + '</th>';
    html += '</tr></thead><tbody>';

    for (var i = 0; i < segments.length; i++) {
      var s = segments[i];
      var cls2 = s.current ? ' class="current"' : '';
      html += '<tr' + cls2 + '>';
      html += '<td>' + escapeHtml(s.name) + '</td>';
      html += '<td class="time-val" data-bd="' + s.businessDays + '" data-ed="' + s.elapsedDays + '" data-wh="' + s.workingHours + '" data-eh="' + s.elapsedHours + '">' + fmt(s[modeObj.key]) + '</td>';
      html += '</tr>';
    }

    html += '<tr class="total">';
    html += '<td>Lead Time Total</td>';
    html += '<td class="time-val" data-bd="' + totals.businessDays + '" data-ed="' + totals.elapsedDays + '" data-wh="' + totals.workingHours + '" data-eh="' + totals.elapsedHours + '">' + fmt(totals[modeObj.key]) + '</td>';
    html += '</tr></tbody></table>';

    return html;
  }

  function switchMode(newMode) {
    var modeObj = MODES[0];
    for (var mi = 0; mi < MODES.length; mi++) {
      if (MODES[mi].key === newMode) { modeObj = MODES[mi]; break; }
    }
    var fmt = FORMATTERS[modeObj.key];
    var dataAttr = { businessDays: 'bd', elapsedDays: 'ed', workingHours: 'wh', elapsedHours: 'eh' };
    var attr = dataAttr[modeObj.key];

    var btns = document.querySelectorAll('.toggle-btn');
    for (var i = 0; i < btns.length; i++) {
      btns[i].className = btns[i].getAttribute('data-mode') === newMode ? 'toggle-btn active' : 'toggle-btn';
    }

    var th = document.getElementById('th-time');
    if (th) th.textContent = modeObj.header;

    var cells = document.querySelectorAll('.time-val');
    for (var j = 0; j < cells.length; j++) {
      var val = parseInt(cells[j].getAttribute('data-' + attr));
      cells[j].textContent = fmt(val);
    }

    try {
      selfUpdate = true;
      // válvula de segurança: se o render disparado pelo t.set não chegar,
      // não deixa um render legítimo futuro ser engolido.
      setTimeout(function() { selfUpdate = false; }, 1500);
      t.set('card', 'shared', 'leadTimeViewMode', newMode);
    } catch(e) { selfUpdate = false; }
  }

  function fetchWithRetry(url, retries, delay) {
    return fetch(url).then(function(r) {
      if (r.status === 401) {
        throw new Error('TOKEN_EXPIRED');
      }
      if ((r.status === 429 || r.status >= 500) && retries > 0) {
        return new Promise(function(resolve) {
          setTimeout(function() {
            resolve(fetchWithRetry(url, retries - 1, delay * 2));
          }, delay);
        });
      }
      if (!r.ok) throw new Error('API ' + r.status);
      return r.json();
    }).catch(function(err) {
      if (err && err.message === 'TOKEN_EXPIRED') throw err;
      if (retries > 0) {
        return new Promise(function(resolve) {
          setTimeout(function() {
            resolve(fetchWithRetry(url, retries - 1, delay * 2));
          }, delay);
        });
      }
      throw err;
    });
  }

  function render() {
    Promise.all([
      t.card('id').then(function (card) {
        return fetchWithRetry(
          'https://api.trello.com/1/cards/' + card.id +
          '/actions?filter=updateCard:idList,createCard,copyCard&limit=1000' +
          '&key=' + APP_KEY + '&token=' + TRELLO_TOKEN,
          3, 1000
        );
      }),
      t.get('card', 'shared', 'leadTimeViewMode').catch(function() { return null; })
    ]).then(function (results) {
      var actions = results[0];
      var savedMode = results[1] || 'businessDays';

      if (!actions || !actions.length) {
        content.innerHTML = '<p class="msg">Nenhum histórico encontrado para este card.</p>';
        adjustHeight();
        return;
      }

      var stages = buildTimeline(actions);
      if (!stages.length) {
        content.innerHTML = '<p class="msg">Nenhuma movimentação encontrada.</p>';
        adjustHeight();
        return;
      }

      var rawSegments = computeSegments(stages);
      var merged = mergeByStage(rawSegments);
      var totals = computeTotals(rawSegments);

      content.innerHTML = renderTable(merged, totals, savedMode);

      document.querySelectorAll('.toggle-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
          switchMode(btn.getAttribute('data-mode'));
          adjustHeight();
        });
      });

      adjustHeight();
    }).catch(function (err) {
      var msg = err && err.message ? err.message : String(err);
      console.error('[CARD-SECTION] ERRO:', msg);
      content.innerHTML = '<p class="msg">Erro ao carregar histórico do card.</p>';
      adjustHeight();
    });
  }

  t.render(function() {
    if (selfUpdate) { selfUpdate = false; return; }
    render();
  });
})();
</script>
</body>
</html>
