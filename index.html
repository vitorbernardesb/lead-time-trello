/*
  REGRA BUTLER — Bloquear movimentação de cards incompletos

  Gatilho: Quando um card é movido para fora de "Planejamento"
  Condição: O campo "Status de conformidade" é "Incompleto"
  Ação 1: Mover o card de volta para "Planejamento"
  Ação 2: Adicionar comentário:
    "⚠️ Este card foi devolvido para Planejamento pois está
     incompleto. Preencha: etiqueta, data de entrega, descrição
     e prioridade. O campo Status de conformidade será atualizado
     automaticamente pelo Power-Up ao recarregar o board."

  AUTOMAÇÕES DO POWER-UP (executadas no card-badges):
  1. dueComplete=true + fora de Concluído → mover p/ Concluído
  2. Em Concluído + !dueComplete → marcar como concluído
  3. Sem etiquetas + fora de Planejamento → mover p/ Planejamento
  5. Sem data de entrega + fora de Planejamento → mover p/ Planejamento
  6. Saiu de Captação de Imagem (últimos 10min) → add label "CAPTAÇÃO REALIZADA"
  7. Entrou em Alterações (últimos 10min) → incrementar Retrabalhos +1
  8. Entrou em Revisões em Atraso (últimos 10min) → Prioridade = "ALTO"
  9. Entrou em Alterações (últimos 10min) → definir data de início = agora
  10. Não conforme em Captação/A fazer/Em andamento → reverter p/ Planejamento + comentário
*/
(function () {
  var APP_KEY = '35b840777660fac1ae7823df3d2398f6';
  var TRELLO_TOKEN = 'ATTAa452bde3af25da62c9bf3061e522b13a132b95f557ff528b4b3a5aaa8aac01165F42B089';
  var APP_NAME = 'Lead Time Midiática';
  var ICON ='https://vitorbernardesb.github.io/lead-time-trello/icon.svg';
  // Etapas com permanência menor que isto são fundidas na etapa anterior
  // (mesma regra do dashboard — mantém badge, seção do card e dashboard consistentes).
  var MIN_STAGE_MS = 600000;

  var LISTAS_REVERTER_CONFORMIDADE = [
    'Captação de Imagem 🎥',
    'A fazer 👇',
    'Em andamento 💪'
  ];

  var LISTAS_PROTEGIDAS_35 = [
    'Planejamento', 'Concluído 🏆', 'Revisão Interna 🔎',
    'Revisão Externa 🧐', 'Revisões em Atraso ⏰'
  ];

  var LISTAS_FORA_DO_FLUXO = [
    'Tarefas recorrentes - Vic 🫡',
    'Tarefas recorrentes - Carol💻',
    'Social Media 📲',
    '🤑💰Tráfego Pago💰🤑',
    'Informações 📣'
  ];

  var FLOW_LISTS = [
    'Planejamento',
    'Captação de Imagem 🎥',
    '🛑URGÊNCIAS🛑',
    'A fazer 👇',
    'Em andamento 💪',
    'Alterações ✏️',
    '⚠️Atrasos⚠️',
    'Revisão Interna 🔎',
    'Revisão Externa 🧐',
    'Revisões em Atraso ⏰',
    'Concluído 🏆'
  ];

  // ═══════════════════════════════════════════════
  //  UTILITÁRIOS
  // ═══════════════════════════════════════════════

  function countBusinessDays(from, to) {
    var s = new Date(from); s.setHours(0,0,0,0);
    var e = new Date(to);   e.setHours(0,0,0,0);
    var totalDays = Math.round((e - s) / 86400000);
    if (totalDays <= 0) return 0;
    var weeks = Math.floor(totalDays / 7);
    var remainder = totalDays % 7;
    var count = weeks * 5;
    var dayOfWeek = s.getDay();
    for (var i = 0; i < remainder; i++) {
      var d = (dayOfWeek + i) % 7;
      if (d !== 0 && d !== 6) count++;
    }
    return count;
  }

  function fmtDate(v) {
    if (!v) return '';
    var d = new Date(v);
    return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear();
  }

  function buildTimeline(actions) {
    if (!Array.isArray(actions)) actions = [];
    actions.sort(function(a, b) {
      var diff = new Date(a.date) - new Date(b.date);
      if (diff !== 0) return diff;
      var priority = { createCard: 0, copyCard: 0, updateCard: 1 };
      return (priority[a.type] || 2) - (priority[b.type] || 2);
    });

    var createdAt = null;
    for (var k = 0; k < actions.length; k++) {
      if (actions[k].type === 'createCard' || actions[k].type === 'copyCard') {
        createdAt = new Date(actions[k].date);
        break;
      }
    }
    if (!createdAt && actions.length > 0) {
      createdAt = new Date(actions[0].date);
    }

    var stages = [];
    for (var i = 0; i < actions.length; i++) {
      var act = actions[i], date = new Date(act.date);
      if (createdAt && date < createdAt) continue;
      if ((act.type === 'createCard' || act.type === 'copyCard') && act.data.list) {
        if (stages.length === 0) {
          stages.push({ name: act.data.list.name, enteredAt: date, leftAt: null });
        }
      } else if (act.type === 'updateCard' && act.data.listAfter) {
        if (stages.length === 0 && act.data.listBefore) {
          var fallback = createdAt || date;
          stages.push({ name: act.data.listBefore.name, enteredAt: fallback, leftAt: date });
        }
        if (stages.length > 0) stages[stages.length - 1].leftAt = date;
        stages.push({ name: act.data.listAfter.name, enteredAt: date, leftAt: null });
      }
    }

    if (stages.length > 0) {
      for (var v = 0; v < stages.length; v++) {
        if (createdAt && stages[v].enteredAt < createdAt) {
          stages[v].enteredAt = createdAt;
        }
      }
    }

    var out = [];
    for (var j = 0; j < stages.length; j++) {
      var st = stages[j];
      var dur = (st.leftAt ? st.leftAt.getTime() : Date.now()) - st.enteredAt.getTime();
      if (dur < MIN_STAGE_MS && st.leftAt && out.length > 0) {
        out[out.length - 1].leftAt = st.leftAt;
      } else {
        out.push(st);
      }
    }

    if (out.length === 1 && !out[0].leftAt && createdAt) {
      out[0].enteredAt = createdAt;
    }

    return out;
  }

  function validarTitulo(nome) {
    return typeof nome === 'string' && nome.trim().length > 0;
  }

  function getListId(lists, name) {
    for (var i = 0; i < lists.length; i++) {
      if (lists[i].name.trim() === name) return lists[i].id;
    }
    return null;
  }

  function apiUrl(path, token) {
    return 'https://api.trello.com/1'+path+(path.indexOf('?')>=0?'&':'?')+'key='+APP_KEY+'&token='+token;
  }

  // Rejeita respostas HTTP não-ok (antes eram tratadas como sucesso e falhavam em silêncio).
  function assertOk(r) {
    if (!r.ok) throw new Error('API ' + r.status);
    return r;
  }

  function buscarCustomFields(t, boardId, token) {
    return queuedFetch(apiUrl('/boards/'+boardId+'/customFields', token))
      .then(assertOk)
      .then(function(r) { return r.json(); })
      .then(function(fields) {
        if (!Array.isArray(fields)) return null;
        var result = { conformidade: null, prioridade: null, retrabalho: null, savedAt: Date.now() };
        fields.forEach(function(field) {
          if (field.name === 'Status de conformidade') {
            var options = {};
            if (Array.isArray(field.options)) {
              field.options.forEach(function(opt) {
                if (opt.value && opt.value.text) options[opt.value.text] = opt.id;
              });
            }
            result.conformidade = { fieldId: field.id, options: options };
          }
          if (field.name === 'Prioridade') {
            var pOpts = {};
            if (Array.isArray(field.options)) {
              field.options.forEach(function(opt) {
                if (opt.value && opt.value.text) pOpts[opt.value.text] = opt.id;
              });
            }
            result.prioridade = { fieldId: field.id, options: pOpts };
          }
          if (field.name === 'Retrabalhos') {
            result.retrabalho = { fieldId: field.id };
          }
        });
        t.set('board', 'private', 'customFieldsCache', result).catch(function() {});
        return result;
      });
  }

  function getCustomFieldsCache(t, boardId, token) {
    return t.get('board', 'private', 'customFieldsCache')
      .catch(function() { return null; })
      .then(function(cache) {
        var TTL = 86400000;
        if (cache && cache.savedAt && Date.now() - cache.savedAt < TTL && cache.conformidade && cache.prioridade) {
          return cache;
        }
        return buscarCustomFields(t, boardId, token).catch(function(err) {
          console.warn('[CF] Falha ao buscar custom fields:', err && err.message ? err.message : String(err));
          return null;
        });
      });
  }

  function hasPrioridade(cfItems, prioridadeFieldId) {
    if (!Array.isArray(cfItems) || !prioridadeFieldId) return false;
    for (var i = 0; i < cfItems.length; i++) {
      if (cfItems[i].idCustomField === prioridadeFieldId && cfItems[i].idValue) return true;
    }
    return false;
  }

  var _conformidadeCache = {};
  var _cacheMaxSize = 200;

  function pruneCache(cache) {
    var keys = Object.keys(cache);
    if (keys.length > _cacheMaxSize) {
      keys.slice(0, keys.length - _cacheMaxSize).forEach(function(k) { delete cache[k]; });
    }
  }

  function atualizarStatusConformidade(cardId, isConforme, conformidadeField, cfItems, token) {
    var valorDesejado = isConforme ? 'Completo' : 'Incompleto';
    var optionId = conformidadeField.options[valorDesejado];
    if (!optionId) return;

    var currentValue = null;
    if (Array.isArray(cfItems)) {
      for (var i = 0; i < cfItems.length; i++) {
        if (cfItems[i].idCustomField === conformidadeField.fieldId) {
          currentValue = cfItems[i].idValue;
          break;
        }
      }
    }
    if (currentValue === optionId) return;
    if (_conformidadeCache[cardId] === optionId) return;

    _conformidadeCache[cardId] = optionId;
    queuedFetch(
      'https://api.trello.com/1/card/' + cardId +
      '/customField/' + conformidadeField.fieldId + '/item' +
      '?key=' + APP_KEY + '&token=' + token,
      {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ idValue: optionId })
      }
    ).then(assertOk).catch(function() { delete _conformidadeCache[cardId]; });
  }

  function avg(arr) {
    var f = arr.filter(function(v){return v!=null;});
    if (!f.length) return 0;
    return Math.round(f.reduce(function(a,b){return a+b;},0)/f.length*10)/10;
  }

  // ═══════════════════════════════════════════════
  //  CACHE DUAL-TTL (resposta API)
  // ═══════════════════════════════════════════════

  var _apiCache = {};
  var CACHE_TTL_OK  = 60000;
  var CACHE_TTL_ERR = 30000;

  function cacheGet(key) {
    var entry = _apiCache[key];
    if (!entry) return null;
    var ttl = entry.error ? CACHE_TTL_ERR : CACHE_TTL_OK;
    if (Date.now() - entry.ts > ttl) { delete _apiCache[key]; return null; }
    return entry;
  }

  function cacheSet(key, value, isError) {
    _apiCache[key] = { value: value, ts: Date.now(), error: !!isError };
  }

  // ═══════════════════════════════════════════════
  //  RATE LIMITING — queuedFetch
  // ═══════════════════════════════════════════════

  var _API_QUEUE = [];
  var _API_RUNNING = 0;
  var _API_CONCURRENCY = 4;         // baixado de 6: menos conexões simultâneas em voo
  var _API_MAX_RETRIES = 3;
  var _API_TOKEN_DEAD = false;

  // Pacing proativo: no máx. _API_RATE_PER_SEC NOVOS disparos por janela de 1s,
  // além do teto de concorrência. _API_CONCURRENCY sozinho só limitava quantas
  // requisições ficavam simultâneas — não a VELOCIDADE de disparo. Card-badges
  // é chamado pelo Trello uma vez por card visível no board, todos na mesma
  // instância deste iframe; com muitos cards, a fila drenava rápido demais e
  // estourava os ~100 req/10s do Trello antes do primeiro 429 voltar (o backoff
  // abaixo é reativo — sempre tarde demais para EVITAR o burst, só amortece o
  // que já aconteceu).
  var _API_RATE_PER_SEC = 6;
  var _API_DISPATCH_TIMES = [];      // timestamps dos disparos na janela de 1s corrente
  var _API_DRAIN_SCHEDULED = false;

  function _flushQueueOnDeadToken() {
    var err = new Error('TOKEN_EXPIRED');
    while (_API_QUEUE.length > 0) {
      var item = _API_QUEUE.shift();
      item.reject(err);
    }
  }

  function _apiWithinRateBudget() {
    var now = Date.now();
    while (_API_DISPATCH_TIMES.length && now - _API_DISPATCH_TIMES[0] >= 1000) _API_DISPATCH_TIMES.shift();
    return _API_DISPATCH_TIMES.length < _API_RATE_PER_SEC;
  }

  function _apiScheduleDrain() {
    if (_API_DRAIN_SCHEDULED) return;
    _API_DRAIN_SCHEDULED = true;
    setTimeout(function() { _API_DRAIN_SCHEDULED = false; drainQueue(); }, 120);
  }

  function _apiRetry(item, delay) {
    _API_RUNNING--;
    setTimeout(function() { _API_QUEUE.unshift(item); drainQueue(); }, delay);
  }

  function drainQueue() {
    if (_API_TOKEN_DEAD) { _flushQueueOnDeadToken(); return; }
    while (_API_QUEUE.length > 0 && _API_RUNNING < _API_CONCURRENCY) {
      if (!_apiWithinRateBudget()) { _apiScheduleDrain(); return; }
      _API_DISPATCH_TIMES.push(Date.now());
      (function() {
        var item = _API_QUEUE.shift();
        _API_RUNNING++;
        fetch(item.url, item.opts)
          .then(function(resp) {
            if (resp.status === 429 && item.attempt < _API_MAX_RETRIES) {
              item.attempt++;
              var backoff = Math.min(1000 * Math.pow(2, item.attempt), 8000);
              console.warn('[API] 429 rate limited, retry', item.attempt, 'in', backoff + 'ms');
              _apiRetry(item, backoff);
              return;
            }
            if (resp.status === 401) {
              console.error('[API] 401 Unauthorized — token expirado ou revogado');
              _API_TOKEN_DEAD = true;
              setTimeout(function() { _API_TOKEN_DEAD = false; }, 60000);
              _API_RUNNING--;
              item.reject(new Error('TOKEN_EXPIRED'));
              _flushQueueOnDeadToken();
              return;
            }
            _API_RUNNING--;
            item.resolve(resp);
            drainQueue();
          })
          .catch(function(err) {
            if (item.attempt < _API_MAX_RETRIES) {
              item.attempt++;
              var backoff = Math.min(1000 * Math.pow(2, item.attempt), 8000);
              console.warn('[API] Network error, retry', item.attempt, ':', err.message || String(err));
              _apiRetry(item, backoff);
            } else {
              _API_RUNNING--;
              console.error('[API] Failed after', _API_MAX_RETRIES, 'retries:', err.message || String(err));
              item.reject(err);
              drainQueue();
            }
          });
      })();
    }
  }

  function queuedFetch(url, opts) {
    return new Promise(function(resolve, reject) {
      _API_QUEUE.push({ url: url, opts: opts, resolve: resolve, reject: reject, attempt: 0 });
      drainQueue();
    });
  }

  function cachedFetch(cacheKey, url, opts) {
    var hit = cacheGet(cacheKey);
    if (hit) {
      return hit.error
        ? Promise.reject(new Error('CACHED_ERROR'))
        : Promise.resolve(hit.value);
    }
    return queuedFetch(url, opts).then(function(r) {
      if (!r.ok) throw new Error('API ' + r.status);
      return r.json();
    }).then(function(data) {
      cacheSet(cacheKey, data, false);
      return data;
    }).catch(function(err) {
      cacheSet(cacheKey, null, true);
      throw err;
    });
  }

  // ═══════════════════════════════════════════════
  //  BADGE
  // ═══════════════════════════════════════════════

  function badgeFromActions(actions) {
    if (!Array.isArray(actions) || !actions.length) return null;
    var tl = buildTimeline(actions);
    if (!tl.length) return null;
    var current = tl[tl.length - 1];
    var days = countBusinessDays(current.enteredAt, new Date());
    return {
      title: 'Dias úteis nesta etapa',
      icon: 'https://cdn.jsdelivr.net/npm/lucide-static@0.321.0/icons/clock.svg',
      text: days === 1 ? '1d útil' : days + 'd úteis',
      color: days <= 3 ? 'green' : days <= 6 ? 'yellow' : 'red'
    };
  }

  // ═══════════════════════════════════════════════
  //  ESTILOS XLSX
  // ═══════════════════════════════════════════════

  var BD = {
    top:{style:'thin',color:{rgb:'DDDDDD'}},
    bottom:{style:'thin',color:{rgb:'DDDDDD'}},
    left:{style:'thin',color:{rgb:'DDDDDD'}},
    right:{style:'thin',color:{rgb:'DDDDDD'}}
  };

  // Cabeçalhos na identidade da marca (preto + branco); zebra e bordas suaves.
  // As cores SEMÂNTICAS de dados (sStatus/sDiasAtePrazo/sPrazoDegrade) não mudam.
  function sHeader()    { return {font:{bold:true,color:{rgb:'FFFFFF'},sz:11},fill:{fgColor:{rgb:'0A0A0A'}},border:BD,alignment:{horizontal:'center',vertical:'center',wrapText:true}}; }
  function sData(r,num) { return {fill:{fgColor:{rgb:r%2===0?'FFFFFF':'F7F8F9'}},border:BD,alignment:{horizontal:num?'right':'left',vertical:'center'}}; }
  // Linha de MÉDIA/total: fundo destacado + NEGRITO + borda superior reforçada (executivo).
  function sMedia(num)  { var o = {font:{bold:true},fill:{fgColor:{rgb:'FFF4CC'}},border:{top:{style:'medium',color:{rgb:'0A0A0A'}},bottom:BD.bottom,left:BD.left,right:BD.right},alignment:{horizontal:num?'right':'left'}}; if(num) o.numFmt='0.0'; return o; }

  function sStatus(v) {
    var bg = v==='🔴 Atrasado'?'FDE8E8' : v==='⚠️ Vence hoje'?'FFF3CD' : v==='✅ No prazo'?'E8F5E9' : 'FFFFFF';
    return {fill:{fgColor:{rgb:bg}},border:BD,alignment:{horizontal:'left'}};
  }

  function sDiasAtePrazo(val, rowIdx) {
    var base = sData(rowIdx, true);
    if (val === '' || val === null || val === undefined) return base;
    if (val < 0)  return {fill:{fgColor:{rgb:'FF4C4C'}},font:{color:{rgb:'FFFFFF'}},border:BD,alignment:{horizontal:'right'}};
    if (val === 0) return {fill:{fgColor:{rgb:'FF8800'}},font:{color:{rgb:'FFFFFF'}},border:BD,alignment:{horizontal:'right'}};
    return base;
  }

  function sPrazoDegrade(dud, rowIdx) {
    var base = sData(rowIdx, false);
    if (dud === null || dud === undefined) return base;
    var bg, fg = null;
    if (dud < 0)       { bg='FF4C4C'; fg='FFFFFF'; }
    else if (dud <= 2)  bg='FF7043';
    else if (dud <= 5)  bg='FFA726';
    else if (dud <= 10) bg='FFCC02';
    else if (dud <= 20) bg='C6E03B';
    else if (dud <= 40) bg='66BB6A';
    else                { bg='2E7D32'; fg='FFFFFF'; }
    var s = {fill:{fgColor:{rgb:bg}},border:BD,alignment:{horizontal:'left'}};
    if (fg) s.font = {color:{rgb:fg}};
    return s;
  }

  function sKpiTitle()  { return {font:{bold:true,color:{rgb:'FFFFFF'},sz:12},fill:{fgColor:{rgb:'0A0A0A'}},border:BD}; }
  function sKpiSub()    { return {font:{bold:true,color:{rgb:'55555E'}},fill:{fgColor:{rgb:'EFEFF2'}},border:BD}; }
  function sKpiData(num){ return {border:BD,alignment:{horizontal:num?'right':'left'}}; }

  function setS(ws,r,c,style) {
    var ref=XLSX.utils.encode_cell({r:r,c:c});
    if (!ws[ref]) ws[ref]={v:'',t:'s'};
    ws[ref].s=style;
  }

  function colWidths(data,max) {
    var w=[];
    for (var c=0;c<data[0].length;c++) {
      var m=8;
      for (var r=0;r<data.length;r++) {
        var l=String(data[r]&&data[r][c]!=null?data[r][c]:'').length;
        if (l>m) m=l;
      }
      w.push({wch:Math.min(m+3,max||40)});
    }
    return w;
  }

  // ── CABEÇALHO EXECUTIVO DA ABA (título + metadados) ──
  // Reutilizado pelas 3 abas para dar aparência de relatório corporativo.
  // Título na linha 0, metadados na 1, espaçador na 2 → dados começam na linha 3.
  // Retorna o nº de linhas consumidas (o corpo é escrito abaixo, com deslocamento).
  var SHEET_HEAD_ROWS = 3;
  function xTitle() { return {font:{bold:true,sz:15,color:{rgb:'0A0A0A'}},alignment:{vertical:'center'}}; }
  function xMeta()  { return {font:{sz:10,color:{rgb:'6B6B70'}},alignment:{vertical:'center'}}; }
  function bandTitle(ws, title, meta, nCols) {
    ws['A1'] = { v:title, t:'s', s:xTitle() };
    ws['A2'] = { v:meta,  t:'s', s:xMeta()  };
    if (!ws['!merges']) ws['!merges'] = [];
    ws['!merges'].push({ s:{r:0,c:0}, e:{r:0,c:nCols-1} });
    ws['!merges'].push({ s:{r:1,c:0}, e:{r:1,c:nCols-1} });
    if (!ws['!rows']) ws['!rows'] = [];
    ws['!rows'][0] = { hpt:21 }; ws['!rows'][1] = { hpt:15 }; ws['!rows'][2] = { hpt:6 };
    return SHEET_HEAD_ROWS;
  }
  // Filtro automático (dropdowns de ordenar/filtrar) na linha de cabeçalho da tabela.
  // Substitui o congelamento de painel (não suportado pela lib xlsx-js-style).
  function autoFilter(ws, headerRow0, nCols, lastRow0) {
    ws['!autofilter'] = {
      ref: XLSX.utils.encode_cell({r:headerRow0,c:0}) + ':' + XLSX.utils.encode_cell({r:lastRow0,c:nCols-1})
    };
  }
  function fmtDateTime(d) {
    d = new Date(d);
    function p(n){ return String(n).padStart(2,'0'); }
    return p(d.getDate())+'/'+p(d.getMonth()+1)+'/'+d.getFullYear()+' '+p(d.getHours())+':'+p(d.getMinutes());
  }

  // ═══════════════════════════════════════════════
  //  PROCESSAMENTO DE DADOS
  // ═══════════════════════════════════════════════

  function processCard(card, actions, listNames, retrabalhoVal) {
    if (!Array.isArray(actions)) actions = [];
    var tl = buildTimeline(actions), now = new Date();
    var bd = {};
    var created = null;

    listNames.forEach(function(n){ bd[n] = null; });

    for (var i=0; i<actions.length; i++) {
      if (actions[i].type==='createCard'||actions[i].type==='copyCard') {
        var dt = new Date(actions[i].date);
        if (!created || dt < created) created = dt;
      }
    }

    tl.forEach(function(st) {
      var end = st.leftAt || now;
      var b = countBusinessDays(st.enteredAt, end);
      if (bd.hasOwnProperty(st.name)) {
        bd[st.name] = (bd[st.name] === null ? 0 : bd[st.name]) + b;
      }
    });

    var totalBD = 0;
    listNames.forEach(function(n){ if (bd[n] !== null) totalBD += bd[n]; });

    var dud = null;
    if (card.due) {
      var td = new Date(); td.setHours(0,0,0,0);
      var du = new Date(card.due); du.setHours(0,0,0,0);
      dud = Math.round((du - td) / 86400000);
    }

    var sp = dud===null ? '—' : dud<0 ? '🔴 Atrasado' : dud===0 ? '⚠️ Vence hoje' : '✅ No prazo';
    var lab = (card.labels||[]).map(function(l){ return l.name||l.color; }).join(' | ');

    var currentListName = tl.length ? tl[tl.length-1].name : '';
    var daysInCurrentList = tl.length ? countBusinessDays(tl[tl.length-1].enteredAt, now) : 0;

    return {
      name: card.name,
      labels: lab,
      createdAt: created ? fmtDate(created) : '',
      due: card.due ? fmtDate(card.due) : '',
      daysUntilDue: dud,
      bd: bd,
      totalBD: totalBD,
      retrabalho: retrabalhoVal,
      status: sp,
      currentListName: currentListName,
      daysInCurrentList: daysInCurrentList
    };
  }

  // ═══════════════════════════════════════════════
  //  ABA RELATÓRIO
  // ═══════════════════════════════════════════════

  function sheetRelatorio(cards, listNames, meta) {
    var hdr = ['Card','Labels','Criado em','Prazo','Dias até o Prazo'];
    var prazoCol = 3;
    var diasCol = 4;
    var stageStart = hdr.length;
    listNames.forEach(function(n){ hdr.push(n); });
    hdr.push('Lead Time Total (d.u.)');
    var ltCol = hdr.length - 1;
    hdr.push('Retrabalho');
    var rwCol = hdr.length - 1;
    hdr.push('Status Prazo');
    var stCol = hdr.length - 1;

    var numCols = {};
    numCols[diasCol] = true;
    for (var ci = stageStart; ci <= rwCol; ci++) numCols[ci] = true;

    var body = [hdr];
    cards.forEach(function(c) {
      var row = [c.name, c.labels, c.createdAt, c.due, c.daysUntilDue !== null ? c.daysUntilDue : ''];
      listNames.forEach(function(n){ row.push(c.bd[n] !== null ? c.bd[n] : '-'); });
      row.push(c.totalBD);
      row.push(c.retrabalho);
      row.push(c.status);
      body.push(row);
    });

    var mRow = new Array(hdr.length);
    for (var mi = 0; mi < mRow.length; mi++) mRow[mi] = '';
    mRow[0] = 'MÉDIA';
    body.push(mRow);

    // Corpo (cabeçalho + dados + MÉDIA) escrito ABAIXO da faixa de título executivo.
    var HEAD = SHEET_HEAD_ROWS;                 // linha do cabeçalho da tabela (idx 3)
    var ws = XLSX.utils.aoa_to_sheet([[]]);
    XLSX.utils.sheet_add_aoa(ws, body, { origin: { r: HEAD, c: 0 } });
    bandTitle(ws, 'Relatório de Lead Time — Cards em aberto', meta || '', hdr.length);

    // Referências das fórmulas AVERAGE deslocadas por HEAD — resultado idêntico
    // (mesmos valores mediados), apenas em linhas rebaixadas. Verificado por teste.
    var firstData1 = HEAD + 2;                  // 1ª linha de dados (1-indexed)
    var lastData0  = HEAD + cards.length;       // última linha de dados (0-indexed)
    var lastData1  = lastData0 + 1;             // (1-indexed)
    var mediaRow0  = HEAD + cards.length + 1;   // linha da MÉDIA (0-indexed)

    function colLetter(idx) { return XLSX.utils.encode_col(idx); }

    if (cards.length >= 1) {
      var diasLetter = colLetter(diasCol);
      ws[XLSX.utils.encode_cell({r: mediaRow0, c: diasCol})] = {t:'n', f:'AVERAGE('+diasLetter+firstData1+':'+diasLetter+lastData1+')', s: sMedia(true)};

      for (var si = 0; si < listNames.length; si++) {
        var col = stageStart + si;
        var cl = colLetter(col);
        ws[XLSX.utils.encode_cell({r: mediaRow0, c: col})] = {t:'n', f:'AVERAGE('+cl+firstData1+':'+cl+lastData1+')', s: sMedia(true)};
      }

      var ltLetter = colLetter(ltCol);
      ws[XLSX.utils.encode_cell({r: mediaRow0, c: ltCol})] = {t:'n', f:'AVERAGE('+ltLetter+firstData1+':'+ltLetter+lastData1+')', s: sMedia(true)};

      var rwLetter = colLetter(rwCol);
      ws[XLSX.utils.encode_cell({r: mediaRow0, c: rwCol})] = {t:'n', f:'AVERAGE('+rwLetter+firstData1+':'+rwLetter+lastData1+')', s: sMedia(true)};
    }

    ws['!cols'] = colWidths(body, 40);          // largura do corpo (título mesclado não infla)
    ws['!ref'] = 'A1:' + XLSX.utils.encode_cell({r: mediaRow0, c: hdr.length - 1});
    autoFilter(ws, HEAD, hdr.length, lastData0);

    // Estilização (linhas do corpo deslocadas por HEAD; título já estilizado)
    var totalC = hdr.length;
    var bodyRows = body.length;                 // cabeçalho + dados + MÉDIA
    for (var br = 0; br < bodyRows; br++) {
      var r = HEAD + br;                         // linha real na planilha
      var isHeader = (br === 0);
      var isMedia  = (br === bodyRows - 1);
      var dataIdx  = br - 1;                     // índice em `cards` (para linhas de dados)
      for (var c = 0; c < totalC; c++) {
        var cellRef = XLSX.utils.encode_cell({r:r, c:c});
        if (isHeader) {
          setS(ws, r, c, sHeader());
        } else if (isMedia) {
          if (!ws[cellRef] || !ws[cellRef].f) setS(ws, r, c, sMedia(!!numCols[c]));
        } else if (c === stCol) {
          setS(ws, r, c, sStatus(body[br][c]));
        } else if (c === diasCol) {
          setS(ws, r, c, sDiasAtePrazo(body[br][c], dataIdx));
        } else if (c === prazoCol) {
          setS(ws, r, c, sPrazoDegrade(cards[dataIdx].daysUntilDue, dataIdx));
        } else {
          setS(ws, r, c, sData(dataIdx, !!numCols[c]));
        }
      }
    }

    return ws;
  }

  // ═══════════════════════════════════════════════
  //  ABA KPIs
  // ═══════════════════════════════════════════════

  function sheetKPIs(cards, listNames, meta) {
    var rows = [], types = [];
    function addTitle(text, cols) {
      var r = new Array(cols); for (var i=0;i<cols;i++) r[i]=''; r[0]=text;
      rows.push(r); types.push('title');
    }
    function addSub(arr) { rows.push(arr); types.push('sub'); }
    function addRow(arr) { rows.push(arr); types.push('data'); }
    function addBlank(cols) { var r=new Array(cols); for(var i=0;i<cols;i++) r[i]=''; rows.push(r); types.push('empty'); }

    var total = cards.length;
    var avgLT = avg(cards.map(function(c){return c.totalBD;}));
    var rwCards = cards.filter(function(c){return c.retrabalho > 0;}).length;
    var dueCards = cards.filter(function(c){return c.daysUntilDue !== null;}).length;
    var lateCards = cards.filter(function(c){return c.status==='🔴 Atrasado';}).length;
    function pct(n){ return total ? Math.round(n/total*1000)/10 : 0; }

    addTitle('Visão Geral', 2);
    addSub(['Indicador','Valor']);
    addRow(['Total de cards em aberto', total]);
    addRow(['Lead time médio total (d.u.)', avgLT]);
    addRow(['Cards com retrabalho', rwCards+' ('+pct(rwCards)+'%)']);
    addRow(['Cards com prazo definido', dueCards+' ('+pct(dueCards)+'%)']);
    addRow(['Cards atrasados', lateCards+' ('+pct(lateCards)+'%)']);
    addBlank(2);

    addTitle('Gargalos por Etapa', 4);
    addSub(['Etapa','Média d.u.','Cards que passaram','Retrabalho médio']);
    listNames.forEach(function(n) {
      var bv = cards.map(function(c){return c.bd[n];}).filter(function(v){return v!==null && v>0;});
      var passed = bv.length;
      var rwVals = cards.filter(function(c){return c.bd[n]!==null;}).map(function(c){return c.retrabalho;});
      var avgRw = avg(rwVals);
      addRow([n, avg(bv), passed, avgRw]);
    });
    addBlank(4);

    var labMap = {};
    cards.forEach(function(c){
      if (!c.labels) return;
      c.labels.split(' | ').forEach(function(l){
        if (!l) return;
        if (!labMap[l]) labMap[l] = [];
        labMap[l].push(c);
      });
    });
    var labData = Object.keys(labMap).map(function(l){
      var lc = labMap[l];
      var late = lc.filter(function(c){return c.status==='🔴 Atrasado';}).length;
      return {
        name: l,
        count: lc.length,
        avgLt: avg(lc.map(function(c){return c.totalBD;})),
        latePct: lc.length ? Math.round(late/lc.length*1000)/10 : 0
      };
    }).sort(function(a,b){return b.count - a.count;});

    addTitle('Distribuição por Label', 4);
    addSub(['Label','Quantidade de cards','Lead time médio','% atrasados']);
    labData.forEach(function(l){ addRow([l.name, l.count, l.avgLt, l.latePct+'%']); });

    var maxCols = 4;
    rows.forEach(function(r){ while(r.length < maxCols) r.push(''); });

    // Blocos escritos abaixo da faixa de título executivo.
    var HEAD = SHEET_HEAD_ROWS;
    var ws = XLSX.utils.aoa_to_sheet([[]]);
    XLSX.utils.sheet_add_aoa(ws, rows, { origin: { r: HEAD, c: 0 } });
    bandTitle(ws, 'Indicadores de Desempenho (KPIs)', meta || '', maxCols);
    ws['!cols'] = [{wch:30},{wch:22},{wch:20},{wch:18}];
    ws['!ref'] = 'A1:' + XLSX.utils.encode_cell({r: HEAD + rows.length - 1, c: maxCols - 1});

    for (var r = 0; r < rows.length; r++) {
      for (var c = 0; c < maxCols; c++) {
        if (types[r]==='title')     setS(ws, HEAD + r, c, sKpiTitle());
        else if (types[r]==='sub')  setS(ws, HEAD + r, c, sKpiSub());
        else if (types[r]==='data') setS(ws, HEAD + r, c, sKpiData(c > 0));
      }
    }

    return ws;
  }

  // ═══════════════════════════════════════════════
  //  ABA ALERTAS
  // ═══════════════════════════════════════════════

  var DEFAULT_SLA = {};
  var slaDefaults = [2, 5, 1, 3, 5, 2, 2, 2, 3, 2, 999];
  FLOW_LISTS.forEach(function(n, i) { DEFAULT_SLA[n] = slaDefaults[i]; });

  function sheetAlertas(cards, slaConfig, meta) {
    var sla = slaConfig || DEFAULT_SLA;
    var alerts = [];
    cards.forEach(function(c) {
      if (!c.currentListName) return;
      var limit = sla[c.currentListName];
      if (limit === undefined || limit >= 999) return;
      if (c.daysInCurrentList > limit) {
        alerts.push({
          name: c.name, list: c.currentListName, days: c.daysInCurrentList,
          slaLimit: limit, excess: c.daysInCurrentList - limit
        });
      }
    });
    alerts.sort(function(a,b) { return b.excess - a.excess; });

    var hdr = ['Card','Etapa atual','Dias úteis na etapa','SLA da etapa','Excesso'];
    var numCols = { 2:true, 3:true };
    var body = [hdr];
    alerts.forEach(function(a) {
      body.push([a.name, a.list, a.days, a.slaLimit, '+'+a.excess+' dias']);
    });

    // Corpo abaixo da faixa de título (o timestamp antes no rodapé agora vive na faixa).
    var HEAD = SHEET_HEAD_ROWS;
    var ws = XLSX.utils.aoa_to_sheet([[]]);
    XLSX.utils.sheet_add_aoa(ws, body, { origin: { r: HEAD, c: 0 } });
    bandTitle(ws, 'Alertas de SLA — Cards acima do limite', meta || '', hdr.length);
    ws['!cols'] = [{wch:35},{wch:25},{wch:20},{wch:15},{wch:20}];

    var lastRow0 = HEAD + alerts.length;        // última linha de dados (0-indexed)
    ws['!ref'] = 'A1:' + XLSX.utils.encode_cell({r: Math.max(lastRow0, HEAD), c: hdr.length - 1});

    // Cabeçalho: dark consistente com as demais abas (era vermelho isolado).
    for (var c=0; c<hdr.length; c++) setS(ws, HEAD, c, sHeader());

    for (var r=1; r<=alerts.length; r++) {
      var excess = alerts[r-1].excess;
      // Severidade: excesso alto (>5 d.u.) em vermelho-alerta, demais em âmbar.
      var bg = excess > 5 ? 'FCEBEB' : 'FFF3CD';
      for (var c2=0; c2<hdr.length; c2++) {
        setS(ws, HEAD + r, c2, {fill:{fgColor:{rgb:bg}},border:BD,alignment:{horizontal:numCols[c2]?'right':'left',vertical:'center'}});
      }
    }

    if (alerts.length) autoFilter(ws, HEAD, hdr.length, lastRow0);

    return ws;
  }

  // ═══════════════════════════════════════════════
  //  EXPORTAÇÃO
  // ═══════════════════════════════════════════════

  function loadXLSX(callback) {
    if (typeof XLSX !== 'undefined') return callback();
    var script = document.createElement('script');
    script.src = 'https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js';
    // NÃO usar `script.onload = callback` — o handler recebe o Event de load como 1º
    // argumento, que chega no callback como `err` truthy e aborta a exportação mesmo
    // quando a lib carregou. O wrapper descarta o Event (igual ao loadScriptOnce do dashboard).
    script.onload = function() { callback(); };
    script.onerror = function() { callback(new Error('Falha ao carregar biblioteca XLSX.')); };
    document.head.appendChild(script);
  }

  function exportReport(t) {
    return loadXLSX(function(err) {
      if (err) return t.alert({message: err.message, display: 'error', duration: 10});
      return _doExport(t);
    });
  }

  function _doExport(t) {
    var token, boardId;
    token = TRELLO_TOKEN;
    return t.board('id')
      .then(function(board) {
        boardId = board.id;
        return Promise.all([
          queuedFetch(apiUrl('/boards/'+boardId+'/lists?fields=name', token)).then(assertOk).then(function(r){return r.json();}),
          queuedFetch(apiUrl('/boards/'+boardId+'/customFields', token)).then(assertOk).then(function(r){return r.json();}),
          t.get('board', 'shared', 'healthConfig')
        ]);
      })
      .then(function(res) {
        var lists = res[0], customFields = res[1], healthConfig = res[2];

        var flowLists = [];
        if (Array.isArray(lists)) {
          lists.forEach(function(l) {
            for (var fi = 0; fi < FLOW_LISTS.length; fi++) {
              if (l.name.trim() === FLOW_LISTS[fi]) { flowLists.push(l); break; }
            }
          });
        }

        var listNames = flowLists.map(function(l) { return l.name.trim(); });
        listNames.sort(function(a, b) {
          return FLOW_LISTS.indexOf(a) - FLOW_LISTS.indexOf(b);
        });

        if (!flowLists.length)
          return t.alert({message:'Nenhuma lista do fluxo encontrada.', display:'warning', duration:6});

        return Promise.all(flowLists.map(function(l) {
          return queuedFetch(apiUrl('/lists/'+l.id+'/cards?filter=open&fields=name,due,dateLastActivity,labels,idList,desc,dueComplete', token))
            .then(assertOk)
            .then(function(r){return r.json();});
        })).then(function(cardArrays) {
          var cards = [];
          cardArrays.forEach(function(arr) {
            if (Array.isArray(arr)) cards = cards.concat(arr);
          });
          if (!cards.length)
            return t.alert({message:'Nenhum card em aberto encontrado.', display:'warning', duration:6});
          return { cards: cards, customFields: customFields, listNames: listNames, healthConfig: healthConfig };
        });
      })
      .then(function(data) {
        if (!data) return;
        var cards = data.cards, customFields = data.customFields, listNames = data.listNames, healthConfig = data.healthConfig;

        var retrabalhoField = null;
        if (Array.isArray(customFields)) {
          for (var fi = 0; fi < customFields.length; fi++) {
            if (customFields[fi].name === 'Retrabalhos') { retrabalhoField = customFields[fi].id; break; }
          }
        }

        var actionPromises = cards.map(function(c){
          return queuedFetch(apiUrl('/cards/'+c.id+'/actions?filter=updateCard:idList,createCard,copyCard&limit=1000', token))
            .then(assertOk)
            .then(function(r){return r.json();});
        });

        var cfPromises = cards.map(function(c){
          if (!retrabalhoField) return Promise.resolve([]);
          return queuedFetch(apiUrl('/cards/'+c.id+'/customFieldItems', token))
            .then(assertOk)
            .then(function(r){return r.json();});
        });

        return Promise.all([Promise.all(actionPromises), Promise.all(cfPromises)])
          .then(function(results) {
            var allActions = results[0], allCF = results[1];

            var processed = cards.map(function(c, i) {
              var rwVal = 0;
              if (retrabalhoField && Array.isArray(allCF[i])) {
                for (var cfi = 0; cfi < allCF[i].length; cfi++) {
                  if (allCF[i][cfi].idCustomField === retrabalhoField) {
                    var v = allCF[i][cfi].value;
                    rwVal = v ? (Number(v.number) || Number(v.text) || 0) : 0;
                    break;
                  }
                }
              }
              return processCard(c, allActions[i], listNames, rwVal);
            });

            var wb = XLSX.utils.book_new();
            var geradoEm = 'Gerado em ' + fmtDateTime(new Date());
            var metaRel = geradoEm + ' · ' + processed.length + ' card' + (processed.length === 1 ? '' : 's') + ' em aberto';
            XLSX.utils.book_append_sheet(wb, sheetRelatorio(processed, listNames, metaRel), 'Relatório');
            XLSX.utils.book_append_sheet(wb, sheetKPIs(processed, listNames, metaRel), 'KPIs');

            var slaConfig = (healthConfig && healthConfig.sla) ? healthConfig.sla : DEFAULT_SLA;
            XLSX.utils.book_append_sheet(wb, sheetAlertas(processed, slaConfig, geradoEm), 'Alertas');

            var hoje = new Date();
            var fn = 'leadtime_midiatica_'+String(hoje.getDate()).padStart(2,'0')+'-'+String(hoje.getMonth()+1).padStart(2,'0')+'-'+hoje.getFullYear()+'.xlsx';
            XLSX.writeFile(wb, fn);

            return t.alert({message:'Relatório exportado com sucesso!', display:'success', duration:5});
          });
      })
      .catch(function(err) {
        return t.alert({message:'Erro ao exportar: '+(err.message||String(err)), display:'error', duration:10});
      });
  }

  // ═══════════════════════════════════════════════
  //  LABELS CACHE
  // ═══════════════════════════════════════════════

  var LABELS_CACHE_TTL = 86400000;
  var _labelsMemCache = null;

  function getLabelsCache(t, boardId, token) {
    // Cache em memória primeiro: mesmo que o t.set do pluginData falhe (ex.: limite
    // de 4096 bytes), as labels não são re-buscadas a cada recomputo de badge.
    if (_labelsMemCache && Date.now() - _labelsMemCache.savedAt < LABELS_CACHE_TTL) {
      return Promise.resolve(_labelsMemCache);
    }
    return t.get('board', 'private', 'labelsCache')
      .catch(function() { return null; })
      .then(function(cache) {
        if (cache && cache.savedAt && Date.now() - cache.savedAt < LABELS_CACHE_TTL) {
          _labelsMemCache = cache;
          return cache;
        }
        return queuedFetch(apiUrl('/boards/' + boardId + '/labels', token))
          .then(assertOk)
          .then(function(r) { return r.json(); })
          .then(function(labels) {
            // Só id e nome são usados — objetos completos estouravam o pluginData.
            var slim = Array.isArray(labels)
              ? labels.map(function(l) { return { id: l.id, name: l.name }; })
              : [];
            var result = { labels: slim, savedAt: Date.now() };
            _labelsMemCache = result;
            t.set('board', 'private', 'labelsCache', result).catch(function() {});
            return result;
          })
          .catch(function(err) {
            console.warn('[LABELS] Falha ao buscar labels:', err && err.message ? err.message : String(err));
            return { labels: [], savedAt: 0 };
          });
      });
  }

  // ═══════════════════════════════════════════════
  //  AUTOMAÇÕES
  // ═══════════════════════════════════════════════

  var AUTO_COOLDOWN = 600000;
  var _automationLock = {};

  function logAutoFail(err) {
    console.warn('[AUTO] Falha na automação:', err && err.message ? err.message : String(err));
  }

  function runAutomations(t, card, lists, actions, cfItems, fields, token, autoCache, labelsCache, isConforme, missingItems) {
    if (_automationLock[card.id]) return;
    _automationLock[card.id] = true;
    setTimeout(function() { delete _automationLock[card.id]; }, 5000);

    var now = Date.now();
    if (!autoCache) autoCache = {};
    var changed = false;

    function cooled(key) { return !autoCache[key] || (now - autoCache[key] > AUTO_COOLDOWN); }
    function mark(key) { autoCache[key] = now; changed = true; }

    var currentList = lists.find(function(l) { return l.id === card.idList; });
    var currentListName = currentList ? currentList.name.trim() : '';
    if (LISTAS_FORA_DO_FLUXO.indexOf(currentListName) !== -1) return;
    var concluidoId = getListId(lists, 'Concluído 🏆');
    var planejamentoId = getListId(lists, 'Planejamento');

    // 1. dueComplete + fora de Concluído → mover p/ Concluído
    if (card.dueComplete && currentListName !== 'Concluído 🏆' && concluidoId && cooled('moveConcluido')) {
      queuedFetch(apiUrl('/cards/' + card.id, token), {
        method: 'PUT', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ idList: concluidoId })
      }).then(assertOk).catch(logAutoFail);
      mark('moveConcluido');
    }

    // 2. Em Concluído + !dueComplete → marcar concluído
    if (currentListName === 'Concluído 🏆' && !card.dueComplete && cooled('markComplete')) {
      queuedFetch(apiUrl('/cards/' + card.id, token), {
        method: 'PUT', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ dueComplete: true })
      }).then(assertOk).catch(logAutoFail);
      mark('markComplete');
    }

    // 6. Saiu de Captação de Imagem (últimos 10min) → add label CAPTAÇÃO REALIZADA
    if (cooled('labelCaptacao') && labelsCache && Array.isArray(labelsCache.labels)) {
      var leftCaptacao = false;
      for (var i = 0; i < actions.length; i++) {
        if (actions[i].type === 'updateCard' && actions[i].data.listBefore &&
            actions[i].data.listBefore.name.trim() === 'Captação de Imagem 🎥' &&
            (now - new Date(actions[i].date).getTime()) < AUTO_COOLDOWN) {
          leftCaptacao = true; break;
        }
      }
      if (leftCaptacao) {
        var captLabel = labelsCache.labels.find(function(l) { return l.name === 'CAPTAÇÃO REALIZADA'; });
        var alreadyHas = card.labels && card.labels.some(function(l) { return l.name === 'CAPTAÇÃO REALIZADA'; });
        if (captLabel && !alreadyHas) {
          queuedFetch(apiUrl('/cards/' + card.id + '/idLabels', token), {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ value: captLabel.id })
          }).then(assertOk).catch(logAutoFail);
          mark('labelCaptacao');
        }
      }
    }

    // 7+9. Entrou em Alterações (últimos 10min) → Retrabalhos +1 AND start = agora
    if (cooled('retrabalhoAlt')) {
      var enteredAlt = false;
      for (var j = 0; j < actions.length; j++) {
        if (actions[j].type === 'updateCard' && actions[j].data.listAfter &&
            actions[j].data.listAfter.name.trim() === 'Alterações ✏️' &&
            (now - new Date(actions[j].date).getTime()) < AUTO_COOLDOWN) {
          enteredAlt = true; break;
        }
      }
      if (enteredAlt) {
        // Increment Retrabalhos
        if (fields && fields.retrabalho) {
          var rwVal = 0;
          if (Array.isArray(cfItems)) {
            for (var ri = 0; ri < cfItems.length; ri++) {
              if (cfItems[ri].idCustomField === fields.retrabalho.fieldId) {
                var v = cfItems[ri].value;
                rwVal = v ? (Number(v.number) || 0) : 0;
                break;
              }
            }
          }
          queuedFetch('https://api.trello.com/1/card/' + card.id + '/customField/' + fields.retrabalho.fieldId + '/item?key=' + APP_KEY + '&token=' + token, {
            method: 'PUT', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ value: { number: String(rwVal + 1) } })
          }).then(assertOk).catch(logAutoFail);
        }
        // Set start date
        queuedFetch(apiUrl('/cards/' + card.id, token), {
          method: 'PUT', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ start: new Date().toISOString() })
        }).then(assertOk).catch(logAutoFail);
        mark('retrabalhoAlt');
      }
    }

    // 8. Entrou em Revisões em Atraso (últimos 10min) → Prioridade = ALTO
    if (cooled('prioAlto') && fields && fields.prioridade && fields.prioridade.options) {
      var enteredRev = false;
      for (var k = 0; k < actions.length; k++) {
        if (actions[k].type === 'updateCard' && actions[k].data.listAfter &&
            actions[k].data.listAfter.name.trim() === 'Revisões em Atraso ⏰' &&
            (now - new Date(actions[k].date).getTime()) < AUTO_COOLDOWN) {
          enteredRev = true; break;
        }
      }
      if (enteredRev) {
        var altoId = fields.prioridade.options['ALTO'];
        if (altoId) {
          queuedFetch('https://api.trello.com/1/card/' + card.id + '/customField/' + fields.prioridade.fieldId + '/item?key=' + APP_KEY + '&token=' + token, {
            method: 'PUT', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ idValue: altoId })
          }).then(assertOk).catch(logAutoFail);
          mark('prioAlto');
        }
      }
    }

    // 10. Não conforme nas listas de reversão → mover p/ topo de Planejamento + comentário
    var cooldownConformidade = 300000;
    var nasListasDeReversao = LISTAS_REVERTER_CONFORMIDADE.indexOf(currentListName) !== -1;
    var podReverter = !autoCache.lastRevertedConformidade ||
      (now - autoCache.lastRevertedConformidade > cooldownConformidade);

    if (nasListasDeReversao && !isConforme && planejamentoId && podReverter) {
      autoCache.lastRevertedConformidade = now;
      changed = true; // gravado uma única vez no bloco final (if changed)

      var commentText ='🚨 CARD DEVOLVIDO PARA PLANEJAMENTO 🚨\n\n' +
        'Este card foi movido de volta automaticamente ' +
        'porque está com campos obrigatórios incompletos.\n\n' +
        '❌ O QUE ESTÁ FALTANDO:\n' +
        missingItems.map(function(i) { return '• ' + i; }).join('\n') +
        '\n\n✅ COMO AVANÇAR:\n' +
        'Preencha todos os campos acima e mova o card ' +
        'novamente para a próxima etapa.\n\n' +
        '⚠️ O card será devolvido automaticamente ' +
        'enquanto os campos obrigatórios não forem preenchidos.';

      queuedFetch(apiUrl('/cards/' + card.id, token), {
        method: 'PUT', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ idList: planejamentoId, pos: 'top' })
      }).then(assertOk).then(function() {
        return queuedFetch(apiUrl('/cards/' + card.id + '/actions/comments', token), {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text: commentText })
        }).then(assertOk);
      }).catch(logAutoFail);
    }

    // 3+5. (Sem etiquetas OR sem due) + fora de Planejamento/finais → mover p/ Planejamento
    if (LISTAS_PROTEGIDAS_35.indexOf(currentListName) === -1 && planejamentoId && cooled('movePlanej')) {
      var noLabels = !card.labels || card.labels.length === 0;
      var noDue = !card.due;
      if (noLabels || noDue) {
        queuedFetch(apiUrl('/cards/' + card.id, token), {
          method: 'PUT', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ idList: planejamentoId })
        }).then(assertOk).catch(logAutoFail);
        mark('movePlanej');
      }
    }

    if (changed) {
      // escopo SHARED: o cooldown vale para todos os membros (private era por membro,
      // o que permitia automações duplicadas com dois boards abertos).
      t.set('card', 'shared', 'automationCache', autoCache).catch(function() {});
    }
  }

  // 60s (antes 10s): alinhado ao TTL do cache de API; reduz ~6x as rajadas de
  // requisições e as gravações de pluginData por card com o board aberto.
  var BADGE_CACHE_TTL = 60000;
  var BADGE_ERROR_TTL = 10000;

  // Jitter determinístico por card (0–20s) somado ao TTL do badge: sem isso,
  // todos os cards carregados juntos (abertura do board) expiram no MESMÍSSIMO
  // instante e todos reconsultam a API ao mesmo tempo — o "thundering herd"
  // que gerava o burst de 429 a cada minuto. Determinístico (hash do id) em
  // vez de aleatório a cada checagem, para o TTL efetivo de um card não ficar
  // mudando de valor a cada chamada.
  function badgeCacheTtlFor(cardId) {
    var hash = 0;
    for (var i = 0; i < cardId.length; i++) hash = (hash * 31 + cardId.charCodeAt(i)) >>> 0;
    return BADGE_CACHE_TTL + (hash % 20000);
  }
  var _dueCompleteProcessed = {};
  var _healthConfigCache = null;
  var _healthConfigCachedAt = 0;
  var HEALTH_CONFIG_TTL = 120000;

  function fetchAndComputeBadges(t) {
    pruneCache(_conformidadeCache);
    pruneCache(_dueCompleteProcessed);
    pruneCache(_automationLock);
    return Promise.all([
      t.card('id', 'name', 'due', 'desc', 'labels', 'idList', 'dueComplete', 'start'),
      t.board('id'),
      t.lists('id', 'name'),
      (function() {
        if (_healthConfigCache && Date.now() - _healthConfigCachedAt < HEALTH_CONFIG_TTL) {
          return Promise.resolve(_healthConfigCache);
        }
        return t.get('board', 'shared', 'healthConfig')
          .then(function(cfg) {
            _healthConfigCache = cfg;
            _healthConfigCachedAt = Date.now();
            return cfg;
          })
          .catch(function() { return null; });
      })(),
      t.get('card', 'shared', 'automationCache').catch(function() { return null; })
    ]).then(function(res) {
      var card = res[0], boardId = res[1].id, lists = res[2], cfg = res[3], autoCache = res[4];
      var token = TRELLO_TOKEN;
      var currentList = lists.find(function(l) { return l.id === card.idList; });
      var currentListName = currentList ? currentList.name.trim() : '';

      return Promise.all([
        cachedFetch(card.id+':actions', apiUrl('/cards/'+card.id+'/actions?filter=updateCard:idList,createCard,copyCard&limit=1000', token)),
        cachedFetch(card.id+':cfItems', apiUrl('/cards/'+card.id+'/customFieldItems', token)),
        getCustomFieldsCache(t, boardId, token),
        getLabelsCache(t, boardId, token)
      ]).then(function(data) {
          var actions = data[0], cfItems = data[1], fields = data[2], labelsCache = data[3];
          var badges = [];
          var tl = buildTimeline(actions);

          var ltBadge = badgeFromActions(actions);
          if (ltBadge) badges.push(ltBadge);

          var tituloOk = validarTitulo(card.name);
          var hasLabels = card.labels && card.labels.length > 0;
          var hasDue = !!card.due;
          var hasDesc = card.desc && card.desc.trim().length > 0;
          var hasPrio = fields && fields.prioridade
            ? hasPrioridade(cfItems, fields.prioridade.fieldId)
            : true;
          var isConforme = tituloOk && hasLabels && hasDue && hasDesc && hasPrio;

          var missingItems = [];
          if (!tituloOk)  missingItems.push('Título não preenchido');
          if (!hasLabels) missingItems.push('Etiqueta não definida');
          if (!hasDue)    missingItems.push('Data de entrega não definida');
          if (!hasDesc)   missingItems.push('Descrição não preenchida');
          if (!hasPrio)   missingItems.push('Prioridade não definida');

          var LISTAS_SEM_CONFORMIDADE = [
            'Revisão Interna 🔎',
            'Revisão Externa 🧐',
            'Revisões em Atraso ⏰',
            'Concluído 🏆'
          ];
          var pularConformidade = LISTAS_SEM_CONFORMIDADE.indexOf(currentListName) !== -1 ||
            LISTAS_FORA_DO_FLUXO.indexOf(currentListName) !== -1;

          if (!pularConformidade) {
            var nasListasDeReversao = LISTAS_REVERTER_CONFORMIDADE.indexOf(currentListName) !== -1;

            if (!isConforme && nasListasDeReversao) {
              badges.push({ text: '🚨 BLOQUEADO', color: 'red', title: 'Card incompleto — será devolvido para Planejamento' });
              badges.push({ text: '⚠ incompleto', color: 'red', title: 'Campos faltando: ' + missingItems.join(', ') });
            } else if (!isConforme) {
              badges.push({ text: '⚠ incompleto', color: 'red', title: 'Card sem campos obrigatórios preenchidos' });
            }

            if (fields && fields.conformidade) {
              atualizarStatusConformidade(card.id, isConforme, fields.conformidade, cfItems, token);
            }
          }

          var slaConfig = (cfg && cfg.sla) ? cfg.sla : DEFAULT_SLA;
          var slaLimite = slaConfig[currentListName];
          if (tl.length && slaLimite && slaLimite < 999) {
            var daysInCurrentList = countBusinessDays(tl[tl.length - 1].enteredAt, new Date());
            if (daysInCurrentList > slaLimite) {
              var excess = daysInCurrentList - slaLimite;
              badges.push({
                text: '+' + excess + 'd SLA',
                color: 'red',
                title: 'Card ' + excess + ' dia(s) acima do SLA da etapa'
              });
            }
          }

          t.set('card', 'private', 'badgeCache', { badges: badges, cachedAt: Date.now() }).catch(function() {});

          try {
            runAutomations(t, card, lists, actions, cfItems, fields, token, autoCache, labelsCache, isConforme, missingItems);
          } catch(e) {
            console.error('[AUTOMATIONS] Erro:', e && e.message ? e.message : String(e));
          }

          return badges;
        });
    }).catch(function(err) {
      console.error('[BADGE] ERRO FATAL:', err && err.message ? err.message : String(err));
      t.set('card', 'private', 'badgeCache', { badges: [], cachedAt: Date.now() - BADGE_CACHE_TTL + BADGE_ERROR_TTL }).catch(function() {});
      return [];
    });
  }

  function buildSections(t, missing) {
    var sections = [];
    if (Array.isArray(missing) && missing.length > 0) {
      sections.push({
        title: '⚠️ Aviso!',
        icon: ICON,
        content: {
          type: 'iframe',
          url: t.signUrl('./card-warning.html'),
          height: 52 + (missing.length * 24)
        }
      });
    }
    sections.push({
      title: APP_NAME,
      icon: ICON,
      content: {
        type: 'iframe',
        url: t.signUrl('./card-section.html'),
        height: 250
      }
    });
    return sections;
  }

  // ═══════════════════════════════════════════════
  //  INICIALIZAÇÃO
  // ═══════════════════════════════════════════════

  try {
  TrelloPowerUp.initialize({
    'card-badges': function(t) {
      return Promise.all([
        t.card('id', 'dueComplete', 'idList'),
        t.lists('id', 'name')
      ]).then(function(res) {
        var card = res[0], lists = res[1];
        var currentList = lists.find(function(l) { return l.id === card.idList; });
        var currentListName = currentList ? currentList.name.trim() : '';
        var isConcluido = currentListName === 'Concluído 🏆';

        if (card.dueComplete && !isConcluido && !_dueCompleteProcessed[card.id]) {
          _dueCompleteProcessed[card.id] = Date.now();
          return fetchAndComputeBadges(t);
        }
        if (isConcluido && _dueCompleteProcessed[card.id]) {
          delete _dueCompleteProcessed[card.id];
        }

        return t.get('card', 'private', 'badgeCache').then(function(cached) {
          if (cached && cached.badges && cached.cachedAt && (Date.now() - cached.cachedAt < badgeCacheTtlFor(card.id))) {
            return cached.badges;
          }
          return fetchAndComputeBadges(t);
        }).catch(function() { return []; });
      }).catch(function() { return []; });
    },

    'card-detail-badges': function(t) {
      return t.card('id').then(function(card) {
        return t.get('card', 'private', 'badgeCache').then(function(cached) {
          if (cached && cached.badges && cached.cachedAt && (Date.now() - cached.cachedAt < badgeCacheTtlFor(card.id))) {
            return cached.badges;
          }
          return fetchAndComputeBadges(t);
        });
      }).catch(function() { return []; });
    },

    'card-buttons': function() { return []; },

    'attachment-sections': function() { return []; },

    'attachment-thumbnail': function() { return null; },

    'card-back-section': function(t) {
      return Promise.all([
        t.card('id', 'name', 'due', 'desc', 'labels'),
        t.board('id')
      ]).then(function(res) {
        var card = res[0], boardId = res[1].id, token = TRELLO_TOKEN;
        return Promise.all([
          cachedFetch(card.id+':cfItems', apiUrl('/cards/'+card.id+'/customFieldItems', token))
            .catch(function() { return []; }),
          getCustomFieldsCache(t, boardId, token)
        ]).then(function(data) {
          var cfItems = data[0], fields = data[1];
          var tituloOk  = validarTitulo(card.name);
          var hasLabels = card.labels && card.labels.length > 0;
          var hasDue    = !!card.due;
          var hasDesc   = card.desc && card.desc.trim().length > 0;
          var hasPrio   = fields && fields.prioridade
            ? hasPrioridade(cfItems, fields.prioridade.fieldId)
            : true;
          var missing = [];
          if (!tituloOk)  missing.push('Título não preenchido');
          if (!hasLabels) missing.push('Etiqueta não definida');
          if (!hasDue)    missing.push('Data de entrega não definida');
          if (!hasDesc)   missing.push('Descrição não preenchida');
          if (!hasPrio)   missing.push('Prioridade não definida');
          // Grava só quando o valor mudou: cada t.set notifica o Trello e
          // re-dispara as capabilities do card — regravar o mesmo valor era ruído.
          t.get('card', 'shared', 'warningFields')
            .catch(function() { return null; })
            .then(function(prev) {
              var prevJson = JSON.stringify(Array.isArray(prev) ? prev : []);
              if (prevJson !== JSON.stringify(missing)) {
                t.set('card', 'shared', 'warningFields', missing).catch(function() {});
              }
            });
          return buildSections(t, missing);
        });
      }).catch(function() {
        return buildSections(t, []);
      });
    },

    'board-buttons': function (t) {
      return [{
        icon: 'https://cdn.jsdelivr.net/npm/lucide-static@0.321.0/icons/heart-pulse.svg',
        text: 'Dashboard',
        callback: function(t) {
          return t.modal({
            url: './dashboard.html?v=8',
            fullscreen: true,
            title: 'Power Up Midiática'
          });
        }
      }, {
        icon: 'https://cdn.jsdelivr.net/npm/lucide-static@0.321.0/icons/download.svg',
        text: 'Relatório',
        callback: function(t) {
          t.alert({ message: 'Gerando relatório…', display: 'info', duration: 30 });
          return exportReport(t);
        }
      }];
    },

    'authorization-status': function () {
      return { authorized: true };
    }
  }, {
    appKey: APP_KEY,
    appName: APP_NAME
  });
  } catch(e) {
    console.error('[LeadTime] Erro na inicialização:', e);
  }
})();
</script>
