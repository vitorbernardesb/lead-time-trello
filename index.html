<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>Lead Time Midiática</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
</head>
<body>
<script>
(function () {
  var APP_KEY = '35b840777660fac1ae7823df3d2398f6';
  var APP_NAME = 'Lead Time Midiática';
  var MIN_STAGE_MS = 600000;
  var ICON = 'https://vitorbernardesb.github.io/lead-time-trello/icon.svg';

  var FLOW_LISTS = [
    'Planejamento',
    'Captação de Imagem 🎥',
    '🛑URGÊNCIAS🛑',
    'A fazer 👇',
    'Em andamento 💪',
    'Alterações ✏️',
    '⚠️Atrasos⚠️',
    'Revisão Interna 🔎',
    'Revisão Externa 🧐',
    'Revisões em Atraso ⏰',
    'Concluído 🏆'
  ];

  // ═══════════════════════════════════════════════
  //  UTILITÁRIOS
  // ═══════════════════════════════════════════════

  function countBusinessDays(from, to) {
    var s = new Date(from); s.setHours(0,0,0,0);
    var e = new Date(to);   e.setHours(0,0,0,0);
    var c = 0, d = new Date(s);
    while (d < e) { if (d.getDay()!==0 && d.getDay()!==6) c++; d.setDate(d.getDate()+1); }
    return c;
  }

  function fmtDate(v) {
    if (!v) return '';
    var d = new Date(v);
    return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear();
  }

  function buildTimeline(actions) {
    if (!Array.isArray(actions)) actions = [];
    actions.sort(function(a,b){ return new Date(a.date)-new Date(b.date); });
    var stages = [];
    for (var i=0; i<actions.length; i++) {
      var act=actions[i], date=new Date(act.date);
      if ((act.type==='createCard'||act.type==='copyCard') && act.data.list) {
        stages.push({name:act.data.list.name, enteredAt:date, leftAt:null});
      } else if (act.type==='updateCard' && act.data.listAfter) {
        if (stages.length===0 && act.data.listBefore)
          stages.push({name:act.data.listBefore.name, enteredAt:date, leftAt:date});
        if (stages.length>0) stages[stages.length-1].leftAt = date;
        stages.push({name:act.data.listAfter.name, enteredAt:date, leftAt:null});
      }
    }
    var out = [];
    for (var j=0; j<stages.length; j++) {
      var st=stages[j], dur=(st.leftAt?st.leftAt.getTime():Date.now())-st.enteredAt.getTime();
      if (dur<MIN_STAGE_MS && st.leftAt && out.length>0) out[out.length-1].leftAt=st.leftAt;
      else out.push(st);
    }
    return out;
  }

  function apiUrl(path, token) {
    return 'https://api.trello.com/1'+path+(path.indexOf('?')>=0?'&':'?')+'key='+APP_KEY+'&token='+token;
  }

  function avg(arr, ignoreZeros) {
    var f = ignoreZeros ? arr.filter(function(v){return v>0;}) : arr.filter(function(v){return v!=null;});
    if (!f.length) return 0;
    return Math.round(f.reduce(function(a,b){return a+b;},0)/f.length*10)/10;
  }

  // ═══════════════════════════════════════════════
  //  BADGE
  // ═══════════════════════════════════════════════

  function fetchActions(t) {
    return t.card('id').then(function(card) {
      return t.getRestApi().getToken().then(function(token) {
        return fetch(apiUrl('/cards/'+card.id+'/actions?filter=updateCard:idList,createCard,copyCard&limit=1000',token))
          .then(function(r){return r.json();});
      });
    });
  }

  function badgeFromActions(actions) {
    if (!Array.isArray(actions) || !actions.length) return null;
    var tl = buildTimeline(actions);
    if (!tl.length) return null;
    var current = tl[tl.length - 1];
    var days = countBusinessDays(current.enteredAt, new Date());
    return {
      title: 'Dias úteis nesta etapa',
      icon: 'https://cdn.jsdelivr.net/npm/lucide-static@0.321.0/icons/clock.svg',
      text: days === 1 ? '1d útil' : days + 'd úteis',
      color: days <= 3 ? 'green' : days <= 6 ? 'yellow' : 'red'
    };
  }

  // ═══════════════════════════════════════════════
  //  ESTILOS XLSX
  // ═══════════════════════════════════════════════

  var BD = {
    top:{style:'thin',color:{rgb:'CCCCCC'}},
    bottom:{style:'thin',color:{rgb:'CCCCCC'}},
    left:{style:'thin',color:{rgb:'CCCCCC'}},
    right:{style:'thin',color:{rgb:'CCCCCC'}}
  };

  function sHeader()    { return {font:{bold:true,color:{rgb:'FFFFFF'},sz:11},fill:{fgColor:{rgb:'1E3A5F'}},border:BD,alignment:{horizontal:'center',vertical:'center'}}; }
  function sData(r,num) { return {fill:{fgColor:{rgb:r%2===0?'FFFFFF':'F8F9FA'}},border:BD,alignment:{horizontal:num?'right':'left',vertical:'center'}}; }
  function sMedia(num)  { var o = {font:{bold:true},fill:{fgColor:{rgb:'FFF9C4'}},border:BD,alignment:{horizontal:num?'right':'left'}}; if(num) o.numFmt='0.0'; return o; }

  function sStatus(v) {
    var bg = v==='🔴 Atrasado'?'FDE8E8' : v==='⚠️ Vence hoje'?'FFF3CD' : v==='✅ No prazo'?'E8F5E9' : 'FFFFFF';
    return {fill:{fgColor:{rgb:bg}},border:BD,alignment:{horizontal:'left'}};
  }

  function sDiasAtePrazo(val, rowIdx) {
    var base = sData(rowIdx, true);
    if (val === '' || val === null || val === undefined) return base;
    if (val < 0)  return {fill:{fgColor:{rgb:'FF4C4C'}},font:{color:{rgb:'FFFFFF'}},border:BD,alignment:{horizontal:'right'}};
    if (val === 0) return {fill:{fgColor:{rgb:'FF8800'}},font:{color:{rgb:'FFFFFF'}},border:BD,alignment:{horizontal:'right'}};
    return base;
  }

  function sPrazoDegrade(dud, rowIdx) {
    var base = sData(rowIdx, false);
    if (dud === null || dud === undefined) return base;
    var bg, fg = null;
    if (dud < 0)       { bg='FF4C4C'; fg='FFFFFF'; }
    else if (dud <= 2)  bg='FF7043';
    else if (dud <= 5)  bg='FFA726';
    else if (dud <= 10) bg='FFCC02';
    else if (dud <= 20) bg='C6E03B';
    else if (dud <= 40) bg='66BB6A';
    else                { bg='2E7D32'; fg='FFFFFF'; }
    var s = {fill:{fgColor:{rgb:bg}},border:BD,alignment:{horizontal:'left'}};
    if (fg) s.font = {color:{rgb:fg}};
    return s;
  }

  function sKpiTitle()  { return {font:{bold:true,color:{rgb:'FFFFFF'},sz:12},fill:{fgColor:{rgb:'1E3A5F'}},border:BD}; }
  function sKpiSub()    { return {font:{bold:true},fill:{fgColor:{rgb:'E0E0E0'}},border:BD}; }
  function sKpiData(num){ return {border:BD,alignment:{horizontal:num?'right':'left'}}; }

  function setS(ws,r,c,style) {
    var ref=XLSX.utils.encode_cell({r:r,c:c});
    if (!ws[ref]) ws[ref]={v:'',t:'s'};
    ws[ref].s=style;
  }

  function colWidths(data,max) {
    var w=[];
    for (var c=0;c<data[0].length;c++) {
      var m=8;
      for (var r=0;r<data.length;r++) {
        var l=String(data[r]&&data[r][c]!=null?data[r][c]:'').length;
        if (l>m) m=l;
      }
      w.push({wch:Math.min(m+3,max||40)});
    }
    return w;
  }

  // ═══════════════════════════════════════════════
  //  PROCESSAMENTO DE DADOS
  // ═══════════════════════════════════════════════

  function processCard(card, actions, listNames, retrabalhoVal) {
    if (!Array.isArray(actions)) actions = [];
    var tl = buildTimeline(actions), now = new Date();
    var bd = {}, visited = {};
    var created = null;

    listNames.forEach(function(n){ bd[n] = null; });

    for (var i=0; i<actions.length; i++) {
      if (actions[i].type==='createCard'||actions[i].type==='copyCard') {
        var dt = new Date(actions[i].date);
        if (!created || dt < created) created = dt;
      }
    }

    tl.forEach(function(st) {
      var end = st.leftAt || now;
      var b = countBusinessDays(st.enteredAt, end);
      if (bd.hasOwnProperty(st.name)) {
        bd[st.name] = (bd[st.name] === null ? 0 : bd[st.name]) + b;
        visited[st.name] = true;
      }
    });

    var totalBD = 0;
    listNames.forEach(function(n){ if (bd[n] !== null) totalBD += bd[n]; });

    var dud = null;
    if (card.due) {
      var td = new Date(); td.setHours(0,0,0,0);
      var du = new Date(card.due); du.setHours(0,0,0,0);
      dud = Math.round((du - td) / 86400000);
    }

    var sp = dud===null ? '—' : dud<0 ? '🔴 Atrasado' : dud===0 ? '⚠️ Vence hoje' : '✅ No prazo';
    var lab = (card.labels||[]).map(function(l){ return l.name||l.color; }).join(' | ');

    return {
      name: card.name,
      labels: lab,
      createdAt: created ? fmtDate(created) : '',
      due: card.due ? fmtDate(card.due) : '',
      daysUntilDue: dud,
      bd: bd,
      totalBD: totalBD,
      retrabalho: retrabalhoVal,
      status: sp
    };
  }

  // ═══════════════════════════════════════════════
  //  ABA RELATÓRIO
  // ═══════════════════════════════════════════════

  function sheetRelatorio(cards, listNames) {
    var hdr = ['Card','Labels','Criado em','Prazo','Dias até o Prazo'];
    var prazoCol = 3;
    var diasCol = 4;
    var stageStart = hdr.length;
    listNames.forEach(function(n){ hdr.push(n); });
    hdr.push('Lead Time Total (d.u.)');
    var ltCol = hdr.length - 1;
    hdr.push('Retrabalho');
    var rwCol = hdr.length - 1;
    hdr.push('Status Prazo');
    var stCol = hdr.length - 1;

    var numCols = {};
    numCols[diasCol] = true;
    for (var ci = stageStart; ci <= rwCol; ci++) numCols[ci] = true;

    var data = [hdr];
    cards.forEach(function(c) {
      var row = [c.name, c.labels, c.createdAt, c.due, c.daysUntilDue !== null ? c.daysUntilDue : ''];
      listNames.forEach(function(n){ row.push(c.bd[n] !== null ? c.bd[n] : '-'); });
      row.push(c.totalBD);
      row.push(c.retrabalho);
      row.push(c.status);
      data.push(row);
    });

    var lastDataRow = cards.length + 1;
    var mRow = new Array(hdr.length);
    for (var mi = 0; mi < mRow.length; mi++) mRow[mi] = '';
    mRow[0] = 'MÉDIA';
    data.push(mRow);

    var ws = XLSX.utils.aoa_to_sheet(data);

    function colLetter(idx) { return XLSX.utils.encode_col(idx); }

    if (lastDataRow >= 2) {
      var diasLetter = colLetter(diasCol);
      var ref = XLSX.utils.encode_cell({r: lastDataRow, c: diasCol});
      ws[ref] = {t:'n', f:'AVERAGE('+diasLetter+'2:'+diasLetter+lastDataRow+')', s: sMedia(true)};

      for (var si = 0; si < listNames.length; si++) {
        var col = stageStart + si;
        var cl = colLetter(col);
        var sr = XLSX.utils.encode_cell({r: lastDataRow, c: col});
        ws[sr] = {t:'n', f:'AVERAGE('+cl+'2:'+cl+lastDataRow+')', s: sMedia(true)};
      }

      var ltLetter = colLetter(ltCol);
      var ltRef = XLSX.utils.encode_cell({r: lastDataRow, c: ltCol});
      ws[ltRef] = {t:'n', f:'AVERAGE('+ltLetter+'2:'+ltLetter+lastDataRow+')', s: sMedia(true)};

      var rwLetter = colLetter(rwCol);
      var rwRef = XLSX.utils.encode_cell({r: lastDataRow, c: rwCol});
      ws[rwRef] = {t:'n', f:'AVERAGE('+rwLetter+'2:'+rwLetter+lastDataRow+')', s: sMedia(true)};
    }

    ws['!cols'] = colWidths(data, 40);
    ws['!freeze'] = { xSplit: 0, ySplit: 1, topLeftCell: 'A2', activeCell: 'A2', sqref: 'A2' };

    var totalR = data.length, totalC = hdr.length;
    for (var r = 0; r < totalR; r++) {
      for (var c = 0; c < totalC; c++) {
        var cellRef = XLSX.utils.encode_cell({r:r, c:c});
        if (r === 0) {
          setS(ws, r, c, sHeader());
        } else if (r === totalR - 1) {
          if (!ws[cellRef] || !ws[cellRef].f) setS(ws, r, c, sMedia(!!numCols[c]));
        } else if (c === stCol) {
          setS(ws, r, c, sStatus(data[r][c]));
        } else if (c === diasCol) {
          setS(ws, r, c, sDiasAtePrazo(data[r][c], r-1));
        } else if (c === prazoCol) {
          setS(ws, r, c, sPrazoDegrade(cards[r-1].daysUntilDue, r-1));
        } else {
          setS(ws, r, c, sData(r-1, !!numCols[c]));
        }
      }
    }

    return ws;
  }

  // ═══════════════════════════════════════════════
  //  ABA KPIs
  // ═══════════════════════════════════════════════

  function sheetKPIs(cards, listNames) {
    var rows = [], types = [];
    function addTitle(text, cols) {
      var r = new Array(cols); for (var i=0;i<cols;i++) r[i]=''; r[0]=text;
      rows.push(r); types.push('title');
    }
    function addSub(arr) { rows.push(arr); types.push('sub'); }
    function addRow(arr) { rows.push(arr); types.push('data'); }
    function addBlank(cols) { var r=new Array(cols); for(var i=0;i<cols;i++) r[i]=''; rows.push(r); types.push('empty'); }

    var total = cards.length;
    var avgLT = avg(cards.map(function(c){return c.totalBD;}), false);
    var rwCards = cards.filter(function(c){return c.retrabalho > 0;}).length;
    var dueCards = cards.filter(function(c){return c.daysUntilDue !== null;}).length;
    var lateCards = cards.filter(function(c){return c.status==='🔴 Atrasado';}).length;
    function pct(n){ return total ? Math.round(n/total*1000)/10 : 0; }

    addTitle('Visão Geral', 2);
    addSub(['Indicador','Valor']);
    addRow(['Total de cards em aberto', total]);
    addRow(['Lead time médio total (d.u.)', avgLT]);
    addRow(['Cards com retrabalho', rwCards+' ('+pct(rwCards)+'%)']);
    addRow(['Cards com prazo definido', dueCards+' ('+pct(dueCards)+'%)']);
    addRow(['Cards atrasados', lateCards+' ('+pct(lateCards)+'%)']);
    addBlank(2);

    addTitle('Gargalos por Etapa', 4);
    addSub(['Etapa','Média d.u.','Cards que passaram','Retrabalho médio']);
    listNames.forEach(function(n) {
      var bv = cards.map(function(c){return c.bd[n];}).filter(function(v){return v!==null && v>0;});
      var passed = bv.length;
      var rwVals = cards.filter(function(c){return c.bd[n]!==null;}).map(function(c){return c.retrabalho;});
      var avgRw = avg(rwVals, false);
      addRow([n, avg(bv, false), passed, avgRw]);
    });
    addBlank(4);

    var labMap = {};
    cards.forEach(function(c){
      if (!c.labels) return;
      c.labels.split(' | ').forEach(function(l){
        if (!l) return;
        if (!labMap[l]) labMap[l] = [];
        labMap[l].push(c);
      });
    });
    var labData = Object.keys(labMap).map(function(l){
      var lc = labMap[l];
      var late = lc.filter(function(c){return c.status==='🔴 Atrasado';}).length;
      return {
        name: l,
        count: lc.length,
        avgLt: avg(lc.map(function(c){return c.totalBD;}), false),
        latePct: lc.length ? Math.round(late/lc.length*1000)/10 : 0
      };
    }).sort(function(a,b){return b.count - a.count;});

    addTitle('Distribuição por Label', 4);
    addSub(['Label','Quantidade de cards','Lead time médio','% atrasados']);
    labData.forEach(function(l){ addRow([l.name, l.count, l.avgLt, l.latePct+'%']); });

    var maxCols = 4;
    rows.forEach(function(r){ while(r.length < maxCols) r.push(''); });

    var ws = XLSX.utils.aoa_to_sheet(rows);
    ws['!cols'] = [{wch:30},{wch:22},{wch:20},{wch:18}];

    for (var r = 0; r < rows.length; r++) {
      for (var c = 0; c < maxCols; c++) {
        if (types[r]==='title')     setS(ws, r, c, sKpiTitle());
        else if (types[r]==='sub')  setS(ws, r, c, sKpiSub());
        else if (types[r]==='data') setS(ws, r, c, sKpiData(c > 0));
      }
    }

    return ws;
  }

  // ═══════════════════════════════════════════════
  //  EXPORTAÇÃO
  // ═══════════════════════════════════════════════

  function exportReport(t) {
    if (typeof XLSX === 'undefined')
      return t.alert({message:'Erro: biblioteca de exportação não carregou. Recarregue a página.', display:'error', duration:10});

    var token, boardId;
    return t.getRestApi().getToken()
      .then(function(tok) {
        token = tok;
        return t.board('id');
      })
      .then(function(board) {
        boardId = board.id;
        return Promise.all([
          fetch(apiUrl('/boards/'+boardId+'/lists?fields=name', token)).then(function(r){return r.json();}),
          fetch(apiUrl('/boards/'+boardId+'/customFields', token)).then(function(r){return r.json();})
        ]);
      })
      .then(function(res) {
        var lists = res[0], customFields = res[1];

        var flowLists = [];
        if (Array.isArray(lists)) {
          lists.forEach(function(l) {
            for (var fi = 0; fi < FLOW_LISTS.length; fi++) {
              if (l.name.trim() === FLOW_LISTS[fi]) { flowLists.push(l); break; }
            }
          });
        }

        var listNames = flowLists.map(function(l) { return l.name.trim(); });
        listNames.sort(function(a, b) {
          return FLOW_LISTS.indexOf(a) - FLOW_LISTS.indexOf(b);
        });

        if (!flowLists.length)
          return t.alert({message:'Nenhuma lista do fluxo encontrada.', display:'warning', duration:6});

        return Promise.all(flowLists.map(function(l) {
          return fetch(apiUrl('/lists/'+l.id+'/cards?filter=open&fields=name,due,dateLastActivity,labels,idList', token))
            .then(function(r){return r.json();});
        })).then(function(cardArrays) {
          var cards = [];
          cardArrays.forEach(function(arr) {
            if (Array.isArray(arr)) cards = cards.concat(arr);
          });
          if (!cards.length)
            return t.alert({message:'Nenhum card em aberto encontrado.', display:'warning', duration:6});
          return { cards: cards, customFields: customFields, listNames: listNames };
        });
      })
      .then(function(data) {
        if (!data) return;
        var cards = data.cards, customFields = data.customFields, listNames = data.listNames;

        var retrabalhoField = null;
        if (Array.isArray(customFields)) {
          for (var fi = 0; fi < customFields.length; fi++) {
            if (customFields[fi].name === 'Retrabalho') { retrabalhoField = customFields[fi].id; break; }
          }
        }

        var actionPromises = cards.map(function(c){
          return fetch(apiUrl('/cards/'+c.id+'/actions?filter=updateCard:idList,createCard,copyCard&limit=1000', token))
            .then(function(r){return r.json();});
        });

        var cfPromises = cards.map(function(c){
          if (!retrabalhoField) return Promise.resolve([]);
          return fetch(apiUrl('/cards/'+c.id+'/customFieldItems', token))
            .then(function(r){return r.json();});
        });

        return Promise.all([Promise.all(actionPromises), Promise.all(cfPromises)])
          .then(function(results) {
            var allActions = results[0], allCF = results[1];

            var processed = cards.map(function(c, i) {
              var rwVal = 0;
              if (retrabalhoField && Array.isArray(allCF[i])) {
                for (var cfi = 0; cfi < allCF[i].length; cfi++) {
                  if (allCF[i][cfi].idCustomField === retrabalhoField) {
                    var v = allCF[i][cfi].value;
                    rwVal = v ? (Number(v.number) || Number(v.text) || 0) : 0;
                    break;
                  }
                }
              }
              return processCard(c, allActions[i], listNames, rwVal);
            });

            var wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, sheetRelatorio(processed, listNames), 'Relatório');
            XLSX.utils.book_append_sheet(wb, sheetKPIs(processed, listNames), 'KPIs');

            var hoje = new Date();
            var fn = 'leadtime_midiatica_'+String(hoje.getDate()).padStart(2,'0')+'-'+String(hoje.getMonth()+1).padStart(2,'0')+'-'+hoje.getFullYear()+'.xlsx';
            XLSX.writeFile(wb, fn);

            return t.alert({message:'Relatório exportado com sucesso!', display:'success', duration:5});
          });
      })
      .catch(function(err) {
        return t.alert({message:'Erro ao exportar: '+(err.message||String(err)), display:'error', duration:10});
      });
  }

  // ═══════════════════════════════════════════════
  //  INICIALIZAÇÃO
  // ═══════════════════════════════════════════════

  TrelloPowerUp.initialize({
    'card-badges': function (t) {
      return t.getRestApi().isAuthorized().then(function (ok) {
        if (!ok) return [];
        return fetchActions(t).then(function (actions) {
          var badge = badgeFromActions(actions);
          return badge ? [badge] : [];
        }).catch(function () { return []; });
      });
    },

    'card-back-section': function (t) {
      return {
        title: APP_NAME,
        icon: ICON,
        content: {
          type: 'iframe',
          url: t.signUrl('./card-section.html'),
          height: 250
        }
      };
    },

    'board-buttons': function (t) {
      return [{
        icon: 'https://cdn.jsdelivr.net/npm/lucide-static@0.321.0/icons/download.svg',
        text: 'Exportar Lead Time',
        callback: exportReport
      }];
    },

    'authorization-status': function (t) {
      return t.getRestApi().isAuthorized().then(function (ok) {
        return { authorized: ok };
      });
    },

    'show-authorization': function (t) {
      return t.getRestApi().authorize({ scope: 'read', expiration: 'never' });
    }
  }, {
    appKey: APP_KEY,
    appName: APP_NAME
  });
})();
</script>
</body>
</html>
