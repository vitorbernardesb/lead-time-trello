<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>Aviso de Conformidade</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont,
        'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      font-size: 14px;
      background: transparent;
      padding: 4px 0;
      overflow: hidden;
    }
    #content { width: 100%; overflow: visible; }

    .warning-box {
      background: #FDF1F0;
      border: 1px solid #F3CFCA;
      border-left: 3px solid #C9372C;
      border-radius: 8px;
      padding: 10px 14px;
    }
    .warning-title {
      font-size: 11px;
      font-weight: 700;
      color: #AE2E24;
      margin-bottom: 7px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .warning-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #172b4d;
      margin-bottom: 4px;
    }
    .warning-item:last-child { margin-bottom: 0; }
    .warning-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #C9372C;
      flex-shrink: 0;
    }
    .msg {
      font-size: 12px;
      color: #6b778c;
      text-align: center;
      padding: 8px;
    }
  </style>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
</head>
<body>
<div id="content">
  <p class="msg">Verificando conformidade…</p>
</div>
<script>
(function() {
  var APP_KEY = '35b840777660fac1ae7823df3d2398f6';
  var t = TrelloPowerUp.iframe({ appKey: APP_KEY, appName: 'Lead Time Midiática' });
  var content = document.getElementById('content');

  function escapeHtml(str) {
    var el = document.createElement('span');
    el.appendChild(document.createTextNode(str));
    return el.innerHTML;
  }

  function adjustHeight() {
    t.sizeTo(content.scrollHeight + 8);
  }

  t.render(function() {
    t.get('card', 'shared', 'warningFields')
      .catch(function() { return []; })
      .then(function(missing) {
        if (!missing || missing.length === 0) {
          content.innerHTML = '';
          t.sizeTo(1);
          return;
        }

        var html = '<div class="warning-box">';
        html += '<div class="warning-title">⚠️ Campos obrigatórios pendentes</div>';
        missing.forEach(function(item) {
          html += '<div class="warning-item">' +
            '<span class="warning-dot"></span>' +
            escapeHtml(item) + '</div>';
        });
        html += '</div>';

        content.innerHTML = html;
        adjustHeight();
      });
  });
})();
</script>
</body>
</html>
